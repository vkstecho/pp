<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#1a305c"/>
  <title>Plan Power — Plan Power Met Dept</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <script>
    if('serviceWorker' in navigator&&location.protocol==='https:'&&!location.hostname.includes('claude')){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('/sw.js?v=4',{updateViaCache:'none'})
          .then(reg=>{console.log('%c✓ Plan Power SW','color:#22c55e;font-weight:bold');reg.update();})
          .catch(e=>console.warn('SW:',e));
      });
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;font-family:system-ui,sans-serif;background:#f0f4f8}
    #pp-splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(150deg,#1a305c 0%,#0c1a35 55%,#0f2040 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s ease}
    #pp-splash.fade{opacity:0;pointer-events:none}
    /* Hard fallback: if React takes too long, force hide after 5s */
    .pp-ring{position:absolute;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;border:1px solid rgba(251,191,36,.06)}
    .pp-title{font-size:32px;font-weight:800;color:#fff;letter-spacing:.5px;margin-top:16px}
    .pp-sub{font-size:13px;color:rgba(255,255,255,.35);margin-top:6px;letter-spacing:.8px}
    .pp-loader{display:flex;gap:7px;margin-top:28px}
    .pp-dot{width:8px;height:8px;border-radius:50%;background:#fbbf24;animation:ppDot 1.2s ease-in-out infinite}
    .pp-dot:nth-child(2){animation-delay:.2s}.pp-dot:nth-child(3){animation-delay:.4s}
    @keyframes ppDot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
  </style>
</head>
<body>
<div id="pp-splash">
  <div class="pp-ring" style="width:200px;height:200px"></div>
  <div class="pp-ring" style="width:320px;height:320px"></div>
  <div class="pp-ring" style="width:440px;height:440px"></div>
  <div class="pp-ring" style="width:560px;height:560px"></div>
  <svg width="96" height="96" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="spbg" cx="50%" cy="40%" r="70%">
        <stop offset="0%" stop-color="#1e3a6e"/>
        <stop offset="60%" stop-color="#0f1e3a"/>
        <stop offset="100%" stop-color="#060e20"/>
      </radialGradient>
      <linearGradient id="spgh" x1="0%" y1="0%" x2="60%" y2="100%">
        <stop offset="0%" stop-color="#fff0a0"/>
        <stop offset="35%" stop-color="#fbbf24"/>
        <stop offset="100%" stop-color="#c47a00"/>
      </linearGradient>
      <linearGradient id="spgl" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#fff3c4"/>
        <stop offset="50%" stop-color="#fbbf24"/>
        <stop offset="100%" stop-color="#a06000"/>
      </linearGradient>
      <filter id="spglow" x="-25%" y="-25%" width="150%" height="150%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <circle cx="100" cy="100" r="98" fill="url(#spbg)"/>
    <circle cx="100" cy="100" r="93" fill="none" stroke="#fbbf24" stroke-width="3.5" opacity="0.95"/>
    <circle cx="100" cy="100" r="86" fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.35"/>
    <ellipse cx="100" cy="46" rx="58" ry="30" fill="rgba(255,255,255,0.07)"/>
    <!-- LEFT P -->
    <g filter="url(#spglow)">
      <rect x="56.5" y="58" width="12" height="56" rx="2" fill="url(#spgl)"/>
      <rect x="57" y="58" width="5" height="56" rx="2" fill="#fff0a0" opacity="0.55"/>
      <path d="M68.5 58 C68.5 58 105 58 105 80 C105 102 68.5 102 68.5 102 L68.5 91 C68.5 91 91 91 91 80 C91 69 68.5 69 68.5 69 Z" fill="url(#spgh)"/>
    </g>
    <path d="M57 114 L67 114 L57.5 132 L66 132 L51.5 158 L64 140.5 L55 140.5 Z" fill="#fbbf24" filter="url(#spglow)"/>
    <path d="M57 114 L61 114 L57.5 122 L60 122 Z" fill="#fff0a0" opacity="0.7"/>
    <!-- RIGHT P -->
    <g filter="url(#spglow)">
      <rect x="131.5" y="58" width="12" height="56" rx="2" fill="url(#spgl)"/>
      <rect x="137" y="58" width="5" height="56" rx="2" fill="#fff0a0" opacity="0.55"/>
      <path d="M131.5 58 C131.5 58 95 58 95 80 C95 102 131.5 102 131.5 102 L131.5 91 C131.5 91 109 91 109 80 C109 69 131.5 69 131.5 69 Z" fill="url(#spgh)"/>
    </g>
    <path d="M143 114 L133 114 L142.5 132 L134 132 L148.5 158 L136 140.5 L145 140.5 Z" fill="#fbbf24" filter="url(#spglow)"/>
    <path d="M143 114 L139 114 L142.5 122 L140 122 Z" fill="#fff0a0" opacity="0.7"/>
    <!-- Pupils -->
    <circle cx="85" cy="80" r="5.5" fill="#06121e" opacity="0.88"/>
    <circle cx="115" cy="80" r="5.5" fill="#06121e" opacity="0.88"/>
    <circle cx="85" cy="80" r="2.5" fill="#1040a0" opacity="0.7"/>
    <circle cx="115" cy="80" r="2.5" fill="#1040a0" opacity="0.7"/>
    <circle cx="87" cy="77.5" r="1.8" fill="rgba(255,255,255,0.75)"/>
    <circle cx="117" cy="77.5" r="1.8" fill="rgba(255,255,255,0.75)"/>
    <!-- Crown -->
    <polygon points="100,4 102.5,9.5 108.5,9.5 103.8,13.2 105.8,19 100,15.5 94.2,19 96.2,13.2 91.5,9.5 97.5,9.5" fill="#fde68a" opacity="0.92"/>
    <circle cx="100" cy="100" r="97" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="3"/>
  </svg>
  <div class="pp-title">PLAN POWER</div>
  <div class="pp-sub">MET DEPARTMENT</div>
  <div class="pp-loader"><div class="pp-dot"></div><div class="pp-dot"></div><div class="pp-dot"></div></div>
  <div style="font-size:11px;color:rgba(255,255,255,.25);margin-top:14px;letter-spacing:.5px">Compiling app…</div>
  <div id="pp-err"></div>
</div>
<div id="root"></div>
<script>
  // Catch any JS errors and show on screen instead of blank
  window.onerror = function(msg, src, line, col, err) {
    var s = document.getElementById('pp-splash');
    if(s) { s.style.display = 'flex'; s.style.opacity = '1'; }
    var el = document.getElementById('pp-err');
    var detail = err ? (err.message || err.toString()) : '';
    var stack = err && err.stack ? err.stack.slice(0,300) : '';
    if(el) el.innerHTML = '<div style="background:rgba(220,38,38,.9);color:#fff;padding:14px 18px;border-radius:10px;max-width:90vw;font-size:11px;margin-top:16px;text-align:left;word-break:break-all"><b>⚠ Error</b><br>MSG: '+msg+'<br>SRC: '+src+'<br>LINE: '+line+'<br>DETAIL: '+detail+'<br><small>'+stack+'</small></div>';
    return false;
  };
  // Hard fallback: hide splash after 12s regardless of React status
  setTimeout(function(){
    var s=document.getElementById('pp-splash');
    if(s&&s.style.display!=='none'){s.classList.add('fade');setTimeout(function(){s.style.display='none';},700);}
  }, 12000);
</script>

<script type="text/babel" data-presets="react">
const { useState } = React;
function App() {
  return <div style={{padding:40,textAlign:"center",fontSize:24,color:"green"}}>✓ React Works!</div>;
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
// Hide splash
document.addEventListener('DOMContentLoaded',function(){
  var s=document.getElementById('pp-splash');
  if(s)s.style.opacity='0';
});
</script>
</body>
</html>
