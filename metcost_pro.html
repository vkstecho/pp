      ct.innerHTML=`<div class="cd"><div class="nd"><p>No Time Study data for ${monthLabel(tsSel)}</p><p style="font-size:11px;margin-top:4px;color:var(--tx3)">Upload ZJUMBO file with timing data on laptop → Sync to Cloud → Open Time Study here</p></div></div>`;return;
    }
    const calDays=new Date(new Date(selMonth+'-01').getFullYear(),new Date(selMonth+'-01').getMonth()+1,0).getDate();
    const totalMins=calDays*1440;
    // Helper: time bar row
    function tsBar(label,mins,color,perRollNote,rolls){
      const pct=totalMins>0?mins/totalMins*100:0;
      const avg=rolls>0?mins/rolls:0;
      const hrs=(mins/60).toFixed(1);
      const days=(mins/1440).toFixed(1);
      return `<tr style="cursor:pointer" onclick="alert('${label}:\\n${mins} min = ${hrs} hrs = ${days} days\\n${pct.toFixed(1)}% of ${totalMins} calendar min\\nPer roll avg: ${avg.toFixed(1)} min${perRollNote||''}')">
        <td>${label}</td>
        <td class="n" style="font-family:var(--mn);font-weight:700">${fmt(mins,0)}</td>
        <td class="n">${hrs}h</td>
        <td class="n">${days}d</td>
        <td class="n">${fmt(avg,1)}</td>
        <td style="width:80px"><div style="background:var(--bg);border-radius:4px;height:10px"><div style="background:${color};height:10px;border-radius:4px;width:${Math.min(100,pct)}%"></div></div></td>
        <td class="n" style="font-size:10px">${fmt(pct,1)}%</td>
      </tr>`;
    }
    function machineTS(mk,label,color){
      const t=ts[mk];
      if(!t||!t.rolls) return `<div class="cd" style="border-left:3px solid var(--tx3)"><div class="ct2">${label} — No data</div><div style="font-size:11px;color:var(--tx3);padding:8px 0">No ZJUMBO rolls found for this machine</div></div>`;
      const operational=(t.setupMins||0)+(t.vacuumMins||0)+(t.runMins||0)+(t.ventMins||0)+(t.boatMins||0);
      return `<div class="cd" style="border-left:3px solid ${color}">
        <div class="ct2" style="color:${color}">${label} — ${monthLabel(selMonth)} (${t.rolls} rolls)</div>
        <div class="mg" style="margin-bottom:8px">
          <div class="mc" style="border-left-color:${color}"><div class="ml">Total Rolls</div><div class="mv">${t.rolls}</div></div>
          <div class="mc" style="border-left-color:#22c55e"><div class="ml">Running</div><div class="mv">${fmt((t.runMins||0)/60,1)}h</div><div class="ms">${fmt((t.runMins||0)/1440,1)} days</div></div>
          <div class="mc" style="border-left-color:#f59e0b"><div class="ml">Operational</div><div class="mv">${fmt(operational/60,1)}h</div><div class="ms">${fmt(operational/1440,1)} days</div></div>
          <div class="mc" style="border-left-color:#ef4444"><div class="ml">Shutdown</div><div class="mv">${fmt((t.shutdownMins||0)/60,1)}h</div><div class="ms">${fmt((t.shutdownMins||0)/1440,1)} days</div></div>
        </div>
        <div class="sx"><table class="tb" style="font-size:11px">
          <thead><tr><th>Phase</th><th class="n">Min</th><th class="n">Hrs</th><th class="n">Days</th><th class="n">/Roll</th><th>Bar</th><th class="n">%</th></tr></thead>
          <tbody>
          ${tsBar('Setup (cap 30 min)',t.setupMins||0,'#3b82f6',' (capped 30 min, excess→downtime)',t.rolls)}
          ${tsBar('Vacuum + Heating',t.vacuumMins||0,'#8b5cf6','',t.rolls)}
          ${tsBar('Running (web)',t.runMins||0,'#22c55e','',t.rolls)}
          ${tsBar('Vent',t.ventMins||0,'#06b6d4','',t.rolls)}
          ${tsBar('Boat Changeover',t.boatMins||0,'#f59e0b','',t.rolls)}
          ${tsBar('Downtime (excess setup)',t.downtimeMins||0,'#ef4444','',t.rolls)}
          ${tsBar('Shutdown (>10 min gap)',t.shutdownMins||0,'#64748b','',t.rolls)}
          ${tsBar('Small gaps (≤10 min)',t.smallGapMins||0,'#94a3b8','',t.rolls)}
          <tr class="tt"><td>Calendar total</td><td class="n" style="font-weight:700">${fmt(totalMins,0)}</td><td class="n">${fmt(totalMins/60,0)}h</td><td class="n">${calDays}d</td><td class="n"></td><td></td><td class="n">100%</td></tr>
          </tbody>
        </table></div>
      </div>`;
    }
    // Downtime Study
    function downtimeStudy(){
      const allDT=[...(dt.m1||[]).map(d=>({...d,mc:'M1'})),...(dt.m2||[]).map(d=>({...d,mc:'M2'}))];
      if(!allDT.length) return '<div class="cd"><div class="ct2">Downtime Study</div><div style="text-align:center;padding:16px;color:var(--tx3);font-size:12px">No downtime remarks recorded</div></div>';
      const byDept={};
      allDT.forEach(d=>{
        const dept=classifyDept(d.remark);
        if(!byDept[dept]) byDept[dept]={mins:0,count:0};
        byDept[dept].mins+=d.mins||0;byDept[dept].count++;
      });
      const deptArr=Object.entries(byDept).sort((a,b)=>b[1].mins-a[1].mins);
      const totalDTMins=deptArr.reduce((s,[,v])=>s+v.mins,0);
      const byRemark={};
      allDT.forEach(d=>{
        const key=d.remark;
        if(!byRemark[key]) byRemark[key]={remark:d.remark,mins:0,count:0,dept:classifyDept(d.remark),machines:new Set()};
        byRemark[key].mins+=d.mins||0;byRemark[key].count++;byRemark[key].machines.add(d.mc);
      });
      const remarkArr=Object.values(byRemark).sort((a,b)=>b.mins-a.mins);
      return `<div class="cd" style="border-left:3px solid #ef4444">
        <div class="ct2" style="color:#ef4444">Downtime Study — ${monthLabel(selMonth)} (${allDT.length} events · ${fmt(totalDTMins,0)} min)</div>
        <div class="mg" style="margin-bottom:10px">
          ${deptArr.map(([dept,v])=>{
            const pct=totalDTMins>0?v.mins/totalDTMins*100:0;
            const clr=DEPT_COLORS[dept]||'#94a3b8';
            return '<div class="mc" style="border-left-color:'+clr+'"><div class="ml" style="color:'+clr+'">'+dept+'</div><div class="mv">'+fmt(v.mins,0)+' min</div><div class="ms">'+v.count+' events · '+fmt(pct,0)+'%</div></div>';
          }).join('')}
        </div>
        <div style="font-size:11px;font-weight:700;margin-bottom:6px">Downtime Remarks (top 30)</div>
        <div class="sx"><table class="tb" style="font-size:10px">
          <thead><tr><th>Remark</th><th class="n">Min</th><th class="n">Cnt</th><th>M/C</th><th>Dept</th></tr></thead>
          <tbody>
          ${remarkArr.slice(0,30).map(r=>`<tr>
            <td style="max-width:200px;word-break:break-word">${r.remark}</td>
            <td class="n" style="font-weight:700">${fmt(r.mins,0)}</td>
            <td class="n">${r.count}</td>
            <td>${[...r.machines].join(',')}</td>
            <td><select style="font-size:10px;padding:2px 4px;border:1px solid var(--bd);border-radius:4px;background:var(--sf);color:${DEPT_COLORS[r.dept]||'var(--tx)'};font-weight:700" onchange="setDept('${r.remark.replace(/'/g,"\\'")}',this.value)">
              ${['Mech','E&I','Utility','Process','Film','Others'].map(d=>'<option value="'+d+'"'+(d===r.dept?' selected':'')+' style="color:'+DEPT_COLORS[d]+'">'+d+'</option>').join('')}
            </select></td>
          </tr>`).join('')}
          </tbody>
        </table></div>
        <div style="font-size:10px;color:var(--tx3);margin-top:6px;padding:4px 8px;background:var(--bg);border-radius:6px">Auto-classified by prefix (M,=Mech E,=E&I U,=Utility P,=Process F,=Film). Override with dropdown — saved locally.</div>
      </div>`;
    }
    // ═══ DAY-WISE TIME STUDY ═══
    function dayWiseStudy(){
      const dw=tsC?tsC.dayWiseTS:null;
      if(!dw||!Object.keys(dw).length) return '<div class="cd"><div class="ct2">Day-wise Time Study</div><div style="text-align:center;padding:16px;color:var(--tx3);font-size:12px">No day-wise data — re-upload ZJUMBO to generate</div></div>';
      const dates=Object.keys(dw).sort();
      const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      return `<div class="cd" style="border-left:3px solid #0ea5e9">
        <div class="ct2" style="color:#0ea5e9">Day-wise Time Study — ${monthLabel(selMonth)} (${dates.length} days)</div>
        <div class="sx"><table class="tb" style="font-size:10px">
          <thead><tr>
            <th>Date</th><th>Day</th>
            <th class="n" style="color:var(--ac)">M1 Rolls</th><th class="n" style="color:var(--ac)">M1 Run</th><th class="n" style="color:var(--ac)">M1 Setup</th><th class="n" style="color:var(--ac)">M1 Vac</th><th class="n" style="color:var(--ac)">M1 Vent</th><th class="n" style="color:var(--ac)">M1 DT</th><th class="n" style="color:var(--ac)">M1 Kg</th>
            <th class="n" style="color:var(--pp)">M2 Rolls</th><th class="n" style="color:var(--pp)">M2 Run</th><th class="n" style="color:var(--pp)">M2 Setup</th><th class="n" style="color:var(--pp)">M2 Vac</th><th class="n" style="color:var(--pp)">M2 Vent</th><th class="n" style="color:var(--pp)">M2 DT</th><th class="n" style="color:var(--pp)">M2 Kg</th>
            <th>Remarks</th>
          </tr></thead><tbody>
          ${dates.map(d=>{
            const dd=dw[d];const m1=dd.m1;const m2=dd.m2;
            const dt=new Date(d);const dayName=dayNames[dt.getDay()];
            const dayNum=d.split('-')[2];
            const isOff=m1.rolls===0&&m2.rolls===0;
            const totalRolls=m1.rolls+m2.rolls;
            const allRemarks=[...m1.remarks.map(r=>r.remark),...m2.remarks.map(r=>r.remark)].filter(Boolean);
            const uniqueRemarks=[...new Set(allRemarks)].slice(0,3).join('; ');
            const bgStyle=isOff?'background:rgba(239,68,68,.04)':totalRolls>=15?'background:rgba(34,197,94,.04)':'';
            const fmtM=v=>v>0?Math.round(v)+'m':'—';
            const alertTxt=d+' ('+dayName+'):\\n\\nM1: '+m1.rolls+' rolls, '+Math.round(m1.outputKg)+' Kg\\n  Run: '+Math.round(m1.runMins)+'m, Setup: '+Math.round(m1.setupMins)+'m, Vacuum: '+Math.round(m1.vacuumMins)+'m, Vent: '+Math.round(m1.ventMins)+'m\\n  DT: '+Math.round(m1.downtimeMins)+'m, Boat: '+Math.round(m1.boatMins)+'m\\n\\nM2: '+m2.rolls+' rolls, '+Math.round(m2.outputKg)+' Kg\\n  Run: '+Math.round(m2.runMins)+'m, Setup: '+Math.round(m2.setupMins)+'m, Vacuum: '+Math.round(m2.vacuumMins)+'m, Vent: '+Math.round(m2.ventMins)+'m\\n  DT: '+Math.round(m2.downtimeMins)+'m, Boat: '+Math.round(m2.boatMins)+'m\\n\\nRemarks: '+(uniqueRemarks||'None');
            return `<tr style="${bgStyle};cursor:pointer" onclick="alert('${alertTxt.replace(/'/g,"\\'")}')">
              <td style="font-weight:700">${dayNum}</td><td style="font-size:9px">${dayName}</td>
              <td class="n" style="font-weight:700;color:var(--ac)">${m1.rolls||'—'}</td>
              <td class="n">${fmtM(m1.runMins)}</td><td class="n">${fmtM(m1.setupMins)}</td><td class="n">${fmtM(m1.vacuumMins)}</td><td class="n">${fmtM(m1.ventMins)}</td>
              <td class="n" style="${m1.downtimeMins>30?'color:var(--rd);font-weight:700':''}">${fmtM(m1.downtimeMins+m1.boatMins)}</td>
              <td class="n">${m1.outputKg>0?fmt(m1.outputKg/1000,1):'—'}</td>
              <td class="n" style="font-weight:700;color:var(--pp)">${m2.rolls||'—'}</td>
              <td class="n">${fmtM(m2.runMins)}</td><td class="n">${fmtM(m2.setupMins)}</td><td class="n">${fmtM(m2.vacuumMins)}</td><td class="n">${fmtM(m2.ventMins)}</td>
              <td class="n" style="${m2.downtimeMins>30?'color:var(--rd);font-weight:700':''}">${fmtM(m2.downtimeMins+m2.boatMins)}</td>
              <td class="n">${m2.outputKg>0?fmt(m2.outputKg/1000,1):'—'}</td>
              <td style="max-width:140px;font-size:9px;word-break:break-word;color:var(--tx3)">${uniqueRemarks||''}</td>
            </tr>`;
          }).join('')}
          <tr class="tt"><td colspan="2">Total</td>
            <td class="n" style="color:var(--ac)">${dates.reduce((s,d)=>s+dw[d].m1.rolls,0)}</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m1.runMins,0)/60,0)}h</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m1.setupMins,0)/60,0)}h</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m1.vacuumMins,0)/60,0)}h</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m1.ventMins,0)/60,0)}h</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m1.downtimeMins+dw[d].m1.boatMins,0)/60,0)}h</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m1.outputKg,0)/1000,1)}</td>
            <td class="n" style="color:var(--pp)">${dates.reduce((s,d)=>s+dw[d].m2.rolls,0)}</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m2.runMins,0)/60,0)}h</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m2.setupMins,0)/60,0)}h</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m2.vacuumMins,0)/60,0)}h</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m2.ventMins,0)/60,0)}h</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m2.downtimeMins+dw[d].m2.boatMins,0)/60,0)}h</td>
            <td class="n">${fmt(dates.reduce((s,d)=>s+dw[d].m2.outputKg,0)/1000,1)}</td>
            <td></td>
          </tr>
          </tbody>
        </table></div>
        <div style="font-size:9px;color:var(--tx3);margin-top:6px">Times in minutes (m). Kg shown as MT. DT = Downtime + Boat changeover. Tap any row for full details.</div>
      </div>`;
    }
    ct.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:16px;font-weight:700">⏱ Time Study — ${monthLabel(selMonth)}</div>
        <button class="btn bo" style="font-size:11px" onclick="tab='dash';render()">← Dashboard</button>
      </div>
      <div style="font-size:11px;color:var(--tx2);margin-bottom:10px;padding:6px 10px;background:rgba(13,148,136,.08);border:1px solid rgba(13,148,136,.2);border-radius:8px">1440 min/day analysis from ZJUMBO timing columns. Setup capped at 30 min/roll · Gaps >10 min = Shutdown · Per-roll breakdown per machine.</div>
      ${machineTS('m1','Met-1 (M1)','var(--ac)')}
      ${machineTS('m2','Met-2 (M2)','var(--pp)')}
      ${dayWiseStudy()}
      ${downtimeStudy()}
    `;
  }

  else if(tab==='emp'){
    const mp=manpowerData[selMonth];
    if(!mp||!mp.perEmployee){ct.innerHTML=`<div class="cd"><div class="nd"><p>Manpower data not yet received from MET Power</p>
      <button class="btn bp" onclick="requestManpower()" style="margin-top:10px;font-size:11px">🔄 Request from MET Power</button>
      <p style="font-size:10px;color:var(--tx3);margin-top:6px">Make sure MetCost Pro is opened from MR Skill hub inside the parent app</p></div></div>`;return}
    const emps=mp.perEmployee.sort((a,b)=>b.netSalary-a.netSalary);

    // ═══ TEAM PERFORMANCE: Map ZJUMBO rolls + ZSLIT output to workers ═══
    const perf={}; // empId → {rolls, eqRolls, outputKg, days, section}
    emps.forEach(e=>{perf[e.id]={name:e.name,section:e.section,role:e.role||'assist',rolls:0,eqRolls:0,outputKg:0,rollDates:new Set(),slitDates:new Set()}});

    // Metalliser: ZJUMBO rolls → M1/M2 workers by date+shift
    const zjumbo=rawData.zjumbo;
    const zs=rawData.zslit;
    if(zjumbo&&mp.perEmployee.some(e=>e.shifts)){
      const ms=new Date(selMonth+'-01'),me=new Date(ms.getFullYear(),ms.getMonth()+1,0,23,59,59);
      const inM=v=>{const d=parseDate(v);return d&&d>=ms&&d<=me};
      const m1Workers=emps.filter(e=>e.section==='M1');
      const m2Workers=emps.filter(e=>e.section==='M2');

      // Group rolls by date+machine+shift
      const rollsByDMS={}; // "2026-02-01_M1_D" → count
      zjumbo.filter(r=>{
        const mvt=String(r['Movment Type']||r['Movement type']||'').trim();
        return mvt==='101'&&inM(r['Date of Production']||r['Date of production']);
      }).forEach(r=>{
        const machine=String(r.Machine||'').trim();
        const sec=machine.includes('M1')?'M1':machine.includes('M2')?'M2':null;
        if(!sec) return;
        const d=parseDate(r['Date of Production']||r['Date of production']);
        if(!d) return;
        const dateStr=d.toISOString().slice(0,10);
        // Determine shift from Chamber Open Time
        let shift='D';
        const t=r['Chamber Open Time']||r['Chamber open Time'];
        if(t){
          let h=-1;
          if(t instanceof Date) h=t.getHours();
          else if(typeof t==='number'){const f=t>=1?t-Math.floor(t):t;h=Math.floor(f*24)}
          else if(typeof t==='string'){const p=t.match(/(\\d{1,2}):/);if(p)h=parseInt(p[1])}
          if(h>=19||h<7) shift='N';
        }
        const key=dateStr+'_'+sec+'_'+shift;
        rollsByDMS[key]=(rollsByDMS[key]||0)+1;
      });

      // Distribute rolls to workers
      Object.entries(rollsByDMS).forEach(([key,count])=>{
        const[dateStr,sec,shift]=key.split('_');
        const workers=(sec==='M1'?m1Workers:m2Workers).filter(e=>{
          if(!e.shifts) return false;
          const sh=e.shifts[dateStr];
          return sh===shift;
        });
        if(!workers.length) return;
        const share=count/workers.length;
        const avgODF=c&&c.odEq?c.odEq.avgODfactor:1;
        workers.forEach(w=>{
          if(!perf[w.id]) return;
          perf[w.id].rolls+=share;
          perf[w.id].eqRolls+=share*avgODF;
          perf[w.id].rollDates.add(dateStr);
        });
      });
    }

    // Slitter: ZSLIT output → S1/S2 workers by date+machine
    if(zs&&mp.perEmployee.some(e=>e.shifts)){
      const ms=new Date(selMonth+'-01'),me=new Date(ms.getFullYear(),ms.getMonth()+1,0,23,59,59);
      const inM=v=>{const d=parseDate(v);return d&&d>=ms&&d<=me};
      const s1Workers=emps.filter(e=>e.section==='S1');
      const s2Workers=emps.filter(e=>e.section==='S2');

      // Group output by date+machine
      const outByDM={}; // "2026-02-01_S1" → totalKg
      const zsMo=(_indexed.zslit&&_indexed.zslit[selMonth])||zs.filter(r=>inM(r.Date||r['Posting Date']));
      zsMo.filter(r=>{
        const mvt=String(r['Move Type']||'').trim();
        const g=String(r.Grade||'');
        return mvt==='101'&&g!=='5'&&g!=='6';
      }).forEach(r=>{
        const machine=String(r.Machine||'').trim();
        const sec=machine.includes('M1_S')||machine.includes('M1-S')?'S1':
                  machine.includes('M2_S')||machine.includes('M2-S')?'S2':null;
        if(!sec) return;
        const d=parseDate(r.Date||r['Posting Date']);
        if(!d) return;
        const dateStr=d.toISOString().slice(0,10);
        const nw=Number(r['Net Weight']||0);
        const key=dateStr+'_'+sec;
        outByDM[key]=(outByDM[key]||0)+nw;
      });

      // Distribute output to workers equally across D+N shift
      Object.entries(outByDM).forEach(([key,kg])=>{
        const[dateStr,sec]=key.split('_');
        const workers=(sec==='S1'?s1Workers:s2Workers).filter(e=>{
          if(!e.shifts) return false;
          const sh=e.shifts[dateStr];
          return sh==='D'||sh==='N';
        });
        if(!workers.length) return;
        const share=kg/workers.length;
        workers.forEach(w=>{
          if(!perf[w.id]) return;
          perf[w.id].outputKg+=share;
          perf[w.id].slitDates.add(dateStr);
        });
      });
    }

    // Build performance tables
    const metPerf=Object.values(perf).filter(p=>['M1','M2'].includes(p.section)&&(p.rolls>0||p.role==='main'));
    const slitPerf=Object.values(perf).filter(p=>['S1','S2'].includes(p.section)&&(p.outputKg>0||p.role==='main'));
    metPerf.sort((a,b)=>b.rolls-a.rolls);
    slitPerf.sort((a,b)=>b.outputKg-a.outputKg);

    let metHtml='';
    if(metPerf.length){
      const avgRolls=metPerf.reduce((s,p)=>s+p.rolls,0)/metPerf.filter(p=>p.rolls>0).length||0;
      metHtml=`<div class="cd" style="border-left:3px solid #3b82f6"><div class="ct2" style="color:#3b82f6">🧵 Metalliser Performance — ${monthLabel(selMonth)}</div>
        <div class="sx"><table class="tb" style="font-size:12px">
        <thead><tr><th>#</th><th>Name</th><th>Sec</th><th class="n">Rolls</th><th class="n">Eq Rolls</th><th class="n">Roll/Day</th><th class="n">Rating</th></tr></thead><tbody>
        ${metPerf.map((p,i)=>{
          const daysWorked=Math.max(1,p.rollDates?p.rollDates.size:1);

function autoFillBOM(code){
  if(!code||code.length<6) return;
  const c=code.toUpperCase().replace(/^3SF-/,'');
  // Parse code: G[micron][matCode][type][OD] e.g. G08301ABM22
  const micM=c.match(/G(\d{2})/);const mic=micM?parseInt(micM[1]):12;
  const isABM=/ABM/.test(c);const isRC=/RC/.test(c);const isAlOx=/AL\d/.test(c);
  const isChem=/360|361|340|331|320|306/.test(c);
  const odM=c.match(/(\d{2})$/);const od=odM?(parseInt(odM[1])/10).toFixed(1):'2.2';
  // Build description
  let desc=mic+'µ ';
  if(isRC) desc+='RC ';
  if(isAlOx) desc+='AlOx ';
  if(isChem) desc+='Chem ';
  if(isABM) desc+='AluBond ';
  else desc+='Met ';
  desc+=od+'OD';
  document.getElementById('nd').value=desc;
  // Find similar material in existing targets
  const hint=document.getElementById('autoFillHint');
  // Match by micron+type (closest match)
  let bestMatch=null,bestScore=0;
  targets.forEach(t=>{
    let score=0;
    const tc=t.c.toUpperCase();
    const tm=tc.match(/G(\d{2})/);const tmic=tm?parseInt(tm[1]):12;
    if(tmic===mic) score+=3;
    if(isABM&&tc.includes('ABM')) score+=5;
    else if(isRC&&tc.includes('RC')) score+=5;
    else if(isAlOx&&tc.includes('AL')) score+=5;
    else if(!isABM&&!isRC&&!isAlOx&&!tc.includes('ABM')&&!tc.includes('RC')&&!/AL\d/.test(tc)) score+=4;
    if(isChem&&/360|361|340|331|320|306/.test(tc)) score+=2;
    const todM=tc.match(/(\d{2})$/);const tod=todM?parseInt(todM[1]):22;
    const cod=parseInt(od*10);
    if(tod===cod) score+=2;
    if(score>bestScore&&t.w>0){bestScore=score;bestMatch=t}
  });
  if(bestMatch&&bestScore>=3){
    if(!document.getElementById('nw').value) document.getElementById('nw').value=bestMatch.w;
    if(!document.getElementById('nb').value) document.getElementById('nb').value=bestMatch.b;
    if(bestMatch.bom) document.getElementById('nbom').value=bestMatch.bom;
    if(hint) hint.innerHTML='💡 Auto-filled from <b>'+bestMatch.c+'</b> ('+bestMatch.d+')';
  }else{
    if(hint) hint.textContent='No similar material found — enter wire/boat manually';
  }
}

function addTarget(){
  const c=document.getElementById('nc').value,d=document.getElementById('nd').value;
  if(!c||!d)return;
  targets.push({id:Date.now(),c,d,w:Number(document.getElementById('nw').value)||0,b:Number(document.getElementById('nb').value)||0,bom:Number(document.getElementById('nbom').value)||1005});
  document.getElementById('addModal').innerHTML='';
  saveAllSettings();
  render();
}
let _undoStack=[];
function removeTarget(id){
  const removed=targets.find(t=>t.id===id);
  if(removed){_undoStack.push({...removed});if(_undoStack.length>20)_undoStack.shift()}
  targets=targets.filter(t=>t.id!==id);saveAllSettings();render();
  // Show undo toast
  if(removed){
    const toast=document.createElement('div');
    toast.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-family:var(--fn);display:flex;align-items:center;gap:10px;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.3)';
    toast.innerHTML='Deleted <b>'+removed.c+'</b> <button onclick="undoDelete();this.parentElement.remove()" style="background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fn)">⟲ Undo</button>';
    document.body.appendChild(toast);
    setTimeout(()=>{if(toast.parentElement)toast.remove()},8000);
  }
}
function undoDelete(){
  if(!_undoStack.length)return;
  const item=_undoStack.pop();
  targets.push(item);
  targets.sort((a,b)=>a.id-b.id);
  saveAllSettings();render();
}

// Running day overrides per month — saved to localStorage + Firebase
function getRunDayOvr(month,machine,autoVal){
  if(!rates.runDayOverrides) return autoVal;
  const key=month+'_'+machine;
  return rates.runDayOverrides[key]!==undefined?rates.runDayOverrides[key]:autoVal;
}
function setRunDayOvr(month,machine,val){
  if(!rates.runDayOverrides) rates.runDayOverrides={};
  const v=parseFloat(val);
  rates.runDayOverrides[month+'_'+machine]=isNaN(v)?0:v;
  // Recalculate manpower for this month
  const c=savedMonths[month];
  if(c&&c.runDays&&c.mpTotalFull){
    const m1d=getRunDayOvr(month,'m1',c.runDays.m1);
    const m2d=getRunDayOvr(month,'m2',c.runDays.m2);
    const avgD=(m1d+m2d)/2;
    const ratio=avgD/c.runDays.total;
    c.mpTotal=Math.round(c.mpTotalFull*ratio);
    c.mpKg=c.effectiveProd>0?c.mpTotal/c.effectiveProd:0;
    c.runDays.avg=avgD;c.runDays.ratio=ratio;
    // Recalc conversion + total
    c.convC=(c.wasteLoss||0)+(c.bGradeLoss||0)+c.mpKg+(c.pwrKg||0)+(c.consKg||0)+(c.rates||rates).indirectExpense;
    c.totalC=(c.rmC||0)+c.convC;
    c.totalWP=c.totalC+(c.rates||rates).packingFreight;
    c.totalAfterScrap=c.totalWP-(c.scrapWireSale||0)-(c.scrapDustSale||0);
    saveToStorage();
  }
  saveRates();
  render();
}

// ═══ MANPOWER MANUAL OVERRIDE ═══
// Stores manual MP ₹/Kg per month with optional remark
let _mpOverrides={};
try{const s=localStorage.getItem('metcost_mpOverrides');if(s)_mpOverrides=JSON.parse(s)}catch(e){}
function getMpOverride(month){return _mpOverrides[month]||null}
function setMpOverride(month,val,remark){
  const v=parseFloat(val);
  if(isNaN(v)||v<=0){delete _mpOverrides[month]}
  else{_mpOverrides[month]={value:v,remark:remark||'',savedAt:new Date().toISOString()}}
  try{localStorage.setItem('metcost_mpOverrides',JSON.stringify(_mpOverrides))}catch(e){}
  // Recalc totals for this month
  const c=savedMonths[month];
  if(c){
    const ovr=getMpOverride(month);
    c.mpKg=ovr?ovr.value:(c.mpTotal||0)/(c.effectiveProd||1);
    c.convC=(c.wasteLoss||0)+(c.bGradeLoss||0)+c.mpKg+(c.pwrKg||0)+(c.consKg||0)+(c.rates||rates).indirectExpense;
    c.totalC=(c.rmC||0)+c.convC;
    c.totalWP=c.totalC+(c.rates||rates).packingFreight;
    c.totalAfterScrap=c.totalWP-(c.scrapWireSale||0)-(c.scrapDustSale||0);
    saveToStorage();
  }
  render();
}
function clearMpOverride(month){
  delete _mpOverrides[month];
  try{localStorage.setItem('metcost_mpOverrides',JSON.stringify(_mpOverrides))}catch(e){}
  const c=savedMonths[month];
  if(c){
    c.mpKg=(c.mpTotal||0)/(c.effectiveProd||1);
    c.convC=(c.wasteLoss||0)+(c.bGradeLoss||0)+c.mpKg+(c.pwrKg||0)+(c.consKg||0)+(c.rates||rates).indirectExpense;
    c.totalC=(c.rmC||0)+c.convC;
    c.totalWP=c.totalC+(c.rates||rates).packingFreight;
    c.totalAfterScrap=c.totalWP-(c.scrapWireSale||0)-(c.scrapDustSale||0);
    saveToStorage();
  }
  render();
}

function updateStopOverride(month,machine,dateStr,field,value){
  if(!rates.stopOverrides) rates.stopOverrides={};
  const ovKey=month+'_'+machine;
  if(!rates.stopOverrides[ovKey]) rates.stopOverrides[ovKey]={};
  if(!rates.stopOverrides[ovKey][dateStr]) rates.stopOverrides[ovKey][dateStr]={};
  if(field==='mins'){
    const v=value.trim();
    rates.stopOverrides[ovKey][dateStr].manualMins=v===''?undefined:Math.max(0,parseInt(v)||0);
    if(v==='') delete rates.stopOverrides[ovKey][dateStr].manualMins;
  } else {
    rates.stopOverrides[ovKey][dateStr].remark=value;
  }
}

function applyStopOverrides(month,machine){
  if(!rates.stopOverrides) rates.stopOverrides={};
  const ovKey=month+'_'+machine;
  const overrides=rates.stopOverrides[ovKey]||{};
  const c=savedMonths[month];
  if(!c||!c.runDays) return;
  const stopRaw=(c.machineStopData&&c.machineStopData[machine])||{};
  const totalDays=c.runDays.total;
  let totalStopMins=0;
  for(let d=1;d<=totalDays;d++){
    const dt=new Date(month+'-01');
    const ds=new Date(dt.getFullYear(),dt.getMonth(),d).toISOString().slice(0,10);
    const auto=(stopRaw[ds]||{}).autoStopMins||0;
    const ovr=overrides[ds]||{};
    totalStopMins+=ovr.manualMins!==undefined?ovr.manualMins:auto;
  }
  const effRunDays=Math.max(0,(totalDays*1440-totalStopMins)/1440);
  // Apply to runDays and recalc MP
  if(machine==='m1') c.runDays.m1=effRunDays;
  else c.runDays.m2=effRunDays;
  c.runDays.avg=(c.runDays.m1+c.runDays.m2)/2;
  const ratio=c.runDays.avg/totalDays;
  c.runDays.ratio=ratio;
  if(c.mpTotalFull){
    c.mpTotal=Math.round(c.mpTotalFull*ratio);
    c.mpKg=c.effectiveProd>0?c.mpTotal/c.effectiveProd:0;
    c.convC=(c.wasteLoss||0)+(c.bGradeLoss||0)+c.mpKg+(c.pwrKg||0)+(c.consKg||0)+(c.rates||rates).indirectExpense;
    c.totalC=(c.rmC||0)+c.convC;
    c.totalWP=c.totalC+(c.rates||rates).packingFreight;
    c.totalAfterScrap=c.totalWP-(c.scrapWireSale||0)-(c.scrapDustSale||0);
  }
  saveToStorage();
  saveRates();
  closeStopModal();
  render();
  alert('✅ '+( machine==='m1'?'Met-1':'Met-2')+' running days updated to '+effRunDays.toFixed(1)+' days');
}

function clearStopOverrides(month,machine){
  if(!confirm('Reset all manual overrides for '+(machine==='m1'?'Met-1':'Met-2')+'?')) return;
  if(rates.stopOverrides&&rates.stopOverrides[month+'_'+machine])
    delete rates.stopOverrides[month+'_'+machine];
  // Restore auto value
  const c=savedMonths[month];
  if(c&&c.machineStopData){
    const stopRaw=c.machineStopData[machine]||{};
    const totalDays=c.runDays.total;
    let totalStopMins=0;
    for(let d=1;d<=totalDays;d++){
      const dt=new Date(month+'-01');
      const ds=new Date(dt.getFullYear(),dt.getMonth(),d).toISOString().slice(0,10);
      totalStopMins+=((stopRaw[ds]||{}).autoStopMins)||0;
    }
    const autoRunDays=Math.max(0,(totalDays*1440-totalStopMins)/1440);
    if(machine==='m1') c.runDays.m1=autoRunDays;
    else c.runDays.m2=autoRunDays;
    c.runDays.avg=(c.runDays.m1+c.runDays.m2)/2;
    if(c.mpTotalFull){
      const ratio=c.runDays.avg/totalDays;
      c.runDays.ratio=ratio;
      c.mpTotal=Math.round(c.mpTotalFull*ratio);
      c.mpKg=c.effectiveProd>0?c.mpTotal/c.effectiveProd:0;
      c.convC=(c.wasteLoss||0)+(c.bGradeLoss||0)+c.mpKg+(c.pwrKg||0)+(c.consKg||0)+(c.rates||rates).indirectExpense;
      c.totalC=(c.rmC||0)+c.convC;
      c.totalWP=c.totalC+(c.rates||rates).packingFreight;
      c.totalAfterScrap=c.totalWP-(c.scrapWireSale||0)-(c.scrapDustSale||0);
    }
    saveToStorage();
  }
  saveRates();
  closeStopModal();
  render();
}

async function loadDayData(dateStr){
  const el=document.getElementById('dayViewContent');
  if(!el) return;
  el.innerHTML='<div style="text-align:center;padding:30px;color:var(--tx3)"><div class="sn" style="margin:0 auto 8px"></div>Computing...</div>';

  const raw=await loadRawFromIDB().catch(()=>null)||rawData;
  const month=_dayViewMonth;
  const mo=savedMonths[month];

  // Helper: parse time to {h,m}
  const pT=(t)=>{
    if(!t) return null;
    if(t instanceof Date) return{h:t.getHours(),m:t.getMinutes()};
    if(typeof t==='number'){const f=t>=1?t-Math.floor(t):t;const h=Math.floor(f*24);return{h,m:Math.round((f*24-h)*60)}}
    const s=String(t);const p=s.match(/(\d{1,2})\s*[:.\-]\s*(\d{2})/);
    return p?{h:+p[1],m:+p[2]}:null;
  };
  const toMins=(hm)=>hm?hm.h*60+hm.m:null;
  const minsBetween=(t1,t2)=>{
    if(t1==null||t2==null) return 0;
    let d=t2-t1; if(d<0) d+=1440; return d;
  };

  // ═══ ZJUMBO: Time Study for this day ═══
  const dayRolls=(raw.zjumbo||[]).filter(r=>{
    const d=r['Date of Production'];
    return d&&new Date(d).toISOString().slice(0,10)===dateStr&&String(r['Movment Type']||r['Mvt type']||'').trim()==='101';
  });

  const tsM={m1:{rolls:[],setup:0,vacuum:0,run:0,vent:0,downtime:0,boat:0,shutdown:0},
             m2:{rolls:[],setup:0,vacuum:0,run:0,vent:0,downtime:0,boat:0,shutdown:0}};

  dayRolls.forEach(r=>{
    const mac=String(r.Machine||'').trim();
    const mKey=mac.includes('M1')?'m1':mac.includes('M2')?'m2':null;
    if(!mKey) return;
    const chOpen=toMins(pT(r['Chamber Open Time']||r['Chamber open Time']));
    const chClose=toMins(pT(r['Chamber Close Time']||r['Chamber close Time']));
    const webStart=toMins(pT(r['Web Start Time']||r['Web start Time']));
    const webEnd=toMins(pT(r['Web End Time']||r['Web end Time']));
    const vent=toMins(pT(r['Vent time']||r['Vent Time']));
    const rawSetup=chClose!=null&&chOpen!=null?minsBetween(chOpen,chClose):0;
    const setup=Math.min(rawSetup,30);
    const setupDT=Math.max(0,rawSetup-30);
    const vacuum=chClose!=null&&webStart!=null?minsBetween(chClose,webStart):0;
    const runT=webStart!=null&&webEnd!=null?minsBetween(webStart,webEnd):0;
    const ventT=webEnd!=null&&vent!=null?minsBetween(webEnd,vent):0;
    const remark=String(r['Remarks']||r['Downtime Remark']||'').toUpperCase();
    const boatT=remark.includes('BOAT')?Math.abs(Number(r['Down Time']||0)):0;
    tsM[mKey].setup+=setup; tsM[mKey].vacuum+=vacuum; tsM[mKey].run+=runT;
    tsM[mKey].vent+=ventT; tsM[mKey].downtime+=setupDT; tsM[mKey].boat+=boatT;
    const mat=String(r.Material||r['Base film Material']||'');
    const od=r.OD||r['OD']||2.2;
    const spd=parseFloat(r['Avg. Speed']||0);
    const length=Number(r.Length||r['Length.1']||0);
    tsM[mKey].rolls.push({mat,od,speed:spd,length,setup,vacuum,run:runT,vent:ventT,downtime:setupDT,boat:boatT,remark:String(r['Remarks']||''),chOpen:r['Chamber Open Time'],chClose:r['Chamber Close Time'],webStart:r['Web Start Time'],webEnd:r['Web End Time'],ventT:r['Vent time']});
  });

  // Compute shutdown for this day (gaps >10 min)
  ['m1','m2'].forEach(mk=>{
    const rolls=tsM[mk].rolls;
    if(rolls.length<2) return;
    // Re-sort by chamber open
    const withTimes=dayRolls.filter(r=>String(r.Machine||'').includes(mk==='m1'?'M1':'M2'));
    withTimes.sort((a,b)=>{
      const ta=pT(a['Chamber Open Time']);const tb=pT(b['Chamber Open Time']);
      if(!ta||!tb) return 0;return (ta.h*60+ta.m)-(tb.h*60+tb.m);
    });
    let shutdown=0;
    for(let i=1;i<withTimes.length;i++){
      const prevVent=toMins(pT(withTimes[i-1]['Vent time']||withTimes[i-1]['Web End Time']));
      const nextOpen=toMins(pT(withTimes[i]['Chamber Open Time']||withTimes[i]['Chamber open Time']));
      if(prevVent!=null&&nextOpen!=null){
        const gap=minsBetween(prevVent,nextOpen);
        if(gap>10) shutdown+=gap;
      }
    }
    tsM[mk].shutdown=Math.round(shutdown);
  });

  // ═══ ZSLIT: Production for this day ═══
  const dayZslit=(raw.zslit||[]).filter(r=>{
    const d=r['Date']||r['date'];
    return d&&new Date(d).toISOString().slice(0,10)===dateStr&&String(r['Move Type']||'').trim()==='101';
  });
  const dayProd={aKg:0,bKg:0,gr5:0,gr6:0,rolls:0,mats:{}};
  dayZslit.forEach(r=>{
    const nw=Number(r['Net Weight']||0);const gr=String(r.Grade||'');
    if(gr==='5'){dayProd.gr5+=nw}else if(gr==='6'){dayProd.gr6+=nw}
    else if(gr==='3'){dayProd.bKg+=nw}else{dayProd.aKg+=nw}
    dayProd.rolls++;
    const mat=String(r.Material||'').replace(/^3[A-Z]{2}-/i,'');
    dayProd.mats[mat]=(dayProd.mats[mat]||0)+nw;
  });
  const dayEffProd=dayProd.aKg+dayProd.bKg;

  // ═══ MB51: Wire + Boat for this day ═══
  const dayMb=(raw.mb51||[]).filter(r=>{
    const d=r['Posting Date'];
    return d&&new Date(d).toISOString().slice(0,10)===dateStr;
  });
  let wireKg=0,wireAmt=0,boatPcs=0,boatAmt=0;
  dayMb.forEach(r=>{
    const mat=String(r.Material||'').toUpperCase();
    const qty=Math.abs(Number(r['Qty in unit of entry']||0));
    const amt=Math.abs(Number(r['Amt.in Loc.Cur.']||r['Amt. in Loc. Cur.']||0));
    const mvt=String(r['Movement type']||'').trim();
    if(mat==='3RM-ALW'&&(mvt==='261'||mvt==='201')){wireKg+=qty;wireAmt+=amt}
    if(mat==='3RM-EVB'&&(mvt==='261'||mvt==='201')){boatPcs+=qty;boatAmt+=amt}
  });
  const wireCostDay=wireAmt>0?wireAmt:wireKg*(rates.wireRate||355);
  const boatCostDay=boatAmt>0?boatAmt:boatPcs*(rates.boatRate||1087);
  const wireCPerKg=dayEffProd>0?wireCostDay/dayEffProd:0;
  const boatCPerKg=dayEffProd>0?boatCostDay/dayEffProd:0;

  // Monthly estimates for power/manpower
  const monthDays=mo&&mo.runDays?mo.runDays.avg||1:1;
  const pwrEstKg=mo&&mo.pwrKg?mo.pwrKg:0;
  const mpEstKg=mo&&mo.mpKg?mo.mpKg:0;
  const consEstKg=mo&&mo.consKg?mo.consKg:0;

  // ═══ BUILD HTML ═══
  const m1r=tsM.m1.rolls.length,m2r=tsM.m2.rolls.length;
  const totalRolls=m1r+m2r;

  function tsBar(v,tot,color){
    const pct=tot>0?Math.min(100,v/tot*100):0;
    return `<div style="height:6px;background:${color};border-radius:3px;width:${pct.toFixed(1)}%;margin-top:2px"></div>`;
  }

  function rollRow(r,idx){
    const matShort=String(r.mat||'').replace(/^3SF-/i,'').replace(/^3[A-Z]{2}-/i,'');
    const total=r.setup+r.vacuum+r.run+r.vent+(r.downtime||0)+(r.boat||0);
    return `<tr style="font-size:10px;${r.downtime>0||r.boat>0?'background:rgba(239,68,68,.04)':''}">
      <td style="font-family:var(--mn);color:var(--ac);font-size:10px">${idx+1}</td>
      <td style="font-size:10px">${matShort}</td>
      <td style="font-size:10px;color:var(--tx3)">${r.chOpen||'—'}</td>
      <td class="n" style="color:#22c55e">${r.run}</td>
      <td class="n" style="color:#3b82f6">${r.setup}</td>
      <td class="n" style="color:#06b6d4">${r.vacuum}</td>

function showPLComparison(period){
  const all=Object.keys(savedMonths).sort();
  let months=[];
  const now=new Date();
  if(period==='fy'){
    // FY Apr-Mar: if current month >= Apr, FY starts this year Apr, else last year Apr
    const fyStart=now.getMonth()>=3?now.getFullYear():now.getFullYear()-1;
    months=all.filter(m=>{const[y,mo]=m.split('-').map(Number);return(y===fyStart&&mo>=4)||(y===fyStart+1&&mo<=3)});
  }else if(period==='cy'){
    const cy=now.getFullYear();
    months=all.filter(m=>m.startsWith(cy+'-')||m.startsWith((cy-1)+'-'));
    months=all.filter(m=>m.startsWith(String(now.getFullYear()-1)+'-')||m.startsWith(String(now.getFullYear())+'-'));
    // Actually just last full CY
    months=all.filter(m=>m.startsWith(String(now.getFullYear()-1)+'-'));
  }else if(period==='q4'){
    months=all.slice(-3);
  }else{
    months=all;
  }
  if(!months.length){document.getElementById('plCompare').innerHTML='<div style="font-size:11px;color:var(--tx3)">No data for this period</div>';return}

  let totalRev=0,totalCost=0,totalScrap=0,totalPacking=0,totalProd=0,totalProfit=0;
  let rows='';
  months.forEach(mk=>{
    const d=savedMonths[mk];if(!d||!d.pl) return;
    const rev=d.pl.revenue||0;
    const cost=d.pl.totalProdCost||0;
    const pack=d.pl.packingCost||0;
    const scrap=d.pl.scrapRevenue||0;
    const profit=d.pl.profit||0;
    totalRev+=rev;totalCost+=cost;totalPacking+=pack;totalScrap+=scrap;totalProfit+=profit;totalProd+=(d.prodMT||0);
    const pc=rev>0?profit>=0?'#22c55e':'#ef4444':'var(--tx3)';
    rows+=`<tr><td>${monthLabel(mk)}</td><td class="n">${fmt(d.prodMT,0)}</td>
      <td class="n" style="color:#22c55e">${rev>0?'₹'+fmt(rev/100000,1)+'L':'—'}</td>
      <td class="n" style="color:#f87171">₹${fmt((cost+pack)/100000,1)}L</td>
      <td class="n" style="color:${pc};font-weight:700">${rev>0?'₹'+fmt(Math.abs(profit)/100000,1)+'L':'—'}</td>
      <td class="n" style="color:${pc}">${rev>0?fmt(profit/((d.prodMT||1)*1000),2):'—'}</td></tr>`;
  });
  // Total row
  const tc=totalProfit>=0?'#22c55e':'#ef4444';
  rows+=`<tr class="tt"><td>TOTAL (${months.length} months)</td><td class="n">${fmt(totalProd,0)}</td>
    <td class="n" style="color:#22c55e">${totalRev>0?'₹'+fmt(totalRev/100000,1)+'L':'—'}</td>
    <td class="n" style="color:#f87171">₹${fmt((totalCost+totalPacking)/100000,1)}L</td>
    <td class="n" style="color:${tc};font-weight:800;font-size:13px">${totalRev>0?'₹'+fmt(Math.abs(totalProfit)/100000,1)+'L':'—'}</td>
    <td class="n" style="color:${tc}">${totalRev>0?fmt(totalProfit/(totalProd*1000),2):'—'}</td></tr>`;

  document.getElementById('plCompare').innerHTML=`<div class="sx"><table class="tb" style="font-size:11px">
    <thead><tr><th>Month</th><th class="n">MT</th><th class="n">Revenue</th><th class="n">Cost</th><th class="n">P&L</th><th class="n">₹/Kg</th></tr></thead>
    <tbody>${rows}</tbody></table></div>
    ${totalRev===0?'<div style="font-size:10px;color:var(--am);margin-top:6px">⚠️ Set selling prices in Targets → BOM → SP ₹/Kg column</div>':''}`;
}

async function sendAI(){
  const inp=document.getElementById('aiInput');
  const q=inp.value.trim();
  if(!q) return;
  inp.value='';
  aiChat.push({role:'user',text:q});
  aiChat.push({role:'assistant',text:'⏳ Analyzing '+Object.keys(savedMonths).length+' months of data...'});
  renderAIChat();

  // Build DETAILED context from all saved months
  const allMk=Object.keys(savedMonths).sort();
  
  // 1. Monthly cost summary (condensed)
  const costSummary=allMk.map(mk=>{
    const d=savedMonths[mk]; if(!d) return null;
    const od=d.odEq||{};const rd=d.runDays||{};const bt=d.boatTypes||{};
    return `${mk}: Prod=${(d.prodMT||0).toFixed(0)}MT(${(d.effectiveProd||0).toFixed(0)}Kg), EqvOut=${((d.equivKg||0)/1000).toFixed(0)}MT(ratio=${(d.eqRatio||1).toFixed(3)}), MJ=${((d.metJumboKg||0)/1000).toFixed(0)}MT, A=${((d.slitAKg||0)/1000).toFixed(0)}MT, B=${((d.slitBKg||0)/1000).toFixed(0)}MT, Gr5=${((d.grade5Kg||0)/1000).toFixed(0)}MT, Gr6=${((d.grade6Kg||0)/1000).toFixed(0)}MT, Export=${((d.exportKg||0)/1000).toFixed(1)}MT, HeatSeal=${((d.heatSealKg||0)/1000).toFixed(1)}MT`
    +`\n  Wire=${(d.wireCKg||0).toFixed(2)}(${(d.wireKgsTotal||0).toFixed(0)}Kg), Boat=${(d.boatCKg||0).toFixed(2)}(${(d.boatPcsTotal||0).toFixed(0)}Pcs, rate=₹${(d.boatRate||0).toFixed(0)})`
    +`\n  BareW=${(d.bareWastePct||0).toFixed(2)}%(${(d.bareWasteKg||0).toFixed(0)}Kg), MetW=${(d.metWastePct||0).toFixed(2)}%(${(d.metWasteKg||0).toFixed(0)}Kg), IO=${(d.ioPct||0).toFixed(2)}%, AdjMet=${(d.adjustedMetPct||0).toFixed(2)}%, WasteLoss=₹${(d.wasteLoss||0).toFixed(2)}(bare₹${(d.bareLossComponent||0).toFixed(2)}+met₹${(d.metLossComponent||0).toFixed(2)})`
    +`\n  RM=${(d.rmC||0).toFixed(2)}, Conv=${(d.convC||0).toFixed(2)}, Total=${(d.totalC||0).toFixed(2)}, Net=${(d.totalAfterScrap||0).toFixed(2)}, MP=${(d.mpKg||0).toFixed(2)}, Pwr=${(d.pwrKg||0).toFixed(2)}(${(d.pwrU||0).toFixed(0)}units), Cons=${(d.consKg||0).toFixed(2)}(₹${(d.consAmt||0).toFixed(0)})`
    +`\n  Scrap: Wire=${(d.scrapWireKg||0).toFixed(0)}Kg(₹${(d.scrapWireSale||0).toFixed(2)}/Kg), Dust=${(d.scrapDustKg||0).toFixed(0)}Kg(₹${(d.scrapDustSale||0).toFixed(2)}/Kg)`
    +`\n  RunDays: M1=${rd.m1||0}, M2=${rd.m2||0}, avg=${rd.avg||0}, Rolls/Day=${(d.avgRollsPerDay||0).toFixed(1)}`
    +(od.avgLenNormal?`\n  JumboLen: Normal=${od.avgLenNormal.toFixed(0)}m(${od.lenNormalCt}rolls), RCM=${(od.avgLenRCM||0).toFixed(0)}m(${od.lenRCMCt||0}), AlOx=${(od.avgLenAlOx||0).toFixed(0)}m(${od.lenAlOxCt||0}), AvgWidth=${(od.avgWidth||3000).toFixed(0)}mm`:'')
    +(d.pl&&d.pl.revenue?`\n  Rev=₹${(d.pl.revenue/100000).toFixed(1)}L, Profit=₹${(d.pl.profit/100000).toFixed(1)}L`:'');
  }).filter(Boolean).join('\n');

  // 2. Material production across months (aggregate all)
  const allMats={}, allCusts={}, allSizes={};
  allMk.forEach(mk=>{
    const d=savedMonths[mk];
    if(!d||!d.zsAgg) return;
    const agg=d.zsAgg;
    if(agg.byMaterial) agg.byMaterial.forEach(m=>{
      if(!allMats[m.code]) allMats[m.code]={code:m.code,desc:m.desc,kg:0,rolls:0,months:[]};
      allMats[m.code].kg+=m.kg; allMats[m.code].rolls+=m.rolls; allMats[m.code].months.push(mk+':'+Math.round(m.kg)+'Kg');
    });
    if(agg.byCustomer) agg.byCustomer.forEach(c=>{
      if(!allCusts[c.name]) allCusts[c.name]={name:c.name,city:c.city,kg:0,rolls:0,months:[],topMats:[],topSizes:[],matMap:{},sizeMap:{}};
      allCusts[c.name].kg+=c.kg; allCusts[c.name].rolls+=c.rolls; allCusts[c.name].months.push(mk+':'+Math.round(c.kg)+'Kg');
      // Merge materials & sizes across months
      (c.topMats||[]).forEach(m=>{const[code,kgS]=m.split(':');const kg=parseInt(kgS)||0;allCusts[c.name].matMap[code]=(allCusts[c.name].matMap[code]||0)+kg});
      (c.topSizes||[]).forEach(s=>{const[sz,kgS]=s.split(':');const kg=parseInt(kgS)||0;allCusts[c.name].sizeMap[sz]=(allCusts[c.name].sizeMap[sz]||0)+kg});
    });
    if(agg.bySize) agg.bySize.forEach(s=>{
      const k=s.thick+'×'+s.od+'×'+(s.width||0);
      if(!allSizes[k]) allSizes[k]={thick:s.thick,od:s.od,width:s.width||0,kg:0,rolls:0};
      allSizes[k].kg+=s.kg; allSizes[k].rolls+=s.rolls;
    });
  });
  const matList=Object.values(allMats).sort((a,b)=>b.kg-a.kg);
  const custList=Object.values(allCusts).sort((a,b)=>b.kg-a.kg);
  const sizeList=Object.values(allSizes).sort((a,b)=>b.kg-a.kg);

  const matData=matList.map(m=>`${m.code} (${m.desc||''}): ${(m.kg/1000).toFixed(1)}MT, ${m.rolls} rolls [${m.months.slice(-6).join(', ')}]`).join('\n');
  // Finalize customer top materials and sizes from cross-month maps
  custList.forEach(c=>{
    if(c.matMap) c.topMats=Object.entries(c.matMap).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([m,kg])=>m+':'+kg+'Kg');
    if(c.sizeMap) c.topSizes=Object.entries(c.sizeMap).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([s,kg])=>s+':'+kg+'Kg');
  });
  const custData=custList.map(c=>`${c.name} (${c.city}): ${(c.kg/1000).toFixed(1)}MT, ${c.rolls} rolls\n  Materials: ${(c.topMats||[]).slice(0,10).join(', ')}\n  Slit Sizes: ${(c.topSizes||[]).slice(0,10).join(', ')}\n  Months: ${c.months.slice(-6).join(', ')}`).join('\n');
  const sizeData=sizeList.map(s=>`${s.thick}µ ${s.od}OD ${s.width||'?'}mm: ${(s.kg/1000).toFixed(1)}MT, ${s.rolls} rolls`).join('\n');

  // 3. Per-month material detail (top 5 per month for recent 6 months)
  const recentMonths=allMk.slice(-6);
  const monthDetail=recentMonths.map(mk=>{
    const d=savedMonths[mk];
    if(!d||!d.zsAgg||!d.zsAgg.byMaterial) return '';
    const top=d.zsAgg.byMaterial;
    const custTop=d.zsAgg.byCustomer?d.zsAgg.byCustomer:[];
    return `\n[${mk}] Materials: ${top.map(m=>m.code+':'+Math.round(m.kg)+'Kg('+m.pct.toFixed(1)+'%)').join(', ')}` +
      (custTop.length?`\n[${mk}] Customers: ${custTop.map(c=>c.name+'('+c.city+'):'+Math.round(c.kg)+'Kg\n    Mats:['+(c.topMats||[]).join(',')+'] Sizes:['+(c.topSizes||[]).slice(0,10).join(',')+']').join('\n  ')}`:'');

━━━ KEY FORMULAS USED IN THIS APP ━━━
- Bare Waste% = 3SC-TW ÷ Base Film Input (orders 303/305)

- OD = Outer Diameter of jumbo roll (2.2, 2.5, 2.8 = standard sizes). Higher OD = more wire+boat per MT.
- Micron = film thickness. Lower micron (8µ,10µ) = faster speed, less wire/boat. Higher (19µ,23µ) = more material.
- Chemical (360/361) = +₹6 film delta. AluBond (ABM) = +₹8 met delta. RCM = +₹64 film delta.

━━━ COST COMPONENTS ━━━
- Wire (Al): Raw material — Al wire consumed per MT. Higher OD/ABM = more wire.
- Boat (EVB): Evaporation boats — consumed per MT. Higher OD = more boats.
- Wastage Loss: Financial impact of bare waste + met waste in ₹/Kg.
- B-Grade Loss: Revenue loss from downgraded (Grade 3) production.
- Manpower: Salary ÷ Production MT. Fixed cost — higher production = lower ₹/Kg.

- Indirect: Fixed overhead ₹${rates.indirectExpense}/Kg target (equiv = actual × ratio).
- Scrap: Al wire scrap + Al dust recovery (reduces net cost).

━━━ TEAM/PERFORMANCE RULES ━━━

- Variance sign: negative = worse than target (bad). Positive = better (good).

        return '<div style="margin-bottom:6px"><label style="font-size:10px;color:#64748b">'+labels[k]+'</label><input id="rptRmk_'+k+'" value="'+(_reportData.remarks[k]||'')+'" placeholder="Add remark..." style="width:100%;padding:6px 8px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:11px"></div>'
      }).join('')}
    </div>

    <div style="background:#111827;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid rgba(245,158,11,.2)">
      <div style="font-size:12px;color:#f59e0b;font-weight:700;margin-bottom:6px">🎯 Focus Areas for Next Month (one per line)</div>
      <textarea id="rptFocus" rows="3" style="width:100%;padding:8px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:11px;resize:vertical">${_reportData.focusAreas.join('\n')}</textarea>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <button onclick="saveAndGenerate()" style="flex:1;padding:12px;background:linear-gradient(135deg,#a855f7,#3b82f6);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer">📊 Generate & Save PPT</button>
      <button onclick="saveReportOnly()" style="padding:12px 16px;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#94a3b8;font-size:12px;cursor:pointer">💾 Save Only</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function collectReportEdits(){
  _reportData.title=document.getElementById('rptTitle').value;
  _reportData.subtitle=document.getElementById('rptSubtitle').value;
  _reportData.highlights=document.getElementById('rptHighlights').value.split('\n').filter(s=>s.trim());
  _reportData.lowlights=document.getElementById('rptLowlights').value.split('\n').filter(s=>s.trim());
  _reportData.focusAreas=document.getElementById('rptFocus').value.split('\n').filter(s=>s.trim());
  ['summary','mix','waste','wasteTrend','machine','machineTrend','threeMonth','convCost','target'].forEach(k=>{
    const el=document.getElementById('rptRmk_'+k);
    if(el) _reportData.remarks[k]=el.value;
  });
  _reportData.savedAt=new Date().toISOString();
}

function saveReportOnly(){
  collectReportEdits();
  saveReport(_reportData.mk,_reportData);
  alert('Report saved for '+monthLabel(_reportData.mk)+'!\nFind it in Dashboard → Saved Reports.');
  document.getElementById('reportModal').remove();
  render();
}

async function saveAndGenerate(){
  collectReportEdits();
  saveReport(_reportData.mk,_reportData);
  document.getElementById('reportModal').remove();
  await generatePPT(_reportData.mk,_reportData);
  render();
}

async function generatePPT(mk,rpt){
  if(typeof PptxGenJS==='undefined'){alert('PptxGenJS not loaded. Check internet connection.');return}
  if(!mk){mk=selMonth;rpt=getSavedReports()[mk]||null}
  if(!rpt){openReportEditor(mk);return} // No saved data → open editor first
  const allMk=Object.keys(savedMonths).sort();
  const d=savedMonths[mk];if(!d){alert('No data for '+mk);return}
  const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const ml=s=>{const[y,m]=s.split('-');return MN[parseInt(m)-1]+' '+y};
  const f=(v,dp)=>Number(v||0).toFixed(dp===undefined?2:dp);
  const r=d.rates||rates;
  const e=d.eq||{};
  const od=d.odEq||{};

  // Recalc waste at report time
  const bp=d.bareWastePct||0,mp=d.metWastePct||0,io=d.ioPct||0;
  const wg=Math.max(0,bp-io),am=Math.max(0,mp-wg);
  const bareLoss=bp*0.5*r.baseFilmRate/100,metLoss=am*(r.baseFilmRate+5)/100;
  const wasteLoss=bareLoss+metLoss;

  const pres=new PptxGenJS();
  pres.layout='LAYOUT_16x9';
  pres.author='MetCost Pro';
  pres.title='Monthly Performance Report — '+ml(mk);

  // Colors
  const C={bg:'0A0F1A',card:'111827',navy:'1E2761',teal:'0D9488',blue:'3B82F6',green:'22C55E',red:'EF4444',amber:'F59E0B',purple:'A855F7',
    tx:'E2E8F0',tx2:'94A3B8',tx3:'64748B',white:'FFFFFF',cyan:'06B6D4'};
  const shadow=()=>({type:'outer',blur:4,offset:2,angle:135,color:'000000',opacity:0.2});
  // Add remark at bottom of slide if present
  const addRemark=(slide,key)=>{
    const txt=rpt.remarks&&rpt.remarks[key];
    if(txt) slide.addText('📝 '+txt,{x:0.4,y:5.05,w:9.2,h:0.4,fontSize:9,color:C.amber,fontFace:'Arial',italic:true});
  };

  // ═══ SLIDE 1: TITLE ═══
  let s1=pres.addSlide();
  s1.background={color:C.bg};
  s1.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:10,h:1.2,fill:{color:C.navy}});
  s1.addText(rpt.subtitle||'GLS POLYFILMS',{x:0.5,y:0.2,w:9,h:0.4,fontSize:14,color:C.tx2,fontFace:'Arial',charSpacing:4,bold:true});
  s1.addText(rpt.title||'MONTHLY PERFORMANCE REPORT',{x:0.5,y:0.55,w:9,h:0.5,fontSize:28,color:C.white,fontFace:'Arial Black',bold:true});
  s1.addText(ml(mk).toUpperCase(),{x:0.5,y:2.0,w:9,h:0.8,fontSize:48,color:C.cyan,fontFace:'Arial Black',bold:true});
  s1.addText([
    {text:'Production: ',options:{bold:true,color:C.tx2}},{text:f(d.prodMT,0)+' MT',options:{bold:true,color:C.green}},{text:'   |   ',options:{color:C.tx3}},
    {text:'Conv. Cost: ',options:{bold:true,color:C.tx2}},{text:'₹'+f(d.convC),options:{bold:true,color:C.amber}},{text:'   |   ',options:{color:C.tx3}},
    {text:'Total: ',options:{bold:true,color:C.tx2}},{text:'₹'+f(d.totalC),options:{bold:true,color:C.red}}
  ],{x:0.5,y:3.2,w:9,h:0.4,fontSize:14,fontFace:'Arial'});
  s1.addText('MetCost Pro · Auto-generated Report',{x:0.5,y:4.8,w:9,h:0.3,fontSize:10,color:C.tx3,fontFace:'Arial'});

  // ═══ SLIDE 2: SUMMARY — Highlights & Lowlights ═══
  let s2=pres.addSlide();
  s2.background={color:C.bg};
  s2.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:10,h:0.7,fill:{color:C.navy}});
  s2.addText('SUMMARY — '+ml(mk),{x:0.5,y:0.12,w:9,h:0.45,fontSize:20,color:C.white,fontFace:'Arial Black',bold:true});

  // Highlights & Lowlights from editor
  const highlights=rpt.highlights||[];
  const lowlights=rpt.lowlights||[];

  s2.addShape(pres.shapes.RECTANGLE,{x:0.4,y:0.9,w:4.3,h:2.2,fill:{color:C.card},shadow:shadow()});
  s2.addText('✅ HIGHLIGHTS',{x:0.6,y:0.95,w:4,h:0.35,fontSize:13,color:C.green,fontFace:'Arial',bold:true});
  s2.addText(highlights.map(h=>({text:h,options:{bullet:true,breakLine:true,color:C.tx,fontSize:11}})),{x:0.6,y:1.35,w:3.9,h:1.7,fontFace:'Arial',paraSpaceAfter:4});

  s2.addShape(pres.shapes.RECTANGLE,{x:5.3,y:0.9,w:4.3,h:2.2,fill:{color:C.card},shadow:shadow()});
  s2.addText('⚠️ LOWLIGHTS',{x:5.5,y:0.95,w:4,h:0.35,fontSize:13,color:C.red,fontFace:'Arial',bold:true});
  s2.addText(lowlights.length?lowlights.map(h=>({text:h,options:{bullet:true,breakLine:true,color:C.tx,fontSize:11}})):[{text:'All parameters within target',options:{color:C.tx2,fontSize:11}}],{x:5.5,y:1.35,w:3.9,h:1.7,fontFace:'Arial',paraSpaceAfter:4});

  // Key metrics cards
  const metrics=[
    {l:'Production',v:f(d.prodMT,0)+' MT',c:C.blue},
    {l:'Eqv. Output',v:f(d.equivKg/1000,0)+' MT',c:C.purple},
    {l:'Bare Waste',v:f(bp)+'%',c:bp>1.5?C.red:C.green},
    {l:'Met Waste',v:f(mp)+'%',c:mp>1.5?C.red:C.green},
    {l:'Avg Width',v:f(od.avgWidth||3000,0)+'mm',c:C.cyan},
    {l:'Conv. Cost',v:'₹'+f(d.convC),c:C.amber}
  ];
  metrics.forEach((m,i)=>{
    const x=0.4+i*1.55,y=3.35;
    s2.addShape(pres.shapes.RECTANGLE,{x,y,w:1.45,h:1.1,fill:{color:C.card},shadow:shadow()});
    s2.addShape(pres.shapes.RECTANGLE,{x,y,w:1.45,h:0.06,fill:{color:m.c}});
    s2.addText(m.v,{x,y:y+0.15,w:1.45,h:0.5,fontSize:16,color:m.c,fontFace:'Arial',bold:true,align:'center'});
    s2.addText(m.l,{x,y:y+0.65,w:1.45,h:0.35,fontSize:9,color:C.tx3,fontFace:'Arial',align:'center'});
  });

  addRemark(s2,'summary');

  // ═══ SLIDE 3: MATERIAL MIX ═══
  let s3=pres.addSlide();
  s3.background={color:C.bg};
  s3.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:10,h:0.7,fill:{color:C.navy}});
  s3.addText('MATERIAL MIX — '+ml(mk),{x:0.5,y:0.12,w:9,h:0.45,fontSize:20,color:C.white,fontFace:'Arial Black',bold:true});

  // Parse material categories from zsAgg
  const mix={'8µ 2.2':{kg:0},'8µ 2.5':{kg:0},'8µ 2.8':{kg:0},'10µ ABM 2.2':{kg:0},'10µ ABM 2.5':{kg:0},'10µ ABM 2.8':{kg:0},
    '12µ 2.2':{kg:0},'12µ 2.5':{kg:0},'12µ 2.8':{kg:0},'19µ & Others':{kg:0},'RCM':{kg:0},'AlOx':{kg:0},'Heat Seal':{kg:0}};
  if(d.zsAgg&&d.zsAgg.byMaterial){
    d.zsAgg.byMaterial.forEach(m=>{
      const c=m.code.toUpperCase();
      const kg=m.kg||0;
      if(c.includes('RCM')){mix['RCM'].kg+=kg}
      else if(c.includes('AL')&&c.match(/AL\d/)){mix['AlOx'].kg+=kg}
      else if(c.includes('SLC')||c.includes('LCM')){mix['Heat Seal'].kg+=kg}
      else{
        const mic=c.match(/G(\d+)/);const od=c.match(/M(\d+)/);
        const t=mic?parseInt(mic[1]):12;const o=od?parseInt(od[1]):22;
        const isABM=c.includes('ABM');
        if(t<=8){mix[`8µ ${o===25?'2.5':o===28?'2.8':'2.2'}`].kg+=kg}
        else if(t<=10&&isABM){mix[`10µ ABM ${o===25?'2.5':o===28?'2.8':'2.2'}`].kg+=kg}
        else if(t<=12){mix[`12µ ${o===25?'2.5':o===28?'2.8':'2.2'}`].kg+=kg}
        else{mix['19µ & Others'].kg+=kg}
      }
    });
  }
  const mixArr=Object.entries(mix).filter(([k,v])=>v.kg>0).sort((a,b)=>b[1].kg-a[1].kg);
  const mixTotal=mixArr.reduce((s,[k,v])=>s+v.kg,0)||1;
  const mixColors=['3B82F6','0D9488','A855F7','F59E0B','EF4444','22C55E','06B6D4','EC4899','8B5CF6','D97706','10B981','6366F1','F43F5E'];

  // Table
  const tblHeader=[
    [{text:'Material Type',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:11}},
     {text:'Kg',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:11,align:'right'}},
     {text:'MT',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:11,align:'right'}},
     {text:'%',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:11,align:'right'}}]
  ];
  const tblRows=mixArr.map(([k,v],i)=>[
    {text:k,options:{color:C.tx,fontSize:10,fill:{color:i%2?C.card:'1A1F2E'}}},
    {text:Math.round(v.kg).toLocaleString(),options:{color:C.tx,fontSize:10,align:'right',fill:{color:i%2?C.card:'1A1F2E'}}},
    {text:f(v.kg/1000,1),options:{color:C.tx,fontSize:10,align:'right',fill:{color:i%2?C.card:'1A1F2E'}}},
    {text:f(v.kg/mixTotal*100,1)+'%',options:{color:mixColors[i%mixColors.length],fontSize:10,bold:true,align:'right',fill:{color:i%2?C.card:'1A1F2E'}}}
  ]);
  tblRows.push([
    {text:'TOTAL',options:{color:C.white,fontSize:11,bold:true,fill:{color:'1E3A5F'}}},

    {text:'100%',options:{color:C.green,fontSize:11,bold:true,align:'right',fill:{color:'1E3A5F'}}}

  s3.addTable([...tblHeader,...tblRows],{x:0.4,y:0.85,w:5.5,colW:[2.2,1.2,0.9,1.0],border:{pt:0.5,color:'2D3748'},fontFace:'Arial'});

  // Pie chart
  if(mixArr.length>0){

  const wasteData=[
    ['Bare Waste (3SC-TW)',f(d.bareWasteKg||0,0)+' Kg',f(bp)+'%','÷ Base Film Input '+f(d.bareIn||0,0)+' Kg'],
    ['Met Waste (MSW+MTW+Gr6)',f(d.metWasteKg||0,0)+' Kg',f(mp)+'%','÷ Slit Production '+f(d.prodKg||0,0)+' Kg'],
    ['I-O %','','',f(io)+'% = ('+f(d.bareIn||0,0)+' − '+f(d.bareOut||0,0)+') ÷ input'],
    ['Weight Gain','','',f(wg)+'% = bare% − I-O%'],
    ['Adjusted Met %','','',f(am)+'% = met% − weightGain'],
    ['Bare Loss','','₹'+f(bareLoss),f(bp)+'% × 50% × ₹'+r.baseFilmRate+' / 100'],
    ['Met Loss','','₹'+f(metLoss),f(am)+'% × ₹'+(r.baseFilmRate+5)+' / 100'],
    ['TOTAL WASTE LOSS','','₹'+f(wasteLoss)+'/Kg','']
  ];
  const wTbl=wasteData.map((row,i)=>{

    return row.map((cell,j)=>({text:cell,options:{color:tc,fontSize:10,bold:isTotal,fontFace:'Arial',fill:{color:bg},align:j>0?'right':'left'}}));

  ],...wTbl],{x:0.4,y:0.85,w:9.2,colW:[2.2,1.5,1.2,4.3],border:{pt:0.5,color:'2D3748'}});

  addRemark(s4,'waste');

  addRemark(s6,'machine');

  ],{x:0.3,y:0.85,w:9.4,h:4.2,lineSize:2,showValue:true,dataLabelPosition:'t',dataLabelColor:C.tx2,dataLabelFontSize:8,
    chartColors:[C.blue,C.green,C.purple],chartArea:{fill:{color:C.card}},
    catAxisLabelColor:C.tx2,valAxisLabelColor:C.tx2,valGridLine:{color:'2D3748',size:0.5},catGridLine:{style:'none'},
    showLegend:true,legendPos:'b',legendColor:C.tx2});

  addRemark(s7,'machineTrend');

  // ═══ SLIDE 8: LAST 3 MONTHS PERFORMANCE ═══
  let s8=pres.addSlide();
  s8.background={color:C.bg};
  s8.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:10,h:0.7,fill:{color:C.navy}});
  s8.addText('LAST 3 MONTHS COMPARISON',{x:0.5,y:0.12,w:9,h:0.45,fontSize:20,color:C.white,fontFace:'Arial Black',bold:true});
  const l3=allMk.slice(-3);
  const compHeader=[
    [{text:'Component',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:10}}]
      .concat(l3.map(m=>({text:ml(m),options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:10,align:'center'}})))
  ];
  const compFields=[
    {l:'Production (MT)',k:'prodMT',dp:0},{l:'Eqv. Output (MT)',k:'equivKg',div:1000,dp:0},
    {l:'Wire ₹/Kg',k:'wireCKg'},{l:'Boat ₹/Kg',k:'boatCKg'},{l:'Raw Material',k:'rmC'},
    {l:'Waste Loss',k:'wasteLoss'},{l:'B-Grade Loss',k:'bGradeLoss'},
    {l:'Manpower',k:'mpKg'},{l:'Power',k:'pwrKg'},{l:'Cons & Spares',k:'consKg'},
    {l:'Conversion Cost',k:'convC'},{l:'TOTAL COST',k:'totalC'}
  ];
  const compRows=compFields.map((fld,i)=>{
    const isTotal=fld.l==='TOTAL COST';
    const bg=isTotal?'1E3A5F':i%2?C.card:'1A1F2E';
    return [{text:fld.l,options:{color:isTotal?C.amber:C.tx,fontSize:10,bold:isTotal,fill:{color:bg}}}]
      .concat(l3.map(m=>{
        const x=savedMonths[m]||{};let v=x[fld.k]||0;if(fld.div)v/=fld.div;
        return{text:fld.k==='totalC'?'₹'+f(v,fld.dp):f(v,fld.dp),options:{color:isTotal?C.amber:C.tx,fontSize:10,bold:isTotal,align:'center',fill:{color:bg}}};
      }));
  });
  s8.addTable([...compHeader,...compRows],{x:0.4,y:0.85,w:9.2,colW:[2.8].concat(l3.map(()=>(9.2-2.8)/l3.length)),border:{pt:0.5,color:'2D3748'},fontFace:'Arial'});

  addRemark(s8,'threeMonth');

  // ═══ SLIDE 9: CONV COST DETAIL — Actual vs Eqv vs Target ═══
  let s9=pres.addSlide();
  s9.background={color:C.bg};
  s9.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:10,h:0.7,fill:{color:C.navy}});
  s9.addText('CONVERSION COST — '+ml(mk)+' (Actual vs Eqv. vs Target 12µ 2.2)',{x:0.3,y:0.12,w:9.4,h:0.45,fontSize:16,color:C.white,fontFace:'Arial Black',bold:true});
  const tRM=r.tWire+r.tBoat;
  const costRows=[
    ['Wire',f(d.wireKgsTotal||0,0)+' Kg',f(d.wireKgsTotal/d.prodMT,1)+' Kg/MT','₹'+f(d.wireCKg),f(e.eqWireKgMT||0,1)+' Kg/MT','₹'+f(e.wire),'₹'+f(r.tWire)],
    ['Boat',f(d.boatPcsTotal||0,0)+' Pcs',f(d.boatPcsTotal/d.prodMT,1)+' Pcs/MT','₹'+f(d.boatCKg),f(e.eqBoatPcMT||0,1)+' Pcs/MT','₹'+f(e.boat),'₹'+f(r.tBoat)],
    ['Raw Material','','','₹'+f(d.rmC),'','₹'+f(e.rm),'₹'+f(tRM)],
    ['Waste Loss','Bare '+f(bp)+'%','Met '+f(am)+'%','₹'+f(wasteLoss),'','₹'+f(e.wasteLoss),'₹'+f(r.tWaste)],
    ['B-Grade','',''+f(d.bGradePct)+'%','₹'+f(d.bGradeLoss),'','₹'+f(e.bGradeLoss),'₹0.00'],
    ['Manpower','','','₹'+f(d.mpKg),'','₹'+f(e.mp),'₹'+f(r.tManpower)],
    ['Power',f(d.pwrU||0,0)+' units','','₹'+f(d.pwrKg),'','₹'+f(e.pwr),'₹'+f(r.tPower)],
    ['Cons & Spares','','','₹'+f(d.consKg),'','₹'+f(d.consKg*(d.effectiveProd/(d.equivKg||d.effectiveProd))),'₹'+f(r.tCons)],
    ['Indirect','','','₹'+f(r.indirectExpense),'','₹'+f(r.indirectExpense*(d.effectiveProd/(d.equivKg||d.effectiveProd))),'₹'+f(r.indirectExpense)],
    ['CONV. COST','','','₹'+f(d.convC),'','₹'+f(e.convC),'₹'+f(r.tWaste+r.tManpower+r.tPower+r.tCons+r.indirectExpense)],
    ['TOTAL COST','','','₹'+f(d.totalC),'','₹'+f(e.totalC),'₹'+f(tRM+r.tWaste+r.tManpower+r.tPower+r.tCons+r.indirectExpense)]
  ];
  const costTblH=[[
    {text:'Component',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:9}},
    {text:'Qty',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:9,align:'center'}},
    {text:'Per MT',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:9,align:'center'}},
    {text:'Actual ₹/Kg',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:9,align:'center'}},
    {text:'Eqv. Per MT',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:9,align:'center'}},
    {text:'Eqv. ₹/Kg',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:9,align:'center'}},
    {text:'Target ₹/Kg',options:{fill:{color:C.navy},color:C.white,bold:true,fontSize:9,align:'center'}}
  ]];
  const costTblR=costRows.map((row,i)=>{
    const isTotal=i>=costRows.length-2;
    const bg=isTotal?'1E3A5F':i%2?C.card:'1A1F2E';
    return row.map((cell,j)=>({text:cell,options:{color:isTotal?C.amber:C.tx,fontSize:9,bold:isTotal,fontFace:'Arial',fill:{color:bg},align:j>0?'center':'left'}}));
  });
  s9.addTable([...costTblH,...costTblR],{x:0.2,y:0.8,w:9.6,colW:[1.3,1.2,1.2,1.2,1.3,1.2,1.2],border:{pt:0.5,color:'2D3748'}});

  addRemark(s9,'convCost');

  // ═══ SLIDE 10: NEXT MONTH TARGET ═══
  let s10=pres.addSlide();
  s10.background={color:C.bg};
  s10.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:10,h:0.7,fill:{color:C.navy}});
  const nextMk=(()=>{const[y,m]=mk.split('-').map(Number);const nm=m===12?1:m+1;const ny=m===12?y+1:y;return ny+'-'+String(nm).padStart(2,'0')})();
  s10.addText('TARGET — '+ml(nextMk),{x:0.5,y:0.12,w:9,h:0.45,fontSize:20,color:C.white,fontFace:'Arial Black',bold:true});

  const targetItems=[
    {l:'Wire ₹/Kg',v:'₹'+f(r.tWire),c:C.blue},
    {l:'Boat ₹/Kg',v:'₹'+f(r.tBoat),c:C.purple},
    {l:'Waste Loss ₹/Kg',v:'₹'+f(r.tWaste),c:C.red},
    {l:'Manpower ₹/Kg',v:'₹'+f(r.tManpower),c:C.amber},
    {l:'Power ₹/Kg',v:'₹'+f(r.tPower),c:C.cyan},
    {l:'Cons & Spares',v:'₹'+f(r.tCons),c:C.teal},
    {l:'Indirect',v:'₹'+f(r.indirectExpense),c:C.tx2},
    {l:'TOTAL TARGET',v:'₹'+f(r.tWire+r.tBoat+r.tWaste+r.tManpower+r.tPower+r.tCons+r.indirectExpense),c:C.green}
  ];
  targetItems.forEach((t,i)=>{
    const x=0.4+(i%4)*2.35,y=1.0+Math.floor(i/4)*1.6;
    const isTotal=t.l==='TOTAL TARGET';
    s10.addShape(pres.shapes.RECTANGLE,{x,y,w:2.2,h:1.3,fill:{color:isTotal?'1E3A5F':C.card},shadow:shadow()});
    s10.addShape(pres.shapes.RECTANGLE,{x,y,w:2.2,h:0.06,fill:{color:t.c}});
    s10.addText(t.v,{x,y:y+0.2,w:2.2,h:0.6,fontSize:isTotal?24:20,color:t.c,fontFace:'Arial',bold:true,align:'center'});
    s10.addText(t.l,{x,y:y+0.85,w:2.2,h:0.3,fontSize:10,color:C.tx3,fontFace:'Arial',align:'center'});
  });
  // Action items
  s10.addShape(pres.shapes.RECTANGLE,{x:0.4,y:4.0,w:9.2,h:1.2,fill:{color:C.card},shadow:shadow()});
  s10.addText('🎯 FOCUS AREAS',{x:0.6,y:4.05,w:8,h:0.3,fontSize:12,color:C.amber,fontFace:'Arial',bold:true});
  const actions=rpt.focusAreas&&rpt.focusAreas.length?rpt.focusAreas:['Maintain current performance'];
  s10.addText(actions.map(a=>({text:a,options:{bullet:true,breakLine:true,color:C.tx,fontSize:10}})),{x:0.6,y:4.35,w:8.8,h:0.8,fontFace:'Arial',paraSpaceAfter:2});
  addRemark(s10,'target');

  // Save
  try{
    await pres.writeFile({fileName:'MetCost_Report_'+mk+'.pptx'});
  }catch(e){
    // Fallback for iframe: use blob download
    const blob=await pres.write({outputType:'blob'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='MetCost_Report_'+mk+'.pptx';a.click();
    URL.revokeObjectURL(url);
  }
}
</script>
<div id="aiPanel" style="display:none;position:fixed;bottom:70px;right:10px;left:10px;max-width:420px;margin-left:auto;height:60vh;background:#0f172a;border:1px solid rgba(59,130,246,.3);border-radius:16px;flex-direction:column;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.5)">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1)">
    <div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">🤖</span><span style="color:#60a5fa;font-weight:700;font-size:13px">MetCost AI Assistant</span><span id="aiMonthCount" style="font-size:9px;color:#64748b"></span></div>
    <button onclick="toggleAI()" style="background:none;border:none;color:#94a3b8;font-size:18px;cursor:pointer">✕</button>
  </div>
  <div id="aiMessages" style="flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px"></div>
  <div style="padding:10px;border-top:1px solid rgba(255,255,255,.1)">
    <div id="aiSuggestions" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">
      <button onclick="document.getElementById('aiInput').value='Which month had lowest total cost?';sendAI()" style="background:#1e293b;border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:4px 10px;color:#60a5fa;font-size:10px;cursor:pointer;font-family:var(--fn)">📉 Best cost month</button>
      <button onclick="document.getElementById('aiInput').value='Top 5 customers by production volume';sendAI()" style="background:#1e293b;border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:4px 10px;color:#60a5fa;font-size:10px;cursor:pointer;font-family:var(--fn)">👥 Top customers</button>
      <button onclick="document.getElementById('aiInput').value='Top 5 materials produced and their average sizes';sendAI()" style="background:#1e293b;border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:4px 10px;color:#60a5fa;font-size:10px;cursor:pointer;font-family:var(--fn)">📦 Top materials</button>
      <button onclick="document.getElementById('aiInput').value='Compare last 3 months — what improved and what got worse?';sendAI()" style="background:#1e293b;border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:4px 10px;color:#60a5fa;font-size:10px;cursor:pointer;font-family:var(--fn)">⚖️ Compare months</button>
      <button onclick="document.getElementById('aiInput').value='What is the production mix breakdown by thickness and OD?';sendAI()" style="background:#1e293b;border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:4px 10px;color:#60a5fa;font-size:10px;cursor:pointer;font-family:var(--fn)">📊 Size mix</button>
      <button onclick="document.getElementById('aiInput').value='Which cost components are consistently above target?';sendAI()" style="background:#1e293b;border:1px solid rgba(96,165,250,.2);border-radius:8px;padding:4px 10px;color:#60a5fa;font-size:10px;cursor:pointer;font-family:var(--fn)">🎯 Above target</button>
    </div>
    <div style="display:flex;gap:8px">
      <input id="aiInput" placeholder="Ask about costs, trends, comparisons..." onkeydown="if(event.key==='Enter')sendAI()"
        style="flex:1;background:#1e293b;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;color:#e2e8f0;font-size:12px;font-family:var(--fn);outline:none">
      <button onclick="sendAI()" style="background:#1d4ed8;border:none;border-radius:10px;padding:8px 14px;color:#fff;font-size:12px;cursor:pointer;font-weight:700">Send</button>
    </div>
  </div>
</div>
<button onclick="toggleAI()" style="position:fixed;bottom:74px;right:14px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(29,78,216,.5);z-index:299;display:flex;align-items:center;justify-content:center">🤖</button>
</body>
