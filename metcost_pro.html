// ═══ IndexedDB: persistent raw data storage (no size limit) ═══
const IDB_NAME='MetCostRaw',IDB_VER=1;
function idbOpen(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(IDB_NAME,IDB_VER);
    req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('raw'))db.createObjectStore('raw')};
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function idbSave(key,val){
  try{const db=await idbOpen();const tx=db.transaction('raw','readwrite');tx.objectStore('raw').put(val,key);return new Promise((r,j)=>{tx.oncomplete=()=>r(true);tx.onerror=()=>j(tx.error)})}
  catch(e){console.warn('[MetCost] IDB save error:',e);return false}
}
async function idbLoad(key){
  try{const db=await idbOpen();const tx=db.transaction('raw','readonly');const req=tx.objectStore('raw').get(key);return new Promise((r,j)=>{req.onsuccess=()=>r(req.result||null);req.onerror=()=>j(req.error)})}
  catch(e){console.warn('[MetCost] IDB load error:',e);return null}
}
async function idbClear(){
  try{const db=await idbOpen();const tx=db.transaction('raw','readwrite');tx.objectStore('raw').clear();return new Promise(r=>{tx.oncomplete=()=>r(true)})}
  catch(e){return false}
}
// Save raw data to IndexedDB — MERGES with existing (never loses previously uploaded types)
async function saveRawToIDB(){
  const types=['mb51','zslit','zjumbo','electricity','consSpares'];
  // Load existing meta to know what's already saved
  let existingMeta;
  try{existingMeta=await idbLoad('raw_meta')}catch(e){}
  const existingTypes=new Set((existingMeta&&existingMeta.types)||[]);
  let saved=0;
  for(const t of types){
    if(rawData[t]&&rawData[t].length>0){
      await idbSave('raw_'+t,rawData[t]);
      existingTypes.add(t); // merge into existing set
      saved++;
      console.log('[MetCost] IDB saved '+t+': '+rawData[t].length+' rows');
    }
  }
  // Meta includes ALL types ever saved (existing + new)
  const allTypes=[...existingTypes];
  const rowCounts={};
  allTypes.forEach(t=>{rowCounts[t]=rawData[t]?rawData[t].length:(existingMeta&&existingMeta.rowCounts?existingMeta.rowCounts[t]||0:0)});
  const newMeta={savedAt:new Date().toISOString(),types:allTypes,rowCounts};
  await idbSave('raw_meta',newMeta);
  _idbMetaCache=newMeta; // update cache for UI
  console.log('[MetCost] ✅ IDB saved '+saved+' new + '+allTypes.length+' total types: '+allTypes.join(', '));
  return saved;
}
// Load raw data from IndexedDB (on app start or after upload) — MERGES with memory
async function loadRawFromIDB(){
  const meta=await idbLoad('raw_meta');
  if(!meta||!meta.types||meta.types.length===0) return false;
  _idbMetaCache=meta; // cache for upload UI
  console.log('[MetCost] IDB found saved data from '+meta.savedAt+': '+meta.types.join(', '));
  let loaded=0;
  for(const t of meta.types){
    // Don't overwrite data that's already in memory (just uploaded)
    if(rawData[t]&&rawData[t].length>0){
      console.log('[MetCost] IDB skip '+t+': already in memory ('+rawData[t].length+' rows)');
      loaded++;
      continue;
    }
    const data=await idbLoad('raw_'+t);
    if(data&&data.length>0){rawData[t]=data;loaded++;console.log('[MetCost] IDB loaded '+t+': '+data.length+' rows')}
  }
  if(loaded>0){
    buildIndex();
    const months=findAllMonths();
    let computed=0;
    // Compute months with UI yielding (prevents freeze on 40+ months)
    for(let i=0;i<months.length;i++){
      const mk=months[i];
      try{const result=computeMonth(mk);if(result){savedMonths[mk]={...savedMonths[mk],...result,savedAt:new Date().toISOString()};computed++}}catch(err){}
      // Yield to UI every 3 months
      if(i%3===2) await new Promise(r=>setTimeout(r,0));
    }
    if(computed) saveToStorage();
    lastComputeResult={months,computed};
    console.log('[MetCost] ✅ IDB recomputed '+computed+'/'+months.length+' months');
    initMonths();render();
    return true;
  }
  return false;
}

// ═══ EQUIVALENCE FACTOR HELPERS — always compute from material code ═══
// Extract OD Eqv factor from material code: M22→eqOD_M22, M25→eqOD_M25, M28→eqOD_M28, M01→eqOD_M01
function getODEqvFromCode(matCode){
  const m=String(matCode||'').toUpperCase();
  if(m.includes('M28')) return rates.eqOD_M28;
  if(m.includes('M25')) return rates.eqOD_M25;
  if(m.includes('M01')) return rates.eqOD_M01;
  return rates.eqOD_M22; // default M22
}
// Extract Mic Eqv factor: G07/G08→1.88, G10→1.2, G12+→1
function getMicEqvFromCode(matCode){
  const m=String(matCode||'').toUpperCase();
  // Extract exactly 2 digits after G: G12→12, G10→10, G08→8, G07→7
  const gMatch=m.match(/G(\d{2})/);
  if(gMatch){
    const mic=parseInt(gMatch[1]);
    if(mic===7||mic===8) return rates.eqMic_G07; // G07/G08 use same factor
    if(mic===10) return rates.eqMic_10;
    if(mic>=12) return rates.eqMic_12plus;
  }
  return rates.eqMic_12plus; // default 12+
}
// Extract Material Eqv factor: AlOx→3, RCM→2.17, Others→1
function getMatEqvFromCode(matCode){
  const m=String(matCode||'').toUpperCase();
  if(m.includes('AL')&&(m.match(/AL\d/)||m.includes('ALTA')||m.includes('ALTR'))) return rates.eqMat_AlOx;
  if(m.includes('RCM')) return rates.eqMat_RCM;
  return rates.eqMat_Others;
}
// Get OD value (2.2/2.5/2.8) from material code for ZJUMBO when OD column missing
function getODValueFromCode(matCode){
  const m=String(matCode||'').toUpperCase();
  if(m.includes('M28')) return 2.8;
  if(m.includes('M25')) return 2.5;
  if(m.includes('M01')) return 2.2; // AlOx M01 = same as M22
  return 2.2; // default M22
}

// Auto-classify by prefix/keywords. User mapping takes priority.
function classifyDept(remark){
  const r=String(remark||'').trim();
  const key=r.toUpperCase();
  // 1. User-saved mapping (exact match)
  if(_deptMap[r]) return _deptMap[r];
  // 2. Prefix convention: M,=Mech E,=E&I U,=Utility P,=Process F,=Film
  if(key.match(/^M[,\s]/)) return 'Mech';
  if(key.match(/^E[,\s]/)) return 'E&I';
  if(key.match(/^U[,\s]/)) return 'Utility';
  if(key.match(/^P[,\s]/)) return 'Process';
  if(key.match(/^F[,\s]/)) return 'Film';
  // 3. Keyword fallback
  if(/POWER|EB FAIL|EB CUT|GRID|LOAD SHED|VOLTAGE/.test(key)) return 'Utility';
  if(/CHILLER|WATER TEMP|WATER PRES|COOLING/.test(key)) return 'Utility';
  if(/CLAMP|SHUTTER|BEARING|PUMP|LEAK|GLYCOL|SHAFT|BOLT BURN|O.RING|ROLLER|LAY.?ARM/.test(key)) return 'Mech';
  if(/PSU|DRIVE|SENSOR|MOTOR|PANEL|TRIP|CONTROL|I\/O|FAULT/.test(key)) return 'E&I';
  if(/BOAT CHANG|WEB BREAK|WIRE STOP|WIRE JAM|SOURCE CLEAN|FEED|STOPAGE|STOPPAGE/.test(key)) return 'Process';
  if(/FILM|SCRATCH|CUT|WRINKLE/.test(key)) return 'Film';
  if(/NO FEED|NO PLAN|NO ORDER|HOLIDAY|SHUT.?DOWN/.test(key)) return 'Others';
  return 'Others';
}

// Load rate history from Firebase on startup (merge with local)
(async function(){
  try{
    const resp=await fetch(FB_BASE+'/metcostRateHistory.json');
    if(resp.ok){
      const cloud=await resp.json();
      if(cloud&&cloud.length>0){
        const local=getRateHistory();
        // Merge: keep unique entries by date+time+field
        const seen=new Set(local.map(r=>r.date+r.time+r.field));
        cloud.forEach(r=>{const k=r.date+r.time+r.field;if(!seen.has(k)){local.push(r);seen.add(k)}});
        local.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
        if(local.length>100) local.splice(0,local.length-100);
        try{localStorage.setItem(RATE_HIST_KEY,JSON.stringify(local))}catch(e){}
        console.log('[MetCost] ✅ Rate history synced: '+local.length+' entries');
      }
    }

// ═══ AUTO SELLING PRICE & FILM RATE from Price List Deltas ═══
// Film ₹ = spBase + Micron Δ + Chem Δ (plain film cost before metallization)
// SP ₹  = spBase + Micron Δ + Met Δ + Chem Δ + ABM Δ + OD Δ (selling price after metallization)
function _parseMaterial(t){
  const d=t.d||'', c=(t.c||'').toUpperCase();
  const micMatch=d.match(/(\d+)µ/);
  const mic=micMatch?parseInt(micMatch[1]):12;
  const odMatch=d.match(/([\d.]+)OD/);
  const od=odMatch?parseFloat(odMatch[1]):2.2;
  const isChem=/chem|360|361|340|331|320|306/i.test(d)||/360|361|340|331|320|306/.test(c);
  const isABM=/alubond|ABM/i.test(d)||/ABM/i.test(c);
  const isRC=/\bRC\b|release/i.test(d)||/RC/.test(c);
  const isAlOx=/alox|AL\d*3/i.test(d)||/AL\d*3/.test(c);
  return {mic,od,isChem,isABM,isRC,isAlOx};
}
function computeFilmRate(t){
  const p=_parseMaterial(t);
  let fr=rates.spBase; // Film ₹ = Base SP (₹170)
  // Micron delta
  if(p.mic<=8) fr+=rates.dMicron8;
  else if(p.mic<=10) fr+=rates.dMicron10;
  // Chem coating
  if(p.isChem) fr+=rates.dChem;
  // RC & AlOx extra film cost
  if(p.isRC) fr+=rates.dFilmRC;
  else if(p.isAlOx) fr+=rates.dFilmAlOx;
  return fr;
}
function computeSP(t){
  // SP = Film ₹ + Met Δ + ABM Δ + OD Δ
  let sp=computeFilmRate(t);
  const p=_parseMaterial(t);
  // Met type delta (metallization charge)
  if(p.isRC) sp+=rates.dMetRC;
  else if(p.isAlOx) sp+=rates.dMetAlOx;
  else if(p.mic<=8) sp+=rates.dMet8;
  else if(p.mic<=10) sp+=rates.dMet10;
  else sp+=rates.dMet12;
  // ABM
  if(p.isABM) sp+=rates.dABM;
  // High OD
  if(p.od>=2.75) sp+=rates.dHighOD28;
  else if(p.od>=2.45) sp+=rates.dHighOD25;
  return sp;
}
function computeSPDelta(t){ return computeSP(t)-rates.spBase; }
function getSPBreakdown(t){
  const p=_parseMaterial(t);
  const fr=computeFilmRate(t);
  let parts=['Film ₹'+fr+' ('+rates.spBase];
  if(p.mic<=8) parts[0]+='+8µ'+rates.dMicron8;
  else if(p.mic<=10) parts[0]+='+10µ'+rates.dMicron10;
  if(p.isChem) parts[0]+='+Chem'+rates.dChem;
  if(p.isRC) parts[0]+='+RC'+rates.dFilmRC;
  else if(p.isAlOx) parts[0]+='+AlOx'+rates.dFilmAlOx;
  parts[0]+=')';
  if(p.isRC) parts.push('Met +'+rates.dMetRC);
  else if(p.isAlOx) parts.push('Met +'+rates.dMetAlOx);
  else if(p.mic<=8) parts.push('Met8 +'+rates.dMet8);
  else if(p.mic<=10) parts.push('Met10 +'+rates.dMet10);
  else parts.push('Met12 +'+rates.dMet12);
  if(p.isABM) parts.push('ABM +'+rates.dABM);
  if(p.od>=2.75) parts.push('OD2.8 +'+rates.dHighOD28);
  else if(p.od>=2.45) parts.push('OD2.5 +'+rates.dHighOD25);
  return parts.join(' → ');
}

const KEEP_COLS={

function trimData(data,type){
  if(!data||!data.length||!KEEP_COLS[type]) return data;
  if(type==='zjumbo'||type==='zslit'||type==='mb51') return data; // don't trim — keep all columns for future use
  const keep=new Set(KEEP_COLS[type]);
  return data.map(row=>{
    const out={};
    for(const k of Object.keys(row)){
      if(keep.has(k)) out[k]=row[k];
    }
    return out;
  });

// Dedup electricity by date — keeps latest row per date
// NOTE: consSpares must NOT be deduped (multiple materials per date are valid)
function _dedupByDate(data,type){
  if(!data||!data.length) return data;
  // Only dedup electricity (1 row per day expected). ConsSpares has multiple valid rows per date.
  if(type==='consSpares'){
    console.log(`[MetCost] _dedupByDate(${type}): SKIP dedup — ${data.length} rows kept`);
    return data;
  }
  const dateKey=type==='electricity'?'Date':'Date';
  const map=new Map();
  data.forEach(row=>{
    const d=row[dateKey]||row.Date||row.date||row['Posting Date'];
    if(!d) return;
    let dk;
    if(d instanceof Date) dk=d.toISOString().slice(0,10);
    else if(typeof d==='string') dk=d.slice(0,10);
    else if(typeof d==='number'&&d>40000) dk=new Date((d-25569)*86400000).toISOString().slice(0,10);
    else dk=String(d);
    map.set(dk,row);
  });
  const result=[...map.values()];
  console.log(`[MetCost] _dedupByDate(${type}): ${data.length} → ${result.length} rows`);
  return result;
}

function parseXL(file,cb,headerRow){
  const sizeMB=file.size/1024/1024;
  const _isMob=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const isCSV=/\.(csv|tsv|txt)$/i.test(file.name);

  // ═══ CSV FAST PATH — 10x less memory than XLSX ═══
  if(isCSV){
    const r=new FileReader();
    r.onerror=()=>{cb(null,null,null,'Read failed: '+file.name)};
    r.onload=e=>{
      try{
        const text=e.target.result;
        try{e.target.result=null}catch(ex){}
        const sep=file.name.endsWith('.tsv')?'\t':',';
        const lines=text.split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2){cb(null,null,null,'Empty CSV');return}
        const headers=lines[0].split(sep).map(h=>h.replace(/^"|"$/g,'').trim());
        const data=[];
        for(let i=1;i<lines.length;i++){
          const vals=lines[i].split(sep);
          const row={};
          headers.forEach((h,j)=>{
            let v=(vals[j]||'').replace(/^"|"$/g,'').trim();
            // Auto-detect dates and numbers
            if(/^\d{1,2}[\/.-]\d{1,2}[\/.-]\d{2,4}$/.test(v)){
              const d=new Date(v);if(!isNaN(d))v=d;
            }else if(v&&!isNaN(v)&&v!==''){v=Number(v)}
            row[h]=v;
          });
          data.push(row);
        }
        console.log('[MetCost] CSV parsed: '+data.length+' rows, '+headers.length+' cols');
        cb(data,null,null,null);
      }catch(err){
        cb(null,null,null,'CSV parse error: '+(err.message||'Unknown').slice(0,80));
      }
    };
    r.readAsText(file);
    return;
  }

  // ═══ WEB WORKER XLSX — parses in background thread (prevents UI freeze) ═══
  const useWorker=typeof Worker!=='undefined'&&sizeMB>0.3;
  if(useWorker){
    console.log('[MetCost] 🔧 Worker parse: '+file.name+' ('+sizeMB.toFixed(1)+'MB)');
    const wCode=`importScripts('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
      self.onmessage=function(e){try{
        var o={type:'array',cellDates:true,cellFormula:false,cellStyles:false,cellHTML:false,
          cellNF:false,cellText:false,bookVBA:false,bookProps:false,bookDeps:false,sheetStubs:false,dense:true};
        if(e.data.raw) o.raw=true;
        if(e.data.one) o.sheets=0;
        var wb=XLSX.read(e.data.b,o);e.data.b=null;var out=[];
        function scanElec(ws){
          var rng=XLSX.utils.decode_range(ws['!ref']||'A1');
          for(var r=0;r<=Math.min(5,rng.e.r);r++){
            for(var c=0;c<=Math.min(25,rng.e.c);c++){
              var v='';
              if(ws['!data']){v=String((ws['!data'][r]&&ws['!data'][r][c]&&ws['!data'][r][c].v)||'').toLowerCase()}
              else{var addr=XLSX.utils.encode_cell({r:r,c:c});var cell=ws[addr];v=cell?String(cell.v||'').toLowerCase():''}
              if(v.indexOf('met-1')>=0||v.indexOf('met-2')>=0||v.indexOf('total met')>=0||v.indexOf('met+%utility')>=0||v.indexOf('process plant')>=0) return r+1;
            }
          }
          return 0;
        }
        for(var i=0;i<wb.SheetNames.length;i++){
          if(e.data.one&&i>0) break;
          var sn=wb.SheetNames[i],ws=wb.Sheets[sn];if(!ws)continue;
          var er=scanElec(ws);
          var d=null;
          if(er>0){try{d=XLSX.utils.sheet_to_json(ws,{defval:null,range:er-1,raw:e.data.raw});if(d&&d.length>0){out.push({d:d,s:sn,h:Object.keys(d[0])});wb.Sheets[sn]=null;continue}}catch(x){}}
          d=XLSX.utils.sheet_to_json(ws,{defval:null,raw:e.data.raw});
          if(!d||!d.length){for(var r=1;r<=5;r++){try{var d2=XLSX.utils.sheet_to_json(ws,{defval:null,range:r});if(d2&&d2.length>5){d=d2;break}}catch(x){}}}
          if(d&&d.length>0){out.push({d:d,s:sn,h:Object.keys(d[0])})}
          wb.Sheets[sn]=null;
        }
        self.postMessage({ok:out});
      }catch(err){self.postMessage({err:err.message||'fail'})}};`;
    const bUrl=URL.createObjectURL(new Blob([wCode],{type:'application/javascript'}));
    const w=new Worker(bUrl);
    let dn=false;
    const tmr=setTimeout(()=>{if(!dn){dn=true;w.terminate();URL.revokeObjectURL(bUrl);
      console.warn('[MetCost] Worker timeout, fallback');_parseXLMain(file,cb,headerRow)}},60000);
    w.onmessage=function(ev){
      if(dn)return;dn=true;clearTimeout(tmr);w.terminate();URL.revokeObjectURL(bUrl);
      if(ev.data.err){console.warn('[MetCost] Worker err: '+ev.data.err);_parseXLMain(file,cb,headerRow);return}
      const sheets=ev.data.ok||[];
      if(!sheets.length){cb(null,null,null,'No data');return}
      const typed=[];
      sheets.forEach(s=>{
        let t=detectFileType(s.h);
        // Electricity fallback: if headers not recognized, check first row values AND header values for electricity keywords
        if(!t&&s.d&&s.d.length>0){
          const vals=Object.values(s.d[0]).map(v=>String(v||'').toLowerCase());
          if(vals.some(v=>v.includes('met-1')||v.includes('met-2')||v.includes('total met')||v.includes('met+%utility')||v.includes('process plant'))){
            t='electricity';
          }
        }
        // Also check if any header contains electricity keywords (scanElec might have re-parsed correctly)
        if(!t&&s.h){
          const hl=s.h.map(x=>String(x||'').toLowerCase());
          if(hl.some(x=>x.includes('met-1')||x.includes('met+%utility')||x.includes('total met'))){

          }

        if(t)typed.push({data:s.d,type:t,sheetName:s.s});

      if(typed.length>1) cb(typed,null,null,null,'multi');
      else if(typed.length===1) cb(typed,null,null,null,'multi');
      else cb(sheets[0].d,null,null,null);

    w.onerror=function(err){
      if(dn)return;dn=true;clearTimeout(tmr);w.terminate();URL.revokeObjectURL(bUrl);
      console.warn('[MetCost] Worker crash, fallback');_parseXLMain(file,cb,headerRow);
    };
    const fr=new FileReader();
    fr.onerror=()=>{if(!dn){dn=true;clearTimeout(tmr);cb(null,null,null,'Read failed')}};
    fr.onload=e=>{const b=e.target.result;try{e.target.result=null}catch(x){}
      w.postMessage({b:b,raw:sizeMB>15,one:sizeMB>15},[b])};
    fr.readAsArrayBuffer(file);
    return;
  }
  // ═══ MAIN THREAD XLSX (small files / desktop / Worker unavailable) ═══
  _parseXLMain(file,cb,headerRow);
}
function _parseXLMain(file,cb,headerRow){
  const sizeMB=file.size/1024/1024;
  const _isMob=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const r=new FileReader();
  r.onerror=()=>{cb(null,null,null,'Read failed: '+file.name)};
  r.onload=e=>{
    try{
      const opts={type:'array',cellDates:true,cellFormula:false,cellStyles:false,cellHTML:false,cellNF:false,cellText:false,
        bookVBA:false,bookProps:false,bookDeps:false,sheetStubs:false};
      if(_isMob||sizeMB>5) opts.dense=true;
      if((_isMob&&sizeMB>15)||sizeMB>50) opts.raw=true;
      if(_isMob&&sizeMB>15) opts.sheets=0;
      const wb=XLSX.read(e.target.result,opts);
      try{e.target.result=null}catch(ex){}
      try{r.result=null}catch(ex){}
      
      // Multi-sheet support: if workbook has multiple sheets, try each
      if(wb.SheetNames.length>1){
        const sheets=[];
        wb.SheetNames.forEach(sn=>{
          try{
            const ws=wb.Sheets[sn];
            if(!ws) return;
            // Always scan for electricity header row FIRST
            const elecRow=scanForElectricity(ws);
            let data;
            if(elecRow>1){
              data=XLSX.utils.sheet_to_json(ws,{defval:null,range:elecRow-1,raw:sizeMB>80});
            }else{
              data=XLSX.utils.sheet_to_json(ws,{defval:null,raw:sizeMB>80});
              if(!data||!data.length){
                for(let rr=1;rr<=5;rr++){try{const d2=XLSX.utils.sheet_to_json(ws,{defval:null,range:rr});if(d2&&d2.length>5){data=d2;break}}catch(x){}}
              }
            }
            if(data&&data.length>0){
              const headers=Object.keys(data[0]);
              const type=detectFileType(headers);
              if(type) sheets.push({data,type,sheetName:sn,ws});
            }
            wb.Sheets[sn]=null; // free memory
          }catch(ex){console.warn('[MetCost] Sheet '+sn+' error:',ex)}
        });
        if(sheets.length>0){
          cb(sheets,wb,null,null,'multi'); // multi-sheet flag
          return;
        }
      }
      
      // Single sheet (original behavior)
      const ws=wb.Sheets[wb.SheetNames[0]];
      let data;
      // Always scan for electricity header row FIRST
      const _elecRow=headerRow?0:scanForElectricity(ws);
      if(_elecRow>1){
        data=XLSX.utils.sheet_to_json(ws,{defval:null,range:_elecRow-1,raw:sizeMB>80});
        console.log('[MetCost] Electricity detected at row '+_elecRow+', re-parsed: '+(data?data.length:0)+' rows');
      }else if(headerRow){
        data=XLSX.utils.sheet_to_json(ws,{defval:null,range:headerRow-1,raw:sizeMB>80});
      }else{
        data=XLSX.utils.sheet_to_json(ws,{defval:null,raw:sizeMB>80});
      }
      wb.Sheets[wb.SheetNames[0]]=null;
      cb(data,wb,ws,null);
    }catch(err){
      console.error('Parse error for '+file.name+' ('+sizeMB.toFixed(1)+'MB):', err);
      cb(null,null,null,'Parse error ('+sizeMB.toFixed(0)+'MB): '+(err.message||'Unknown').slice(0,80));
    }
  };
  r.readAsArrayBuffer(file);
}

function detectFileType(headers){
  const h=headers.map(x=>String(x||'').toLowerCase().trim());
  const has=(...keys)=>keys.every(k=>h.some(x=>x.includes(k)));
  // ELECTRICITY first — because re-parsed electricity row3 has extra cols that look like ZJUMBO
  if(has('met-1')&&has('met-2')) return 'electricity';
  if(has('met+%utility share')) return 'electricity';
  if(has('total met')&&has('process plant')) return 'electricity';
  if(has('process plant')&&has('chillers')&&has('utility')) return 'electricity';
  // MB51
  if(has('amt.in loc.cur')&&has('movement type')&&has('material')&&!has('cost center')&&!has('met-1')) return 'mb51';
  // ZJUMBO — require both machine AND setup time (not just date of production alone)
  if(has('date of production')&&has('machine')&&(has('setup time')||has('chamber open'))) return 'zjumbo';
  if(has('movment type')&&has('machine')&&has('setup time')) return 'zjumbo';
  // ZSLIT
  if(has('move type')&&has('net weight')&&has('grade')&&has('sales order')) return 'zslit';
  // Cons & Spares
  if(has('cost center')&&has('amt.in loc.cur')) return 'consSpares';
  // MB51 fallback
  if(has('material')&&has('amt.in loc.cur')&&h.some(x=>x.includes('posting date'))) return 'mb51';
  return null;
}

// Scan raw worksheet cells for electricity keywords (rows 1-5)
function scanForElectricity(ws){
  // Handle both normal and dense mode worksheets
  const range=XLSX.utils.decode_range(ws['!ref']||'A1');
  for(let r=0;r<=Math.min(4,range.e.r);r++){
    for(let c=0;c<=Math.min(25,range.e.c);c++){
      let v='';
      if(ws['!data']){
        // Dense mode
        v=String((ws['!data'][r]&&ws['!data'][r][c]&&ws['!data'][r][c].v)||'').toLowerCase();
      }else{
        // Normal mode
        const addr=XLSX.utils.encode_cell({r,c});
        const cell=ws[addr];
        v=cell?String(cell.v||'').toLowerCase():'';
      }
      if(v.includes('met-1')||v.includes('met-2')||v.includes('total met')||v.includes('process plant')||v.includes('met+%utility')) return r+1;
    }
  }
  return 0;
}

let uploadLog=[];

function parseDate(v){
  if(v instanceof Date) return isNaN(v)?null:v;
  if(typeof v==='number'){const d=new Date((v-25569)*86400000);return isNaN(d)?null:d}
  if(typeof v==='string'){
    const s=v.trim();
    // Handle DD-MM-YYYY (Indian SAP format with 4-digit year)
    let m=s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
    if(m){return new Date(+m[3],+m[2]-1,+m[1])}
    // Fallback to native Date (handles M/D/YY, YYYY-MM-DD, ISO, etc.)
    const d=new Date(s);return isNaN(d)?null:d;
  }
  return null;
}

function getMonthKey(d){const dt=parseDate(d);if(!dt)return null;return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');}

// Scan all uploaded data to find which months are present
function findAllMonths(){
  const months=new Set();
  const scan=(arr,dateCol)=>{
    if(!arr)return;
    arr.forEach(r=>{
      const mk=getMonthKey(r[dateCol]||r.Date||r.date||r['Posting Date']);
      if(mk)months.add(mk);
    });
  };
  scan(rawData.mb51,'Posting Date');
  scan(rawData.zslit,'Date');
  scan(rawData.zjumbo,'Date of Production');
  scan(rawData.electricity,'Date');
  scan(rawData.consSpares,'Posting Date');
  return Array.from(months).sort();
}

// Compute conversion cost for ONE specific month
// Pre-index raw data by month for fast computation
let _indexed={};
function buildIndex(){
  _indexed={};
  const idx=(arr,dateCol)=>{
    const m={};
    if(!arr) return m;
    arr.forEach(r=>{
      const mk=getMonthKey(r[dateCol]||r.Date||r.date||r['Posting Date']);
      if(mk){if(!m[mk])m[mk]=[];m[mk].push(r)}
    });
    return m;
  };
  if(rawData.mb51) _indexed.mb51=idx(rawData.mb51,'Posting Date');
  if(rawData.zslit) _indexed.zslit=idx(rawData.zslit,'Date');
  if(rawData.zjumbo) _indexed.zjumbo=idx(rawData.zjumbo,'Date of Production');
  if(rawData.electricity) _indexed.electricity=idx(rawData.electricity,'Date');
  if(rawData.consSpares) _indexed.consSpares=idx(rawData.consSpares,'Posting Date');
  console.log('[MetCost] Index built: mb51='+Object.keys(_indexed.mb51||{}).length+'mo, zslit='+Object.keys(_indexed.zslit||{}).length+'mo');
}

function computeMonth(monthKey){
  const{mb51,zslit,electricity,consSpares}=rawData;
  if(!mb51)return null;
  let denom=0,zsAgg=null; // declared early to prevent TDZ errors
  const ms=new Date(monthKey+'-01'),me=new Date(ms.getFullYear(),ms.getMonth()+1,0,23,59,59);
  const inM=v=>{const d=parseDate(v);return d&&d>=ms&&d<=me};

  // Use pre-indexed data if available (much faster for large datasets)
  const mb=_indexed.mb51?(_indexed.mb51[monthKey]||[]):mb51.filter(r=>inM(r['Posting Date']));
  const zs=_indexed.zslit?(_indexed.zslit[monthKey]||[]):zslit?zslit.filter(r=>inM(r.Date||r['Posting Date'])):[];
  const el=_indexed.electricity?(_indexed.electricity[monthKey]||[]):electricity?electricity.filter(r=>inM(r.Date||r.date||r['Posting Date'])):[];
  const cs=_indexed.consSpares?(_indexed.consSpares[monthKey]||[]):consSpares?consSpares.filter(r=>inM(r['Posting Date']||r.Date)):[];

  // Wire cost: All 3RM-ALW rows, raw sum (negative for consumption, positive for returns)
  let wireAmt=0,wireN=0,wireKgsTotal=0;
  mb.filter(r=>String(r.Material||'').toUpperCase().includes('3RM-ALW')).forEach(r=>{
    wireAmt+=Number(r['Amt.in Loc.Cur.']||r['Amt.in loc.cur.']||0); // raw (negative)
    wireKgsTotal+=Number(r['Qty in unit of entry']||0); // raw (negative)
    wireN++;
  });
  wireAmt=-wireAmt; wireKgsTotal=-wireKgsTotal; // negate: consumption is positive

  // Boat cost: compute weighted rate from Libra vs OKOSU/Supervac batches
  let boatAmt=0,boatN=0,boatPcsTotal=0;
  const boatTypes={Libra:{qty:0,amt:0},OKOSU:{qty:0,amt:0},Supervac:{qty:0,amt:0}};
  mb.filter(r=>String(r.Material||'').toUpperCase().includes('3RM-EVB')).forEach(r=>{
    const amt=-Number(r['Amt.in Loc.Cur.']||r['Amt.in loc.cur.']||0); // negate
    const qty=-Number(r['Qty in unit of entry']||0); // negate
    boatAmt+=amt;boatN++;boatPcsTotal+=qty;
    const batch=String(r.Batch||r['Valuation Type']||'').toUpperCase();
    if(batch.startsWith('LIB')){boatTypes.Libra.qty+=qty;boatTypes.Libra.amt+=amt}
    else if(batch.startsWith('OKO')){boatTypes.OKOSU.qty+=qty;boatTypes.OKOSU.amt+=amt}
    else if(batch.startsWith('SUP')){boatTypes.Supervac.qty+=qty;boatTypes.Supervac.amt+=amt}
  });
  // Compute actual weighted boat rate (₹/Pc)
  const boatRate=boatPcsTotal>0?boatAmt/boatPcsTotal:rates.boatRate;

  // SLIT PRODUCTION: MB51 Orders 304/306, Mvt 101+102
  let prodKg=0;
  mb.filter(r=>{
    const ord=String(r.Order||'').trim();
    const mvt=String(r['Movement type']||'').trim();
    return(ord.startsWith('304')||ord.startsWith('306'))&&(mvt==='101'||mvt==='102');
  }).forEach(r=>{prodKg+=Number(r['Qty in unit of entry']||0)});

  // MET JUMBO PRODUCTION: MB51 Orders 303/305, Mvt 101
  let metJumboKg=0;
  mb.filter(r=>{
    const ord=String(r.Order||'').trim();
    const mvt=String(r['Movement type']||'').trim();
    return(ord.startsWith('303')||ord.startsWith('305'))&&mvt==='101';
  }).forEach(r=>{metJumboKg+=Number(r['Qty in unit of entry']||0)});

  if(!prodKg||prodKg<1) return null;

  // GRADE CATEGORIZATION from ZSLIT (Move Type 101 only) — MUST be before bare/met waste
  let slitAKg=0,slitBKg=0,grade5Kg=0,grade6Kg=0,equivKg=0,exportKg=0,domesticKg=0,heatSealKg=0;
  let gr3Remarks=[],gr6Remarks=[];
  let wtWirePerMT=rates.wireOD22,wtBoatPerMT=rates.boatOD22,wtWireCost=rates.tWire,wtBoatCost=rates.tBoat;
  let matBreakdown=[],matchedKg=0;
  let widthEqvFactor=1; // default, computed inside if(zslit)
  if(zslit){
    const sm=zs;
    const p101=sm.filter(r=>String(r['Move Type']||'')=='101');
    // Log ZSLIT column names for equiv debugging
    if(sm.length>0){
      const keys=Object.keys(sm[0]);
      const eqCols=keys.filter(k=>k.toLowerCase().includes('equiv')||k.toLowerCase().includes('output'));
      console.log(`[MetCost] ${monthKey}: ZSLIT ${sm.length} rows, equivCols=[${eqCols.join(', ')}]`);
    }
    slitAKg=p101.filter(r=>{const g=String(r.Grade||'');return g==='2'||g==='7'||g==='8'}).reduce((s,r)=>s+(Number(r['Net Weight'])||0),0);
    slitBKg=p101.filter(r=>String(r.Grade||'')==='3').reduce((s,r)=>s+(Number(r['Net Weight'])||0),0);
    grade5Kg=p101.filter(r=>String(r.Grade||'')==='5').reduce((s,r)=>s+(Number(r['Net Weight'])||0),0);
    grade6Kg=p101.filter(r=>String(r.Grade||'')==='6').reduce((s,r)=>s+(Number(r['Net Weight'])||0),0);
    // Grade 3 & 6 remarks (Down Grade col AO + Remark col U)
    const _gr3Remarks={},_gr6Remarks={};
    p101.forEach(r=>{
      const g=String(r.Grade||'');
      if(g!=='3'&&g!=='6') return;
      const nw=Number(r['Net Weight']||0);if(!nw) return;
      const dg=String(r['Down Grade']||'').trim();
      const rm=String(r.Remark||'').trim();
      const reason=dg||rm||'No reason';
      const tgt=g==='3'?_gr3Remarks:_gr6Remarks;
      if(!tgt[reason]) tgt[reason]={kg:0,count:0};
      tgt[reason].kg+=nw;tgt[reason].count++;
    });
    gr3Remarks=Object.entries(_gr3Remarks).map(([r,v])=>({reason:r,kg:v.kg,count:v.count})).sort((a,b)=>b.kg-a.kg);
    gr6Remarks=Object.entries(_gr6Remarks).map(([r,v])=>({reason:r,kg:v.kg,count:v.count})).sort((a,b)=>b.kg-a.kg);

    // ═══ EQUIVALENT OUTPUT — ALWAYS compute from material code ═══
    // Pre-pass: compute avg jumbo width from ZJUMBO for Width Eqv factor
    let _preAvgWidth=3000;
    const _preZjumbo=rawData.zjumbo;
    if(_preZjumbo){
      let _wS=0,_wC=0;
      _preZjumbo.filter(r=>{
        const mvt=String(r['Movment Type']||r['Mvt type']||r['Movement type']||'').trim();
        return mvt==='101'&&inM(r['Date of Production']||r['Date of production']);
      }).forEach(r=>{
        let w=Number(r['Width_1']||0);if(!w||w<100)w=Number(r.Width||0);
        if(w>500&&w<5000){_wS+=w;_wC++}
      });
      if(_wC>0) _preAvgWidth=_wS/_wC;
    }
    widthEqvFactor=3000/_preAvgWidth;

    const p101valid=p101.filter(r=>{const g=String(r.Grade||'');return g==='2'||g==='3'||g==='7'||g==='8'});
    // Compute equivalent output per roll: NW × OD_eqv × Mic_eqv × Mat_eqv × Width_eqv
    // Then multiply by Length_eqv factor at the end (Excel: ×72/67.4 = 72000/avgLen)
    equivKg=p101valid.reduce((s,r)=>{
      const nw=Number(r['Net Weight']||0);
      if(nw<=0) return s;
      const mat=String(r.Material||'');
      const odEqv=getODEqvFromCode(mat);
      const micEqv=getMicEqvFromCode(mat);
      const matEqv=getMatEqvFromCode(mat);
      const cumEqv=odEqv*micEqv*matEqv*widthEqvFactor;
      return s+nw*cumEqv;
    },0);
    // Length Equivalence Factor = 72000 / avgLenNonAlOxRCM (computed later from ZJUMBO)
    // Applied after ZJUMBO avg length is calculated — see post-ZJUMBO section below
    // Store pre-length equivKg for applying length factor later
    const _equivKgPreLength=equivKg;
    console.log(`[MetCost] ${monthKey}: EQV OUTPUT (pre-length): ${equivKg.toFixed(0)} Kg, widthEqv=${widthEqvFactor.toFixed(4)}, avgJumboW=${_preAvgWidth.toFixed(0)}mm`);
    // Export vs Domestic (Sales Order starting with 3302 = export) & Heat Seal (SLC/LCM in material)
    p101.filter(r=>{const g=String(r.Grade||'');return g!=='5'&&g!=='6'}).forEach(r=>{
      const nw=Number(r['Net Weight']||0);
      const so=String(r['Sales Order']||'').trim();
      const mat=String(r.Material||'').toUpperCase();
      if(so.startsWith('3302')) exportKg+=nw; else domesticKg+=nw;
      if(mat.includes('SLC')||mat.includes('LCM')) heatSealKg+=nw;
    });

    // ═══ WEIGHTED TARGETS: Match ZSLIT material codes to BOM for mix-based targets ═══
    const bomMap={};
    targets.forEach(t=>{bomMap[t.c.toUpperCase()]=t});
    const matMix={}; // code → totalKg
    let unmatchedKg=0;
    p101.filter(r=>{const g=String(r.Grade||'');return g!=='5'&&g!=='6'}).forEach(r=>{
      const nw=Number(r['Net Weight']||0);
      if(nw<=0) return;
      // Extract BOM code: 3SF-G12301M22 → G12301M22, or 3FG-G12301M22 → G12301M22
      let mat=String(r.Material||'').trim();
      let code=mat.replace(/^3[A-Z]{2}-/i,'').toUpperCase();
      if(bomMap[code]){
        matMix[code]=(matMix[code]||0)+nw;
        matchedKg+=nw;
      }else{
        unmatchedKg+=nw;
      }
    });
    // Compute weighted targets
    let wtWire=0,wtBoat=0,totalMixKg=0;
    matBreakdown=[];
    Object.entries(matMix).forEach(([code,kg])=>{
      const bom=bomMap[code];
      if(!bom) return;
      wtWire+=bom.w*kg/1000; // wire Kgs for this material
      wtBoat+=bom.b*kg/1000; // boat Pcs for this material
      totalMixKg+=kg;
      matBreakdown.push({code,kg,pct:0,wirePerMT:bom.w,boatPerMT:bom.b});
    });
    matBreakdown.forEach(m=>{m.pct=totalMixKg>0?m.kg/totalMixKg*100:0});
    matBreakdown.sort((a,b)=>b.kg-a.kg);
    // Weighted target ₹/Kg = (totalWireKgs × wireRate + totalBoatPcs × boatRate) / prodKg
    wtWirePerMT=totalMixKg>0?wtWire/(totalMixKg/1000):rates.wireOD22;
    wtBoatPerMT=totalMixKg>0?wtBoat/(totalMixKg/1000):rates.boatOD22;
    wtWireCost=wtWirePerMT*rates.wireRate/1000;
    wtBoatCost=wtBoatPerMT*rates.boatRate/1000;
    console.log(`[MetCost] ${monthKey}: BOM match ${matchedKg.toFixed(0)}Kg (${unmatchedKg.toFixed(0)} unmatched), wtWire=${wtWirePerMT.toFixed(2)}Kg/MT, wtBoat=${wtBoatPerMT.toFixed(2)}Pcs/MT`);
  }

  // ═══ DETAILED ZSLIT AGGREGATION for AI Assistant ═══
  // VERSION: v3.6 — all fixes
  zsAgg=null;
  if(zslit&&zs.length>0){
   try{
    const byMat={},byCust={},bySize={},byCustMat={};
    let totalRolls=0;
    const p101prod=zs.filter(r=>{
      const mvt=String(r['Move Type']||'').trim();
      const g=String(r.Grade||'');
      return mvt==='101'&&g!=='5'&&g!=='6';
    });
    p101prod.forEach(r=>{
      const nw=Number(r['Net Weight']||0);
      if(nw<=0) return;
      totalRolls++;
      let mat=String(r.Material||'').trim().replace(/^3[A-Z]{2}-/i,'');
      const desc=String(r['Material Description']||r['Material Group']||'').trim();
      const thick=String(r.Thickness||'');
      const od=String(r.OD||r['OD_1']||'');
      const width=Number(r.Width||0);
      const custName=String(r['Ship-To-Party Name']||'').trim();
      const custCity=String(r['Ship-To-Party City']||'').trim();
      const shift=String(r.Shift||'');
      const machine=String(r.Machine||'');
      // By Material — with A/B grade split for P&L
      if(!byMat[mat]) byMat[mat]={code:mat,desc,kg:0,rolls:0,widthSum:0,aKg:0,bKg:0};
      byMat[mat].kg+=nw; byMat[mat].rolls++; byMat[mat].widthSum+=width;
      const gr=String(r.Grade||'');
      if(gr==='3') byMat[mat].bKg+=nw; else byMat[mat].aKg+=nw;
      // By Customer — with size/OD/material breakdown
      if(custName){
        const ck=custName;
        if(!byCust[ck]) byCust[ck]={name:custName,city:custCity,kg:0,rolls:0,mats:{},sizes:{}};
        byCust[ck].kg+=nw; byCust[ck].rolls++;
        if(!byCust[ck].mats[mat]) byCust[ck].mats[mat]=0;
        byCust[ck].mats[mat]+=nw;
        const szk=thick+'µ×'+od+'OD×'+width+'mm';
        if(!byCust[ck].sizes[szk]) byCust[ck].sizes[szk]=0;
        byCust[ck].sizes[szk]+=nw;
      }
      // By Size (Thickness × OD × Width)
      const sk=thick+'µ×'+od+'OD×'+width+'mm';
      if(!bySize[sk]) bySize[sk]={thick,od,width,kg:0,rolls:0};
      bySize[sk].kg+=nw; bySize[sk].rolls++;
    });
    // Convert to sorted arrays (top entries)
    const matArr=Object.values(byMat).sort((a,b)=>b.kg-a.kg);
    matArr.forEach(m=>{m.avgWidth=m.rolls>0?Math.round(m.widthSum/m.rolls):0;m.pct=totalRolls>0?m.kg/(matArr.reduce((s,x)=>s+x.kg,0))*100:0;delete m.widthSum});
    const custArr=Object.values(byCust).sort((a,b)=>b.kg-a.kg);
    const zsTotal=matArr.reduce((s,x)=>s+x.kg,0);
    custArr.forEach(c=>{
      c.pct=zsTotal>0?c.kg/zsTotal*100:0;
      c.topMats=Object.entries(c.mats).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([m,kg])=>m+':'+Math.round(kg)+'Kg');
      c.topSizes=Object.entries(c.sizes).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([s,kg])=>s+':'+Math.round(kg)+'Kg');
      delete c.mats; delete c.sizes;
    });
    const sizeArr=Object.values(bySize).sort((a,b)=>b.kg-a.kg);
    sizeArr.forEach(s=>{s.pct=zsTotal>0?s.kg/zsTotal*100:0});
    zsAgg={
      byMaterial:matArr,
      byCustomer:custArr,
      bySize:sizeArr,
      totalRolls,totalKg:zsTotal
    };

    // ═══ REVENUE & P&L COMPUTATION ═══
    const bomMap2={};
    targets.forEach(t=>{bomMap2[t.c.toUpperCase()]={_t:t,bom:t.bom||1005}});
    let revenue=0,bGradeRevenue=0,baseFilmCost=0,revenueMatched=0;
    matArr.forEach(m=>{
      const bom=bomMap2[m.code.toUpperCase()];
      if(!bom) return;
      const sp=bom._t?computeSP(bom._t):rates.spBase; // Selling price from price list deltas
      const aRev=m.aKg*sp; // A-grade at full price
      const bRev=m.bKg*Math.max(0,sp-10); // B-grade at ₹10 less
      revenue+=aRev; bGradeRevenue+=bRev;
      // Base film cost: auto from price list deltas
      const matFilmRate=bom._t?computeFilmRate(bom._t):rates.baseFilmRate;
      baseFilmCost+=(m.aKg+m.bKg)*matFilmRate;
      revenueMatched+=m.aKg+m.bKg;
    });
    zsAgg.revenue=revenue+bGradeRevenue;
    zsAgg.aGradeRevenue=revenue;
    zsAgg.bGradeRevenue=bGradeRevenue;
    zsAgg.baseFilmCost=baseFilmCost;
    zsAgg.revenueMatched=revenueMatched;
   }catch(zsErr){console.warn('[MetCost] zsAgg error (non-fatal):',zsErr.message)}
  }

  // WASTE from MB51 materials:
  // Bare = 3SC-TW (trim waste) ÷ Base Film Input (3FG 261+262 in 303/305)
  // Met = (Mvt 531+532 in orders 304/306) + Grade6 from ZSLIT ÷ (Mvt 101+102+531+532 in 304/306)
  // I-O: Input = 3FG material (261+262), Output = 3SF material (101+102)
  let metWasteKg=0,bareWasteKg=0,twKg=0;
  let mswKg=0,mtwKg=0; // MSW and MTW tracked separately (in 304/306 only)
  let slitWaste531_532=0; // signed sum of Mvt 531+532 in orders 304/306
  let bareIn=0,bareOut=0;
  mb.forEach(r=>{
    const mat=String(r.Material||'').toUpperCase().trim();
    const qty=Number(r['Qty in unit of entry']||0);
    const absQty=Math.abs(qty);
    const ord=String(r.Order||'').trim();
    const mvt=String(r['Movement type']||'').trim();
    if(mat==='3SC-TW') twKg+=absQty;
    // Met waste: track 531+532 in slit orders (304/306) only
    if(ord.startsWith('304')||ord.startsWith('306')){
      if(mvt==='531'||mvt==='532'){
        slitWaste531_532+=qty; // signed: 531 positive, 532 negative
        if(mat==='3SC-MSW') mswKg+=absQty;
        else if(mat==='3SC-MTW') mtwKg+=absQty;
      }
    }
    // I-O tracking: 3FG input (261+262) vs 3SF output (101+102) in metalliser orders 303/305
    if(ord.startsWith('303')||ord.startsWith('305')){
      if((mvt==='261'||mvt==='262')&&mat.startsWith('3FG')) bareIn+=absQty;
      if((mvt==='101'||mvt==='102')&&mat.startsWith('3SF')) bareOut+=absQty;
    }
  });
  bareWasteKg=twKg; // bare waste = 3SC-TW
  metWasteKg=Math.abs(slitWaste531_532)+grade6Kg; // 531+532 in 304/306 + ZSLIT Grade 6
  const ioWasteKg=Math.max(0,bareIn-bareOut); // input-output bare
  const wasteKg=bareWasteKg+metWasteKg;

  // Effective production: ZSLIT A+B grade (Excel: "Exc. 5 &6 Grade")
  // Use ZSLIT sum when available (more accurate), MB51 as fallback
  const zslitProd=slitAKg+slitBKg; // Grade 2,3,7,8 — excludes 5 and 6
  const effectiveProd=zslitProd>0?zslitProd:(prodKg-grade5Kg-grade6Kg);
  denom=effectiveProd>0?effectiveProd:prodKg;

  const bareWastePct=bareIn>0?bareWasteKg/bareIn*100:0; // 3SC-TW ÷ Base Film Input (3FG 261/262 in 303/305)
  const ioPct=bareIn>0?ioWasteKg/bareIn*100:0; // (3FG input - 3SF output) ÷ 3FG input
  const metWasteDenom=prodKg+Math.abs(slitWaste531_532); // 101+102+531+532 in orders 304/306
  const metWastePct=metWasteDenom>0?metWasteKg/metWasteDenom*100:0; // Met waste ÷ (SlitProd + SlitWaste)

  // SCRAP from MB51: 3SC-ALWW (scrap wire), 3SC-AD (al dust)
  let scrapWireKg=0,scrapDustKg=0;
  mb.forEach(r=>{
    const mat=String(r.Material||'').toUpperCase().trim();
    const qty=Math.abs(Number(r['Qty in unit of entry']||0));
    if(mat==='3SC-ALWW') scrapWireKg+=qty;
    else if(mat==='3SC-AD') scrapDustKg+=qty;
  });
  // If no scrap data in MB51, estimate from wire consumption
  if(!scrapWireKg&&wireKgsTotal>0) scrapWireKg=wireKgsTotal*0.037;
  if(!scrapDustKg&&wireKgsTotal>0) scrapDustKg=wireKgsTotal*0.382;
  // Scrap values: ALWW = scrapAlPct% of wire rate, AD = alDustRate/Kg
  const scrapWireAmt=scrapWireKg*rates.wireRate*(rates.scrapAlPct||70)/100;
  const scrapDustAmt=scrapDustKg*(rates.alDustRate||239);

  // ═══ WEIGHTED AVERAGES FROM ZSLIT — computed from material codes ═══
  // G6 = weighted avg Mic factor, G7 = weighted avg OD factor
  // O21/P21/Q21 = OD-wise Mic Eqv*Weight sums for target wire/boat calc
  let odEqWtSum=0,micEqWtSum=0,validNwSum=0;
  let odEq22=0,odEq25=0,odEq28=0; // OD-wise Mic Eqv*Weight sums (in Kg, convert to MT later)

  if(zslit){
    const sm=zs;
    const p101v2=sm.filter(r=>{
      const mvt=String(r['Move Type']||'');
      const g=String(r.Grade||'');
      return mvt==='101'&&g!=='5'&&g!=='6';
    });

    p101v2.forEach(r=>{
      const nw=Number(r['Net Weight']||0);
      if(nw<=0||isNaN(nw)) return;
      const mat=String(r.Material||'');
      // ALWAYS compute from material code
      const odEqvFactor=getODEqvFromCode(mat);
      const micEqvFactor=getMicEqvFromCode(mat);
      const odEqvWt=odEqvFactor*nw;
      const micEqvWt=micEqvFactor*nw;
      odEqWtSum+=odEqvWt;
      micEqWtSum+=micEqvWt;
      validNwSum+=nw;

      // OD grouping for target wire/boat calc
      if(odEqvFactor>1.3) odEq28+=micEqvWt;
      else if(odEqvFactor>1.1) odEq25+=micEqvWt;
      else if(odEqvFactor>0) odEq22+=micEqvWt;
    });
  }
  // Convert OD-wise sums to MT
  odEq22/=1000;odEq25/=1000;odEq28/=1000;

  // Weighted avg OD factor and Mic factor (Excel Met-1&2 G7 and G6)
  const avgODfactor=validNwSum>0?odEqWtSum/validNwSum:1;   // ~1.07-1.10
  const avgMicFactor=validNwSum>0?micEqWtSum/validNwSum:1;  // ~1.08-1.11
  const avgOD=2.2*avgODfactor;
  const avgMic=12/avgMicFactor;

  // Average width from ZJUMBO (jumbo rolls ~2900mm), NOT ZSLIT (slit rolls ~1000mm)
  const{zjumbo}=rawData;
  let avgWidth=3000;
  let avgLenNormal=0,avgLenRCM=0,avgLenAlOx=0;
  let _lenNormalSum=0,_lenNormalCt=0,_lenRCMSum=0,_lenRCMCt=0,_lenAlOxSum=0,_lenAlOxCt=0;
  const _lenBk={normal:{lt50:0,lt70:0,gte70:0},rcm:{lt30:0,gte32:0,mid:0},alox:{lt23:0,gte23:0}};
  if(zjumbo){
    let wSum=0,wCt=0;
    zjumbo.filter(r=>{
      const mvt=String(r['Movment Type']||r['Mvt type']||r['Movement type']||'').trim();
      return mvt==='101'&&inM(r['Date of Production']);
    }).forEach(r=>{
      // Width: SheetJS names duplicate 'Width' col as 'Width_1' (col AD = jumbo width ~2900mm)
      let w=Number(r['Width_1']||0);
      if(!w||w<100) w=Number(r.Width||0);
      if(w>500&&w<5000){wSum+=w;wCt++}
      // Length: col 'Length_1' (col AC) or 'Length' (col G)
      let len=Number(r['Length_1']||0);
      if(!len||len<100) len=Number(r.Length||0);
      if(typeof len==='string') len=Number(len);
      if(!len||len<500) return; // skip invalid
      // Categorize by material
      const mat=String(r.Material||'').toUpperCase();
      if(mat.includes('RCM')){
        _lenRCMSum+=len;_lenRCMCt++;
        if(len<30000) _lenBk.rcm.lt30++;
        else if(len>=32000) _lenBk.rcm.gte32++;
        else _lenBk.rcm.mid++;
      }else if(mat.includes('AL')&&mat.match(/AL\d/)){
        _lenAlOxSum+=len;_lenAlOxCt++;
        if(len<23000) _lenBk.alox.lt23++; else _lenBk.alox.gte23++;
      }else{
        _lenNormalSum+=len;_lenNormalCt++;
        if(len<50000) _lenBk.normal.lt50++;
        else if(len<70000) _lenBk.normal.lt70++;
        else _lenBk.normal.gte70++;
      }
    });
    if(wCt>0) avgWidth=wSum/wCt;
    if(_lenNormalCt>0) avgLenNormal=_lenNormalSum/_lenNormalCt;
    if(_lenRCMCt>0) avgLenRCM=_lenRCMSum/_lenRCMCt;
    if(_lenAlOxCt>0) avgLenAlOx=_lenAlOxSum/_lenAlOxCt;
    console.log(`[MetCost] ${monthKey}: JUMBO avgWidth=${avgWidth.toFixed(0)}mm, avgLen Normal=${avgLenNormal.toFixed(0)}m(${_lenNormalCt}), RCM=${avgLenRCM.toFixed(0)}m(${_lenRCMCt}), AlOx=${avgLenAlOx.toFixed(0)}m(${_lenAlOxCt})`);
  }

  // ═══ LENGTH EQUIVALENCE — Apply to equivKg ═══
  // Excel: G3 = Σ(BA) × 72/67.4 where 72000/avgLen is the length normalization
  // lengthEqvFactor = 72000 / avgLenNonAlOxRCM (from ZJUMBO)
  const lengthEqvFactor=avgLenNormal>0?(72000/avgLenNormal):1;
  if(typeof _equivKgPreLength!=='undefined'&&_equivKgPreLength>0){
    equivKg=_equivKgPreLength*lengthEqvFactor;
    console.log(`[MetCost] ${monthKey}: EQV OUTPUT (with length): ${equivKg.toFixed(0)} Kg, lengthEqv=${lengthEqvFactor.toFixed(4)} (72000/${avgLenNormal.toFixed(0)})`);
  }

  // Target wire/boat for OD mix (Excel J18/J19):
  // J18 = O21*8.6 + P21*10.4 + Q21*11.8 (OD-wise Mic Eqv*Weight MT × base wire Kg/MT)
  // The micron equivalence is already baked into the Mic Eqv*Weight values from ZSLIT
  const targetWireForMix=odEq22*rates.wireOD22+odEq25*rates.wireOD25+odEq28*rates.wireOD28;
  const targetBoatForMix=odEq22*rates.boatOD22+odEq25*rates.boatOD25+odEq28*rates.boatOD28;

  // Electricity
  let pwrU=0;
  if(electricity){
    const elecRows=el;
    elecRows.forEach(r=>{
      pwrU+=Number(r['Met+%Utility Share']||r['Met+% Utility Share']||r['Total Met']||0);
    });
    console.log(`[MetCost] ${monthKey}: Electricity ${electricity.length} total, ${elecRows.length} in-month, pwrU=${pwrU.toFixed(0)}, keys=${Object.keys(electricity[0]||{}).slice(0,6).join(', ')}`);
    if(elecRows.length===0&&electricity.length>0){
      // Debug: check first row's date
      const d0=electricity[0];
      console.log(`[MetCost] Elec debug: first row Date=${JSON.stringify(d0.Date)} type=${typeof d0.Date}, date=${JSON.stringify(d0.date)}`);
    }
  }else{
    console.log(`[MetCost] ${monthKey}: NO electricity data in rawData`);
  }
  const pwrCost=pwrU*rates.electricityRate;

  // Cons & Spares: sum all Amt.in Loc.Cur. for the month (file is already department-specific)
  // Fallback: filter by Cost Centers 3030010082/3030010083 if column exists
  let consAmt=0;
  if(consSpares){
    let allAmt=0, ccAmt=0, hasCostCenter=false;
    cs.forEach(r=>{
      const amt=-(Number(r['Amt.in Loc.Cur.']||r['Amt.in loc.cur.']||0));
      allAmt+=amt;
      const cc=String(r['Cost Center']||r['Cost center']||'').trim();
      if(cc==='3030010082'||cc==='3030010083'){ccAmt+=amt;hasCostCenter=true}
    });
    // Use cost center filtered amount if significant, otherwise use all amounts
    consAmt=(hasCostCenter&&ccAmt>allAmt*0.5)?ccAmt:allAmt;
    console.log(`[MetCost] ${monthKey}: Cons&Spares allAmt=${allAmt.toFixed(0)}, ccAmt=${ccAmt.toFixed(0)}, used=${consAmt.toFixed(0)} (${hasCostCenter?'CC filter':'all rows'})`);
  }

  // MACHINE RUNNING DAYS — Hybrid: time-gap analysis + date-counting fallback
  const daysInMonth=me.getDate();
  let m1RunDays=0,m2RunDays=0;
  const m1Dates=new Set(),m2Dates=new Set();
  let m1PwrStopMins=0,m2PwrStopMins=0,m1PwrEvents=0,m2PwrEvents=0;
  const m1Rolls=[],m2Rolls=[];
  let m1RollCount=0,m2RollCount=0;
  let m1EqRollCount=0,m2EqRollCount=0;
  let m1JumboKg=0,m2JumboKg=0; // per-machine met jumbo output from ZJUMBO
  const speedAcc={m1:{},m2:{}};
  const tsAcc={
    m1:{setupMins:0,vacuumMins:0,runMins:0,ventMins:0,downtimeMins:0,boatMins:0,rolls:0},
    m2:{setupMins:0,vacuumMins:0,runMins:0,ventMins:0,downtimeMins:0,boatMins:0,rolls:0}
  };
  let machineStopData={m1:{},m2:{}};
  let timeStudy={m1:{},m2:{}};
  const dtRemarks={m1:[],m2:[]}; // collect all downtime remarks with duration
  // Time parser for SheetJS — handles: Date objects, numbers (Excel serial), strings (HH:MM, AM/PM, ISO)
  const parseT=(t)=>{
    if(t==null||t===''||t===false) return null;
    // JS Date object (SheetJS cellDates:true)
    if(t instanceof Date){if(isNaN(t.getTime())) return null; return{h:t.getHours(),m:t.getMinutes()}}
    if(typeof t==='object'&&typeof t.getHours==='function'){return{h:t.getHours(),m:t.getMinutes()}}
    // Generic object — try toString
    if(typeof t==='object'){try{const s=t.toString();if(s==='[object Object]') return null;const p=s.match(/(\d{1,2}):(\d{2})/);if(p){let h=+p[1];if(/pm/i.test(s)&&h<12)h+=12;if(/am/i.test(s)&&h===12)h=0;return{h,m:+p[2]}}}catch(e){}return null}
    // Number — Excel serial time fraction (0.4722 = 11:20)
    if(typeof t==='number'){if(isNaN(t)) return null;const f=t>=1?t-Math.floor(t):Math.abs(t);const h=Math.floor(f*24);return{h:h%24,m:Math.round((f*24-h)*60)%60}}
    // Boolean
    if(typeof t==='boolean') return null;
    // String
    const s=String(t).trim();
    if(!s||s==='NaN'||s==='null'||s==='undefined') return null;
    // Try HH:MM with optional AM/PM (handles "11:20:00 AM", "2:10:00 PM", "14:20", etc.)
    const p=s.match(/(\d{1,2})\s*[:.\-]\s*(\d{2})(?:\s*[:.\-]\s*\d{2})?\s*(AM|PM|am|pm)?/i);
    if(p){let h=+p[1],m=+p[2];if(p[3]){const pm=p[3].toUpperCase()==='PM';if(pm&&h<12)h+=12;if(!pm&&h===12)h=0}return{h,m}}
    // Try as numeric string (SheetJS raw mode can return "0.4722")
    const nv=parseFloat(s);if(!isNaN(nv)&&nv>=0&&nv<1){const h=Math.floor(nv*24);return{h,m:Math.round((nv*24-h)*60)%60}}
    // Try as Date string
    try{const d=new Date(s);if(!isNaN(d.getTime()))return{h:d.getHours(),m:d.getMinutes()}}catch(e){}
    return null;
  };

  if(zjumbo){
    if(zjumbo.length>0) console.log('[MetCost] ZJUMBO cols: '+Object.keys(zjumbo[0]).slice(0,15).join(', '));
    // Debug: log first Mvt 101 row time values to diagnose parsing issues
    if(zjumbo.length>0){
      const _dbg=zjumbo.find(r=>String(r['Movment Type']||r['Mvt type']||r['Movement type']||'').trim()==='101');
      if(_dbg) console.log('[MetCost] ZJUMBO time debug (1st Mvt101):',
        'ChOpenTime='+JSON.stringify(_dbg['Chamber Open Time'])+'(type:'+typeof _dbg['Chamber Open Time']+')',
        'VentTime='+JSON.stringify(_dbg['Vent time']||_dbg['Vent Time'])+'(type:'+typeof(_dbg['Vent time']||_dbg['Vent Time'])+')',
        'WebEndTime='+JSON.stringify(_dbg['Web End Time'])+'(type:'+typeof _dbg['Web End Time']+')',
        'parseT(ChOpen)='+JSON.stringify(parseT(_dbg['Chamber Open Time'])),
        'parseT(Vent)='+JSON.stringify(parseT(_dbg['Vent time']||_dbg['Vent Time'])));
    }

    // Collect rolls with chamber open + vent times per machine
    const rollsByMachine={m1:[],m2:[]};
    // EQ ROLL FACTORS — extract OD from material code (works even without OD column)
    // Uses same eqOD factors as ZSLIT, plus AlOx/RCM material factors
    function getRollEqFactor(mat,od){
      const m=String(mat||'').toUpperCase();
      // Material type factor (inverse: AlOx/RCM take longer per roll = fewer eq rolls)
      if(m.includes('AL')&&(m.match(/AL\d/)||m.includes('ALTA')||m.includes('ALTR'))) return 0.77;
      if(m.includes('RCM')) return 0.72;
      // OD from material code (works without OD column)
      const odV=parseFloat(od)||getODValueFromCode(mat);
      if(odV>=2.75) return rates.eqOD_M28;  // 2.8 OD
      if(odV>=2.35) return rates.eqOD_M25;  // 2.5 OD
      return rates.eqOD_M22;                  // 2.2 OD (default)
    }
    // Speed accumulators: per machine per material group {speedSum, count}
    function getSpeedGroup(mat,od){
      const m=String(mat||'').toUpperCase();
      if(m.includes('AL3')&&m.includes('M01')) return 'AlOx';
      if(m.includes('AL')&&(m.match(/AL\d/)||m.includes('ALTA')||m.includes('ALTR'))) return 'AlOx';
      if(m.includes('RCM')) return 'RCM';
      const odV=parseFloat(od)||0;
      if(odV>=2.75) return 'M28';
      if(odV>=2.35) return 'M25';
      if(odV>=2.0&&odV<2.35) return 'M22';
      // Fallback: extract OD from material code string
      if(m.includes('M28')||m.includes('SM28')) return 'M28';
      if(m.includes('M25')) return 'M25';
      return 'M22';
    }

    // Time study accumulators (declared in outer scope)
    // Helper: minutes between two HH:MM time objects on same or next day
    function minsBetween(t1Dt,t1HM,t2Dt,t2HM){
      if(!t1HM||!t2HM) return 0;
      const a=new Date(t1Dt);a.setHours(t1HM.h,t1HM.m,0,0);
      const b=new Date(t2Dt||t1Dt);b.setHours(t2HM.h,t2HM.m,0,0);
      if(b<=a) b.setTime(b.getTime()+86400000);
      return (b-a)/60000;
    }

    zjumbo.filter(r=>{
      const mvt=String(r['Movment Type']||r['Mvt type']||r['Movement type']||r['Movement Type']||'').trim();
      return mvt==='101'&&inM(r['Date of Production']||r['Date of production']);
    }).forEach(r=>{
      const machine=String(r.Machine||r.machine||'').trim();
      const mKey=machine.includes('M1')?'m1':machine.includes('M2')?'m2':null;
      if(!mKey) return;
      const prodDate=parseDate(r['Date of Production']||r['Date of production']);
      if(!prodDate) return;
      const dateStr=prodDate.toISOString().slice(0,10);
      const eqF=getRollEqFactor(r['Proces Order']||r.Material||r['Base film Material'],r.OD||r['OD']);
      if(mKey==='m1'){ m1Dates.add(dateStr); m1RollCount++; m1EqRollCount+=eqF; m1JumboKg+=Number(r.Quantity||0); }
      else { m2Dates.add(dateStr); m2RollCount++; m2EqRollCount+=eqF; m2JumboKg+=Number(r.Quantity||0); }
      // Speed tracking per material group — use Avg. Speed (clean column)
      const spd=parseFloat(r['Avg. Speed']||r['Machine Speed']||0);
      if(spd>0&&spd<2000){
        const grp=getSpeedGroup(r['Proces Order']||r.Material||r['Base film Material'],r.OD||r['OD']);
        if(!speedAcc[mKey][grp]) speedAcc[mKey][grp]={sum:0,count:0};
        speedAcc[mKey][grp].sum+=spd; speedAcc[mKey][grp].count++;
      }
      const chOpenDate=parseDate(r['Chamber Open Date']||r['Chamber open Date'])||prodDate;
      const chHM=parseT(r['Chamber Open Time']||r['Chamber open Time']);
      const ventHM=parseT(r['Vent time']||r['Vent Time'])||parseT(r['Web End Time']);
      if(!chHM||!ventHM) return;
      const startDt=new Date(chOpenDate);startDt.setHours(chHM.h,chHM.m,0,0);
      const endDt=new Date(chOpenDate);endDt.setHours(ventHM.h,ventHM.m,0,0);
      if(endDt<=startDt) endDt.setTime(endDt.getTime()+86400000);
      const remark=String(r['Downtime Remark']||r['Remarks']||'').trim();
      rollsByMachine[mKey].push({startDt,endDt,dateStr,remark});
      if(mKey==='m1') m1Rolls.push([startDt,endDt]);
      else m2Rolls.push([startDt,endDt]);

      // ═══ TIME STUDY per roll ═══
      const ts=tsAcc[mKey];
      ts.rolls++;
      const chCloseHM=parseT(r['Chamber Close Time']||r['Chamber close Time']);
      const webStartHM=parseT(r['Web Start Time']||r['Web start Time']);
      const webEndHM=parseT(r['Web End Time']||r['Web end Time']);

      // 1. Setup = CH_Close - CH_Open (capped 30 min; excess = downtime)
      const rawSetup=minsBetween(chOpenDate,chHM,chOpenDate,chCloseHM);
      const setupMins=Math.min(rawSetup,30);
      const setupDowntime=Math.max(0,rawSetup-30);
      ts.setupMins+=setupMins;
      if(setupDowntime>0) ts.downtimeMins+=setupDowntime;

      // 2. Vacuum = Web_Start - CH_Close
      const vacMins=chCloseHM&&webStartHM?minsBetween(chOpenDate,chCloseHM,chOpenDate,webStartHM):0;
      ts.vacuumMins+=Math.max(0,vacMins);

      // 3. Run = Web_End - Web_Start
      const runMins=webStartHM&&webEndHM?minsBetween(chOpenDate,webStartHM,chOpenDate,webEndHM):0;
      ts.runMins+=Math.max(0,runMins);

      // 4. Vent = Vent_time - Web_End
      const ventMins=webEndHM&&ventHM?minsBetween(chOpenDate,webEndHM,chOpenDate,ventHM):0;
      ts.ventMins+=Math.max(0,ventMins);

      // 5. Boat changeover = Down_Time when remark contains BOAT CHANGE
      const rmUp=remark.toUpperCase();
      if(rmUp.includes('BOAT')||rmUp.includes('BOAT CHANGE')){
        const downT=Math.abs(Number(r['Down Time']||r['Roll Change over tim']||0));
        ts.boatMins+=downT;
      }

      // 6. Collect ALL downtime remarks for Downtime Study
      const downTimeMins=Math.abs(Number(r['Down Time']||0));
      const dtRemark=String(r['Remarks']||r['Downtime Remark']||'').trim();
      if((downTimeMins>0||setupDowntime>0)&&dtRemark&&dtRemark!=='OK'&&dtRemark!=='0K'){
        dtRemarks[mKey].push({
          date:dateStr,
          remark:dtRemark,
          mins:downTimeMins||setupDowntime,
          mat:String(r.Material||'').replace(/^3SF-/i,'').replace(/^3[A-Z]{2}-/i,'')
        });
      }
    });

    // ═══ 10-MINUTE GAP RULE ═══
    // Gap between VentTime[i] and ChamberOpenTime[i+1] > 10 min = machine stop
    function calcStopsByGap(rolls){
      if(!rolls.length) return {stopData:{},totalStopMins:0,runDays:0};
      rolls.sort((a,b)=>a.startDt-b.startDt);
      const stopData={};
      let totalStopMins=0;
      for(let i=1;i<rolls.length;i++){
        const gapMins=(rolls[i].startDt-rolls[i-1].endDt)/60000;
        if(gapMins>10){
          const d=rolls[i].dateStr;
          if(!stopData[d]) stopData[d]={autoStopMins:0,remarks:[]};
          stopData[d].autoStopMins+=Math.round(gapMins);
          totalStopMins+=gapMins;
          const rm=rolls[i].remark;
          if(rm&&rm.toUpperCase()!=='OK'&&rm!=='') stopData[d].remarks.push(rm);
        }
      }
      Object.keys(stopData).forEach(d=>{
        stopData[d].remark=[...new Set(stopData[d].remarks)].join('; ');
        delete stopData[d].remarks;
      });
      const totalRunMins=daysInMonth*1440-totalStopMins;
      return {stopData,totalStopMins,runDays:Math.max(0,totalRunMins/1440)};
    }

    const m1Gap=calcStopsByGap(rollsByMachine.m1);
    const m2Gap=calcStopsByGap(rollsByMachine.m2);
    machineStopData={m1:m1Gap.stopData,m2:m2Gap.stopData};

    if(rollsByMachine.m1.length>0){
      m1RunDays=m1Gap.runDays;
      console.log('[MetCost] '+monthKey+': GAP-RULE M1='+m1RunDays.toFixed(1)+'d (stop='+Math.round(m1Gap.totalStopMins)+'min, '+rollsByMachine.m1.length+' rolls)');
    } else { m1RunDays=m1Dates.size; }
    if(rollsByMachine.m2.length>0){
      m2RunDays=m2Gap.runDays;
      console.log('[MetCost] '+monthKey+': GAP-RULE M2='+m2RunDays.toFixed(1)+'d (stop='+Math.round(m2Gap.totalStopMins)+'min, '+rollsByMachine.m2.length+' rolls)');
    } else { m2RunDays=m2Dates.size; }

    // ═══ FINALIZE TIME STUDY ═══
    // Add shutdown (gap) time — the remaining minutes = small gaps (≤10 min)
    function buildTimeStudy(ts,gapResult,totalCalMins){
      const shutdown=Math.round(gapResult.totalStopMins);
      const accounted=Math.round(ts.setupMins+ts.vacuumMins+ts.runMins+ts.ventMins+ts.downtimeMins+ts.boatMins)+shutdown;
      const smallGaps=Math.max(0,totalCalMins-accounted);
      return {
        rolls:ts.rolls,
        setupMins:Math.round(ts.setupMins),
        vacuumMins:Math.round(ts.vacuumMins),
        runMins:Math.round(ts.runMins),
        ventMins:Math.round(ts.ventMins),
        downtimeMins:Math.round(ts.downtimeMins),
        boatMins:Math.round(ts.boatMins),
        shutdownMins:shutdown,
        smallGapMins:Math.round(smallGaps),
        totalMins:totalCalMins
      };
    }
    const totalCalMins=daysInMonth*1440;
    timeStudy={
      m1:rollsByMachine.m1.length>0?buildTimeStudy(tsAcc.m1,m1Gap,totalCalMins):{},
      m2:rollsByMachine.m2.length>0?buildTimeStudy(tsAcc.m2,m2Gap,totalCalMins):{}
    };

    // Power shutdown detection
    const PWR_KEYS=['power fail','power cut','power dip','power trip','power shut','power off','power change',
      'poewr','pawer','powr fail','no power','eb cut','eb fail','grid fail','load shed','electr'];
    const isPwr=(txt)=>{const t=(txt||'').toLowerCase();return PWR_KEYS.some(k=>t.includes(k))};
    zjumbo.filter(r=>inM(r['Date of Production']||r['Date of production'])).forEach(r=>{
      if(!isPwr(r.Remarks||'')&&!isPwr(r['Downtime Remark']||'')) return;
      const machine=String(r.Machine||r.machine||'').trim();
      let mins=Math.max(Math.abs(Number(r['Down Time']||0)),Math.abs(Number(r['Down Time_1']||0)),Math.abs(Number(r['Down Time_2']||0)));
      if(machine.includes('M1')){m1PwrStopMins+=mins;m1PwrEvents++}
      else if(machine.includes('M2')){m2PwrStopMins+=mins;m2PwrEvents++}
    });
  }

  const m1PwrStopDays=m1PwrStopMins/60/24;
  const m2PwrStopDays=m2PwrStopMins/60/24;
  // Subtract power stoppage from running days
  m1RunDays=Math.max(0,m1RunDays-m1PwrStopDays);
  m2RunDays=Math.max(0,m2RunDays-m2PwrStopDays);
  const avgRunDays=(m1RunDays+m2RunDays)/2;
  // ═══ ACTUAL Rolls/Day: Total Rolls ÷ Running Days (per machine) ═══
  const m1RollsPerDay=m1RunDays>0?m1RollCount/m1RunDays:0;
  const m2RollsPerDay=m2RunDays>0?m2RollCount/m2RunDays:0;
  const avgRollsPerDay=((m1RunDays>0?m1RollsPerDay:0)+(m2RunDays>0?m2RollsPerDay:0))/
                       ((m1RunDays>0?1:0)+(m2RunDays>0?1:0)||1);
  // ═══ EQV Rolls/Day: Eqv Roll Count ÷ Running Days ═══
  // AlOx=0.77, RCM=0.72, OD2.2=1.0, OD2.5=1.24, OD2.8=1.44
  const m1EqRollsPerDay=m1RunDays>0?(m1EqRollCount||m1RollCount)/m1RunDays:0;
  const m2EqRollsPerDay=m2RunDays>0?(m2EqRollCount||m2RollCount)/m2RunDays:0;
  const avgEqRollsPerDay=((m1RunDays>0?m1EqRollsPerDay:0)+(m2RunDays>0?m2EqRollsPerDay:0))/
                         ((m1RunDays>0?1:0)+(m2RunDays>0?1:0)||1);
  const eqRollFactor=m1RollCount>0?(m1EqRollCount+m2EqRollCount)/(m1RollCount+m2RollCount):1;
  console.log(`[MetCost] ${monthKey}: FINAL M1=${m1RunDays.toFixed(1)}d, M2=${m2RunDays.toFixed(1)}d, avg=${avgRunDays.toFixed(1)}d`);


  // Manpower from parent app — ADJUSTED for machine running days
  // Only charge manpower for days machines were actually running
  const mpData=manpowerData[monthKey];
  const mpTotalFull=mpData?mpData.totalNet:0;
  const mpRunRatio=(avgRunDays>0&&daysInMonth>0)?avgRunDays/daysInMonth:1;
  const mpTotal=mpTotalFull*mpRunRatio; // prorated to running days

  // Wire/boat consumed

  // ═══ ACTUAL cost ₹/Kg (÷ effectiveProd) ═══
  const wireCKg=wireAmt/denom,boatCKg=boatAmt/denom,rmC=wireCKg+boatCKg;
  // ═══ WASTAGE & B-GRADE — Excel Conv. Cost formulas v4 ═══
  // wasteDenom = A+B + MetWaste(net 531+532) + Grade6 + Grade5  (all-inclusive)
  // Excel: F4 denom = F3 + J4 + J5 + J6 + BA97*1000
  const metWasteNet=Math.abs(slitWaste531_532); // net signed sum (531-532)
  const wasteDenom=denom+metWasteNet+grade6Kg+grade5Kg;
  // Waste% Slitter (Inc. 6 Grade) = (MetWaste + Grade6) / wasteDenom
  // Excel F4 = (J4+J5+J6)*100 / wasteDenom  (J4=metWaste, J5=grade6, J6=309mvt=0)
  const wastePctSlitter=(metWasteNet+grade6Kg)*100/(wasteDenom||1);
  const wastePct=wastePctSlitter; // alias for backward compat
  // Waste Loss ₹/Kg = wastePctSlitter × baseFilmRate / 100
  // Excel F12 = F4 × N11/100 where N11=baseFilmRate (currently ₹100)
  const wasteLoss=wastePctSlitter*rates.baseFilmRate/100;
  // B Grade % uses same all-inclusive denominator
  // Excel F5 = B_Grade_Kg × 100 / wasteDenom
  const bGradePct=slitBKg*100/(wasteDenom||1);
  // B Grade Loss = B% × bGradeLossPerKg / 100 (Excel F13 = F5×10/100)
  const bGradeLoss=bGradePct*(rates.bGradeLossPerKg||10)/100;
  // Keep old bare/met split for display/debugging purposes
  const weightGainPct=Math.max(0,bareWastePct-ioPct);
  const adjustedMetPct=Math.max(0,metWastePct-weightGainPct);
  const bareLossComponent=wasteLoss; // for backward compat in display
  const metLossComponent=0;
  console.log(`[MetCost] ${monthKey}: WASTE v4 Excel: wasteDenom=${wasteDenom.toFixed(0)}, wastePctSlitter=${wastePctSlitter.toFixed(3)}%, wasteLoss=₹${wasteLoss.toFixed(3)}, bGradePct=${bGradePct.toFixed(3)}%, bGradeLoss=₹${bGradeLoss.toFixed(3)}, bare%=${bareWastePct.toFixed(3)}, met%=${metWastePct.toFixed(3)}`);
  const mpKg=mpTotal/denom;
  const pwrKg=pwrCost/denom,consKg=consAmt/denom;
  const convC=wasteLoss+bGradeLoss+mpKg+pwrKg+consKg+rates.indirectExpense;
  const totalC=rmC+convC,totalWP=totalC+rates.packingFreight;
  // Scrap sale (by-product, deducted from cost)
  const scrapWireSale=scrapWireAmt/denom;
  const scrapDustSale=scrapDustAmt/denom;
  const totalAfterScrap=totalWP-scrapWireSale-scrapDustSale;

  // ═══ EQUIVALENT cost ₹/Kg (Excel-exact formulas) ═══
  // Only compute equiv if we have valid ZSLIT equivalence data
  const hasEquivData=validNwSum>0&&equivKg>0&&(odEq22+odEq25+odEq28)>0;
  console.log(`[MetCost] ${monthKey}: hasEquiv=${hasEquivData}, validNw=${validNwSum.toFixed(0)}, equivKg=${equivKg.toFixed(0)}, avgOD=${validNwSum>0?(odEqWtSum/validNwSum).toFixed(4):'N/A'}, avgMic=${validNwSum>0?(micEqWtSum/validNwSum).toFixed(4):'N/A'}, odEq22=${(odEq22/1000).toFixed(1)}MT`);
  let eqWirePerMT=wireCKg, eqBoatPerMT=boatCKg; // default: equiv = actual
  if(hasEquivData){
    const eqFactor=1/(avgMicFactor*avgODfactor);
    eqWirePerMT=(rates.wireOD22+(wireKgsTotal-targetWireForMix)*1000*eqFactor/denom)*(rates.wireRate||355)/1000;
    eqBoatPerMT=(rates.boatOD22+(boatPcsTotal-targetBoatForMix)*1000*eqFactor/denom)*(boatRate||rates.boatRate)/1000;
    console.log(`[MetCost] ${monthKey}: EQV DEBUG: eqFactor=${eqFactor.toFixed(4)}, avgMic=${avgMicFactor.toFixed(4)}, avgOD=${avgODfactor.toFixed(4)}`);
    console.log(`[MetCost] ${monthKey}: EQV WIRE: base=${rates.wireOD22}, actual=${wireKgsTotal.toFixed(1)}Kg, target=${targetWireForMix.toFixed(1)}Kg, delta=${(wireKgsTotal-targetWireForMix).toFixed(1)}, eqKgMT=${((rates.wireOD22+(wireKgsTotal-targetWireForMix)*1000*eqFactor/denom)).toFixed(2)}, eqv₹=${eqWirePerMT.toFixed(3)}`);
    console.log(`[MetCost] ${monthKey}: EQV BOAT: base=${rates.boatOD22}, actual=${boatPcsTotal.toFixed(1)}Pcs, target=${targetBoatForMix.toFixed(1)}Pcs, delta=${(boatPcsTotal-targetBoatForMix).toFixed(1)}, eqPcMT=${((rates.boatOD22+(boatPcsTotal-targetBoatForMix)*1000*eqFactor/denom)).toFixed(2)}, eqv₹=${eqBoatPerMT.toFixed(3)}`);
    console.log(`[MetCost] ${monthKey}: OD EQUIV MT: od22=${odEq22.toFixed(1)}, od25=${odEq25.toFixed(1)}, od28=${odEq28.toFixed(1)}, targetWire=od22×${rates.wireOD22}+od25×${rates.wireOD25}+od28×${rates.wireOD28}=${targetWireForMix.toFixed(1)}`);
  }
  const ratio=hasEquivData&&equivKg>0?denom/equivKg:1;

  // ═══ EQUIVALENT WASTE — Excel Conv. Cost G4/G5 formulas ═══
  const widthRatio=avgWidth/3000;
  const lenRatioNormal=avgLenNormal>0?avgLenNormal/72000:1;

  // Eqv Waste% = wastePctSlitter × (0.5 × avgLen/72000 + 0.5 × avgWidth/3000)
  // Excel G4 = F4 × (0.5×Q5/72000 + 0.5×N6/O6)
  const eqWastePctSlitter=wastePctSlitter*(0.5*lenRatioNormal+0.5*widthRatio);
  const eqWastePct=eqWastePctSlitter;
  // Eqv Waste Loss = eqWastePct × baseFilmRate / 100 (Excel G12 = G4×N11/100)
  const eqWasteLoss=eqWastePctSlitter*rates.baseFilmRate/100;
  // Keep old bare/met split vars for backward compat in display
  const eqBareWPct=eqWastePctSlitter;
  const eqMetWPct=0;
  const eqBareLoss=eqWasteLoss;
  const eqMetLoss=0;

  // Eqv B Grade% = bGradePct × avgWidth/3000 (Excel G5 = F5 × N6/O6)
  const eqBGradePct=bGradePct*widthRatio;
  // Eqv B Grade Loss = eqBGradePct × bGradeLossPerKg / 100 (Excel G13 = G5×10/100)
  const eqBGradeLoss=eqBGradePct*(rates.bGradeLossPerKg||10)/100;
  // G14/G15/G16: Manpower/Power/Cons equiv = actual × (prodKg/equivKg)
  const eqMpKg=mpKg*ratio;
  const eqPwrKg=pwrKg*ratio;
  const eqConsKg=consKg*ratio;
  const eqIndirectKg=rates.indirectExpense*ratio; // App formula: Indirect also scaled
  const eqRM=eqWirePerMT+eqBoatPerMT;
  const eqConvC=eqWasteLoss+eqBGradeLoss+eqMpKg+eqPwrKg+eqConsKg+eqIndirectKg;
  const eqTotalC=eqRM+eqConvC,eqTotalWP=eqTotalC+rates.packingFreight;
  const eqTotalAfterScrap=eqTotalWP-scrapWireSale-scrapDustSale;

  // ═══ DAY-WISE TIME STUDY — build per-date breakdown from ZJUMBO rolls ═══
  const dayWiseTS={};
  if(rawData.zjumbo){
    const ms2=new Date(monthKey+'-01'),me2=new Date(ms2.getFullYear(),ms2.getMonth()+1,0,23,59,59);
    rawData.zjumbo.filter(r=>{
      const mvt=String(r['Movment Type']||r['Mvt type']||r['Movement type']||r['Movement Type']||'').trim();
      const d=parseDate(r['Date of Production']||r['Date of production']);
      return mvt==='101'&&d&&d>=ms2&&d<=me2;
    }).forEach(r=>{
      const machine=String(r.Machine||r.machine||'').trim();

      if(!mKey) return;
      const prodDate=parseDate(r['Date of Production']||r['Date of production']);
      if(!prodDate) return;
      const dateStr=prodDate.toISOString().slice(0,10);
      if(!dayWiseTS[dateStr]) dayWiseTS[dateStr]={m1:{rolls:0,setupMins:0,vacuumMins:0,runMins:0,ventMins:0,downtimeMins:0,boatMins:0,outputKg:0,remarks:[]},m2:{rolls:0,setupMins:0,vacuumMins:0,runMins:0,ventMins:0,downtimeMins:0,boatMins:0,outputKg:0,remarks:[]}};
      const dts=dayWiseTS[dateStr][mKey];
      dts.rolls++;
      dts.outputKg+=Number(r.Quantity||0);
      const chOpenDate=parseDate(r['Chamber Open Date']||r['Chamber open Date'])||prodDate;
      const chHM=parseT(r['Chamber Open Time']||r['Chamber open Time']);
      const chCloseHM=parseT(r['Chamber Close Time']||r['Chamber close Time']);
      const webStartHM=parseT(r['Web Start Time']||r['Web start Time']);
      const webEndHM=parseT(r['Web End Time']||r['Web end Time']);
      const ventHM=parseT(r['Vent time']||r['Vent Time'])||webEndHM;
      const minsBtwn=(t1,t2)=>{if(!t1||!t2)return 0;const a=new Date(chOpenDate);a.setHours(t1.h,t1.m,0,0);const b=new Date(chOpenDate);b.setHours(t2.h,t2.m,0,0);if(b<=a)b.setTime(b.getTime()+86400000);return(b-a)/60000};
      const rawSetup=minsBtwn(chHM,chCloseHM);
      dts.setupMins+=Math.min(rawSetup,30);
      if(rawSetup>30) dts.downtimeMins+=(rawSetup-30);
      dts.vacuumMins+=Math.max(0,minsBtwn(chCloseHM,webStartHM));
      dts.runMins+=Math.max(0,minsBtwn(webStartHM,webEndHM));
      dts.ventMins+=Math.max(0,minsBtwn(webEndHM,ventHM));
      const rmUp=String(r['Remarks']||r['Downtime Remark']||'').toUpperCase();
      if(rmUp.includes('BOAT')){dts.boatMins+=Math.abs(Number(r['Down Time']||0))}
      const dtMins=Math.abs(Number(r['Down Time']||0));
      const dtRm=String(r['Remarks']||r['Downtime Remark']||'').trim();
      if(dtMins>0&&dtRm&&dtRm!=='OK'&&dtRm!=='0K') dts.remarks.push({remark:dtRm,mins:dtMins});
    });
  }

  return{month:monthKey,prodKg,effectiveProd,equivKg,eqRatio:equivKg/denom,metJumboKg,prodMT:denom/1000,slitAKg,slitBKg,grade5Kg,grade6Kg,wasteKg,
    bareWasteKg,metWasteKg,mswKg,mtwKg,bareWastePct,metWastePct,metWasteDenom,slitWaste531_532,bareIn,bareOut,twKg,ioWasteKg,ioPct,weightGainPct,adjustedMetPct,bareLossComponent,metLossComponent,boatRate,
    wasteDenom,wastePctSlitter,metWasteNet,lengthEqvFactor:lengthEqvFactor||1,

// Compute ALL months found in uploaded data and auto-save
function computeAndSaveAll(){
  try{
  buildIndex(); // pre-index for fast per-month lookups
  const months=findAllMonths();
  console.log(`[MetCost] computeAndSaveAll: ${months.length} months found: ${months.join(', ')}`);
  console.log(`[MetCost] rawData: mb51=${rawData.mb51?rawData.mb51.length:0}, zslit=${rawData.zslit?rawData.zslit.length:0}, zjumbo=${rawData.zjumbo?rawData.zjumbo.length:0}, elec=${rawData.electricity?rawData.electricity.length:0}, cons=${rawData.consSpares?rawData.consSpares.length:0}`);
  let computed=0;
  months.forEach(mk=>{
    try{
    const result=computeMonth(mk);
    if(result){
      const existing=savedMonths[mk]||{};
      savedMonths[mk]={...existing,...result,savedAt:new Date().toISOString()};
      computed++;
      console.log(`[MetCost] ✅ ${mk}: prod=${result.prodMT?.toFixed(1)}MT, wire=${result.wireCKg?.toFixed(2)}, total=${result.totalC?.toFixed(2)}`);
    }else{
      console.log(`[MetCost] ⚠️ ${mk}: computeMonth returned null`);
    }
    }catch(err){console.error(`[MetCost] ❌ ${mk} compute error:`,err)}
  });
  // Also update existing saved months with partial data (e.g. only electricity uploaded)
  // If a saved month has production data but we have new rawData for power/cons/manpower
  Object.keys(savedMonths).forEach(mk=>{
    if(months.includes(mk)) return; // already computed above
    const existing=savedMonths[mk];
    if(!existing||!existing.effectiveProd) return;
    const denom=existing.effectiveProd;
    let updated=false;
    // Update power if electricity data available for this month
    const{electricity,consSpares}=rawData;
    if(electricity){
      const ms=new Date(mk+'-01'),me=new Date(ms.getFullYear(),ms.getMonth()+1,0,23,59,59);
      const inM=v=>{const d=parseDate(v);return d&&d>=ms&&d<=me};
      let pwrU=0;
      electricity.filter(r=>inM(r.Date||r.date||r['Posting Date']||null)).forEach(r=>{
        pwrU+=Number(r['Met+%Utility Share']||r['Met+% Utility Share']||r['Total Met']||0);
      });
      if(pwrU>0){
        const pwrCost=pwrU*rates.electricityRate;
        existing.pwrU=pwrU;existing.pwrCost=pwrCost;existing.pwrKg=pwrCost/denom;
        updated=true;
      }
    }
    // Update cons & spares if available
    if(consSpares){
      const ms=new Date(mk+'-01'),me=new Date(ms.getFullYear(),ms.getMonth()+1,0,23,59,59);
      const inM=v=>{const d=parseDate(v);return d&&d>=ms&&d<=me};
      let consAmt=0;
      consSpares.filter(r=>{
        const cc=String(r['Cost Center']||r['Cost center']||'').trim();
        return(cc==='3030010082'||cc==='3030010083')&&inM(r['Posting Date']||r.Date||r['date']);
      }).forEach(r=>{consAmt+=-(Number(r['Amt.in Loc.Cur.']||r['Amt.in loc.cur.']||0))});
      if(consAmt!==0){
        existing.consAmt=consAmt;existing.consKg=consAmt/denom;
        updated=true;
      }
    }
    // Recalculate totals if anything updated
    if(updated){
      existing.convC=(existing.wasteLoss||0)+(existing.bGradeLoss||0)+(existing.mpKg||0)+(existing.pwrKg||0)+(existing.consKg||0)+(existing.rates||rates).indirectExpense;
      existing.totalC=(existing.rmC||0)+existing.convC;
      existing.totalWP=existing.totalC+(existing.rates||rates).packingFreight;
      existing.totalAfterScrap=existing.totalWP-(existing.scrapWireSale||0)-(existing.scrapDustSale||0);
      if(existing.eq){
        const _legRatio=existing.effectiveProd/(existing.equivKg||existing.effectiveProd);
        existing.eq.pwr=(existing.pwrKg||0)*_legRatio;
        existing.eq.cons=(existing.consKg||0)*_legRatio;
        existing.eq.indirect=(existing.rates||rates).indirectExpense*_legRatio;
        existing.eq.convC=(existing.eq.wasteLoss||0)+(existing.eq.bGradeLoss||0)+(existing.eq.mp||0)+existing.eq.pwr+existing.eq.cons+existing.eq.indirect;
        existing.eq.totalC=(existing.eq.rm||0)+existing.eq.convC;
        existing.eq.totalWP=existing.eq.totalC+(existing.rates||rates).packingFreight;
        existing.eq.totalAfterScrap=existing.eq.totalWP-(existing.scrapWireSale||0)-(existing.scrapDustSale||0);
      }
      existing.savedAt=new Date().toISOString();
      computed++;
    }
  });
  if(computed) saveToStorage();
  saveRawToIDB().catch(()=>{});
  console.log(`[MetCost] computeAndSaveAll DONE: ${computed} months computed, ${Object.keys(savedMonths).length} total saved`);
  return{months:[...new Set([...months,...Object.keys(savedMonths)])].sort(),computed};
  }catch(err){console.error('[MetCost] computeAndSaveAll CRASH:',err);return{months:[],computed:0}}
}

function openTrend(metricKey){
  trendMetric=metricKey||'totalC';
  const all=Object.keys(savedMonths).sort();
  if(!trendFrom||!all.includes(trendFrom)) trendFrom=all.length>5?all[all.length-6]:all[0]||'';

  renderTrendModal();

function renderTrendModal(){
  const all=Object.keys(savedMonths).sort();
  if(!all.length){alert('No saved months. Upload files first.');return}
  const metric=TREND_METRICS.find(m=>m.key===trendMetric)||TREND_METRICS[0];
  // Safe index calculation
  let fromIdx=all.indexOf(trendFrom);
  let toIdx=all.indexOf(trendTo);
  if(fromIdx<0) fromIdx=Math.max(0,all.length-6);
  if(toIdx<0) toIdx=all.length-1;
  if(fromIdx>toIdx){const t=fromIdx;fromIdx=toIdx;toIdx=t}
  trendFrom=all[fromIdx];trendTo=all[toIdx];
  const months=all.slice(fromIdx,toIdx+1);
  if(!months.length) return;
  const vals=months.map(m=>{const d=savedMonths[m];return d?Number(d[metric.key])||0:0});
  const tgtVal=metric.target?rates[metric.target]:0;
  const maxV=Math.max(...vals,tgtVal||0)*1.2||1;
  const minV=Math.min(...vals,tgtVal||maxV)*0.9;

  // Build SVG chart
  const w=600,h=280,padL=48,padR=12,padT=24,padB=44;
  const cw=w-padL-padR,ch=h-padT-padB;
  const barW=Math.min(36,Math.floor(cw/months.length*0.7));
  const gap=(cw-barW*months.length)/(months.length+1);
  let svg='';

  // Grid lines
  const steps=5;
  for(let i=0;i<=steps;i++){
    const y=padT+ch-ch/steps*i;
    const v=(maxV/steps*i).toFixed(maxV>10?1:2);
    svg+=`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#e2e8f0" stroke-width="0.5"/>`;
    svg+=`<text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="10" fill="#94a3b8">${v}</text>`;
  }

  // Target line
  if(tgtVal>0){
    const ty=padT+ch-((tgtVal/maxV)*ch);
    svg+=`<line x1="${padL}" y1="${ty}" x2="${w-padR}" y2="${ty}" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4"/>`;
    svg+=`<text x="${w-padR+2}" y="${ty-4}" font-size="9" fill="#ef4444" font-weight="700">Target ${tgtVal}</text>`;
  }

  // Bars + values
  months.forEach((m,i)=>{
    const x=padL+gap+(gap+barW)*i;
    const v=vals[i];
    const bh=Math.max(2,(v/maxV)*ch);
    const y=padT+ch-bh;
    const isOver=tgtVal>0&&v>tgtVal;
    svg+=`<rect x="${x}" y="${y}" width="${barW}" height="${bh}" rx="3" fill="${isOver?'#ef4444':metric.color}" opacity=".8"/>`;
    svg+=`<text x="${x+barW/2}" y="${y-5}" text-anchor="middle" font-size="10" font-weight="700" fill="${isOver?'#ef4444':'#1e293b'}">${v>=100?Math.round(v):v.toFixed(2)}</text>`;

    svg+=`<text x="${x+barW/2}" y="${h-padB+14}" text-anchor="middle" font-size="9" fill="#64748b">${lbl}</text>`;

  });

  // Metric selector buttons
  let metricBtns='';

  });

  });

  document.getElementById('trendModal').innerHTML=`<div class="mo" onclick="document.getElementById('trendModal').innerHTML=''">
