        const lineKeys=p.orderLineKeys||[];
        const soNums=p.orderNumbers||[];
        for(const lk of lineKeys){
          if(!pMap[lk]){pMap[lk]={planNo:pno,f05No:f05,createdAt:dt,planId:p.id};}
        }
        soKeys.push(...soNums);
      }
      setPlannedMap(pMap);
      setPlannedOrders([...new Set(soKeys)]);
    }).catch(()=>{});
    // Also check tracking status for orders in pp_tracking
    getDB().collection("pp_tracking").orderBy("globalSeqIndex","asc").limit(500).get().then(snap=>{
      const trackMap={};
      snap.docs.forEach(d=>{
        const t=d.data();
        const orderNos=(t.orders||[]).map(o=>String(o["Sales Order"]||""));
        for(const sn of orderNos){
          if(!trackMap[sn])trackMap[sn]={metDone:false,slitDone:false,cancelled:false,planNo:t.planNo||""};
          if(t.metStatus==="cancelled")trackMap[sn].cancelled=true;
          else if(t.metStatus==="done")trackMap[sn].metDone=true;
          if(t.slitStatus==="done")trackMap[sn].slitDone=true;
        }
      });
      setTrackingStatus(trackMap);
    }).catch(()=>{});
  },[]);
  const [trackingStatus,setTrackingStatus]=useState({});

  const getOrderHistory=(o)=>{
    const lineKey=String(o["Sales Order"]||"")+"-"+String(o["Sale Order Item"]||"");
    const soNum=String(o["Sales Order"]||"");
    const pm=plannedMap[lineKey];
    const ts=trackingStatus[soNum];
    // CANCELLED = free to replan — treat as NOT planned
    if(ts&&ts.cancelled&&!ts.metDone&&!ts.slitDone){
      return{planned:false,cancelled:true,planNo:ts.planNo,status:"🚫 Cancelled — available for replanning"};
    }
    if(pm){
      let status="📋 Planned";
      if(ts&&ts.slitDone)status="✅ Slit Done";
      else if(ts&&ts.metDone)status="🔥 Metallized";
      return{planned:true,planNo:pm.planNo,f05No:pm.f05No,status,createdAt:pm.createdAt};
    }
    if(plannedOrders.includes(soNum)){
      let status="📋 Planned";
      if(ts&&ts.slitDone)status="✅ Slit Done";
      else if(ts&&ts.metDone)status="🔥 Metallized";
      return{planned:true,planNo:ts?ts.planNo:"(older plan)",f05No:"?",status,createdAt:""};
    }
    return{planned:false};
  };

  const pend=useMemo(()=>pen.filter(r=>r.Material&&(toFloat(r["Pending Rolls"])>0)),[pen]);

  const withSource=useMemo(()=>{
    if(!fgjm.length&&!mj.length&&!bare.length)return pend.map(o=>({...o,_src:"UNKNOWN"}));
    return pend.map(order=>{
      const oMat=String(order.Material).trim(),oW=toFloat(order.Width),oL=toFloat(order.Length);
      const op=parseMat(oMat);
      const minT=cfg.trimMinOD25||15;
      const fg=fgjm.find(x=>x.Batch&&toFloat(x.Grade)===5&&canFillFGM(x.Material,oMat,order["Consignee Name"])&&toFloat(x.Width)>=oW);
      if(fg)return{...order,_src:"FGJM"};
      const mjr=mj.find(x=>{
        if(!x.Batch)return false;
        const mp=parseMat(String(x.Material||"").replace("3SF-","3FG-"));
        if(mp.isAL)return false;
        return mp.micron===op.micron&&mp.grade===op.grade&&mp.isAB===op.isAB&&toFloat(x.Width)>=oW+minT&&toFloat(x.Length||0)>=oL-3000;
      });
      if(mjr)return{...order,_src:"MJ"};
      const br=bare.find(x=>x.Batch&&canFillBare(x.Material,oMat)&&toFloat(x.Width)>=oW+5);
      if(br)return{...order,_src:"BARE"};
      return{...order,_src:"NONE"};
    });
  },[pend,fgjm,mj,bare,cfg]);

  // Add _key to each order
  const withKey=useMemo(()=>withSource.map(o=>({
    ...o,
    _key:`${o["Sales Order"]||""}-${o["Sale Order Item"]||""}`,
    _soDate:cleanDate(o["SO Crtd Dt."]||o["SO Crtd Date"]||o["SO Crtd. Date"]||"")
  })),[withSource]);

  // All unique SO Created Dates
  const availDates=useMemo(()=>[...new Set(withKey.map(o=>o._soDate).filter(Boolean))].sort().reverse(),[withKey]);

  const availMicrons=useMemo(()=>[...new Set(pend.map(o=>toFloat(o.Thickness)).filter(Boolean))].sort((a,b)=>a-b),[pend]);
  const odsForMicron=useMemo(()=>{const src=selMicrons.length>0?pend.filter(o=>selMicrons.includes(toFloat(o.Thickness))):pend;return[...new Set(src.map(o=>parseMat(o.Material).od).filter(Boolean))].sort();},[pend,selMicrons]);
  const filteredPend=useMemo(()=>withKey.filter(o=>{
    if(selMicrons.length>0&&!selMicrons.includes(toFloat(o.Thickness)))return false;
    if(selODs.length>0&&!selODs.includes(parseMat(o.Material).od))return false;
    if(selSoDate.length>0&&selSoDate.indexOf(o._soDate)<0)return false;
    return true;
  }),[withKey,selMicrons,selODs,selSoDate]);

  const customerData=useMemo(()=>{
    const map={};
    filteredPend.forEach(o=>{
      const c=String(o["Consignee Name"]||"Unknown").trim();
      if(!map[c])map[c]={customer:c,rolls:0,kg:0,orders:0,microns:[],src:{}};
      map[c].rolls+=toFloat(o["Pending Rolls"]);
      map[c].kg+=toFloat(o["Pend. Prod."]);
      map[c].orders++;
      const th=toFloat(o.Thickness);if(th&&map[c].microns.indexOf(th)<0)map[c].microns.push(th);
      const src=o._src||"UNKNOWN";map[c].src[src]=(map[c].src[src]||0)+1;
    });
    return Object.values(map).map(c=>({...c,microns:c.microns.sort(function(a,b){return a-b;})}))
      .sort((a,b)=>sortDir*(sortKey==="rolls"?b.rolls-a.rolls:sortKey==="kg"?b.kg-a.kg:b.orders-a.orders));
  },[filteredPend,sortKey,sortDir]);

  const totalRolls=useMemo(()=>filteredPend.reduce((s,o)=>s+toFloat(o["Pending Rolls"]),0),[filteredPend]);
  const totalKg=useMemo(()=>filteredPend.reduce((s,o)=>s+toFloat(o["Pend. Prod."]),0),[filteredPend]);
  const overdueCount=useMemo(()=>filteredPend.filter(o=>cleanDate(o["Required Delivery Date"]||"")<TODAY).length,[filteredPend]);
  const srcCounts=useMemo(()=>{const m={};filteredPend.forEach(o=>{const s=o._src||"UNKNOWN";m[s]=(m[s]||0)+1;});return m;},[filteredPend]);

  const srcBg={FGJM:"#f0fdf4",MJ:"#eff6ff",BARE:"#fef9c3",NONE:"#fef2f2",UNKNOWN:"#f8fafc"};
  const srcColors={FGJM:"#15803d",MJ:"#1e40af",BARE:"#92400e",NONE:"#991b1b",UNKNOWN:"#64748b"};
  const srcLabel={FGJM:"Direct FGM",MJ:"MJ Slit",BARE:"Met",NONE:"No Stock",UNKNOWN:"Unknown"};
  const OD_COLORS={"22":"#15803d","25":"#1d4ed8","28":"#92400e"};
  const OD_BG={"22":"#f0fdf4","25":"#eff6ff","28":"#fff7ed"};

  // What to pass to planning engine:
  // If individual orders ticked → plan those; else if customers selected → plan by customer
  const getSelectionForPlan=()=>{
    if(selOrders.length>0){
      // Pass the actual order keys to generatePlan
      return{type:"orders",keys:selOrders,microns:selMicrons,ods:selODs};
    }
    if(selCustomers.length>0){
      return{type:"customers",customers:selCustomers,microns:selMicrons,ods:selODs};
    }
    return{type:"all",microns:selMicrons,ods:selODs};
  };

  const selCount=selOrders.length;
  const selRolls=filteredPend.filter(o=>selOrders.includes(o._key)).reduce((s,o)=>s+toFloat(o["Pending Rolls"]),0);

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:C.navy,marginBottom:4}}>Pendency Analysis</h1>
          <p style={{fontSize:14,color:C.textMd}}>{filteredPend.length} orders · {totalRolls.toFixed(0)} rolls · {(totalKg/1000).toFixed(2)} MT
            {(selMicrons.length>0||selODs.length>0||selSoDate.length>0)&&<span style={{color:C.accent,fontWeight:700}}> (filtered)</span>}
          </p>
        </div>
        <button onClick={()=>onMakePlan(getSelectionForPlan())}
          style={{...btn("linear-gradient(135deg,#1a305c,#1d4ed8)","#fff",{padding:"12px 20px",fontSize:13,fontWeight:700,borderRadius:10,minWidth:200})}}>
          {selCount>0?`📋 Plan ${selCount} Selected Orders →`:`📋 Make Plan MET/F/04 →`}
        </button>
      </div>

      {overdueCount>0&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>🔴</span>
        <span style={{fontWeight:700,color:"#991b1b",fontSize:13}}>{overdueCount} orders OVERDUE — Immediate action required</span>
      </div>}

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10,marginBottom:14}}>
        {[
          {l:"Total Orders",v:filteredPend.length,sub:`${totalRolls.toFixed(0)} rolls`,c:C.navy,bg:"#f0f4ff"},
          {l:"OVERDUE",v:overdueCount,sub:"Past delivery date",c:C.red,bg:"#fef2f2"},
          {l:"Pending MT",v:(totalKg/1000).toFixed(2),sub:"Metric Tonnes",c:"#1e40af",bg:"#eff6ff"},
          {l:"Direct FGM",v:srcCounts.FGJM||0,sub:"Ready",c:"#15803d",bg:"#f0fdf4"},
          {l:"MJ Slit",v:srcCounts.MJ||0,sub:"Slit only",c:"#1e40af",bg:"#eff6ff"},
          {l:"To Metallise",v:srcCounts.BARE||0,sub:"Bare avail",c:"#92400e",bg:"#fef9c3"},
          {l:"No Stock",v:srcCounts.NONE||0,sub:"Procure",c:C.red,bg:"#fef2f2"},
        ].map((s,i)=>(
          <div key={i} style={{background:s.bg,borderRadius:12,padding:"12px",textAlign:"center",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:22,fontWeight:800,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:11,color:C.textMd,fontWeight:700,marginTop:4}}>{s.l}</div>
            <div style={{fontSize:10,color:C.textLt,marginTop:2}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* ── FILTERS BAR ── */}
      <div style={{...card({padding:"12px 14px",marginBottom:12})}}>
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:11,fontWeight:700,color:C.textMd,minWidth:50}}>Micron:</span>
          <button onClick={()=>handleMicronToggle(null,pend)} style={{...btn(selMicrons.length===0?C.navy:"#f1f5f9",selMicrons.length===0?"#fff":C.textMd,{padding:"4px 10px",fontSize:11,border:"1px solid "+(selMicrons.length===0?C.navy:C.border)})}}>All</button>
          {availMicrons.map(m=>{const isSel=selMicrons.includes(m);return(
            <button key={m} onClick={()=>handleMicronToggle(m,pend)} style={{...btn(isSel?"#1e40af":"#eff6ff",isSel?"#fff":"#1e40af",{padding:"4px 10px",fontSize:11,border:"1px solid #bfdbfe"})}}>
              {isSel?"✓ ":""}{m}µ
            </button>
          );})}
          {(selMicrons.length>0||selODs.length>0||selSoDate.length>0)&&<button onClick={()=>{handleMicronToggle(null,pend);setSelSoDate([]);}} style={{...btn("#fef2f2",C.red,{padding:"4px 10px",fontSize:11,border:"1px solid #fca5a5",marginLeft:8})}}>✕ Clear All</button>}
        </div>
        {selMicrons.length>0&&(
          <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center",background:"#f0f7ff",borderRadius:8,padding:"8px 10px",border:"1px solid #bfdbfe"}}>
            <span style={{fontSize:11,fontWeight:700,color:"#1e40af",minWidth:90}}>OD for {selMicrons.map(m=>m+"µ").join("+")}:</span>
            {odsForMicron.map(od=>{const isSel=selODs.includes(od);const oc=OD_COLORS[od]||C.navy;return(
              <button key={od} onClick={()=>setSelODs(s=>isSel?s.filter(x=>x!==od):[...s,od])} style={{...btn(isSel?oc:"#fff",isSel?"#fff":oc,{padding:"5px 10px",fontSize:11,border:`2px solid ${oc}`,borderRadius:8,fontWeight:700})}}>
                {isSel?"✓ ":""}{od==="22"?"2.2 OD":od==="25"?"2.5 OD":od==="28"?"2.8 OD":od+" OD"}
              </button>
            );})}
            <span style={{fontSize:11,color:"#1e40af"}}>{selODs.length}/{odsForMicron.length} selected</span>
          </div>
        )}
        {/* Row 2: SO Created Date filter */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:11,fontWeight:700,color:C.textMd,minWidth:40}}>SO Date:</span>
          <button onClick={()=>setSelSoDate([])} style={{...btn(selSoDate.length===0?C.navy:"#f1f5f9",selSoDate.length===0?"#fff":C.textMd,{padding:"4px 10px",fontSize:11,border:"1px solid "+(selSoDate.length===0?C.navy:C.border)})}}>All Dates</button>
          {availDates.slice(0,12).map(d=>{
            var isActive=selSoDate.indexOf(d)>=0;
            return<button key={d} onClick={function(){setSelSoDate(function(prev){var idx=prev.indexOf(d);if(idx>=0){var n=prev.slice();n.splice(idx,1);return n;}return prev.concat([d]);});}} style={{...btn(isActive?"#6d28d9":"#f5f3ff",isActive?"#fff":"#6d28d9",{padding:"4px 10px",fontSize:11,border:"1px solid "+(isActive?"#6d28d9":"#ddd6fe")})}}>
              {d}
            </button>;
          })}
          {availDates.length>12&&<span style={{fontSize:11,color:C.textLt}}>+{availDates.length-12} more dates</span>}
        </div>
      </div>

      {/* Planned notice */}
      {plannedOrders.length>0&&<div style={{fontSize:11,color:"#6d28d9",background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:8,padding:"6px 12px",marginBottom:10}}>
        🗂 {plannedOrders.length} order(s) already in archive — shown with <span style={{background:"#ede9fe",borderRadius:4,padding:"1px 5px"}}>purple</span> highlight
      </div>}

      {/* Selected orders action bar */}
      {selCount>0&&<div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span style={{fontWeight:700,color:"#1e40af",fontSize:13}}>✅ {selCount} orders selected · {selRolls.toFixed(0)} rolls</span>
        <button onClick={()=>onMakePlan(getSelectionForPlan())} style={{...btn("linear-gradient(135deg,#1e40af,#1d4ed8)","#fff",{padding:"8px 18px",fontSize:13,fontWeight:700,borderRadius:8})}}>
          📋 Plan Selected Orders →
        </button>
        <button onClick={()=>setSelOrders([])} style={{...btn("#fef2f2",C.red,{padding:"8px 14px",fontSize:12,border:"1px solid #fca5a5"})}}>✕ Clear Selection</button>
      </div>}

      {/* View Tabs */}
      <div style={{display:"flex",gap:0,marginBottom:12,borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
        {[{id:"orders",icon:"📋",label:"All Orders ("+filteredPend.length+")"},{id:"customer",icon:"🏢",label:"Customer Wise"},{id:"planned",icon:"📌",label:"Already Planned ("+Object.keys(alreadyPlannedRolls||{}).length+")"}].map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)} style={{flex:1,padding:"10px 8px",background:view===t.id?C.navy:"#f8fafc",border:"none",cursor:"pointer",fontWeight:700,fontSize:13,color:view===t.id?"#fff":C.textMd,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* ── ALL ORDERS VIEW (with checkboxes + date) ── */}
      {view==="orders"&&(
        <div style={{...card({padding:0,overflow:"hidden"})}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",background:"#fff",minWidth:960}}>
              <thead><tr style={{background:C.navy}}>
                <th style={{...TH,width:36,color:"#fff",padding:"10px 8px"}}>
                  <input type="checkbox"
                    checked={filteredPend.length>0&&filteredPend.every(o=>selOrders.includes(o._key))}
                    onChange={()=>toggleAllOrders(filteredPend)}
                    style={{cursor:"pointer",width:16,height:16}}/>
                </th>
                {["#","SO Date","SO No","Material","Customer","Width","Length","Rolls","Planned","Remaining","KG","Req. Delivery","Status"].map(h=>(
                  <th key={h} style={{...TH,color:"#fff",padding:"10px 8px",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{filteredPend.map((o,i)=>{
                const isOD=cleanDate(o["Required Delivery Date"]||"")<TODAY;
                const src=o._src||"UNKNOWN";
                const isSel=selOrders.includes(o._key);
                const hist=getOrderHistory(o);
                const apRolls=(alreadyPlannedRolls||{})[o._key]||0;
                const pendRolls=toFloat(o["Pending Rolls"]);
                const remRolls=Math.max(0,pendRolls-apRolls);
                return(
                  <tr key={i} className="pprow" style={{background:isSel?"#eff6ff":hist.planned?"#f5f3ff":isOD?"#fff5f5":i%2?"#f7f9fc":"#fff",cursor:"pointer",opacity:apRolls>=pendRolls?0.6:1}}
                    onClick={()=>toggleOrder(o._key)}>
                    <td style={{...TD,textAlign:"center",width:36}} onClick={e=>e.stopPropagation()}>
                      <input type="checkbox" checked={isSel} onChange={()=>toggleOrder(o._key)} style={{cursor:"pointer",width:16,height:16}}/>
                    </td>
                    <td style={{...TD,textAlign:"center",fontWeight:700}}>{i+1}</td>
                    <td style={{...TD,fontSize:11,whiteSpace:"nowrap",color:"#6d28d9",fontWeight:600}}>{o._soDate||"—"}</td>
                    <td style={{...TD,fontSize:11,whiteSpace:"nowrap",color:C.textMd}}>{o["Sales Order"]||"—"}</td>
                    <td style={{...TD,fontWeight:700,color:C.navy,fontSize:10}}>
                      {o.Material}
                      {hist.planned&&<span style={{fontSize:8,marginLeft:3,background:hist.status.includes("Slit")?"#f0fdf4":hist.status.includes("Met")?"#fef9c3":"#ede9fe",color:hist.status.includes("Slit")?"#15803d":hist.status.includes("Met")?"#92400e":"#6d28d9",borderRadius:3,padding:"1px 4px",fontWeight:700}}>{hist.status} {hist.planNo}</span>}
                      {hist.cancelled&&<span style={{fontSize:8,marginLeft:3,background:"#fef2f2",color:"#991b1b",borderRadius:3,padding:"1px 4px",fontWeight:700}}>🚫 Cancelled {hist.planNo} — replan OK</span>}
                    </td>
                    <td style={{...TD,fontSize:11,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{String(o["Consignee Name"]||"").slice(0,20)}</td>
                    <td style={{...TD,textAlign:"center"}}>{toFloat(o.Width)}</td>
                    <td style={{...TD,textAlign:"center"}}>{toFloat(o.Length)}</td>
                    <td style={{...TD,textAlign:"center",fontWeight:800,color:C.red}}>{pendRolls}</td>
                    <td style={{...TD,textAlign:"center",fontWeight:700,color:apRolls>0?"#6d28d9":"#e2e8f0"}}>{apRolls>0?apRolls:"—"}</td>
                    <td style={{...TD,textAlign:"center",fontWeight:800,color:remRolls>0?"#92400e":"#15803d"}}>{apRolls>0?(remRolls>0?remRolls:"✓"):pendRolls}</td>
                    <td style={{...TD,textAlign:"center"}}>{(toFloat(o["Pend. Prod."])/1000).toFixed(2)}MT</td>
                    <td style={{...TD,fontSize:11,whiteSpace:"nowrap"}}>{isOD&&<span style={{color:C.red,fontWeight:700}}>🔴 </span>}{cleanDate(o["Required Delivery Date"]||"")||"—"}</td>
                    <td style={{...TD}}><span style={{background:srcBg[src],color:srcColors[src],padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{srcLabel[src]}</span></td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── CUSTOMER WISE VIEW ── */}
      {view==="customer"&&(
        <div style={card()}>
          <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
            <div style={{flex:1,fontSize:12,color:C.textMd}}>{selCustomers.length===0?"Click customers to plan specific ones":`${selCustomers.length} selected`}</div>
            <button onClick={()=>setSelCustomers(customerData.map(c=>c.customer))} style={{...btn(C.navy,"#fff",{padding:"5px 12px",fontSize:11})}}>All</button>
            <button onClick={()=>setSelCustomers([])} style={{...btn("#f1f5f9",C.textMd,{padding:"5px 12px",fontSize:11,border:`1px solid ${C.border}`})}}>Clear</button>
          </div>
          <table style={{width:"100%"}}>
            <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
              <th style={{...TH,width:34}}></th>
              {["Customer","Orders","Rolls↓","KG","Microns","Fulfillment"].map(h=><th key={h} style={TH}>{h}</th>)}
            </tr></thead>
            <tbody>{customerData.map((cd,ci)=>{
              const isSel=selCustomers.includes(cd.customer);
              const isExp=expandedCustomers.includes(cd.customer);
              const custOrders=filteredPend.filter(o=>String(o["Consignee Name"]||"").trim()===cd.customer)
                .sort((a,b)=>(a._soDate||"9999").localeCompare(b._soDate||"9999"));// oldest SO date first
              return(
                <React.Fragment key={ci}>
                  <tr className="pprow" style={{background:isSel?"#eff6ff":"transparent",cursor:"pointer"}}
                    onClick={()=>toggleExpandCustomer(cd.customer)}>
                    <td style={{...TD,width:34,textAlign:"center"}}>
                      <input type="checkbox" checked={isSel} onChange={e=>{e.stopPropagation();toggleCustomer(cd.customer);}} style={{cursor:"pointer"}}/>
                    </td>
                    <td style={{...TD,fontWeight:700,color:C.navy}}>{cd.customer}</td>
                    <td style={{...TD,textAlign:"center"}}>{cd.orders}</td>
                    <td style={{...TD,textAlign:"center",fontWeight:800,color:C.red}}>{cd.rolls.toFixed(0)}</td>
                    <td style={{...TD,textAlign:"center"}}>{(cd.kg/1000).toFixed(2)} MT</td>
                    <td style={{...TD,fontSize:11}}>{cd.microns.map(m=>`${m}µ`).join(", ")}</td>
                    <td style={{...TD}}>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {Object.entries(cd.src).map(([s,n])=>(
                          <span key={s} style={{background:srcBg[s],color:srcColors[s],padding:"2px 7px",borderRadius:8,fontSize:10,fontWeight:700}}>{n} {srcLabel[s]}</span>

function F04PlanView({result,cfg,planNo,bareNo,user,pen,bareStock,onSave,saved,onRegenerate,onRollSizeChange,onRegenerateSkipStock}){
  const {planRows,mjAdvisory,mjTotalKg,fgmTotalKg,stockTotalKg,stockHigh,fgmHigh,overdueCount,remainingOrders,planWarnings}=result||{};
  const [f04Tab,setF04Tab]=useState("stock");
  const [rowStates,setRowStates]=useState({});// {id: {selected,rejected,reason}}
  const [armDetail,setArmDetail]=useState(null);// {run,armIndex} for popup
  const [rejectingRun,setRejectingRun]=useState(null);
  const [showDeselected,setShowDeselected]=useState(false);
  const [showBareAvail,setShowBareAvail]=useState(false);
  const [manualRows,setManualRows]=useState([]);

  const isSelected=(run)=>rowStates[run&&run.id]&&rowStates[run.id].selected===false?false:true;

  // ── ARM WIDTH OVERRIDES ──────────────────────────────────────────
  // armOverrides: {runId: [w0,w1,w2,w3,w4]} — user-edited arm widths
  // editingArm: {runId, ai} — which arm cell is in edit mode
  const [armOverrides,setArmOverrides]=useState({});
  const [setsOverrides,setSetsOverrides]=useState({});
  const [editingSets,setEditingSets]=useState(null);// runId being edited
  const [editingArm,setEditingArm]=useState(null);

  // Get effective arms for a run (override or original)
  const getArms=function(r){return armOverrides[r.id]||r.armDisplay||r.arms||[];};

  // Get effective roll size for a run (recalculate if arms overridden)
  const getEffectiveRollSize=function(r){
    if(!armOverrides[r.id])return getRollSize(r);
    var aw=armOverrides[r.id];
    var sum=aw.reduce(function(s,w){return s+(typeof w==="number"?w:0);},0);
    return sum+(getTrim(r)||0);
  };

  // Effective trim = physical roll width - sum of all arm widths (live, reacts to arm overrides)
  const getEffectiveSets=function(r){
    if(setsOverrides[r.id]!==undefined&&setsOverrides[r.id]!==null)return setsOverrides[r.id];
    return r.sets||1;
  };

  const getEffectiveNOR=function(r){
    var effSets=getEffectiveSets(r);
    if(effSets===(r.sets||1))return r.noOfRoll||0;// no override, use engine value
    var sl=r.slitLen||24000;
    if(r.source==="FGJM")return r.noOfRoll||0;
    if(r.source==="MJ"||r.source==="BARE"){
      var rollLen=r.mjLength||r.jumboLen||73000;
      var norVal=rollLen>0?(effSets*sl/rollLen):effSets;
      return Math.abs(norVal-Math.round(norVal))<0.15?Math.round(norVal):Math.round(norVal*100)/100;
    }
    return calcNOR(effSets,sl,r.micron||10);
  };

  const getEffectiveTrim=function(r){
    var baseW=r.mjWidth||getRollSize(r)||r.rollSize||0;// physical roll width
    var arms=getArms(r);
    var armSum=arms.reduce(function(s,a){
      if(!a||String(a).indexOf("5G:")===0)return s;
      var w=typeof a==="number"?a:toFloat(a);
      return s+w;
    },0);
    return armSum>0?(baseW-armSum):(getTrim(r)||0);
  };

  // Find the pending order matching a given arm width for a run (for order detail in edit popup)
  const getArmOrderDetail=function(r,ai,overrideW){
    var targetW=overrideW!==undefined?overrideW:toFloat((getArms(r)||[])[ai]||0);
    if(!targetW)return null;
    // First try original order
    var orig=(r.orders||[])[ai];
    if(!overrideW&&orig&&toFloat(orig.Width||orig.w||0)===targetW)return orig;
    // Search pen for matching order
    if(!pen)return null;
    var rp=parseMat(r.mjMat||r.material||"");
    for(var pi=0;pi<pen.length;pi++){
      var po=pen[pi];
      if(!po.Material)continue;
      if(toFloat(po.Width)!==targetW)continue;
      var pp=parseMat(po.Material);
      if(pp.micron!==rp.micron)continue;
      var runR=rp.isSM?100:rp.grade==="320"?90:rp.grade==="360"?80:rp.isAB?60:40;
      var ordR=pp.isSM?100:pp.grade==="320"?90:pp.grade==="360"?80:pp.isAB?60:40;
      if(ordR>runR)continue;
      return po;
    }
    return orig||null;// fallback
  };

  // Valid widths for arm editing: pending orders matching this run's material/grade/micron
  const getValidWidths=function(r){
    if(!pen||!pen.length)return[];
    // Use MJ stock material (mjMat) if available — it determines actual quality/grade
    var rp=parseMat(r.mjMat||r.material||"");
    var validWidths=[];
    var seen={};
    for(var pi=0;pi<pen.length;pi++){
      var o=pen[pi];
      if(!o.Material)continue;
      // Skip Grade 3 (special/trial) and zero-pending orders
      if(String(o.Grade||"").trim()==="3")continue;
      if(toFloat(o["Pending Rolls"])<=0)continue;
      var op=parseMat(o.Material);
      if(op.micron!==rp.micron)continue;
      // Rewind: R3 stock can fill R3+normal, normal can't fill R3
      if(op.rewind&&rp.rewind!==op.rewind)continue;
      // Grade rank check: order rank must be <= run rank (can fill lower grade orders)
      var runRank=rp.isSM?100:rp.grade==="320"?90:rp.grade==="360"?80:rp.isAB?60:rp.grade==="301"?40:20;
      var ordRank=op.isSM?100:op.grade==="320"?90:op.grade==="360"?80:op.isAB?60:op.grade==="301"?40:20;
      if(ordRank>runRank)continue;
      // OD check: order OD must be <= run OD
      var odVal={"22":22,"25":25,"28":28};
      var rOD=odVal[r.od||rp.od||"22"]||22;
      var oOD=odVal[op.od||"22"]||22;
      if(oOD>rOD)continue;
      var w=toFloat(o.Width);
      if(w>0&&!seen[w]){seen[w]=true;validWidths.push(w);}
    }
    return validWidths.sort(function(a,b){return b-a;});// descending
  };

  // Save arm override: validate new width is in valid list, update arms
  const saveArmOverride=function(r,ai,newW){
    var vw=getValidWidths(r);
    if(vw.indexOf(newW)<0){
      showToast("⚠️ "+newW+"mm has no matching pending order for "+r.material);
      return false;
    }
    var cur=(armOverrides[r.id]||getArms(r)).slice();
    // Ensure array is 5 long
    while(cur.length<5)cur.push("");
    cur[ai]=newW;
    setArmOverrides(function(prev){var n={};Object.keys(prev).forEach(function(k){n[k]=prev[k];});n[r.id]=cur;return n;});
    setEditingArm(null);
    return true;
  };

  // ── Build plannedPerOrder map for a given set of runs ────────────────────
  // Capped at each order's pending rolls to prevent planned > pending
  const buildPlannedMap=function(runs){
    var map={};
    if(!runs||!pen)return map;
    // pending rolls per order key for cap
    var pendingCap={};
    pen.forEach(function(o){
      if(!o.Material)return;
      var k=String(o["Sales Order"]||"")+"-"+String(o["Sale Order Item"]||"");
      pendingCap[k]=toFloat(o["Pending Rolls"]||0);
    });
    // Build PEN lookup by micron+width for fast matching
    // Exclude Grade 3 and zero-pending orders
    var penByMicWidth={};
    pen.forEach(function(o){
      if(!o.Material)return;
      if(String(o.Grade||"").trim()==="3")return;
      if(toFloat(o["Pending Rolls"])<=0)return;
      var pp=parseMat(o.Material);
      var w=toFloat(o.Width);
      var mic=pp.micron||toFloat(o.Thickness)||0;
      var key=mic+"_"+w;
      if(!penByMicWidth[key])penByMicWidth[key]=[];
      penByMicWidth[key].push(o);
    });
    runs.forEach(function(r){
      if(!r||!isSelected(r))return;
      var sets=getEffectiveSets(r);
      if(r.source==="FGJM"){
        var fgmRolls=r.noOfRoll||1;
        (r.orders||[]).forEach(function(o){
          var k=String(o["Sales Order"]||"")+"-"+String(o["Sale Order Item"]||"");
          var cap=pendingCap[k];
          map[k]=(map[k]||0)+fgmRolls;
        });
      } else {
        // Width-based distribution: compute total rolls per width, then fill orders
        // up to their pending, excess goes to last order (shows negative remaining)
        var effArms=getArms(r);
        var rp=parseMat(r.mjMat||r.material||"");
        var mic=r.micron||rp.micron||10;
        var jumboLen=r.jumboLen||r.mjLength||73000;
        var perArmSets=r.armSets||null;
        var globalSets=getEffectiveSets(r);
        var origOrders=r.orders||[];

        // Step 1: compute total rolls per width
        // ALWAYS use globalSets (the capped sets from the run) — NOT per-arm jumbo capacity
        var rollsByWidth={};
        for(var ai=0;ai<effArms.length;ai++){
          var aw=effArms[ai];
          if(!aw||String(aw).indexOf("5G:")===0)continue;
          var w=typeof aw==="number"?aw:toFloat(aw);
          if(w<=0)continue;
          var thisArmSets=globalSets;
          if(!rollsByWidth[w])rollsByWidth[w]=0;
          rollsByWidth[w]+=thisArmSets;
        }

        // Step 2: distribute rolls per width across PEN orders (fill up to pending first)
        for(var wk4 in rollsByWidth){
          var remaining2=rollsByWidth[wk4];
          var candidates4=penByMicWidth[mic+"_"+wk4]||[];
          // First pass: fill each order up to its pending
          for(var ci4=0;ci4<candidates4.length&&remaining2>0;ci4++){
            var po4=candidates4[ci4];
            var pp4=parseMat(po4.Material);
            var rR4=rp.isSM?100:rp.grade==="320"?90:rp.grade==="360"?80:rp.isAB?60:40;
            var oR4=pp4.isSM?100:pp4.grade==="320"?90:pp4.grade==="360"?80:pp4.isAB?60:40;
            if(oR4>rR4)continue;
            var oKey4=String(po4["Sales Order"]||"")+"-"+String(po4["Sale Order Item"]||"");
            var pCap=pendingCap[oKey4]||0;
            var alreadyPlanned=map[oKey4]||0;
            var spaceLeft=pCap-alreadyPlanned;
            if(spaceLeft>0){
              var assign2=Math.min(remaining2,spaceLeft);
              map[oKey4]=(map[oKey4]||0)+assign2;
              remaining2-=assign2;
            }
          }
          // Second pass: excess goes to last matching order (shows as negative remaining)
          if(remaining2>0){
            var lastKey=null;
            for(var ci5=candidates4.length-1;ci5>=0;ci5--){
              var pp5=parseMat(candidates4[ci5].Material);
              var rR5=rp.isSM?100:rp.grade==="320"?90:rp.grade==="360"?80:rp.isAB?60:40;
              var oR5=pp5.isSM?100:pp5.grade==="320"?90:pp5.grade==="360"?80:pp5.isAB?60:40;
              if(oR5<=rR5){lastKey=String(candidates4[ci5]["Sales Order"]||"")+"-"+String(candidates4[ci5]["Sale Order Item"]||"");break;}
            }
            if(lastKey){map[lastKey]=(map[lastKey]||0)+remaining2;}
          }
        }
      }
    });
    return map;
  };

  // Tab-specific planned maps — ORDER DETAILS shows the active tab's orders
  // Tab 1 = FGM + MJ (no metallisation needed — slit/dispatch only)
  // Tab 2 = BARE stock + BARE_FRESH (both need metallisation)
  const stockRuns=(planRows||[]).filter(function(r){return r.source==="FGJM"||r.source==="MJ";});
  const freshRuns=(planRows||[]).filter(function(r){return r.source==="BARE_FRESH"||r.source==="BARE";});
  // Recompute every render — arm/trim overrides must instantly reflect in ORDER DETAILS
  const plannedPerOrderStock=buildPlannedMap(stockRuns);
  const plannedPerOrderFresh=buildPlannedMap(freshRuns);
  // Active tab map — used by ORDER DETAILS
  const plannedPerOrder=f04Tab==="fresh"?plannedPerOrderFresh:plannedPerOrderStock;
  const [editingTrim,setEditingTrim]=useState(null);// {runId, value}
  const [trimOverrides,setTrimOverrides]=useState({});// {runId: newTrimValue}
  const [rollSizeOverrides,setRollSizeOverrides]=useState({});// {runId: newRollSize}
  const [trimReasonModal,setTrimReasonModal]=useState(null);// {runId,oldTrim,newTrim}
  const [trimReasons]=useState(["Better fit machine range","Customer request","OD type requirement","Minimize waste","Arm width adjustment","Other"]);

  const getTrim=(r)=>trimOverrides[r.id]!==undefined?trimOverrides[r.id]:(r.trim||0);
  const getRollSize=(r)=>rollSizeOverrides[r.id]!==undefined?rollSizeOverrides[r.id]:(r.rollSize||r.rs||0);

  const startEditTrim=(r)=>{
    setEditingTrim({runId:r.id,value:String(getTrim(r))});
  };

  const commitTrim=(r,newVal)=>{
    const parsed=parseInt(newVal);
    if(isNaN(parsed)||parsed<5||parsed>30){
      setEditingTrim(null);return;// invalid — cancel
    }
    const oldTrim=getTrim(r);
    setEditingTrim(null);
    if(parsed===oldTrim)return;// no change
    // Ask why
    setTrimReasonModal({runId:r.id,oldTrim,newTrim:parsed,run:r});
  };

  const applyTrimChange=(reason)=>{
    if(!trimReasonModal)return;
    const{runId,oldTrim,newTrim,run}=trimReasonModal;
    setTrimOverrides(t=>({...t,[runId]:newTrim}));
    // Roll Size = Arms + Trim → when trim changes, roll size changes by same delta
    const trimDelta=newTrim-oldTrim;
    const currentRS=getRollSize(run);
    const newRS=currentRS+trimDelta;
    setRollSizeOverrides(rs=>({...rs,[runId]:newRS}));
    // Notify App level so F/05 can recalculate
    if(onRollSizeChange)onRollSizeChange(runId,newRS);
    // Save to learning engine
    fbSavePlanOverride(planNo,runId,"trim",oldTrim,newTrim,reason,user?.name||"Unknown").catch(()=>{});
    setTrimReasonModal(null);
  };

  // Initialize row states when planRows change
  useEffect(()=>{
    if(!planRows)return;
    const init={};
    planRows.forEach(r=>{if(r.id)init[r.id]={selected:true,rejected:false,reason:""};});
    setRowStates(init);
  },[planRows]);

  const toggleRow=(run)=>{
    const cur=rowStates[run.id];
    if(!cur)return;
    if(cur.selected){
      // Show why modal — row stays selected until reason submitted
      setRejectingRun(run);
    } else {
      // Re-selecting (undo rejection)
      setRowStates(s=>({...s,[run.id]:{selected:true,rejected:false,reason:""}}));
    }
  };
  const handleRejection=async(reason)=>{
    if(!rejectingRun)return;
    const run=rejectingRun;
    // Deselect
    setRowStates(s=>({...s,[run.id]:{selected:false,rejected:true,reason}}));
    try{await fbSavePlanOverride(planNo,run.id,"rejected","selected","rejected",reason,user?.name||"Unknown");}catch(e){}
    setRejectingRun(null);

    // If stock run rejected → auto-regenerate with this batch excluded
    if(run.source==="FGJM"||run.source==="MJ"||run.source==="BARE"){
      var batch=run.fgmBatch||run.mjBatch||run.bareBatch||"";
      if(batch&&onRegenerateSkipStock){
        // Collect ALL currently skipped batches + this new one
        var allSkipped=skippedStockRuns.map(function(r){return r.fgmBatch||r.mjBatch||r.bareBatch||"";}).filter(Boolean);
        if(allSkipped.indexOf(batch)<0)allSkipped.push(batch);
        setTimeout(function(){onRegenerateSkipStock(allSkipped);},300);
      }
    }
  };
  const handleRejectionCancel=()=>{
    // User cancelled — keep row selected, close modal
    setRejectingRun(null);
  };

  const selectedCount=planRows?planRows.filter(r=>isSelected(r)).length:0;
  const rejectedCount=planRows?planRows.filter(r=>rowStates[r.id]&&rowStates[r.id].rejected).length:0;

  // Detect skipped stock runs → their orders need Fresh Met
  const skippedStockRuns=planRows?planRows.filter(r=>(r.source==="FGJM"||r.source==="MJ"||r.source==="BARE")&&rowStates[r.id]&&!rowStates[r.id].selected):[];
  const skippedStockCount=skippedStockRuns.length;
  if(!planRows)return<div style={{padding:40,textAlign:"center",color:C.textMd}}>No plan generated yet. Upload files and generate plan.</div>;

  const freshMetRuns=planRows.filter(r=>r.source==="BARE_FRESH");
  const bareStockRuns=planRows.filter(r=>r.source==="BARE");
  const metRuns=planRows.filter(r=>r.source==="BARE_FRESH"||r.source==="BARE");// for sequence/tracking
  const mjRuns=planRows.filter(r=>r.source==="MJ");
  const fgmRuns=planRows.filter(r=>r.source==="FGJM");
  const totalNOR=planRows.reduce(function(s,r){
    if(!isSelected(r))return s;
    var effSets=getEffectiveSets(r);
    // Recompute NOR based on effective sets
    var sl=r.slitLen||24000;
    var rollLen=r.mjLength||r.jumboLen||73000;
    if(r.source==="FGJM")return s+(r.noOfRoll||0);
    if(r.source==="MJ"||r.source==="BARE"){
      var norVal=rollLen>0?(effSets*sl/rollLen):effSets;
      return s+(Math.abs(norVal-Math.round(norVal))<0.15?Math.round(norVal):Math.round(norVal*100)/100);
    }
    // Fresh Met: use calcNOR with effective sets
    return s+calcNOR(effSets,sl,r.micron||10);
  },0);

  const OD_COLORS={"22":"#15803d","25":"#1e40af","28":"#92400e"};
  const OD_BG={"22":"#f0fdf4","25":"#eff6ff","28":"#fff7ed"};

  // Find matching bare stock rolls for a fresh met run
  // A bare roll matches if: same micron, grade compatible, width fits, length >= 21000m
  const findMatchingBare=function(run){
    if(!bareStock||!bareStock.length)return null;
    var rp=parseMat(run.material||"");
    var mic=run.micron||rp.micron||10;
    var rs=run.rollSize||0;
    // Collect batches already used in BARE stock runs
    var usedBatches=bareStockRuns.map(function(br){return br.bareBatch||"";});
    var matches=[];
    for(var bi=0;bi<bareStock.length;bi++){
      var b=bareStock[bi];
      if(!b.Material||!b.Batch)continue;
      if(usedBatches.indexOf(b.Batch)>=0)continue;// already used in Tab 1
      var bw=toFloat(b.Width);
      var bl=toFloat(b.Length);
      if(bl<21000)continue;// too short
      var bp=parseMat(b.Material);
      var bMic=toFloat(b.Thickness)||bp.micron||0;
      if(bMic!==mic)continue;// different micron
      // Width must be >= rollSize (bare roll feeds the met run)
      if(bw<rs-30)continue;// allow small tolerance
      // Grade compatibility check
      if(!canFillBare(b.Material,run.material))continue;
      matches.push({batch:b.Batch,material:b.Material,width:bw,length:bl});
    }
    return matches.length>0?matches:null;
  };

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      {trimReasonModal&&<TrimReasonModal
        oldTrim={trimReasonModal.oldTrim}
        newTrim={trimReasonModal.newTrim}
        run={trimReasonModal.run}
        reasons={trimReasons}
        onSubmit={applyTrimChange}
        onClose={()=>setTrimReasonModal(null)}
      />}
    {rejectingRun&&<RejectionModal run={rejectingRun} onSubmit={handleRejection} onClose={()=>setRejectingRun(null)} onCancel={handleRejectionCancel}/>}

      {/* Controls */}
      <div className="no-print" style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{flex:1}}>
          <h1 style={{fontSize:20,fontWeight:800,color:C.navy}}>MET/F/04 — {planNo}</h1>
          <p style={{fontSize:12,color:C.textMd}}>Bare Plan: {bareNo} · Generated by {user?.name||"—"} · {new Date().toLocaleDateString("en-IN")}
            {result?.f05Mode&&<span style={{marginLeft:8,background:"#ede9fe",color:"#6d28d9",padding:"2px 8px",borderRadius:6,fontWeight:700,fontSize:10}}>F/05: {{"3r5g":"3R+5G+T","3rt":"3R+T","4rt":"4R+T","4r5g":"4R+5G+T","auto":"Auto Mix"}[result.f05Mode]||result.f05Mode}</span>}
          </p>
        </div>
        {!saved&&<button onClick={onSave} style={{...btn(C.green,"#fff",{padding:"10px 20px"})}}> 💾 Save Plan</button>}
        {saved&&<div style={{color:C.green,fontWeight:700,fontSize:13}}>✓ Saved</div>}
        <button onClick={onRegenerate} style={{...btn("#f1f5f9",C.navy,{padding:"10px 16px",border:"1px solid "+C.border,fontSize:13})}} title="Generate a fresh plan with same settings">🔄 Regenerate</button>
        <button onClick={()=>{
          // Apply trim/rollSize overrides before exporting
          var expRows=(planRows||[]).map(function(r){
            var t=trimOverrides[r.id]; var rs=rollSizeOverrides[r.id];
            if(t!==undefined||rs!==undefined)return Object.assign({},r,{trim:t!==undefined?t:r.trim,rollSize:rs!==undefined?rs:r.rollSize});
            return r;
          });
          exportF04Excel(expRows,planNo,bareNo,cfg,user);
        }} style={{...btn("#15803d","#fff",{padding:"10px 20px"})}}>⬇ Excel F/04</button>
        <button onClick={()=>window.print()} style={{...btn(C.navy,"#fff",{padding:"10px 20px"})}}>🖨️ Print</button>
      </div>

      {/* Tab bar */}
      <div className="no-print" style={{display:"flex",marginBottom:14,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
        <button onClick={()=>setF04Tab("stock")} style={{flex:1,padding:"10px 16px",background:f04Tab==="stock"?"#eff6ff":"#f8fafc",border:"none",borderBottom:f04Tab==="stock"?`3px solid ${C.accent}`:"3px solid transparent",cursor:"pointer",fontWeight:700,fontSize:13,color:f04Tab==="stock"?C.accent:C.textMd,fontFamily:"inherit"}}>
          📦 Tab 1 — Stock (FGM + MJ): {planRows?(planRows.filter(r=>r.source==="FGJM"||r.source==="MJ").length):0} runs
        </button>
        <button onClick={()=>setF04Tab("fresh")} style={{flex:1,padding:"10px 16px",background:f04Tab==="fresh"?"#fef9c3":"#f8fafc",border:"none",borderBottom:f04Tab==="fresh"?"3px solid #92400e":"3px solid transparent",cursor:"pointer",fontWeight:700,fontSize:13,color:f04Tab==="fresh"?"#92400e":C.textMd,fontFamily:"inherit"}}>
          🏭 Tab 2 — Met Runs (Bare + Fresh): {planRows?(planRows.filter(r=>r.source==="BARE_FRESH"||r.source==="BARE").length):0} runs
        </button>
      </div>

      {/* Selection summary bar */}
      {planRows&&planRows.length>0&&<div className="no-print" style={{background:"#f0f4ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 16px",marginBottom:12,display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:13,fontWeight:700,color:C.navy}}>📋 Plan Suggestions: {planRows.length} total</span>
        <span style={{fontSize:13,fontWeight:700,color:C.green}}>✅ Selected: {selectedCount}</span>
        {rejectedCount>0&&<span style={{fontSize:13,fontWeight:700,color:C.red}}>❌ Skipped: {rejectedCount} <span style={{fontWeight:400,color:C.textMd}}>(saved for learning)</span></span>}
        {rejectedCount>0&&<button onClick={function(){setShowDeselected(!showDeselected);}} style={{background:showDeselected?"#fef2f2":"#f1f5f9",color:showDeselected?"#991b1b":"#64748b",border:"1px solid "+(showDeselected?"#fca5a5":"#dde3ed"),borderRadius:8,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{showDeselected?"👁 Hide skipped":"👁 Show skipped"}</button>}
        <span style={{fontSize:11,color:C.textMd,flex:1}}>Uncheck any run you don't want — app will ask why and learn from your choice</span>
      </div>}

      {/* Tab 2 Toolbar */}
      {f04Tab==="fresh"&&<div className="no-print" style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        <button onClick={function(){setShowBareAvail(!showBareAvail);}} style={{background:showBareAvail?"#f0fdf4":"#f1f5f9",color:showBareAvail?"#15803d":"#64748b",border:"1px solid "+(showBareAvail?"#86efac":"#dde3ed"),borderRadius:8,padding:"5px 14px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{showBareAvail?"📦 Hide Bare Available":"📦 Show Bare Available"}</button>
        <button onClick={function(){
          setManualRows(function(prev){return prev.concat([{
            id:uid(),source:"MANUAL",machine:"M-1",material:"",bareMat:"",
            rollSize:0,jumboLen:73000,trim:15,slitLen:24000,
            arms:["","","","",""],sets:1,od:"22",micron:10,
            customers:"",metalIO:"I",packMode:"WM",coreId:6
          }]);});
        }} style={{background:"#1d4ed8",color:"#fff",border:"none",borderRadius:8,padding:"5px 14px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>➕ Add Manual Row</button>
        {manualRows.length>0&&<span style={{fontSize:11,color:C.textMd}}>{manualRows.length} manual row(s)</span>}
      </div>}

      {/* ═══ SKIPPED STOCK RUNS BANNER ═══ */}
      {skippedStockCount>0&&<div className="no-print" style={{background:"#fef9c3",border:"2px solid #f59e0b",borderRadius:10,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span style={{fontSize:14}}>🔄</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,color:"#92400e",fontSize:13}}>You skipped {skippedStockCount} stock run(s) — those orders are NOT in Fresh Met yet</div>
          <div style={{fontSize:11,color:"#78350f",marginTop:2}}>Click Regenerate to re-plan — skipped stock orders will be included as Fresh Met runs instead</div>
        </div>
        <button onClick={()=>{
          // Collect batch IDs from all skipped stock runs
          var skipBatches=[];
          skippedStockRuns.forEach(function(r){
            var batch=r.fgmBatch||r.mjBatch||r.bareBatch||"";
            if(batch&&skipBatches.indexOf(batch)<0)skipBatches.push(batch);
          });
          if(onRegenerateSkipStock)onRegenerateSkipStock(skipBatches);
          else onRegenerate();
        }} style={{...btn("linear-gradient(135deg,#f59e0b,#d97706)","#fff",{padding:"10px 20px",fontSize:13,fontWeight:800,borderRadius:10})}}>🔄 Regenerate with skipped orders →</button>
      </div>}

      {/* Warnings */}
      {mjAdvisory&&<div style={{background:"#fef9c3",border:"2px solid #f59e0b",borderRadius:10,padding:"12px 16px",marginBottom:14}}>
        <div style={{fontWeight:800,color:"#92400e",fontSize:14}}>⚠️ Stock High — MJ: {(mjTotalKg/1000).toFixed(1)} MT + FGM: {((fgmTotalKg||0)/1000).toFixed(1)} MT = {((stockTotalKg||0)/1000).toFixed(1)} MT total</div>
        <div style={{fontSize:11,color:"#78350f",marginTop:4}}>Sets capped to pending only. Use Tab 1 (MJ Slit + FGM Direct) to clear stock. Click SETS column to increase if extra FGM needed.</div>
      </div>}

      {overdueCount>0&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 16px",marginBottom:14}}>
        <div style={{fontWeight:700,color:C.red,fontSize:13}}>🔴 {overdueCount} OVERDUE ORDERS — Shown first in plan</div>
      </div>}

      {(planWarnings||[]).length>0&&<div className="no-print" style={{background:"#fff7ed",border:"1px solid #fdba74",borderRadius:10,padding:"10px 16px",marginBottom:14}}>
        <div style={{fontWeight:800,color:"#9a3412",fontSize:12,marginBottom:4}}>⚠ Engine Skipped {(planWarnings||[]).length} Stock Item(s)</div>
        {(planWarnings||[]).map(function(w,i){return React.createElement("div",{key:i,style:{fontSize:11,color:"#7c2d12",padding:"2px 0"}},w);})}
      </div>}

      {/* ═══ PLAN FULFILMENT SUMMARY ═══ */}
      <div className="no-print" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:14}}>
        <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:10,padding:"10px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.textMd,textTransform:"uppercase"}}>FGM Dispatch</div>
          <div style={{fontSize:22,fontWeight:800,color:C.green}}>{fgmRuns.length}</div>
          <div style={{fontSize:10,color:C.textMd}}>Direct from finished stock</div>
        </div>
        <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.textMd,textTransform:"uppercase"}}>MJ Slit Only</div>
          <div style={{fontSize:22,fontWeight:800,color:"#1e40af"}}>{mjRuns.length}</div>
          <div style={{fontSize:10,color:C.textMd}}>Already metallized → slit</div>
        </div>
        <div style={{background:"#fef9c3",border:"1px solid #fbbf24",borderRadius:10,padding:"10px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.textMd,textTransform:"uppercase"}}>Fresh Met Runs</div>
          <div style={{fontSize:22,fontWeight:800,color:"#92400e"}}>{metRuns.length}</div>
          <div style={{fontSize:10,color:C.textMd}}>Need bare film feed</div>
        </div>
        <div style={{background:remainingOrders&&remainingOrders.length>0?"#fef2f2":"#f0fdf4",border:"1px solid "+(remainingOrders&&remainingOrders.length>0?"#fca5a5":"#86efac"),borderRadius:10,padding:"10px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.textMd,textTransform:"uppercase"}}>Unfulfilled</div>
          <div style={{fontSize:22,fontWeight:800,color:remainingOrders&&remainingOrders.length>0?C.red:C.green}}>{remainingOrders?remainingOrders.length:0}</div>
          <div style={{fontSize:10,color:C.textMd}}>{remainingOrders&&remainingOrders.length>0?"Need bare stock / new orders":"All orders planned ✅"}</div>
        </div>
      </div>

      {/* No fresh feed warning */}
      {metRuns.length===0&&fgmRuns.length+mjRuns.length>0&&<div className="no-print" style={{background:"#fffbeb",border:"2px solid #f59e0b",borderRadius:10,padding:"12px 16px",marginBottom:14}}>
        <div style={{fontWeight:800,color:"#92400e",fontSize:14,marginBottom:4}}>📦 No Fresh Met Runs — All fulfilled from existing stock</div>
        <div style={{fontSize:12,color:"#78350f"}}>{fgmRuns.length} FGM dispatch + {mjRuns.length} MJ slit = {fgmRuns.length+mjRuns.length} orders from stock. No fresh bare film feed required for this plan.</div>
      </div>}
      {metRuns.length===0&&fgmRuns.length+mjRuns.length===0&&<div className="no-print" style={{background:"#fef2f2",border:"2px solid #dc2626",borderRadius:10,padding:"12px 16px",marginBottom:14}}>
        <div style={{fontWeight:800,color:"#991b1b",fontSize:14,marginBottom:4}}>⛔ No Plan Generated — Nothing can be fulfilled</div>
        <div style={{fontSize:12,color:"#991b1b"}}>No matching FGM, MJ, or Bare stock found. All {remainingOrders?remainingOrders.length:0} orders need fresh bare film feed which is not available. Check stock or adjust order filters.</div>
      </div>}
      {remainingOrders&&remainingOrders.length>0&&<div className="no-print" style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 16px",marginBottom:14}}>
        <div style={{fontWeight:700,color:C.red,fontSize:13,marginBottom:6}}>⚠ {remainingOrders.length} orders could not be fulfilled:</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {remainingOrders.slice(0,10).map((o,i)=><span key={i} style={{background:"#fff",border:"1px solid #fca5a5",borderRadius:6,padding:"3px 8px",fontSize:10,fontWeight:600,color:"#991b1b"}}>
            {o.Material} {toFloat(o.Width)}mm ×{toFloat(o["Pending Rolls"]||o._rem)} — {String(o["Consignee Name"]||"").slice(0,15)}
          </span>)}
          {remainingOrders.length>10&&<span style={{fontSize:11,color:C.textMd}}>...and {remainingOrders.length-10} more</span>}
        </div>
      </div>}

      {/* Printable F/04 */}
      <div className="print-area" style={{background:"#fff",border:"1px solid #dde3ed",borderRadius:12,overflow:"hidden"}}>
        {/* Header */}
        <div style={{background:"#fff",borderBottom:"2px solid #1a305c",padding:"8px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <Logo size={40}/>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:14,fontWeight:800,color:C.navy}}>{cfg.companyName||"GLS POLYFILMS PVT. LTD., GURAWARA, REWARI"}</div>
              <div style={{fontSize:11,color:C.textMd,marginTop:2}}>Slitting Plan for Met Slitters · GLS/MET/F/04</div>
            </div>
            <div style={{textAlign:"right",fontSize:12}}>
              <div><strong>Date:</strong> {new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}</div>
              <div><strong>Met Plan No:</strong> <span style={{color:C.navy,fontWeight:800}}>{planNo}</span></div>
              <div><strong>Bare Plan No:</strong> <span style={{color:C.green,fontWeight:800}}>{bareNo}</span></div>
              <div><strong>Total Rolls:</strong> {totalNOR.toFixed(1)}</div>
            </div>
          </div>
        </div>

        {/* Overdue section */}
        {planRows.filter(r=>r.overdue).length>0&&(
          <div style={{background:"#fef2f2",borderBottom:"2px solid #fca5a5",padding:"6px 12px"}}>
            <div style={{fontSize:11,fontWeight:800,color:C.red}}>🔴 OVERDUE — IMMEDIATE ACTION REQUIRED</div>
          </div>
        )}

        {/* UNIFIED PLAN TABLE — all sections share same columns */}
        {(mjRuns.length>0||fgmRuns.length>0||metRuns.length>0)&&(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",minWidth:1100,borderCollapse:"collapse"}}>
              <thead>
                <tr style={{background:"#eef1f7"}}>
                  {["✓","#","Met M/C","Material","Bare / FGM / MJ Ref","Roll Size","Length","No. of Roll","Trim","Slit L","Arm 1","Arm 2","Arm 3","Arm 4","Arm 5","Sets","I/O","Pack","Core","OD"].map(h=>(
                    <th key={h} style={{...TH,padding:"5px 7px",fontSize:9,whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {f04Tab==="stock"&&mjRuns.length>0&&<tr><td colSpan={20} style={{background:"#eff6ff",padding:"5px 12px",fontWeight:800,fontSize:11,color:"#1e40af",borderBottom:"1px solid #bfdbfe"}}>
                  📋 MJ SLITTING — {mjRuns.length} runs — No metallisation required
                  <span style={{fontWeight:400,fontSize:10,color:"#6d28d9",marginLeft:12}}>* Purple width = Grade 5 arm → saved to FGM stock</span>
                  <span style={{fontWeight:400,fontSize:10,color:"#92400e",marginLeft:8}}>Trim: 10–20mm only</span>
                </td></tr>}
                {f04Tab==="stock"&&mjRuns.filter(function(r){return isSelected(r)||showDeselected;}).map((r,i)=>(
                  <tr key={"mj"+i} className="pprow" style={{background:!isSelected(r)?"#f4f4f4":r.overdue?"#fff5f5":i%2?"#f7f9fc":"#fff",opacity:!isSelected(r)?0.4:1}}>
                    <td style={{...TD,textAlign:"center",width:34}}>
                      <input type="checkbox" checked={isSelected(r)} onChange={()=>toggleRow(r)} style={{cursor:"pointer",width:15,height:15,accentColor:C.accent}}/>

                  </tr>
                })}</tbody>
              </table>
            </div>

            {f04Tab==="fresh"&&pen&&pen.length>0&&(function(){

              });

                  React.createElement("span",{style:{fontSize:11,fontWeight:800,color:"#991b1b"}},"⚠ NOT YET PLANNED — "+unplanned.length+" orders"),
                  React.createElement("span",{style:{fontSize:10,color:"#92400e",fontWeight:500}},"These orders from your selection were not planned. Change arm widths above to accommodate them.")
                ),

                    React.createElement("thead",null,
                      React.createElement("tr",{style:{background:"#fef2f2"}},

                      )
                    ),
                    React.createElement("tbody",null,
                      unplanned.map(function(o,i){
                        var isOD=cleanDate(o["Required Delivery Date"]||"")<TODAY;
                        return React.createElement("tr",{key:i,className:"pprow",style:{background:isOD?"#fff5f5":i%2?"#fef2f2":"#fff"}},
                          React.createElement("td",{style:{...TD,fontSize:10,whiteSpace:"nowrap"}},isOD?"🔴 ":"",fmtDateShort(o["SO Crtd Dt."])),
                          React.createElement("td",{style:{...TD,fontWeight:700,color:C.navy,fontSize:11}},o.Material),
                          React.createElement("td",{style:{...TD,fontSize:11}},o["Sales Order"]),
                          React.createElement("td",{style:{...TD,fontSize:11,textAlign:"center"}},o["Sale Order Item"]),
                          React.createElement("td",{style:{...TD,fontSize:11,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},o["Consignee Name"]),
                          React.createElement("td",{style:{...TD,textAlign:"center",fontWeight:700}},toFloat(o.Width)),
                          React.createElement("td",{style:{...TD,textAlign:"center"}},toFloat(o.Length)),

                        );
                      })
                    )
                  )
                )
              );
            })()}
          </>
        )}
      </div>
    </div>
  );
}

// ─── F/05 PLAN VIEW ───────────────────────────────────────────────────────────
function F05PlanView({f05Rows,cfg,bareNo,planNo}){
  if(!f05Rows||!f05Rows.length)return<div style={{padding:40,textAlign:"center",color:C.textMd}}>F/05 plan auto-generates after F/04. No fresh met runs in current plan.</div>;
  const [rollOverrides,setRollOverrides]=useState({});// {rowIdx_rollIdx: newSize}
  const [editingF05,setEditingF05]=useState(null);// "rowIdx_rollIdx"

  const getF05Roll=function(rowIdx,rollIdx){
    var key=rowIdx+"_"+rollIdx;
    if(rollOverrides[key]!==undefined)return rollOverrides[key];
    var orig=(f05Rows[rowIdx]&&f05Rows[rowIdx].rolls&&f05Rows[rowIdx].rolls[rollIdx]);
    return orig?orig.size:0;
  };
  const getF05Trim=function(rowIdx){
    var row=f05Rows[rowIdx];if(!row)return 0;
    var jw=row.jumboWidth||cfg.jumboWidth||10450;
    var rollSum=0;
    for(var ri=0;ri<4;ri++){rollSum+=getF05Roll(rowIdx,ri);}
    var offcut=getF05Offcut(rowIdx);
    return jw-rollSum-offcut;
  };
  const getF05Offcut=function(rowIdx){
    var row=f05Rows[rowIdx];if(!row)return 0;
    var jw=row.jumboWidth||cfg.jumboWidth||10450;
    var rollSum=0;for(var ri=0;ri<4;ri++){rollSum+=getF05Roll(rowIdx,ri);}
    // If any roll was overridden, recalc: offcut = jumboWidth - rollSum - originalTrim
    var hasOverride=false;
    for(var ri2=0;ri2<4;ri2++){if(rollOverrides[rowIdx+"_"+ri2]!==undefined){hasOverride=true;break;}}
    if(hasOverride){
      var remaining=jw-rollSum;
      // Keep trim in reasonable range (100-500mm), rest is offcut
      var origTrim=row.trim||200;
      if(remaining>=origTrim){return remaining-origTrim;}
      if(remaining>=100){return 0;}// all goes to trim
      return 0;
    }
    return row.offcut||0;
  };
  const matColors={"3FG-G10901":"#fbbf24","3FG-G12901":"#86efac","3FG-G12360":"#5eead4","3FG-G10320":"#a78bfa","3FG-G08901":"#fda4af","3FG-G23320":"#fdba74"};
  const getMatColor=mat=>{for(const[k,v]of Object.entries(matColors))if(mat.includes(k))return v;return "#e2e8f0";};

  // Calculate F/05 utilization stats
  const JW=cfg.jumboWidth||10450;
  const totalJumbos=f05Rows.length;
  const totalFilm=totalJumbos*JW;
  const totalMet=f05Rows.reduce(function(s,r,ri){var rs=0;for(var k=0;k<4;k++){rs+=getF05Roll(ri,k);}return s+rs;},0);
  const totalTrim=f05Rows.reduce(function(s,r,ri){return s+getF05Trim(ri);},0);
  const totalOffcut=f05Rows.reduce(function(s,r,ri){return s+getF05Offcut(ri);},0);
  const metPct=totalFilm>0?(totalMet/totalFilm*100):0;
  const trimPct=totalFilm>0?(totalTrim/totalFilm*100):0;

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <div className="no-print" style={{display:"flex",gap:10,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{flex:1}}>
          <h1 style={{fontSize:20,fontWeight:800,color:C.navy}}>MET/F/05 — {bareNo}</h1>
          <p style={{fontSize:12,color:C.textMd}}>Slitting of Base Film Roll · Linked to Met Plan {planNo}</p>
        </div>
        <button onClick={()=>exportF05Excel(f05Rows,bareNo,planNo,cfg)} style={{...btn("#15803d","#fff",{padding:"10px 20px"})}}>⬇ Excel F/05</button>
        <button onClick={()=>window.print()} style={{...btn(C.navy,"#fff",{padding:"10px 20px"})}}>🖨️ Print</button>
      </div>

      {/* ═══ F/05 UTILIZATION STATS BAR ═══ */}
      <div className="no-print" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:14}}>
        <div style={{background:"#f0f4ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.textMd,textTransform:"uppercase"}}>Jumbos Used</div>
          <div style={{fontSize:22,fontWeight:800,color:C.navy}}>{totalJumbos}</div>
          <div style={{fontSize:10,color:C.textMd}}>{(totalFilm/1000).toFixed(1)}m film</div>
        </div>
        <div style={{background:metPct>=95?"#f0fdf4":metPct>=88?"#fef9c3":"#fef2f2",border:"1px solid "+(metPct>=95?"#86efac":metPct>=88?"#fbbf24":"#fca5a5"),borderRadius:10,padding:"10px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.textMd,textTransform:"uppercase"}}>For Metallizer</div>
          <div style={{fontSize:22,fontWeight:800,color:metPct>=95?C.green:metPct>=88?"#92400e":C.red}}>{metPct.toFixed(1)}%</div>
          <div style={{fontSize:10,color:C.textMd}}>{(totalMet/1000).toFixed(1)}m used</div>
        </div>
        <div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.textMd,textTransform:"uppercase"}}>Trim Waste</div>
          <div style={{fontSize:22,fontWeight:800,color:C.red}}>{trimPct.toFixed(1)}%</div>
          <div style={{fontSize:10,color:C.textMd}}>{totalTrim.toLocaleString()}mm total</div>
        </div>
        <div style={{background:"#fef9c3",border:"1px solid #fbbf24",borderRadius:10,padding:"10px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:C.textMd,textTransform:"uppercase"}}>5-Grade Offcut</div>
          <div style={{fontSize:22,fontWeight:800,color:"#92400e"}}>{totalOffcut>0?(totalOffcut/1000).toFixed(1)+"m":"—"}</div>
          <div style={{fontSize:10,color:C.textMd}}>{totalOffcut>0?"Saleable product":"No offcut"}</div>
        </div>
      </div>
      <div style={{background:"#fff",border:"1px solid #dde3ed",borderRadius:12,overflow:"hidden"}}>
        {/* Header */}
        <div style={{background:"#fff",borderBottom:"2px solid #1a305c",padding:"8px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <Logo size={36}/>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:13,fontWeight:800,color:C.navy}}>{cfg.companyName||"GLS POLYFILMS PVT. LTD., GURAWARA, REWARI"}</div>
              <div style={{fontSize:12,fontWeight:700,color:C.textMd,marginTop:2}}>Slitting of Base Film Roll</div>
              <div style={{fontSize:11,color:C.textMd}}>All Rolls Chemical Surface Outside</div>
            </div>
            <div style={{textAlign:"right",fontSize:12}}>
              <div><strong>Format No:</strong> MET/F/05</div>
              <div><strong>Plan No:</strong> <span style={{color:C.green,fontWeight:800}}>{bareNo}</span></div>
              <div><strong>Met Plan:</strong> <span style={{color:C.navy,fontWeight:800}}>{planNo}</span></div>
              <div><strong>Date:</strong> {new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}</div>
            </div>
          </div>
        </div>
        {/* Note */}
        <div style={{background:"#fef9c3",padding:"6px 16px",borderBottom:"1px solid #fbbf24",fontSize:11,color:"#92400e",fontWeight:600}}>
          ⚠️ Jumbo Length for 10µ &amp; 12µ NOT more than 73,000m (unless specifically asked) · SAP Core size = actual aluminum core size used
        </div>
        {/* Table */}
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",minWidth:900,borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"#eef1f7"}}>
                <th style={TH}>Material</th>
                <th style={TH}>Length</th>
                <th style={TH}>Roll 1</th>
                <th style={TH}>Roll 2</th>
                <th style={TH}>Roll 3</th>
                <th style={TH}>Roll 4</th>
                <th style={{...TH,background:"#fef9c3"}}>5 Grade</th>
                <th style={TH}>Trim</th>
                <th style={TH}>Jumbo Width</th>
                <th style={{...TH,background:"#f0f4ff"}}>Met %</th>
                <th style={TH}>Customer</th>
                <th style={TH}>Met Plan</th>
              </tr>
            </thead>
            <tbody>{f05Rows.map((row,i)=>(
              <React.Fragment key={i}>
                <tr style={{background:i%2?"#f7f9fc":"#fff",borderBottom:"1px solid #dde3ed"}}>
                  <td style={{...TD,fontWeight:800,paddingLeft:12}}>
                    <span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:getMatColor(row.material),marginRight:6,verticalAlign:"middle"}}/>
                    {row.material}
                    {row.mixedMats&&row.mixedMats.length>1&&(
                      <div style={{fontSize:9,color:"#6d28d9",fontWeight:600,marginTop:2}}>
                        +{row.mixedMats.slice(1).map(m=>m.replace("3FG-G","")).join(", ")}
                      </div>
                    )}
                    {row.offcutWarn&&<div style={{fontSize:9,color:"#991b1b",fontWeight:700,marginTop:2}}>⚠ Offcut &gt;2000mm</div>}
                  </td>
                  <td style={{...TD,textAlign:"center",fontWeight:700}}>{row.length}</td>
                  {[0,1,2,3].map(function(ri){
                    var origRoll=row.rolls[ri];
                    var effSize=getF05Roll(i,ri);
                    var isEditing2=editingF05===i+"_"+ri;
                    var isOverridden2=rollOverrides[i+"_"+ri]!==undefined;
                    return<td key={ri} style={{...TD,textAlign:"center",fontWeight:700,color:effSize?C.navy:"#cbd5e1",background:isEditing2?"#eff6ff":isOverridden2?"#fefce8":"transparent",cursor:"pointer",position:"relative"}}
                      onClick={function(){if(!isEditing2)setEditingF05(i+"_"+ri);}}>
                      {isEditing2?
                        <input type="number" autoFocus defaultValue={effSize||""} min={0} max={5000} step={5}
                          style={{width:65,border:"2px solid #1d4ed8",borderRadius:5,padding:"3px",fontSize:12,fontWeight:700,textAlign:"center",fontFamily:"inherit"}}
                          onClick={function(e){e.stopPropagation();}}
                          onBlur={function(e){var v=parseInt(e.target.value)||0;setRollOverrides(function(prev){var n={};Object.keys(prev).forEach(function(k){n[k]=prev[k];});n[i+"_"+ri]=v;return n;});setEditingF05(null);}}
                          onKeyDown={function(e){if(e.key==="Enter")e.target.blur();if(e.key==="Escape")setEditingF05(null);}}/>
                      :effSize?<div>
                        <div style={{fontWeight:800}}>{effSize}{isOverridden2?React.createElement("span",{style:{fontSize:8,color:"#7c3aed",marginLeft:2}},"✎"):null}</div>
                        {origRoll&&origRoll.bareMat&&origRoll.bareMat!==row.material&&(
                          <div style={{fontSize:9,color:"#92400e",fontWeight:600,marginTop:1}}>({origRoll.bareMat.replace("3FG-G","")})</div>
                        )}
                      </div>:"—"}
                    </td>;
                  })}
                  <td style={{...TD,textAlign:"center",background:"#fef9c3",fontWeight:700,color:"#92400e"}}>
                    {getF05Offcut(i)>0?getF05Offcut(i):"—"}
                  </td>
                  <td style={{...TD,textAlign:"center",fontWeight:700,color:getF05Trim(i)>500?"#991b1b":C.text}}>{getF05Trim(i)}</td>
                  <td style={{...TD,textAlign:"center",fontWeight:700}}>{row.jumboWidth}</td>
                  <td style={{...TD,textAlign:"center",fontWeight:800,fontSize:12,background:"#f0f4ff",color:(function(){var rs2=0;for(var rk=0;rk<4;rk++){rs2+=getF05Roll(i,rk);}var pct2=rs2/(row.jumboWidth||10450)*100;return pct2>=95?"#15803d":pct2>=88?"#92400e":"#991b1b";})()}}>
                    {(function(){var rs2=0;for(var rk=0;rk<4;rk++){rs2+=getF05Roll(i,rk);}return(rs2/(row.jumboWidth||10450)*100).toFixed(1);})()}%
                  </td>
                  <td style={{...TD,fontSize:11,fontWeight:700}}>
                    {[...new Set((row.rolls||[]).map(r=>r&&r.customer||""))].filter(Boolean).join(" / ")||"DOMESTIC"}
                  </td>
                  <td style={{...TD,fontSize:11,color:C.navy,fontWeight:700}}>{planNo}</td>
                </tr>
                {/* Core size row */}
                <tr style={{background:i%2?"#f7f9fc":"#fff",borderBottom:"2px solid #dde3ed"}}>
                  <td style={{...TD,fontSize:10,color:C.textLt,paddingTop:2,paddingBottom:6}} colSpan={2}></td>
                  {[0,1,2,3].map(ri=>(
                    <td key={ri} style={{...TD,textAlign:"center",fontSize:10,fontWeight:700,color:C.textMd,paddingTop:2,paddingBottom:6}}>
                      {row.rolls[ri]?<span style={{background:row.rolls[ri].coreId===8?"#eff6ff":"#f0fdf4",color:row.rolls[ri].coreId===8?"#1e40af":"#15803d",padding:"1px 7px",borderRadius:6,fontSize:10,fontWeight:800}}>{row.rolls[ri].coreId}" Core</span>:""}
                    </td>
                  ))}
                  <td colSpan={6} style={{...TD,paddingTop:2,paddingBottom:6}}></td>
                </tr>
              </React.Fragment>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── F/05 PRIMARY SLIT TRACKER ───────────────────────────────────────────────
function F05Tracker(){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [expanded,setExpanded]=useState(null);
  const [saving,setSaving]=useState({});
  const [planFilter,setPlanFilter]=useState("");

  useEffect(function(){
    var unsub=fbWatchF05Tracking(function(data){setRows(data);setLoading(false);});
    return function(){if(unsub)unsub();};
  },[]);

  // Group by plan
  var plans=useMemo(function(){
    var map={};
    rows.forEach(function(r){
      var key=r.f05No||r.planId||"unknown";
      if(!map[key])map[key]={f05No:r.f05No,planId:r.planId,rows:[],received:0,total:0};
      map[key].rows.push(r);
      var rollCount=r.rolls?r.rolls.length:0;
      var recCount=r.rolls?r.rolls.filter(function(rl){return rl.received;}).length:0;
      map[key].total+=rollCount;
      map[key].received+=recCount;
    });
    return Object.values(map).sort(function(a,b){return(b.rows[0]&&b.rows[0].createdAt||"").localeCompare(a.rows[0]&&a.rows[0].createdAt||"");});
  },[rows]);

  var filtered=planFilter?plans.filter(function(p){return p.f05No===planFilter;}):plans;
  var allF05Nos=[...new Set(plans.map(function(p){return p.f05No;}))].filter(Boolean);

  var markRollReceived=async function(doc,rollIdx){
    var key=doc.id+"_r"+rollIdx;
    setSaving(function(v){var n={};for(var k in v)n[k]=v[k];n[key]=true;return n;});
    try{
      var newRolls=doc.rolls.map(function(rl,i){
        if(i===rollIdx)return Object.assign({},rl,{received:!rl.received,receivedAt:rl.received?null:new Date().toISOString()});
        return rl;
      });
      var allRec=newRolls.every(function(rl){return rl.received;});
      await fbUpdateF05Roll(doc.id,newRolls,allRec);
    }catch(e){alert("Error: "+e.message);}
    finally{setSaving(function(v){var n={};for(var k in v)n[k]=v[k];n[key]=false;return n;});}
  };

  var markAllReceived=async function(doc,val){
    var key=doc.id+"_all";
    setSaving(function(v){var n={};for(var k in v)n[k]=v[k];n[key]=true;return n;});
    try{
      var newRolls=doc.rolls.map(function(rl){
        return Object.assign({},rl,{received:val,receivedAt:val?new Date().toISOString():null});
      });
      await fbUpdateF05Roll(doc.id,newRolls,val);
    }catch(e){alert("Error: "+e.message);}
    finally{setSaving(function(v){var n={};for(var k in v)n[k]=v[k];n[key]=false;return n;});}
  };

  if(loading)return <div style={{padding:40,textAlign:"center"}}><Spin color={C.accent} size={28}/></div>;
  if(!rows.length)return <div style={{...card({textAlign:"center",padding:48})}}>
    <div style={{fontSize:48,marginBottom:12}}>✂️</div>
    <div style={{fontWeight:700,color:C.navy,fontSize:16}}>No F/05 plans saved yet</div>
    <div style={{fontSize:13,color:C.textMd,marginTop:6}}>Generate a plan and Save — F/05 tracking appears here</div>
  </div>;

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <h1 style={{fontSize:20,fontWeight:800,color:C.navy,marginBottom:4}}>F/05 Primary Slit Tracker</h1>
      <p style={{fontSize:13,color:C.textMd,marginBottom:14}}>Track each roll received from primary slitter · Tick per roll or per jumbo · Live sync</p>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <select value={planFilter} onChange={function(e){setPlanFilter(e.target.value);}} style={{...inp({maxWidth:200,minHeight:38})}}>
          <option value="">All F/05 Plans</option>
          {allF05Nos.map(function(n){return <option key={n} value={n}>{n}</option>;})}
        </select>
      </div>
      {filtered.map(function(plan){
        var pct=plan.total>0?Math.round(plan.received/plan.total*100):0;
        return(
          <div key={plan.f05No||plan.planId} style={{...card({marginBottom:14,padding:0,overflow:"hidden"})}}>
            <div style={{padding:"12px 16px",background:pct===100?"#f0fdf4":"#fff",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div style={{fontWeight:800,fontSize:16,color:C.navy}}>{plan.f05No||"—"}</div>
              <div style={{fontSize:12,color:C.textMd}}>{plan.rows.length} jumbos</div>
              <div style={{flex:1}}/>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:800,color:pct===100?C.green:pct>0?"#1e40af":C.textLt}}>{plan.received}/{plan.total}</div>
                <div style={{fontSize:10,color:C.textMd}}>rolls received</div>
              </div>
              <div style={{width:80,height:8,background:"#f1f5f9",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:8,background:pct===100?C.green:"#1d4ed8",width:pct+"%",transition:"width .3s"}}/>
              </div>
            </div>

            {/* Jumbo rows */}
            {plan.rows.map(function(doc){
              var isExp=expanded===doc.id;
              var docRolls=doc.rolls||[];
              var recCount=docRolls.filter(function(rl){return rl.received;}).length;
              var allDone=recCount===docRolls.length&&docRolls.length>0;
              return(
                <div key={doc.id} style={{borderTop:"1px solid "+C.border}}>
                  <div onClick={function(){setExpanded(isExp?null:doc.id);}} style={{padding:"10px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",background:allDone?"#f0fdf4":"#fff"}}>
                    <div style={{width:8,height:8,borderRadius:4,background:allDone?C.green:recCount>0?"#1d4ed8":"#e2e8f0"}}/>
                    <div style={{fontWeight:700,color:C.navy,fontSize:12,minWidth:140}}>{doc.material}</div>
                    <div style={{fontSize:11,color:C.textMd}}>{doc.length}m</div>
                    <div style={{display:"flex",gap:6}}>
                      {docRolls.map(function(rl,ri){
                        return <span key={ri} style={{background:rl.received?"#f0fdf4":"#f8fafc",border:"1px solid "+(rl.received?"#86efac":"#dde3ed"),borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:700,color:rl.received?C.green:C.navy}}>
                          {rl.received?"✅ ":""}{rl.size}mm
                        </span>;
                      })}
                    </div>
                    <div style={{flex:1}}/>
                    <span style={{fontSize:11,color:C.textMd}}>{recCount}/{docRolls.length}</span>
                    <span style={{fontSize:11,color:C.textLt}}>{isExp?"▲":"▼"}</span>
                  </div>

                  {isExp&&(
                    <div style={{padding:"10px 16px",background:"#f8fafc",borderTop:"1px solid "+C.border}}>
                      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                        {!allDone&&<button onClick={function(){markAllReceived(doc,true);}} disabled={!!saving[doc.id+"_all"]} style={{...btn(C.green,"#fff",{padding:"6px 14px",fontSize:11})}}>
                          {saving[doc.id+"_all"]?<Spin size={11} color="#fff"/>:"✅ All Rolls Received"}
                        </button>}
                        {allDone&&<button onClick={function(){markAllReceived(doc,false);}} style={{...btn("#fef2f2","#991b1b",{padding:"6px 14px",fontSize:11,border:"1px solid #fca5a5"})}}>↩ Undo All</button>}
                      </div>
                      {docRolls.map(function(rl,ri){
                        var sKey=doc.id+"_r"+ri;
                        var isSaving=!!saving[sKey];
                        return(
                          <div key={ri} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid #e2e8f0"}}>
                            <div style={{width:35,fontWeight:800,fontSize:13,color:rl.received?C.green:C.navy}}>R{ri+1}</div>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:700,fontSize:14,color:C.navy}}>{rl.size}mm</div>
                              <div style={{fontSize:11,color:C.textMd}}>{rl.customer||"—"} · {rl.machine||"—"} · Core: {rl.coreId||"6"}"</div>
                            </div>
                            {rl.received&&rl.receivedAt&&<div style={{fontSize:10,color:C.green}}>{fmtDateShort(rl.receivedAt)}</div>}
                            <button onClick={function(){markRollReceived(doc,ri);}} disabled={isSaving}
                              style={{...btn(rl.received?"#fef2f2":C.green,rl.received?"#991b1b":"#fff",{padding:"7px 14px",fontSize:12,border:rl.received?"1px solid #fca5a5":"none"})}}>
                              {isSaving?<Spin size={11} color={rl.received?"#991b1b":"#fff"}/>:rl.received?"↩ Undo":"✅ Received"}
                            </button>
                          </div>
                        );
                      })}
                      {doc.offcut>0&&(
                        <div style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid #e2e8f0"}}>
                          <div style={{width:35,fontWeight:800,fontSize:13,color:"#92400e"}}>5G</div>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:700,fontSize:14,color:"#92400e"}}>{doc.offcut}mm <span style={{fontSize:10,fontWeight:600}}>Grade 5 offcut</span></div>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}
