          {tab==="metseq"&&(
            <div style={{animation:"fadeIn .3s ease"}}>
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:18,flexWrap:"wrap"}}>
                <div><h1 style={{fontSize:22,fontWeight:800,color:C.navy,marginBottom:3}}>Metallization Sequence</h1><p style={{fontSize:14,color:"#4b5a6e"}}>Boat-life optimized · Editable · Re-orderable</p></div>
              </div>
              <div style={{...card({background:"#f5f3ff",borderColor:"#c4b5fd",marginBottom:14,padding:14})}}>
                <div style={{fontWeight:800,color:"#4c1d95",marginBottom:9}}>Boat Life Rules · Target {fmtNum(cfg.boatTarget)} m/set</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {[{l:"First run MUST be 2.2 OD"},{l:`2.2 OD max ${cfg.boatCap22} runs/set`},{l:`2.5 OD max ${cfg.boatCap25} runs/set`},{l:`2.8 OD max ${cfg.boatCap28} runs/set`}].map((r,i)=>(
                    <div key={i} style={{background:"#fff",border:"1px solid #e9d5ff",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:700,color:"#5b21b6"}}>{r.l}</div>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:0,borderBottom:"2px solid #dde3ed",marginBottom:12}}>
                {["M-1","M-2"].map(m=>{const mr=metPlan.filter(r=>r.machine===m);return(
                  <button key={m} onClick={()=>setMetView(m)} style={{background:metView===m?"#fff":"transparent",border:`1px solid ${metView===m?"#dde3ed":"transparent"}`,borderBottom:"none",padding:"10px 22px",fontSize:14,fontWeight:700,cursor:"pointer",color:metView===m?C.navy:"#4b5a6e",borderRadius:"9px 9px 0 0",marginBottom:-2}}>
                    {m} · {mr.length} runs
                  </button>
                );})}
                {user.role!=="viewer"&&<button onClick={()=>setMetPlan(p=>[...p,{id:uid(),machine:metView,setNo:1,slotNo:p.filter(r=>r.machine===metView).length+1,odType:"22",bareMat:"",batch:"",width:"",length:"",thickness:"",outputMat:"",customers:"",jumboWidth:"",arms:[],cumMeters:0,notes:""}])} style={{...btn(C.accent,"#fff",{padding:"5px 12px",fontSize:11,marginLeft:"auto",marginBottom:4})}}>+ Run</button>}
              </div>
              {boatSets.length===0
                ?<div style={{...card({textAlign:"center",color:"#4b5a6e",padding:40})}}>No {metView} runs. Go to Plan Builder and generate a plan first.</div>
                :boatSets.map(set=>{
                  const pct=Math.min(100,(set.maxMeters/cfg.boatTarget)*100),over=set.maxMeters>cfg.boatTarget,vOK=(set.rows[0] && set.rows[0].odType)==="22",sk=metView+"_"+set.no,isE=expandedSet[sk]!==false;
                  return(
                    <div key={set.no} style={{...card({marginBottom:14,borderColor:vOK?"#bfdbfe":"#fca5a5",borderWidth:2})}}>
                      <div onClick={()=>setExpanded(e=>({...e,[sk]:!isE}))} style={{display:"flex",alignItems:"center",gap:10,marginBottom:isE?12:0,cursor:"pointer",flexWrap:"wrap"}}>
                        <div style={{background:vOK?C.navy:C.red,color:"#fff",borderRadius:7,padding:"6px 14px",fontWeight:800,fontSize:14}}>Set {set.no}</div>
                        <div style={{display:"flex",gap:5,flex:1,flexWrap:"wrap"}}>
                          {set.rows.map(r=>{const os=OD_STYLE[r.odType]||OD_STYLE["??"];return<span key={r.id} style={{background:os.bg,color:os.text,border:`1px solid ${os.border}`,padding:"3px 9px",borderRadius:18,fontSize:11,fontWeight:700}}>{os.label}</span>;})}
                        </div>
                        <div style={{textAlign:"right",marginLeft:"auto"}}>
                          <div style={{fontSize:13,fontWeight:700,color:over?C.red:"#1e40af"}}>{fmtNum(set.maxMeters)} / {fmtNum(cfg.boatTarget)} m</div>
                          <div style={{fontSize:11,color:"#94a3b8"}}>{set.rows.length} runs</div>
                        </div>
                      </div>
                      {!vOK&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",color:C.red,padding:"6px 12px",borderRadius:7,fontSize:12,fontWeight:700,marginBottom:isE?12:6}}>⚠ First run is NOT 2.2 OD — boat damage risk!</div>}
                      {isE&&<>
                        <div style={{background:"#f1f5f9",borderRadius:4,height:7,marginBottom:12,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:over?"#dc2626":pct>90?"#f59e0b":"#22c55e",borderRadius:4}}/></div>
                        <div style={{overflowX:"auto",borderRadius:9,border:"1px solid #dde3ed"}}>
                          <table style={{width:"100%",background:"#fff",minWidth:700}}>
                            <thead><tr>{["Slot","OD","Bare Material","Batch","Width","Length","µ","Arms","Output","Customers","Cum.m","⚙"].map(h=><th key={h} style={{...TH,padding:"7px 9px"}}>{h}</th>)}</tr></thead>
                            <tbody>{set.rows.map((r,ri)=>{const os=OD_STYLE[r.odType]||OD_STYLE["??"],isF=ri===0;return(
                              <tr key={r.id} className="pprow" style={{background:isF?"#fffbeb":ri%2?"#f7f9fc":"#fff"}}>
                                <td style={{...TD,fontWeight:800,color:C.navy,textAlign:"center"}}>{isF?"🚩":""}{r.slotNo}</td>
                                <td style={{...TD,width:80}}><select value={r.odType} disabled={user.role==="viewer"} onChange={e=>updMet(r.id,"odType",e.target.value)} style={{background:os.bg,color:os.text,border:`1px solid ${os.border}`,borderRadius:5,padding:"3px 6px",fontSize:11,fontWeight:700,fontFamily:"inherit"}}><option value="22">2.2 OD</option><option value="25">2.5 OD</option><option value="28">2.8 OD</option></select></td>
                                {["bareMat","batch"].map(k=>(
                                  <td key={k} style={{...TD,padding:"5px 7px"}}><input value={r[k]||(r.bare && r.bare.Material)||(r.bare && r.bare.Batch)||""} readOnly={user.role==="viewer"} onChange={e=>updMet(r.id,k,e.target.value)} className="ppec" style={{fontFamily:"monospace",fontSize:13}}/></td>
                                ))}
                                <td style={{...TD,fontWeight:700,color:C.accent}}>{r.jumboWidth||r.width}mm</td>
                                <td style={TD}>{(r.bare && r.bare.Length)||r.length||"—"}</td>
                                <td style={{...TD,fontWeight:700}}>{r.thickness}µ</td>
                                <td style={{...TD,fontSize:11}}>{(r.arms||[]).filter(Boolean).join("+")}+{r.trim||"?"}T</td>
                                <td style={{...TD,padding:"5px 7px"}}><input value={r.outputMat||""} readOnly={user.role==="viewer"} onChange={e=>updMet(r.id,"outputMat",e.target.value)} className="ppec" style={{fontFamily:"monospace",fontSize:13}}/></td>
                                <td style={{...TD,fontSize:11,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.customers}</td>
                                <td style={{...TD,fontWeight:700,color:"#1e40af"}}>{fmtNum(r.cumMeters)}</td>
                                <td style={{...TD,width:90}}>{user.role!=="viewer"&&<div style={{display:"flex",gap:4}}>
                                  <button onClick={()=>moveMet(r.id,-1)} style={{...btn("#eff6ff",C.accent,{padding:"3px 7px",fontSize:11,minHeight:0})}}>↑</button>
                                  <button onClick={()=>moveMet(r.id,1)} style={{...btn("#eff6ff",C.accent,{padding:"3px 7px",fontSize:11,minHeight:0})}}>↓</button>
                                  <button onClick={()=>setMetPlan(p=>p.filter(x=>x.id!==r.id))} style={{...btn("#fef2f2",C.red,{padding:"3px 7px",fontSize:11,minHeight:0,border:"1px solid #fca5a5"})}}>✕</button>
                                </div>}</td>
                              </tr>
                            );})}
                            </tbody>
                          </table>
                        </div>
                      </>}
                    </div>
                  );
                })}
              {boatSets.length>0&&<div style={{background:C.navy,borderRadius:9,padding:"11px 16px",display:"flex",gap:14,alignItems:"center",color:"#fff",flexWrap:"wrap"}}>
                {[{l:"RUNS",v:shownMet.length},{l:"SETS",v:boatSets.length},{l:"METERS",v:fmtNum(shownMet.reduce((s,r)=>s+toInt(r.length||(r.bare && r.bare.Length)||0),0))}].map(c=>(
                  <span key={c.l}><span style={{color:"rgba(255,255,255,.32)",fontSize:11}}>{c.l}: </span><span style={{fontWeight:800}}>{c.v}</span></span>
                ))}
              </div>}
            </div>
          )}

          {/* ── HISTORY TAB ── */}
          {tab==="history"&&(
            <div style={{animation:"fadeIn .3s ease"}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:12}}>
                <div>
                  <h1 style={{fontSize:22,fontWeight:800,color:C.navy,marginBottom:4}}>Plan History</h1>
                  <p style={{fontSize:14,color:"#4b5a6e"}}>All generated plans · Search & trace any order</p>
                </div>
                <button onClick={function(){
                  setHistLoading(true);setHistSearch("");setHistSearchField("all");
                  fbGetPlans(50).then(function(plans){setPlanHistory(plans);setHistLoading(false);}).catch(function(e){console.warn(e);setHistLoading(false);});
                }} style={{...btn(C.accent,"#fff",{padding:"10px 20px"})}}>↻ Refresh</button>
              </div>

              {/* Search filter buttons */}
              <div style={{...card({marginBottom:16,padding:14})}}>
                <div style={{fontSize:12,fontWeight:700,color:C.textMd,marginBottom:8}}>SEARCH BY:</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                  {[
                    {id:"all",label:"🔍 All Fields"},
                    {id:"customer",label:"🏢 Customer"},
                    {id:"width",label:"📏 Roll Size (mm)"},
                    {id:"od",label:"⚙ OD Type"},
                    {id:"order",label:"📋 Order No."},
                    {id:"lineitem",label:"📝 Line Item"},
                  ].map(f=>(
                    <button key={f.id} onClick={function(){setHistSearchField(f.id);}} style={{...btn(histSearchField===f.id?C.navy:"#f1f5f9",histSearchField===f.id?"#fff":C.navy,{padding:"6px 14px",fontSize:12,border:"1px solid "+(histSearchField===f.id?C.navy:C.border),borderRadius:20})}}>
                      {f.label}
                    </button>
                  ))}
                </div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  <input value={histSearch} onChange={function(e){setHistSearch(e.target.value);}}
                    onKeyDown={function(e){if(e.key==="Enter"){
                      setHistLoading(true);
                      fbSearchOrder(histSearch.trim(),histSearchField).then(function(res){setPlanHistory(res);setHistLoading(false);}).catch(function(e2){console.warn(e2);setHistLoading(false);});
                    }}}
                    placeholder={histSearchField==="customer"?"Enter customer name…":histSearchField==="width"?"Enter roll width e.g. 1030…":histSearchField==="od"?"Enter OD e.g. M22, M25, M28…":histSearchField==="order"?"Enter sales order number…":histSearchField==="lineitem"?"Enter order-lineitem e.g. 12345-10…":"Search anything…"}
                    style={{...inp({flex:1,minWidth:200})}}/>
                  <button onClick={function(){
                    setHistLoading(true);
                    fbSearchOrder(histSearch.trim(),histSearchField).then(function(res){setPlanHistory(res);setHistLoading(false);}).catch(function(e2){console.warn(e2);setHistLoading(false);});
                  }} style={{...btn(C.navy,"#fff",{padding:"10px 20px"})}}>🔍 Search</button>
                </div>
              </div>

              {histLoading&&<div style={{padding:40,textAlign:"center"}}><Spin color={C.accent} size={28}/><div style={{marginTop:10,fontSize:13,color:C.textMd}}>Loading plans…</div></div>}

              {!histLoading&&planHistory.length===0&&(
                <div style={{...card({textAlign:"center",padding:40})}}>
                  <div style={{fontSize:44,marginBottom:10}}>📋</div>
                  <div style={{fontWeight:700,color:C.navy,fontSize:16}}>{histSearch?"No plans match your search":"No plans yet"}</div>
                  <div style={{fontSize:13,color:C.textMd,marginTop:6}}>{histSearch?"Try a different search term or clear filters":"Generate a plan from MET/F/04 tab — it will auto-save here"}</div>
                </div>
              )}

              {!histLoading&&planHistory.length>0&&(
                <div style={{overflowX:"auto",borderRadius:9,border:"1px solid "+C.border}}>
                  <table style={{width:"100%",background:"#fff",minWidth:900}}>
                    <thead><tr>
                      {["#","Date","F/04 Plan","F/05 Plan","Runs","Machine","Created By","Customers","Widths (mm)","OD Types","Orders"].map(h=>(
                        <th key={h} style={{...TH,padding:"8px 10px"}}>{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>{planHistory.map(function(p,i){
                      return(
                        <tr key={p.id||i} className="pprow" style={{background:i%2?"#f7f9fc":"#fff"}}>
                          <td style={{...TD,textAlign:"center",fontWeight:700,width:36}}>{i+1}</td>
                          <td style={{...TD,fontSize:12,whiteSpace:"nowrap"}}>{fmtDate(p.createdAt)}</td>
                          <td style={{...TD,fontWeight:800,color:C.navy,whiteSpace:"nowrap"}}>{p.planNo||"—"}</td>
                          <td style={{...TD,fontWeight:800,color:"#14532d",whiteSpace:"nowrap"}}>{p.f05No||"—"}</td>
                          <td style={{...TD,textAlign:"center",fontWeight:700}}>{p.metRuns||0}</td>
                          <td style={{...TD,fontSize:12,whiteSpace:"nowrap"}}>{p.machine||"—"}</td>
                          <td style={{...TD,fontSize:12}}>{p.createdBy||"—"}</td>
                          <td style={{...TD,fontSize:11,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(p.customers||[]).slice(0,3).join(", ")}{(p.customers||[]).length>3?" +"+((p.customers||[]).length-3):""}</td>
                          <td style={{...TD,fontSize:11}}>{(p.widths||[]).slice(0,4).join(", ")}{(p.widths||[]).length>4?" …":""}</td>
                          <td style={TD}>{(p.ods||[]).map(function(o){
                            const lbl=o==="M22"?"2.2":o==="M25"?"2.5":o==="M28"?"2.8":o;
                            const bg2=o==="M22"?"#f0fdf4":o==="M25"?"#eff6ff":"#fff7ed";
                            const c2=o==="M22"?"#15803d":o==="M25"?"#1e40af":"#92400e";
                            return <span key={o} style={{background:bg2,color:c2,padding:"2px 7px",borderRadius:10,fontSize:10,fontWeight:700,marginRight:3}}>{lbl} OD</span>;
                          })}</td>
                          <td style={{...TD,fontSize:11,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(p.orderNumbers||[]).slice(0,3).join(", ")}{(p.orderNumbers||[]).length>3?" +more":""}</td>
                        </tr>
                      );
                    })}</tbody>
                  </table>
                </div>
              )}

              {planHistory.length>0&&(
                <div style={{background:C.navy,borderRadius:9,padding:"11px 16px",display:"flex",gap:14,alignItems:"center",color:"#fff",flexWrap:"wrap",marginTop:12}}>
                  <span><span style={{color:"rgba(255,255,255,.32)",fontSize:11}}>PLANS: </span><span style={{fontWeight:800}}>{planHistory.length}</span></span>
                  {histSearch&&<span><span style={{color:"rgba(255,255,255,.32)",fontSize:11}}>SEARCH ({histSearchField.toUpperCase()}): </span><span style={{fontWeight:800}}>"{histSearch}"</span></span>}
                </div>
              )}
            </div>
          )}

          <div style={{textAlign:"center",padding:"14px 0 4px",fontSize:11,color:"#94a3b8",borderTop:"1px solid #dde3ed",marginTop:14}}>
            ⚡ Plan Power · Production Planning SaaS
          </div>
        </div>

        {!showChat&&<button className="pp-fab" onClick={()=>setShowChat(true)} title="AI Planning Assistant">⚡</button>}
        {toast&&<div className="pp-toast">{toast}</div>}
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
class ErrorBoundary extends React.Component{constructor(p){super(p);this.state={err:null};}static getDerivedStateFromError(e){return{err:e};}componentDidCatch(e){var el=document.getElementById('pp-err');if(el)el.innerHTML='<div style="background:#dc2626;color:#fff;padding:12px;border-radius:8px;margin-top:10px;font-size:13px">App Error: '+(e&&e.message?e.message:String(e))+'</div>';var sp=document.getElementById('pp-splash');if(sp)sp.style.display='flex';}render(){if(this.state.err)return null;return this.props.children;}}
root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
</body>
</html>
