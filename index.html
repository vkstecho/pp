function AdminUserCard({u,onApprove,onToggle,onExtend,onDelete}){
  const [showPwd,setShowPwd]=useState(false);
  const [resetPwd,setResetPwd]=useState("");
  const [showReset,setShowReset]=useState(false);
  const doAdminReset=async()=>{
    if(!resetPwd||resetPwd.length<6){alert("Min 6 chars");return;}
    await fbAdminResetPassword(u.uid,resetPwd);
    alert("Password updated!");setShowReset(false);setResetPwd("");
  };
  const deviceShort=String(u.device||"Unknown").slice(0,70);
  return(
    <div style={{...card({marginBottom:10,padding:14,border:!u.approved?`2px solid #fbbf24`:`1px solid ${C.border}`})}}>
      <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
        {u.facePhoto
          ?<img src={u.facePhoto} style={{width:56,height:56,borderRadius:28,objectFit:"cover",border:`2px solid ${u.approved?C.green:"#fbbf24"}`,flexShrink:0}}/>
          :<div style={{width:56,height:56,borderRadius:28,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:22,color:"#fff"}}>👤</div>
        }
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:14,color:C.navy}}>{u.name||"Unknown"}</div>
          <div style={{fontSize:12,color:C.textMd,marginTop:2}}>📞 {u.phone} · 🏭 {u.company}</div>
          <div style={{fontSize:11,color:C.textLt,marginTop:2}}>Joined: {fmtDate(u.createdAt)} · Trial: {trialDaysLeft(u.trialEnd)}d left</div>
          <div style={{fontSize:10,color:C.textLt,marginTop:2,wordBreak:"break-all"}}>💻 {deviceShort}{(u.device||"").length>70?"…":""}</div>
        </div>
        <div style={{flexShrink:0}}>
          {!u.approved&&<span style={{background:"#fef9c3",color:"#92400e",padding:"3px 10px",borderRadius:8,fontSize:11,fontWeight:700}}>⏳ Pending</span>}
          {u.approved&&<span style={{background:u.active?"#f0fdf4":"#fef2f2",color:u.active?"#15803d":"#991b1b",padding:"3px 10px",borderRadius:8,fontSize:11,fontWeight:700}}>{u.active?"✅ Active":"🔴 Off"}</span>}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,padding:"8px 10px",background:"#f8fafc",borderRadius:8,border:`1px solid ${C.border}`}}>
        <span style={{fontSize:11,color:C.textMd,fontWeight:700,minWidth:70}}>🔑 Password:</span>
        <span style={{fontSize:12,fontFamily:"monospace",color:C.navy,flex:1,letterSpacing:2}}>
          {showPwd?u.password||"—":"•".repeat(Math.min((u.password||"").length||8,12))}
        </span>
        <button onClick={()=>setShowPwd(s=>!s)} style={{...btn("#eff6ff",C.accent,{padding:"3px 10px",fontSize:11,border:"1px solid #bfdbfe"})}}>
          {showPwd?"Hide":"Show"}
        </button>
        <button onClick={()=>setShowReset(s=>!s)} style={{...btn("#fef9c3","#92400e",{padding:"3px 10px",fontSize:11,border:"1px solid #fbbf24"})}}>
          Reset
        </button>
      </div>
      {showReset&&<div style={{display:"flex",gap:8,marginTop:8}}>
        <input value={resetPwd} onChange={e=>setResetPwd(e.target.value)} placeholder="New password (min 6 chars)" type="password"
          style={{...inp({flex:1,padding:"7px 12px",fontSize:12})}}/>
        <button onClick={doAdminReset} style={{...btn(C.green,"#fff",{padding:"7px 14px",fontSize:12})}}>✓ Set</button>
        <button onClick={()=>setShowReset(false)} style={{...btn("#f1f5f9",C.textMd,{padding:"7px 10px",fontSize:12})}}>✕</button>
      </div>}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:10}}>
        {!u.approved&&<button onClick={()=>onApprove(u.uid)} style={{...btn(C.green,"#fff",{padding:"5px 12px",fontSize:12})}}>✅ Approve</button>}
        <button onClick={()=>onToggle(u.uid,u.active)} style={{...btn(u.active?"#fef2f2":"#f0fdf4",u.active?C.red:C.green,{padding:"5px 12px",fontSize:12,border:`1px solid ${u.active?C.redBd:C.greenBd}`})}}>
          {u.active?"Deactivate":"Activate"}
        </button>
        <button onClick={()=>onExtend(u.uid)} style={{...btn("#eff6ff",C.accent,{padding:"5px 12px",fontSize:12,border:"1px solid #bfdbfe"})}}>+30d Trial</button>
        <button onClick={()=>onDelete(u.uid,u.name)} style={{...btn("#fef2f2",C.red,{padding:"5px 12px",fontSize:12,border:`1px solid ${C.redBd}`})}}>✕ Delete</button>
      </div>
    </div>
  );
}

function AdminPanel({cfg,setCfg,onClose}){
  const [aTab,setATab]=useState("users");
  const [users,setUsers]=useState([]);
  const [loadingU,setLoadingU]=useState(false);
  const [uErr,setUErr]=useState("");
  const [selUser,setSelUser]=useState(null);
  const [search,setSearch]=useState("");
  const [lc,setLc]=useState({...DEFAULT_CONFIG,...cfg});
  const [saved,setSaved]=useState(false);

  const loadUsers=async()=>{setLoadingU(true);setUErr("");try{setUsers(await fbGetUsers());}catch(e){setUErr("Failed: "+e.message);}setLoadingU(false);};
  useEffect(()=>{if(aTab==="users")loadUsers();},[aTab]);

  const doDelete=async(uid,name)=>{if(!confirm(`Delete "${name}"?`))return;await fbDeleteUser(uid);setUsers(u=>u.filter(x=>x.uid!==uid));if(selUser?.uid===uid)setSelUser(null);};
  const doToggle=async(uid,cur)=>{await fbSetActive(uid,!cur);setUsers(u=>u.map(x=>x.uid===uid?{...x,active:!cur}:x));};
  const doApprove=async(uid)=>{await fbApproveUser(uid);setUsers(u=>u.map(x=>x.uid===uid?{...x,approved:true,active:true}:x));};
  const doExtend=async(uid)=>{await fbExtendTrial(uid);const ts=new Date();ts.setDate(ts.getDate()+30);setUsers(u=>u.map(x=>x.uid===uid?{...x,trialEnd:ts.toISOString()}:x));};

  const filt=users.filter(u=>{const q=search.toLowerCase();return!q||(u.name&&u.name.toLowerCase().includes(q))||(u.phone&&u.phone.includes(q))||(u.company&&u.company.toLowerCase().includes(q));});
  const upd=(k,v)=>setLc(c=>({...c,[k]:v}));
  const save=()=>{setCfg(lc);setSaved(true);setTimeout(()=>setSaved(false),2200);};

  const stats=[
    {l:"Total",v:users.length,c:C.navy},{l:"Active",v:users.filter(u=>u.active).length,c:C.green},
    {l:"Pending",v:users.filter(u=>!u.approved).length,c:"#d97706"},{l:"Expiring ≤7d",v:users.filter(u=>trialDaysLeft(u.trialEnd)<=7&&u.active).length,c:C.red},
  ];

  return(
    <div style={{position:"fixed",inset:0,zIndex:400,background:"rgba(10,20,45,.62)",display:"flex",alignItems:"center",justifyContent:"center",padding:12}}>
      <div style={{background:"#fff",borderRadius:18,width:"min(980px,100%)",maxHeight:"94vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 72px rgba(0,0,0,.38)",overflow:"hidden"}}>
        <div style={{background:C.navy,padding:"13px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
          <Logo size={28}/>
          <div><div style={{color:"#fff",fontWeight:800,fontSize:16}}>Admin Panel</div><div style={{color:"rgba(255,255,255,.35)",fontSize:11}}>Plan Power Management Console</div></div>
          <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={onClose} style={{...btn("rgba(255,255,255,.1)","rgba(255,255,255,.65)",{border:"1px solid rgba(255,255,255,.15)",padding:"7px 14px"})}}>✕ Close</button>
          </div>
        </div>
        <div style={{display:"flex",borderBottom:`2px solid ${C.border}`,background:"#f8fafc",flexShrink:0}}>
          {[{id:"users",icon:"👥",lbl:"Users"},{id:"settings",icon:"⚙",lbl:"Planning Rules"}].map(t=>(
            <button key={t.id} onClick={()=>setATab(t.id)} style={{background:"transparent",border:"none",borderBottom:aTab===t.id?`3px solid ${C.navy}`:"3px solid transparent",padding:"11px 22px",fontSize:13,fontWeight:700,cursor:"pointer",color:aTab===t.id?C.navy:C.textMd,display:"flex",alignItems:"center",gap:6,marginBottom:-2,fontFamily:"inherit"}}>
              {t.icon} {t.lbl}
            </button>
          ))}
        </div>
        <div style={{flex:1,overflow:"auto",padding:20}}>
          {aTab==="users"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
                {stats.map(s=><div key={s.l} style={{...card({textAlign:"center",padding:12})}}>
                  <div style={{fontSize:24,fontWeight:800,color:s.c}}>{s.v}</div>
                  <div style={{fontSize:11,color:C.textMd,fontWeight:700,marginTop:3}}>{s.l}</div>
                </div>)}
              </div>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, phone, company…" style={{...inp({flex:1,fontSize:12})}}/>
                <button onClick={loadUsers} style={{...btn("#eff6ff",C.accent,{padding:"6px 12px",border:`1px solid #bfdbfe`})}}>↻</button>
              </div>
              {loadingU&&<div style={{padding:32,textAlign:"center"}}><Spin color={C.accent} size={24}/></div>}
              {uErr&&<ErrBox msg={uErr}/>}
              {!loadingU&&filt.map((u)=>(
                <AdminUserCard key={u.uid} u={u}
                  onApprove={doApprove}
                  onToggle={doToggle}
                  onExtend={doExtend}
                  onDelete={doDelete}
                />
              ))}
            </div>
          )}
          {aTab==="settings"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div style={{gridColumn:"1/-1",background:C.navy,borderRadius:10,padding:"8px 14px",marginBottom:4}}>
                <span style={{color:"#fbbf24",fontWeight:800,fontSize:13}}>Machine & Trim Rules</span>
              </div>
              {[
                {l:"M-1 Min Width (mm)",k:"m1Min",t:"number"},{l:"M-1 Max Width (mm)",k:"m1Max",t:"number"},
                {l:"M-2 Min Width (mm)",k:"m2Min",t:"number"},{l:"M-2 Max Width (mm)",k:"m2Max",t:"number"},
                {l:"Max Arms Per Run",k:"maxArms",t:"number"},
                {l:"Trim Min 2.2 OD (mm)",k:"trimMinOD22",t:"number"},{l:"Trim Max (mm)",k:"trimMax",t:"number"},
                {l:"Trim Min 2.5 OD (mm)",k:"trimMinOD25",t:"number"},{l:"Trim Min 2.8 OD (mm)",k:"trimMinOD28",t:"number"},

                  <label style={lbl}>{f.l}</label>
                  <input type={f.t||"number"} value={lc[f.k]||""} onChange={e=>upd(f.k,f.t==="text"?e.target.value:Number(e.target.value))} style={inp()}/>
                </div>
              ))}
              <div style={{gridColumn:"1/-1",background:C.navy,borderRadius:10,padding:"8px 14px",marginBottom:4,marginTop:8}}>
                <span style={{color:"#fbbf24",fontWeight:800,fontSize:13}}>Boat Life & Production</span>
              </div>
              {[
                {l:"Boat Life M22 (m)",k:"boatLife22",t:"number"},{l:"Boat Life M25 (m)",k:"boatLife25",t:"number"},
                {l:"Boat Life M28 (m)",k:"boatLife28",t:"number"},
                {l:"Boat Target (m/set)",k:"boatTarget",t:"number"},{l:"MJ Stock Cap (KG)",k:"mjStockCap",t:"number"},
              ].map(f=>(
                <div key={f.k}>
                  <label style={lbl}>{f.l}</label>
                  <input type={f.t||"number"} value={lc[f.k]||""} onChange={e=>upd(f.k,Number(e.target.value))} style={inp()}/>
                </div>
              ))}
              <div style={{gridColumn:"1/-1",background:C.navy,borderRadius:10,padding:"8px 14px",marginBottom:4,marginTop:8}}>
                <span style={{color:"#fbbf24",fontWeight:800,fontSize:13}}>Plan Numbering</span>
              </div>
              {[

function RegisterScreen({onDone}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:"",phone:"",company:"",password:"",confirm:""});
  const [facePhoto,setFacePhoto]=useState(null);
  const [camOn,setCamOn]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [done,setDone]=useState(false);
  const videoRef=useRef(null);const canvasRef=useRef(null);const streamRef=useRef(null);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const startCam=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});streamRef.current=s;if(videoRef.current)videoRef.current.srcObject=s;setCamOn(true);}catch{setErr("Camera access denied.");}};
  const stopCam=()=>{streamRef.current?.getTracks().forEach(t=>t.stop());setCamOn(false);};
  const snap=()=>{const v=videoRef.current,c=canvasRef.current;if(!v||!c)return;c.width=v.videoWidth;c.height=v.videoHeight;c.getContext("2d").drawImage(v,0,0);setFacePhoto(c.toDataURL("image/jpeg",0.8));stopCam();};
  const submit=async()=>{
    setLoading(true);setErr("");
    try{await fbRegister(form.name,form.phone,form.company,form.password,facePhoto);setDone(true);}
    catch(e){setErr(e.message);}
    setLoading(false);
  };
  if(done)return(
    <div style={{textAlign:"center",padding:"10px 0"}}>
      <div style={{fontSize:44,marginBottom:12}}>🎉</div>
      <div style={{fontSize:20,fontWeight:800,color:C.navy,marginBottom:6}}>Registration Submitted!</div>

        {STEPS.map((s,i)=><div key={s} style={{flex:1,padding:"8px 4px",textAlign:"center",fontSize:11,fontWeight:700,background:step===i+1?C.navy:step>i+1?"#15803d":"#f8fafc",color:step>=i+1?"#fff":C.textLt,borderRight:i<2?`1px solid ${C.border}`:undefined}}>{step>i+1?"✓ ":""}{s}</div>)}
      </div>
      {step===1&&(
        <div>
          {[{l:"Full Name",k:"name",ph:"Your full name",t:"text"},{l:"Phone Number",k:"phone",ph:"10-digit mobile",t:"tel"},{l:"Company",k:"company",ph:"Company name",t:"text"},{l:"Password (6-15 chars)",k:"password",ph:"Min 6 characters",t:"password"},{l:"Confirm Password",k:"confirm",ph:"Re-enter",t:"password"}].map(f=>(
            <div key={f.k} style={{marginBottom:11}}><label style={lbl}>{f.l}</label><input type={f.t} value={form[f.k]} onChange={e=>upd(f.k,e.target.value)} placeholder={f.ph} style={inp()}/></div>
          ))}
          {err&&<ErrBox msg={err}/>}
          <button onClick={()=>{
            if(!form.name.trim()||!form.phone.trim()||!form.company.trim()||!form.password){setErr("All fields required.");return;}

            if(form.password.length<6||form.password.length>15){setErr("Password must be 6-15 characters.");return;}
            if(form.password!==form.confirm){setErr("Passwords don't match.");return;}

          }} style={{...btn(C.navy,"#fff",{width:"100%",padding:"12px",fontSize:14,marginTop:4})}}>Next: Take Face Photo →</button>
        </div>

          <div style={{position:"relative",width:180,height:180,borderRadius:90,margin:"0 auto 14px",overflow:"hidden",border:`3px solid ${facePhoto?"#15803d":C.border}`,background:"#f0f4f8"}}>

            <canvas ref={canvasRef} style={{display:"none"}}/>

          </div>

          {camOn&&<div style={{display:"flex",gap:8,justifyContent:"center"}}>

        </div>
      )}
    </div>
  );
}

function LoginScreen({onLogin}){
  const [tab,setTab]=useState("login");

  const [password,setPassword]=useState("");
  const [showPw,setShowPw]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [installable,setInstallable]=useState(null);
  // Forgot password flow
  const [forgotMode,setForgotMode]=useState(false);
  const [otpPhone,setOtpPhone]=useState("");
  const [otpSent,setOtpSent]=useState(false);
  const [otp,setOtp]=useState("");
  const [newPwd,setNewPwd]=useState("");
  const [fpLoading,setFpLoading]=useState(false);
  const [fpMsg,setFpMsg]=useState("");

  useEffect(()=>{window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();setInstallable(e);});},[]);
  const installPWA=()=>{if(installable)installable.prompt();};
  const doLogin=async()=>{
    setLoading(true);setErr("");
    try{const user=await fbLogin(phone,password);onLogin(user);}
    catch(e){setErr(e.message);}
    setLoading(false);
  };
  const doSendOTP=async()=>{
    if(!otpPhone){setFpMsg("Enter your registered phone number");return;}
    setFpLoading(true);setFpMsg("");
    try{
      // First check if phone exists
      const digits=otpPhone.replace(/[^0-9]/g,"");
      const ten=digits.length>10?digits.slice(-10):digits;
      if(ten.length!==10){setFpMsg("Enter valid 10-digit number");setFpLoading(false);return;}
      const snap=await getDB().collection("pp_users").where("phone","==",ten).get();
      if(snap.empty){setFpMsg("Number not registered in app.");setFpLoading(false);return;}
      const sentTo=await fbSendOTP(ten);
      setOtpSent(true);setFpMsg("✅ OTP sent to "+sentTo);
    }catch(e){setFpMsg("Error: "+e.message);}
    setFpLoading(false);
  };
  const doResetPwd=async()=>{
    if(!otp||!newPwd||newPwd.length<6){setFpMsg("Enter OTP and new password (min 6 chars)");return;}
    setFpLoading(true);setFpMsg("");
    try{
      await fbVerifyOTPAndReset(otp,newPwd);
      setFpMsg("Password reset successfully! Please login.");
      setTimeout(()=>{setForgotMode(false);setOtpSent(false);setOtp("");setNewPwd("");setFpMsg("");},2000);
    }catch(e){setFpMsg("Error: "+e.message);}

        <div style={{display:"flex",marginBottom:20,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
          {["login","register"].map(t=><button key={t} onClick={()=>{setTab(t);setErr("");}} style={{flex:1,padding:"9px",background:tab===t?C.navy:"#f8fafc",border:"none",cursor:"pointer",fontWeight:700,fontSize:13,color:tab===t?"#fff":C.textMd,fontFamily:"inherit"}}>{t==="login"?"Sign In":"Register"}</button>)}
        </div>
        {tab==="login"&&(
          <div>
            {!forgotMode?(
              <>
                <div style={{marginBottom:14}}>
                  <label style={lbl}>Phone Number</label>
                  <input type="tel" value={phone} onChange={e=>{setPhone(e.target.value);setErr("");}}
                    placeholder="10-digit mobile number" style={inp()} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
                </div>
                <div style={{marginBottom:14,position:"relative"}}>
                  <label style={lbl}>Password</label>
                  <input type={showPw?"text":"password"} value={password}
                    onChange={e=>{setPassword(e.target.value);setErr("");}}
                    placeholder="Your password" style={inp()} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
                  <button onClick={()=>setShowPw(s=>!s)} style={{position:"absolute",right:11,bottom:9,background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.textLt}}>
                    {showPw?"🙈":"👁"}
                  </button>
                </div>

                <button onClick={doLogin} disabled={loading} style={{...btn(!loading?C.navy:"#94a3b8","#fff",{width:"100%",padding:"13px",fontSize:15,fontWeight:700,marginBottom:10,borderRadius:10})}}>
                  {loading?<><Spin size={16}/>Signing in…</>:"Sign In →"}
                </button>
                <div style={{textAlign:"center"}}>
                  <button onClick={()=>{setForgotMode(true);setOtpPhone(phone);setFpMsg("");}} style={{background:"none",border:"none",color:C.accent,fontSize:12,cursor:"pointer",fontFamily:"inherit",textDecoration:"underline"}}>
                    Forgot password?
                  </button>
                </div>
              </>
            ):(
              <div>
                <div style={{fontWeight:700,fontSize:14,color:C.navy,marginBottom:14}}>🔑 Reset Password via OTP</div>
                {!otpSent?(
                  <>
                    <div style={{marginBottom:14}}>
                      <label style={lbl}>Registered Phone Number</label>
                      <input type="tel" value={otpPhone} onChange={e=>setOtpPhone(e.target.value)}
                        placeholder="10-digit number" style={inp()}/>
                    </div>
                    {fpMsg&&<div style={{fontSize:12,color:fpMsg.includes("Error")?"#991b1b":"#15803d",marginBottom:10,padding:"8px 12px",background:fpMsg.includes("Error")?"#fef2f2":"#f0fdf4",borderRadius:8}}>{fpMsg}</div>}
                    <button onClick={doSendOTP} disabled={fpLoading} style={{...btn(C.navy,"#fff",{width:"100%",padding:"12px",fontSize:14,fontWeight:700,borderRadius:10,marginBottom:8})}}>
                      {fpLoading?<><Spin size={14}/>Sending OTP…</>:"Send OTP →"}
                    </button>
                  </>
                ):(
                  <>
                    <div style={{marginBottom:12}}>
                      <label style={lbl}>Enter OTP (sent to your phone)</label>
                      <input type="number" value={otp} onChange={e=>setOtp(e.target.value)}
                        placeholder="6-digit OTP" style={inp()} maxLength={6}/>
                    </div>
                    <div style={{marginBottom:12}}>
                      <label style={lbl}>New Password (min 6 chars)</label>
                      <input type="password" value={newPwd} onChange={e=>setNewPwd(e.target.value)}
                        placeholder="New password" style={inp()}/>
                    </div>
                    {fpMsg&&<div style={{fontSize:12,color:fpMsg.includes("Error")?"#991b1b":"#15803d",marginBottom:10,padding:"8px 12px",background:fpMsg.includes("Error")?"#fef2f2":"#f0fdf4",borderRadius:8}}>{fpMsg}</div>}
                    <button onClick={doResetPwd} disabled={fpLoading} style={{...btn(C.green,"#fff",{width:"100%",padding:"12px",fontSize:14,fontWeight:700,borderRadius:10,marginBottom:8})}}>
                      {fpLoading?<><Spin size={14}/>Verifying…</>:"✅ Reset Password"}
                    </button>
                    <button onClick={doSendOTP} disabled={fpLoading} style={{...btn("#f1f5f9",C.textMd,{width:"100%",padding:"10px",fontSize:12,borderRadius:10,marginBottom:8,border:`1px solid ${C.border}`})}}>
                      Resend OTP
                    </button>
                  </>
                )}
                <button onClick={()=>{setForgotMode(false);setOtpSent(false);setOtp("");setNewPwd("");setFpMsg("");}} style={{...btn("#f1f5f9",C.textMd,{width:"100%",padding:"10px",fontSize:12,borderRadius:10,border:`1px solid ${C.border}`})}}>
                  ← Back to Login
                </button>
              </div>
            )}
          </div>
        )}
        {tab==="register"&&<RegisterScreen onDone={()=>{setTab("login");setPhone("");setPassword("");}}/>}
      </div>
      {installable&&<button onClick={installPWA} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:16,padding:"11px 28px",background:"linear-gradient(135deg,#1a305c,#0f1e3a)",border:"2px solid rgba(251,191,36,.4)",borderRadius:12,cursor:"pointer",color:"#fbbf24",fontWeight:800,fontSize:13,fontFamily:"inherit"}}>📲 Install Plan Power App</button>}
      <div style={{marginTop:12,fontSize:12,color:"rgba(255,255,255,.2)",textAlign:"center"}}>Plan Power v8 · 30-day free trial</div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("upload");
  const [data,setData]=useState({pen:[],mj:[],fgjm:[],bare:[]});
  const [cfg,setCfg]=useState({...DEFAULT_CONFIG});
  const [planResult,setPlanResult]=useState(null);
  const [generating,setGenerating]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [toast,setToast]=useState("");
  const [planSaved,setPlanSaved]=useState(false);
  const [machineMode,setMachineMode]=useState("auto");
  const [planId,setPlanId]=useState(null);
  const [showFeedback,setShowFeedback]=useState(false);
  const [suggestions,setSuggestions]=useState([]);

  useEffect(()=>{
    const splash=document.getElementById("pp-splash");
    setTimeout(()=>{if(splash)splash.classList.add("fade");setTimeout(()=>{if(splash)splash.style.display="none";},700);},600);
    // Load learning suggestions
    fbGetSuggestions().then(s=>{if(s.length>0)setSuggestions(s);}).catch(()=>{});
  },[]);
  // Keep window user ref updated for Firebase tracking
  useEffect(()=>{window._ppUser=user?.name||"unknown";},[user]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),3000);};

  const onUpload=(type,rows,fname)=>{
    setData(d=>({...d,[type]:rows}));
    showToast(`✓ ${fname} loaded as ${type.toUpperCase()}`);
    setPlanResult(null);setPlanSaved(false);
  };

  const generatePlan=useCallback(async(selection=null)=>{
    if(!data.pen.length){showToast("Upload PEN file first");return;}
    setGenerating(true);setPlanSaved(false);setPlanId(null);
    await new Promise(r=>setTimeout(r,100));
    try{
      let penData=data.pen;
      let priorityCustomers=[];
      // Handle new selection object {type,keys,customers,micron,od}
      const sel=selection||{};
      const selMicron=sel.micron||null;
      const selOD=sel.od||null;

      if(sel.type==="orders"&&sel.keys&&sel.keys.length>0){
        // Filter to only selected order keys
        penData=penData.filter(r=>{
          const k=`${r["Sales Order"]||""}-${r["Sale Order Item"]||""}`;
          return sel.keys.includes(k);
        });
      } else if(sel.type==="customers"&&sel.customers&&sel.customers.length>0){
        priorityCustomers=sel.customers;
      }
      // Apply micron and OD filters
      if(selMicron){penData=penData.filter(r=>toFloat(r.Thickness)===selMicron);}
      if(selOD){penData=penData.filter(r=>parseMat(r.Material||"").od===selOD);}

      const result=smartPlanV8(penData,data.bare,data.mj,data.fgjm,cfg,machineMode,priorityCustomers);
      setPlanResult(result);
      setTab("f04");
      showToast(`✓ Plan generated! ${selMicron?selMicron+"µ ":""}${selOD?selOD+" OD ":""}${result.planRows.length} runs`);
    }catch(e){showToast("Error: "+e.message);console.error(e);}
    setGenerating(false);
  },[data,cfg,machineMode]);

  const savePlan=async()=>{
    if(!planResult)return;
    try{
      const planData={
        planNo:cfg.nextPlanNo,f05No:cfg.nextBareNo,
        createdBy:user?.name||"Unknown",createdAt:new Date().toISOString(),
        machine:machineMode,metRuns:planResult.planRows.filter(r=>r.source==="BARE_FRESH").length,
        customers:[...new Set(planResult.planRows.map(r=>r.customers||"").filter(Boolean))],
        orderNumbers:[...new Set(planResult.planRows.flatMap(r=>(r.orders||[]).map(o=>String(o["Sales Order"]||""))).filter(Boolean))],
        mjBlocked:planResult.mjBlocked,mjTotalKg:planResult.mjTotalKg,
      };
      const docRef=await getDB().collection("pp_plans").add({...planData,createdAt:new Date().toISOString()});
      const newPlanId=docRef.id;
      setPlanId(newPlanId);
      // Save tracking for each met run
      const metRuns2=planResult.planRows.filter(r=>r.source==="BARE_FRESH"||r.source==="BARE").map((r,i)=>({...r,seqIndex:i}));
      if(metRuns2.length>0)await fbSavePlanTracking(newPlanId,metRuns2);
      setPlanSaved(true);showToast("✓ Plan saved — live tracking enabled!");
      setShowFeedback(true);// Ask feedback AFTER save
    }catch(e){showToast("Save failed: "+e.message);}
  };

  if(!user)return<LoginScreen onLogin={u=>{setUser(u);const splash=document.getElementById("pp-splash");if(splash)splash.style.display="none";}}/>;

  const isAdmin=user.role==="admin";
  const TABS=[
    {id:"upload",icon:"📂",label:"Upload"},
    {id:"analysis",icon:"📊",label:"Pendency"},
    {id:"f04",icon:"📋",label:"MET/F/04"},
    {id:"f05",icon:"📄",label:"MET/F/05"},
    {id:"sequence",icon:"⚡",label:"Sequence"},
    {id:"sfstock",icon:"🏭",label:"SF Stock"},
    {id:"archive",icon:"🗄️",label:"Archive"},
  ];

  const analysis={pend:data.pen.filter(r=>r.Material&&toFloat(r["Pending Rolls"])>0),totalKg:data.pen.reduce((s,o)=>s+toFloat(o["Pend. Prod."]),0)};

  const mjTotalKg=(data.mj||[]).filter(r=>r.Material&&r.Batch&&!parseMat(String(r.Material).replace("3SF-","3FG-")).isAL).reduce((s,r)=>s+toFloat(r.Weight),0);
  const mjAlert=mjTotalKg>(cfg.mjStockCap||7000);

  return(
    <>
      <style>{CSS}</style>
      <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
        {/* Top bar */}
        <div style={{background:C.navy,padding:"0 16px",display:"flex",alignItems:"center",gap:10,flexShrink:0,minHeight:52}}>
          <Logo size={28}/>
          <div style={{flex:1}}>
            <div style={{color:"#fff",fontWeight:800,fontSize:13,lineHeight:1}}>PLAN POWER <span style={{fontSize:10,background:"rgba(251,191,36,.2)",color:"#fbbf24",padding:"1px 6px",borderRadius:8,marginLeft:4}}>v8</span></div>
            <div style={{color:"rgba(255,255,255,.35)",fontSize:10}}>GLS Polyfilms · Met Dept</div>
          </div>
          {mjAlert&&<div style={{background:"#dc2626",color:"#fff",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,animation:"ppPulse 2s infinite"}}>MJ {(mjTotalKg/1000).toFixed(1)}MT ⚠️</div>}
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {isAdmin&&<button onClick={()=>setShowAdmin(true)} style={{...btn("rgba(251,191,36,.15)","#fbbf24",{padding:"5px 10px",fontSize:11,border:"1px solid rgba(251,191,36,.3)"})}}>⚙ Admin</button>}
            <div style={{background:"rgba(255,255,255,.08)",borderRadius:8,padding:"5px 10px",fontSize:11,color:"rgba(255,255,255,.6)"}}>{user.name}</div>
            <button onClick={()=>setUser(null)} style={{background:"none",border:"1px solid rgba(255,255,255,.15)",color:"rgba(255,255,255,.5)",borderRadius:7,padding:"5px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>Logout</button>
          </div>
        </div>
        {/* Tab bar */}
        <div style={{background:"#fff",borderBottom:`2px solid ${C.border}`,display:"flex",overflowX:"auto",flexShrink:0}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"11px 16px",background:"transparent",border:"none",borderBottom:tab===t.id?`3px solid ${C.navy}`:"3px solid transparent",cursor:"pointer",fontWeight:700,fontSize:12,color:tab===t.id?C.navy:C.textMd,display:"flex",alignItems:"center",gap:5,marginBottom:-2,whiteSpace:"nowrap",fontFamily:"inherit",flexShrink:0}}>
              {t.icon} {t.label}
              {t.id==="f04"&&planResult&&<span style={{background:C.navy,color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:10,marginLeft:4}}>{planResult.planRows.length}</span>}
            </button>
          ))}
        </div>
        {/* Main content */}
        <div style={{flex:1,overflowY:"auto",padding:16}}>

          {tab==="upload"&&(
            <div style={{animation:"fadeIn .3s ease"}}>
              <h1 style={{fontSize:22,fontWeight:800,color:C.navy,marginBottom:4}}>Smart Upload</h1>
              <p style={{fontSize:14,color:C.textMd,marginBottom:16}}>Upload PEN, MJ and STK (Stock) Excel files to generate production plan</p>

              {mjAlert&&<div style={{background:"#fef9c3",border:"1px solid #fbbf24",borderRadius:10,padding:"10px 16px",marginBottom:14}}>
                <div style={{fontWeight:800,color:"#92400e",fontSize:13}}>⚠️ MJ Stock High: {(mjTotalKg/1000).toFixed(2)} MT — Advisory only</div>
                <div style={{fontSize:12,color:"#92400e",marginTop:4}}>Cap is {((cfg.mjStockCap||7000)/1000).toFixed(0)} MT. Fresh met runs will still be suggested — planner decides.</div>
              </div>}

              <SmartUpload data={data} onUpload={onUpload}/>

              <div style={{display:"flex",gap:10,marginTop:16,flexWrap:"wrap",alignItems:"center"}}>
                <div>
                  <label style={lbl}>Machine Mode</label>
                  <select value={machineMode} onChange={e=>setMachineMode(e.target.value)} style={{...inp({width:"auto",minHeight:38})}}>
                    <option value="auto">Auto (Best Fit)</option>
                    <option value="M-1">M-1 Only</option>
                    <option value="M-2">M-2 Only</option>
                    <option value="both">Both</option>
                  </select>
                </div>
                <div style={{paddingTop:18}}>
                  <button onClick={()=>setTab("analysis")} disabled={!data.pen.length}
                    style={{...btn(data.pen.length?"linear-gradient(135deg,#1a305c,#1d4ed8)":"#94a3b8","#fff",{padding:"12px 24px",fontSize:14,fontWeight:700,borderRadius:10,cursor:data.pen.length?"pointer":"not-allowed"})}}>
                    📊 Analyse Pendency →
                  </button>
                </div>
                {planResult&&<div style={{color:C.green,fontWeight:700,fontSize:13,paddingTop:18}}>✓ Plan ready — {planResult.planRows.length} rows</div>}
              </div>

              {/* Stock summary */}
              {(data.pen.length>0||data.mj.length>0)&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10,marginTop:16}}>
                  {[
                    {l:"PEN Orders",v:data.pen.filter(r=>r.Material).length,sub:"pending orders",c:C.navy,bg:"#f0f4ff"},
                    {l:"MJ Rolls",v:data.mj.filter(r=>r.Material&&r.Batch).length,sub:`${(mjTotalKg/1000).toFixed(2)} MT`,c:mjAlert?C.red:"#1e40af",bg:mjAlert?"#fef2f2":"#eff6ff"},
                    {l:"FGM Rolls",v:data.fgjm.filter(r=>r.Material&&r.Batch).length,sub:"grade 5 stock",c:"#15803d",bg:"#f0fdf4"},
                    {l:"BARE Rolls",v:data.bare.filter(r=>r.Material&&r.Batch).length,sub:"ready to metallise",c:"#92400e",bg:"#fef9c3"},
                  ].map((s,i)=>(
                    <div key={i} style={{background:s.bg,borderRadius:12,padding:"13px 12px",border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:26,fontWeight:800,color:s.c,lineHeight:1}}>{s.v}</div>
                      <div style={{fontSize:12,color:C.textMd,fontWeight:700,marginTop:4}}>{s.l}</div>
                      <div style={{fontSize:11,color:C.textLt,marginTop:2}}>{s.sub}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {tab==="analysis"&&(
            data.pen.length>0
              ?<PendencyAnalysis pen={data.pen} mj={data.mj} fgjm={data.fgjm} bare={data.bare} cfg={cfg} onMakePlan={(sel)=>{generatePlan(sel);}}/>
              :<div style={{...card({textAlign:"center",padding:48})}}>
                <div style={{fontSize:48,marginBottom:12}}>📊</div>
                <div style={{fontWeight:700,color:C.navy,fontSize:16}}>Upload PEN file first</div>
                <div style={{fontSize:13,color:C.textMd,marginTop:6}}>Go to Upload tab and drop your SAP Excel files</div>
              </div>
          )}

          {tab==="f04"&&(
            <F04PlanView result={planResult} cfg={cfg} planNo={cfg.nextPlanNo} bareNo={cfg.nextBareNo} user={user} pen={data.pen} onSave={savePlan} saved={planSaved}/>
          )}

          {tab==="f05"&&(
            <F05PlanView f05Rows={planResult?.f05Rows} cfg={cfg} bareNo={cfg.nextBareNo} planNo={cfg.nextPlanNo}/>
          )}

          {tab==="sfstock"&&<SFStock/>}

          {tab==="sequence"&&(
            <MetSequence result={planResult} cfg={cfg} planId={planId} user={user}/>
          )}

          {tab==="archive"&&<PlanArchive/>}

        </div>
      </div>

      {showFeedback&&<FeedbackModal planId={planId||"local"} planNo={cfg.nextPlanNo} user={user} onClose={()=>setShowFeedback(false)}/>}

      {suggestions.length>0&&(
        <div style={{position:"fixed",bottom:96,left:16,zIndex:300,background:"#1a305c",borderRadius:12,padding:"10px 16px",maxWidth:360,boxShadow:"0 4px 20px rgba(0,0,0,.3)"}}>
          <div style={{color:"#fbbf24",fontWeight:800,fontSize:13,marginBottom:6}}>💡 Plan Power Suggestion</div>
          {suggestions.slice(0,1).map((s,i)=><div key={i} style={{color:"rgba(255,255,255,.8)",fontSize:12,marginBottom:6}}>{s.msg}</div>)}
          <div style={{display:"flex",gap:6,marginTop:8}}>
            <button onClick={()=>setSuggestions([])} style={{...btn("rgba(255,255,255,.1)","#fff",{padding:"5px 12px",fontSize:11})}}>Dismiss</button>
          </div>
        </div>
      )}

      {showAdmin&&<AdminPanel cfg={cfg} setCfg={c=>{setCfg(c);showToast("Rules saved!");}} onClose={()=>setShowAdmin(false)}/>}
      {toast&&<div className="pp-toast">{toast}</div>}
    </>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e){
    const el=document.getElementById('pp-err');
    if(el)el.innerHTML='<div style="background:#dc2626;color:#fff;padding:12px;border-radius:8px;margin-top:10px;font-size:13px">App Error: '+(e&&e.message?e.message:String(e))+'</div>';
    const sp=document.getElementById('pp-splash');if(sp)sp.style.display='flex';
  }
  render(){if(this.state.err)return null;return this.props.children;}
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
</body>
</html>
