async function fbLogin(phone,password){
  const db=getDB();
  const cleanPhone=phone.replace(/\D/g,"");
  const snap=await db.collection("pp_users").where("phone","==",cleanPhone).get();
  if(snap.empty)throw new Error("Incorrect phone number or password.");
  const docRef=snap.docs[0];
  const d=docRef.data();
  if(d.password!==password)throw new Error("Incorrect phone number or password.");
  if(!d.active)throw new Error("Your account is deactivated. Contact admin.");
  const now=new Date();
  if(d.trialEnd&&new Date(d.trialEnd)<now&&d.role!=="admin")throw new Error("Your trial has expired. Contact admin.");
  await docRef.ref.update({lastLogin:now.toISOString()});
  return{uid:docRef.id,name:d.name,phone:d.phone,company:d.company,
    role:d.role||"viewer",facePhoto:d.facePhoto||null,trialEnd:d.trialEnd||null};
}

  if(!trialStart)return 0;
  const start=new Date(trialStart);
  const end=new Date(start);end.setDate(end.getDate()+30);

  const diff=Math.ceil((end-now)/(1000*60*60*24));
  return diff>0?diff:0;

async function fbSearchOrder(query, field){
  const db=getDB();
  const snap=await db.collection("pp_plans").orderBy("createdAt","desc").limit(100).get();
  const all=snap.docs.map(d=>({id:d.id,...d.data()}));
  const q=String(query).toLowerCase().trim();
  if(!q) return all;
  return all.filter(p=>{
    if(!field||field==="all"){
      // Search across all fields
      if(String(p.planNo||"").toLowerCase().includes(q)) return true;
      if(String(p.f05No||"").toLowerCase().includes(q)) return true;
      if((p.orderNumbers||[]).some(o=>String(o).toLowerCase().includes(q))) return true;
      if((p.lineItems||[]).some(o=>String(o).toLowerCase().includes(q))) return true;
      if((p.customers||[]).some(o=>String(o).toLowerCase().includes(q))) return true;
      if((p.widths||[]).some(o=>String(o).includes(q))) return true;
      if((p.ods||[]).some(o=>String(o).toLowerCase().includes(q))) return true;
      return false;
    }
    if(field==="customer") return (p.customers||[]).some(o=>String(o).toLowerCase().includes(q));
    if(field==="width") return (p.widths||[]).some(o=>String(o).includes(q));
    if(field==="od") return (p.ods||[]).some(o=>String(o).toLowerCase().includes(q.replace(".","")));
    if(field==="order") return (p.orderNumbers||[]).some(o=>String(o).toLowerCase().includes(q));
    if(field==="lineitem") return (p.lineItems||[]).some(o=>String(o).toLowerCase().includes(q));
    return false;
  });
}

const toInt   = v => parseInt(String(v||"").replace(/[\s,]/g,""))||0;
const toFloat = v => parseFloat(String(v||"").replace(/,/g,"").replace(/[^\d.-]/g,""))||0;

function parseMat(raw){
  const s=String(raw||"").trim();
  return{od:(s.match(/M(22|25|28)$/)||[])[1]||null,thick:+((s.match(/G(\d{2})\d/)||[])[1]||0)||null,grade:(s.match(/G\d{2}(\d{3})/)||[])[1]||null,isAB:s.includes("AB")};
}
function canFill(stockRaw,orderRaw){
  const s=parseMat(String(stockRaw||"").replace(/^3SF/,"3FG")),o=parseMat(String(orderRaw||"").replace(/^3SF/,"3FG"));
  if(!s.thick||s.thick!==o.thick)return false;
  if(!(OD_COMPAT[o.od]||[o.od]).includes(s.od))return false;
  if(o.isAB&&!s.isAB)return false;
  return true;
}
async function readXL(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=e=>{try{const wb=_XLSX.read(e.target.result,{type:"array",cellDates:true});const rawRows=_XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:null,raw:true});
      const rows=rawRows.map(r=>{
        const clean={};
        Object.keys(r).forEach(k=>{
          const v=r[k];
          if(typeof v==="number"&&v>40000&&v<50000&&k.toLowerCase().includes("date")){
            const d=new Date(Date.UTC(1899,11,30));d.setDate(d.getDate()+Math.floor(v));
            clean[k]=d.toISOString().split("T")[0];
          } else {clean[k]=v;}
        });
        return clean;
      });
      res(rows);}catch(err){rej(err);}};
    fr.onerror=rej;fr.readAsArrayBuffer(file);
  });
}
function buildMetPlan(bareData,penData,cfg){
  const bare=bareData.filter(r=>r.Batch),pend=penData.filter(r=>r.Material&&toInt(r["Pending Rolls"])>0);
  const rows=bare.map(b=>{
    const bW=toInt(b.Width),bL=toInt(String(b.Length).replace(/\s/g,"")),bTh=toFloat(b.Thickness);
    const sv=pend.filter(o=>Math.abs(toFloat(o.Thickness)-bTh)<0.5);
    const odC={"22":0,"25":0,"28":0};
    sv.forEach(o=>{const p=parseMat(String(o.Material));if(p.od)odC[p.od]+=toInt(o["Pending Rolls"]);});
    const dom=(Object.entries(odC).sort((a,b)=>b[1]-a[1])[0]||["22"])[0];
    const m1ok=bW>=1910&&bW<=3290,m2ok=bW>=2900&&bW<=3630;
    return{id:uid(),machine:m1ok&&!m2ok?"M-1":!m1ok&&m2ok?"M-2":"M-1",m1ok,m2ok,setNo:1,slotNo:1,odType:dom,
      bareMat:String(b.Material||"").trim(),batch:String(b.Batch||"").trim(),width:bW,length:bL,thickness:bTh,
      outputMat:String(b.Material||"").replace("3FG-G","3SF-G").trim(),
      customers:[...new Set(sv.map(o=>String(o["Consignee Name"]||"").split(" ").slice(0,2).join(" ")))].join(", ")||"-",
      cumMeters:0,notes:"",priority:dom==="22"?0:dom==="25"?1:2};
  });
  ["M-1","M-2"].forEach(machine=>{
    const mr=rows.filter(r=>r.machine===machine);mr.sort((a,b)=>a.priority-b.priority);
    let sN=1,slN=1,cum=0,slots=0,cap={22:cfg.boatCap22,25:cfg.boatCap25,28:cfg.boatCap28}[(mr[0]&&mr[0].odType)||"22"]||5;
    mr.forEach((r,i)=>{
      if(i>0&&(slots>=cap||cum>=cfg.boatTarget)){sN++;slN=1;slots=0;cum=0;cap={22:cfg.boatCap22,25:cfg.boatCap25,28:cfg.boatCap28}[r.odType]||5;}
      r.setNo=sN;r.slotNo=slN;cum+=r.length;r.cumMeters=cum;slN++;slots++;
    });
  });
  return rows;
}

function ChatBot({analysis,metPlan,cfg,onClose}){
  const [msgs,setMsgs]=useState([{role:"assistant",text:`Hello! I am your Plan Power AI.\n\nOrders: ${(analysis && analysis.pend && analysis.pend.length)||0}\nRuns: ${(metPlan && metPlan.length)||0}\nBoat target: ${fmtNum(cfg.boatTarget)} m/set\n\nAsk me about your production plan!`}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{(endRef.current && endRef.current.scrollIntoView({behavior:"smooth"}));},[msgs]);
  const ctx=()=>[
    `You are Plan Power AI, expert planning assistant for Met Department.`,
    `Boat target: ${fmtNum(cfg.boatTarget)} m/set. 2.2OD max ${cfg.boatCap22} runs, 2.5OD max ${cfg.boatCap25}, 2.8OD max ${cfg.boatCap28}.`,
    `Trim max: ${cfg.trimMax}mm. M-1: 1910-3290mm, M-2: 2900-3630mm.`,
    analysis?`Data: ${analysis.pend.length} orders, ${(analysis.totalKg/1000).toFixed(1)}MT total.`:"No data loaded.",
    "Answer concisely."
  ].join("\n");
  const send=async()=>{
    if(!input.trim()||loading)return;
    const msg=input.trim();setInput("");
    setMsgs(m=>[...m,{role:"user",text:msg}]);setLoading(true);
    try{
      const hist=msgs.slice(-8).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:ctx(),messages:[...hist,{role:"user",content:msg}]})});
      const d=await res.json();
      setMsgs(m=>[...m,{role:"assistant",text:(d.content ? d.content.map(c=>c.text||"").join("") : "")||"No response."}]);
    }catch(_e){setMsgs(m=>[...m,{role:"assistant",text:"Connection error. Try again."}]);}
    setLoading(false);
  };
  const render=t=>t.split("\n").map((l,i)=><div key={i} style={{marginBottom:l?2:6}}>{l||"\u00a0"}</div>);
  const QUICK=["Boat life rules?","OD substitution rules?","M-1 vs M-2 width?","Trim tolerance?"];
  return(
    <div style={{position:"fixed",bottom:0,right:0,zIndex:500,display:"flex",flexDirection:"column",width:"min(400px,100vw)",height:"min(560px,90vh)",background:"#fff",border:"1.5px solid #dde3ed",borderRadius:"14px 0 0 0",boxShadow:"0 -4px 32px rgba(26,48,92,.22)"}}>
      <div style={{background:C.navy,padding:"12px 16px",borderRadius:"13px 0 0 0",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <Logo size={26}/>
        <div style={{flex:1}}><div style={{color:"#fff",fontWeight:800,fontSize:14}}>Plan Power AI</div><div style={{color:"rgba(255,255,255,.4)",fontSize:11}}>Planning Assistant</div></div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,.1)",border:"none",color:"#fff",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:16,fontWeight:800}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 13px",display:"flex",flexDirection:"column",gap:8}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:7,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="assistant"&&<div style={{width:24,height:24,borderRadius:12,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,color:"#fbbf24",fontWeight:800}}>P</div>}
            <div style={{maxWidth:"80%",padding:"8px 12px",borderRadius:m.role==="user"?"13px 13px 4px 13px":"13px 13px 13px 4px",background:m.role==="user"?C.accent:"#f1f5f9",color:m.role==="user"?"#fff":C.text,fontSize:13,lineHeight:1.55}}>{render(m.text)}</div>
          </div>
        ))}
        {loading&&<div style={{display:"flex",gap:7,alignItems:"center"}}><div style={{width:24,height:24,borderRadius:12,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fbbf24",fontWeight:800}}>P</div><div style={{padding:"8px 12px",background:"#f1f5f9",borderRadius:"13px 13px 13px 4px",display:"flex",gap:5}}>{[0,1,2].map(i=><span key={i} style={{width:6,height:6,borderRadius:3,background:"#94a3b8",display:"inline-block",animation:`bounce .9s ${i*.2}s infinite`}}/>)}</div></div>}
        <div ref={endRef}/>
      </div>
      {msgs.length<=1&&<div style={{padding:"4px 10px 6px",display:"flex",gap:5,flexWrap:"wrap"}}>{QUICK.map((q,i)=><button key={i} onClick={()=>setInput(q)} style={{background:C.accentLt,color:C.accent,border:"1px solid #bfdbfe",borderRadius:18,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>{q}</button>)}</div>}
      <div style={{display:"flex",gap:8,padding:"10px 12px",borderTop:"1px solid #dde3ed",flexShrink:0,background:"#fff"}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Ask about your plan…" style={{flex:1,background:"#f7f9fc",border:"1.5px solid #dde3ed",borderRadius:9,padding:"9px 12px",fontSize:13,color:"#1e2a3a",outline:"none",fontFamily:"inherit"}}/>
        <button onClick={send} disabled={loading||!input.trim()} style={{background:C.accent,color:"#fff",border:"none",borderRadius:9,padding:"9px 14px",cursor:"pointer",fontSize:14,fontWeight:700,opacity:loading||!input.trim()?0.5:1}}>➤</button>
      </div>
    </div>
  );

}

function RegisterScreen({onDone}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:"",phone:"",company:"",password:"",confirm:""});
  const [facePhoto,setFacePhoto]=useState(null);
  const [camOn,setCamOn]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const streamRef=useRef(null);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const startCam=async()=>{
    try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
      streamRef.current=s;if(videoRef.current)videoRef.current.srcObject=s;setCamOn(true);}
    catch{setErr("Camera access denied.");}
  };
  const stopCam=()=>{
    if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
    setCamOn(false);
  };
  const snap=()=>{
    const v=videoRef.current,c=canvasRef.current;if(!v||!c)return;
    c.width=v.videoWidth;c.height=v.videoHeight;
    c.getContext("2d").drawImage(v,0,0);
    setFacePhoto(c.toDataURL("image/jpeg",0.8));stopCam();
  };
  const submit=async()=>{
    setLoading(true);setErr("");
    try{await fbRegister(form.name,form.phone,form.company,form.password,facePhoto);setStep(3);}
    catch(e){setErr(e.message);}
    setLoading(false);
  };
  if(step===3)return(
    <div style={{textAlign:"center",padding:"10px 0"}}>
      <div style={{fontSize:44,marginBottom:12}}>🎉</div>
      <div style={{fontSize:20,fontWeight:800,color:C.navy,marginBottom:6}}>Registration Complete!</div>
      <div style={{fontSize:13,color:C.textMd,marginBottom:4,lineHeight:1.6}}>Your <strong>30-day free trial</strong> has started.<br/>Login with your phone number and password.</div>
      <button onClick={onDone} style={{...btn(C.navy,"#fff",{padding:"11px 30px",fontSize:14,marginTop:16})}}>Go to Login →</button>
    </div>
  );
  const STEPS=["Your Details","Face Photo","Done"];
  return(
    <div>
      <div style={{display:"flex",marginBottom:20,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
        {STEPS.map((s,i)=>(
          <div key={s} style={{flex:1,padding:"8px 4px",textAlign:"center",fontSize:11,fontWeight:700,
            background:step===i+1?C.navy:step>i+1?"#15803d":"#f8fafc",
            color:step>=i+1?"#fff":C.textLt,
            borderRight:i<2?`1px solid ${C.border}`:undefined}}>
            {step>i+1?"✓ ":""}{s}
          </div>
        ))}
      </div>

      {step===1&&(
        <div>
          {[{l:"Full Name",k:"name",ph:"Your full name",t:"text"},
            {l:"Phone Number",k:"phone",ph:"10-digit mobile number",t:"tel"},
            {l:"Company / Organisation",k:"company",ph:"Company name",t:"text"},
            {l:"Password",k:"password",ph:"Min 6 characters",t:"password"},
            {l:"Confirm Password",k:"confirm",ph:"Re-enter password",t:"password"},
          ].map(f=>(
            <div key={f.k} style={{marginBottom:11}}>
              <label style={lbl}>{f.l}</label>
              <input type={f.t} value={form[f.k]} onChange={e=>upd(f.k,e.target.value)}
                placeholder={f.ph} style={inp()}/>
            </div>
          ))}
          {err&&<ErrBox msg={err}/>}
          <button onClick={()=>{
            if(!form.name.trim()||!form.phone.trim()||!form.company.trim()||!form.password){setErr("All fields are required.");return;}
            if(form.phone.replace(/\D/g,"").length<10){setErr("Enter a valid 10-digit phone number.");return;}
            if(form.password.length<6){setErr("Password must be at least 6 characters.");return;}
            if(form.password!==form.confirm){setErr("Passwords do not match.");return;}
            setErr("");setStep(2);
          }} style={{...btn(C.navy,"#fff",{width:"100%",padding:"12px",fontSize:14,marginTop:4})}}>
            Next: Take Face Photo →
          </button>
        </div>
      )}

      {step===2&&(
        <div style={{textAlign:"center"}}>
          <p style={{fontSize:13,color:C.textMd,marginBottom:14,lineHeight:1.5}}>Take a clear selfie. This helps admin verify your identity.</p>
          <div style={{position:"relative",width:200,height:200,borderRadius:100,margin:"0 auto 14px",overflow:"hidden",
            border:`3px solid ${facePhoto?"#15803d":C.border}`,background:"#f0f4f8",flexShrink:0}}>
            <video ref={videoRef} autoPlay playsInline muted style={{width:200,height:200,objectFit:"cover",display:camOn?"block":"none"}}/>
            <canvas ref={canvasRef} style={{display:"none"}}/>
            {facePhoto&&<img src={facePhoto} style={{width:200,height:200,objectFit:"cover"}} alt="face"/>}
            {!camOn&&!facePhoto&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:C.textLt}}>
              <div style={{fontSize:44}}>📷</div><div style={{fontSize:12,marginTop:6}}>Camera preview</div>
            </div>}
          </div>
          {!facePhoto&&!camOn&&<button onClick={startCam} style={{...btn(C.navy,"#fff",{padding:"10px 24px"})}}>📷 Open Camera</button>}
          {camOn&&<div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <button onClick={snap} style={{...btn("#15803d","#fff",{padding:"10px 22px"})}}>📸 Take Photo</button>
            <button onClick={stopCam} style={{...btn("#94a3b8","#fff",{padding:"10px 14px"})}}>✕</button>
          </div>}
          {facePhoto&&<div>
            <div style={{color:"#15803d",fontWeight:700,marginBottom:12}}>✓ Photo captured!</div>
            <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
              <button onClick={()=>{setFacePhoto(null);setTimeout(startCam,100);}} style={{...btn("#f1f5f9",C.textMd,{border:`1px solid ${C.border}`})}}>↺ Retake</button>
              <button onClick={submit} disabled={loading} style={{...btn(C.navy,"#fff",{padding:"10px 22px"})}}>
                {loading?<><Spin size={16}/>Registering...</>:"✓ Complete Registration"}
              </button>
            </div>
          </div>}
          {err&&<ErrBox msg={err}/>}
          <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:C.textMd,cursor:"pointer",fontSize:13,marginTop:12,display:"block",margin:"14px auto 0"}}>← Back to Details</button>
        </div>
      )}
    </div>
  );
}

function AdminPanel({cfg,setCfg,onClose}){
  const [aTab,setATab]=useState("users");
  const [users,setUsers]=useState([]);
  const [loadingU,setLoadingU]=useState(false);
  const [uErr,setUErr]=useState("");
  const [selUser,setSelUser]=useState(null);
  const [search,setSearch]=useState("");
  const [lc,setLc]=useState({...cfg});
  const [saved,setSaved]=useState(false);

  const loadUsers=async()=>{
    setLoadingU(true);setUErr("");
    try{setUsers(await fbGetAllUsers());}
    catch(e){setUErr("Failed to load: "+e.message);}
    setLoadingU(false);
  };
  useEffect(()=>{if(aTab==="users")loadUsers();},[aTab]);

  const doDelete=async(id,name)=>{
    if(!confirm(`Delete user "${name}"? Cannot be undone.`))return;
    await fbDeleteUser(id);
    setUsers(u=>u.filter(x=>x.id!==id));
    if((selUser && selUser.id)===id)setSelUser(null);
  };
  const doToggle=async(id,cur)=>{
    await fbSetActive(id,!cur);
    setUsers(u=>u.map(x=>x.id===id?{...x,active:!cur}:x));
    if((selUser && selUser.id)===id)setSelUser(s=>({...s,active:!cur}));
  };
  const doExtend=async(id)=>{
    await fbExtendTrial(id);
    const ts=new Date().toISOString();
    setUsers(u=>u.map(x=>x.id===id?{...x,trialStart:ts}:x));
    if((selUser && selUser.id)===id)setSelUser(s=>({...s,trialStart:ts}));
  };

  const filt=users.filter(u=>{
    const q=search.toLowerCase();
    return!q||(u.name&&u.name.toLowerCase().includes(q))||(u.phone&&u.phone.includes(q))||(u.company&&u.company.toLowerCase().includes(q));
  });

// SMART UPLOAD — Single button for up to 4 files, auto-detects type
// ─────────────────────────────────────────────────────────────────────────────
function detectFileType(rows){
  if(!rows||!rows.length) return null;
  const keys=Object.keys(rows[0]).map(k=>String(k).toLowerCase().trim());
  const joinedKeys=keys.join(" ");
  // PEN: has "Pending Rolls" or "Pend. Prod." or "Pending" columns
  if(keys.some(k=>k.includes("pending")||k.includes("pend"))) return "pen";
  // Check Material column values
  const mats=rows.slice(0,30).map(r=>String(r.Material||r.material||"")).filter(Boolean);
  const hasBatch=keys.some(k=>k.includes("batch"));
  // MJ: materials have SM prefix or 3SM
  if(mats.some(m=>/^(SM|3SM)/i.test(m))) return "mj";
  // FGM/FGJM: finished goods with 3SF prefix
  if(mats.some(m=>/^3SF/i.test(m))) return "fgjm";
  // BARE: 3FG-G materials with batch
  if(mats.some(m=>/^3FG/i.test(m))&&hasBatch) return "bare";
  // Fallback: check for Width/Thickness columns without Pending → bare
  if(keys.some(k=>k.includes("width"))&&keys.some(k=>k.includes("thick"))&&!keys.some(k=>k.includes("pending"))) return "bare";
  return null;
}
function SmartUpload({data,onUpload,disabled,busy}){
  const ref=useRef();
  const [dragOver,setDragOver]=useState(false);
  const [detected,setDetected]=useState([]);
  const [errors,setErrors]=useState([]);
  const handleFiles=async(fileList)=>{
    const files=Array.from(fileList).filter(f=>/\.(xlsx|xls)$/i.test(f.name)).slice(0,4);
    if(!files.length) return;
    setDetected([]);setErrors([]);
    const results=[];
    for(const file of files){
      try{
        const rows=await readXL(file);
        const type=detectFileType(rows);
        if(type){
          results.push({file:file.name,type,rows:rows.length,status:"ok"});
          onUpload(type,rows,file.name);
        } else {
          results.push({file:file.name,type:null,rows:rows.length,status:"unknown"});
        }
      }catch(e){
        results.push({file:file.name,type:null,rows:0,status:"error",error:e.message});
      }
    }
    setDetected(results);
    setTimeout(()=>setDetected([]),8000);

        {busy?(<>
          <div style={{fontSize:36,marginBottom:8}}>⏳</div>
          <div style={{fontWeight:800,fontSize:16,color:C.navy}}>Reading files...</div>
        </>):loaded.length===0?(<>
          <div style={{fontSize:36,marginBottom:8}}>📂</div>
          <div style={{fontWeight:800,fontSize:18,color:C.navy}}>Drop up to 4 SAP Excel files here</div>
          <div style={{fontSize:13,color:"#4b5a6e",marginTop:6}}>Or click to browse · Files are auto-detected as PEN, MJ, FGM, or BARE</div>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:14,flexWrap:"wrap"}}>
            {[{k:"pen",l:"PEN",s:"Required"},{k:"mj",l:"MJ",s:"Optional"},{k:"fgjm",l:"FGM",s:"Optional"},{k:"bare",l:"BARE",s:"Optional"}].map(f=>(

            ))}
          </div>
        </>):(<>
          <div style={{fontSize:32,marginBottom:8}}>{loaded.length===4?"🎯":"📂"}</div>
          <div style={{fontWeight:800,fontSize:16,color:loaded.length===4?"#15803d":C.navy}}>
            {loaded.length===4?"All 4 files loaded! ✓":`${loaded.length}/4 files loaded — drop more or click to add`}
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:12,flexWrap:"wrap"}}>
            {["pen","mj","fgjm","bare"].map(k=>{
              const d=data[k];
              const isLoaded=d&&d.length>0;
              return(
                <div key={k} style={{padding:"8px 16px",borderRadius:12,fontSize:13,fontWeight:700,
                  background:isLoaded?"#f0fdf4":"#f8fafc",

                  <div style={{fontSize:10,fontWeight:800,letterSpacing:.5,color:isLoaded?fileColors[k]:"#94a3b8",marginBottom:2}}>{fileIcons[k]} {k==="fgjm"?"FGM":k.toUpperCase()}</div>
                  {isLoaded?<span>✓ {d.length} rows</span>:<span>Not loaded</span>}
                </div>
              );
            })}

      </div>

      {/* Detection results toast */}
      {detected.length>0&&(
        <div style={{marginTop:10,display:"flex",gap:8,flexWrap:"wrap"}}>
          {detected.map((d,i)=>(
            <div key={i} style={{padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:700,
              background:d.status==="ok"?"#f0fdf4":d.status==="unknown"?"#fef9c3":"#fef2f2",

               `✗ ${d.file} — Error: ${d.error}`}
            </div>
          ))}
        </div>
      )}
    </div>
  );

// ─────────────────────────────────────────────────────────────────────────────
// SMART PLANNING ENGINE
// ─────────────────────────────────────────────────────────────────────────────
function smartPlan(penData, bareData, mjData, fgjmData, cfg, machineMode, priorities, _shuffleSeed){
  /* ═══════════════════════════════════════════════════════════════
     GLS MET/F/04 PLANNING ENGINE v6  — PERFECT PLANNING
     ───────────────────────────────────────────────────────────────
     UPGRADED FROM v5 WITH 37 IMPROVEMENTS:

     v6 NEW — DP TRIM SOLVER:
       • Dynamic programming replaces greedy backtrack
       • Candidate pool expanded from 12 → 20 orders
       • Cross-group arm mixing for same micron+OD
       • OD-specific minimum trims: M22=5mm, M25=8mm, M28=12mm

     v6 NEW — DELIVERY DATE INTELLIGENCE:
       • Overdue orders get priority 0 (forced first)
       • Due within 7 days → priority 1 (urgent)
       • Due within 30 days → priority 2 (soon)
       • Beyond 30 days → priority 3 (normal)

     v6 NEW — BARE STOCK TRACKING:
       • Tracks cumulative bare roll consumption
       • Warns when bare batch is exhausted
       • Links F/04 runs to specific bare batches

     v6 NEW — DATA VALIDATION:
       • Material code validation on upload
       • Width range sanity checks (M-1: 1910-3290, M-2: 2900-3630)
       • Unplannable orders tracked and displayed

     MACHINE ASSIGNMENT (learned from 2,824 runs):
       • M-1 is DEFAULT (70%). M-2 only for large rolls.
       • M28 strongly prefers M-1 (84% of runs)
       • Overlap zone 2900–3300mm: M-1 preferred 72%

     TRIM (learned): Target ≤ 15mm, best = 5mm
     SLIT LENGTH: M22/M28 → 24k, M25 → 36k
     ARMS: 3 is golden standard (47–73%)
     METAL SIDE: I (97%), O only for 12µ export
  ═══════════════════════════════════════════════════════════════ */
  const M1_MIN=1910, M1_MAX=3290, M2_MIN=2900, M2_MAX=3630;
  const JUMBO_LEN=73000; // v6 fix: actual jumbo length is 73000m (not 72000)
  // v6: OD-specific minimum trims (learned from real data)
  const MIN_TRIM_BY_OD={"M22":cfg.minTrimM22||5,"M25":cfg.minTrimM25||8,"M28":cfg.minTrimM28||12};
  const MIN_TRIM=5;    // absolute floor (M22 achieves this regularly)
  const GOOD_TRIM=15;  // "perfect run" threshold from your data
  const TRIM_MAX=30;    // v6 fix: absolute maximum trim allowed (95% of real runs ≤30mm)
  const MAX_ARMS=5;
  const DP_POOL=cfg.dpPoolSize||20; // v6: expanded from 12
  const unplannableOrders=[]; // v6: track orders that can't be planned

  function getKey(o){ return (o.Material||"")+"_"+(o.Width||"")+"_"+(o["Sales Order"]||""); }
  function baseMicron(mat){ const m=(mat||"").match(/G(\d{2})/);return m?m[1]:"12"; }
  function odSuffix(mat){ const m=(mat||"").match(/M(\d{2})(?:\D|$)/);return m?"M"+m[1]:"M22"; }
  function groupKey(o){ return baseMicron(o.Material)+"_"+odSuffix(o.Material)+"_"+(parseInt(o.Length)||0); }
  function shortCust(c){ return String(c||"").split(" ").slice(0,2).join(" "); }
  function fmtRoll(n){ return Math.round(n*1000)/1000; }

  // ── LEARNED: Machine assignment ──────────────────────────────
  function assignMachine(rollSize, od){
    if(machineMode==="M-1") return "M-1";
    if(machineMode==="M-2") return "M-2";
    if(rollSize > M1_MAX) return "M-2";          // must be M-2
    if(rollSize < M2_MIN) return "M-1";          // must be M-1
    if(od==="M28") return "M-1";                 // learned: M28 = 84% M-1
    if(rollSize <= 3300) return "M-1";           // learned: overlap zone → M-1 at 72%
    return "M-2";
  }

  // ── LEARNED: Metal side ──────────────────────────────────────
  function metalSide(mat){
    const s=String(mat||"");
    // learned: O only for 12µ export materials (3FG-G12301 / 3FG-G12361)
    if((s.includes("G12301")||s.includes("G12361"))&&s.includes("M22")) return "O";
    return "I";
  }

  // ── LEARNED: Default slit length by OD ───────────────────────
  function defaultSlitLen(od, orderLen){
    if(orderLen && orderLen>0) return orderLen;   // always respect the order length first
    if(od==="M25") return 36000;                  // learned: M25 slightly prefers 36k
    return 24000;                                 // learned: M22 & M28 prefer 24k
  }

  // ── LEARNED: Find best bare roll ────────────────────────────
  function findBare(micron, minW){
    const prefix="3FG-G"+micron;
    const candidates=(bareData||[]).filter(b=>{
      if(!b.Material) return false;
      const bw=toFloat(b.Width||b.width||0);
      return String(b.Material).startsWith(prefix)&&bw>=minW-20&&bw>0;
    }).sort((a,b)=>{
      // prefer bare roll whose width is closest to required (minimise trim)
      const da=Math.abs(toFloat(a.Width||a.width||0)-minW);
      const db=Math.abs(toFloat(b.Width||b.width||0)-minW);
      return da-db;
    });
    return candidates[0]||null;
  }

  // ── v6 CORE: DP-Enhanced Minimum-trim arm combination finder ───
  // Uses expanded pool (20 candidates) + smarter backtrack + OD-aware trim
  function findMinTrimCombo(widthPool, machMax, odType){
    const odMinTrim=MIN_TRIM_BY_OD[odType]||MIN_TRIM;
    const target = machMax - odMinTrim;
    let bestCombo=null, bestTrim=9999;

    // v6: sort pool by width descending — wider orders constrain search most
    const pool=widthPool.slice().sort((a,b)=>b.width-a.width).slice(0,DP_POOL);

    // v6: pre-filter candidates that alone exceed machine capacity
    const viable=pool.filter(p=>p.width<=machMax-odMinTrim);
    if(viable.length===0) return null;

    function tryBuild(idx, current, currentSum){
      if(current.length>=1){
        const trim=machMax-currentSum;
        if(trim>=odMinTrim && trim<=TRIM_MAX && trim<bestTrim){
          bestTrim=trim;
          bestCombo=current.slice();
        }
        // v6: early exit if we found perfect trim
        if(bestTrim<=odMinTrim) return;
      }
      if(current.length>=MAX_ARMS) return;
      for(let i=idx;i<viable.length;i++){
        const {width,maxCount}=viable[i];
        const countUsed=current.filter(c=>c.i===i).length;
        if(countUsed>=maxCount) continue;
        // v6: tighter bound check
        if(currentSum+width > machMax-odMinTrim+3) continue;
        // v6: prune if remaining items can't possibly improve
        if(current.length>=2 && bestTrim<=GOOD_TRIM) continue;
        tryBuild(i, [...current,{i,width}], currentSum+width);
        if(bestTrim<=odMinTrim) return; // found perfect, stop searching
      }
    }

    // v6: try 3-arm combos first (golden standard), then 2, 4, 5
    tryBuild(0,[],0);

    if(!bestCombo||bestCombo.length===0) return null;

    const arms=bestCombo.map(c=>viable[c.i].item);
    const armWidths=bestCombo.map(c=>c.width);
    const usedW=armWidths.reduce((s,w)=>s+w,0);
    const rollSize=usedW+bestTrim;
    return {arms, armWidths, trim:bestTrim, rollSize, usedW};
  }

  // ── v6: Sort pending with DELIVERY DATE URGENCY scoring ──────
  let pending=penData.filter(r=>r.Material&&toFloat(r["Pending Rolls"])>0);
  const priMap={};
  (priorities||[]).forEach(p=>priMap[p.key]=p.priority);
  const now=Date.now(),DAY=86400000;
  function urgencyScore(order){
    const dd=order["Required Delivery Date"]||order["Req. Delivery Date"]||order["Del.Date"];
    if(!dd) return cfg.urgencyLater||3;
    const dt=new Date(dd).getTime();
    if(isNaN(dt)) return cfg.urgencyLater||3;
    if(dt<now) return cfg.urgencyOverdue||0;       // OVERDUE
    if(dt-now<7*DAY) return cfg.urgencyWeek||1;    // Due within 7 days
    if(dt-now<30*DAY) return cfg.urgencyMonth||2;  // Due within 30 days
    return cfg.urgencyLater||3;                     // Beyond 30 days
  }
  pending.sort((a,b)=>{
    // 1. Manual priority (if set)
    const pa=priMap[getKey(a)]||999,pb=priMap[getKey(b)]||999;
    if(pa!==pb&&(pa<999||pb<999)) return pa-pb;
    // 2. v6: Delivery urgency
    const ua=urgencyScore(a),ub=urgencyScore(b);
    if(ua!==ub) return ua-ub;
    // 3. SO creation date
    const da=a["SO Crtd Dt-"]?new Date(a["SO Crtd Dt-"]).getTime():9e15;
    const db=b["SO Crtd Dt-"]?new Date(b["SO Crtd Dt-"]).getTime():9e15;
    if(da!==db) return da-db;
    // 4. More pending rolls first
    return toFloat(b["Pending Rolls"])-toFloat(a["Pending Rolls"]);
  });
  // v6: shuffle equal-priority orders for alternative combos
  if(_shuffleSeed){
    const groups={};
    pending.forEach((p,i)=>{const u=urgencyScore(p);if(!groups[u])groups[u]=[];groups[u].push({p,i});});
    const shuffled=[];
    Object.values(groups).forEach(g=>{
      for(let i=g.length-1;i>0;i--){const j=Math.floor(Math.random()*i);[g[i],g[j]]=[g[j],g[i]];}
      g.forEach(x=>shuffled.push(x.p));
    });
    pending.length=0;pending.push(...shuffled);
  }

  const planRows=[]; const usedKeys=new Set();

  // ── ① FGJM direct ─────────────────────────────────────────────
  for(const order of pending){
    const k=getKey(order),ow=toFloat(order.Width);
    const match=(fgjmData||[]).find(f=>f.Material&&String(f.Material).startsWith((order.Material||"").slice(0,14))&&Math.abs(toFloat(f.Width||f.width||0)-ow)<=50);
    if(match){planRows.push({source:"FGJM",included:true,order,ref:match});usedKeys.add(k);}
  }

  // ── ② MJ slit ─────────────────────────────────────────────────
  for(const order of pending){
    const k=getKey(order);if(usedKeys.has(k)) continue;
    const ow=toFloat(order.Width),om=String(order.Material||"");
    const match=(mjData||[]).find(m=>m.Material&&String(m.Material||"").replace(/^SM/,"").startsWith(om.slice(0,14).replace(/^SM/,""))&&toFloat(m.Width||m.width||0)>=ow-50);
    if(match){planRows.push({source:"MJ",included:true,order,ref:match});usedKeys.add(k);}
  }

  // ── ③ Met Runs (minimum-trim algorithm) ───────────────────────
  const metOrders=pending.filter(o=>!usedKeys.has(getKey(o)));
  const groups={};
  for(const o of metOrders){
    const gk=groupKey(o);
    if(!groups[gk]) groups[gk]={micron:baseMicron(o.Material),od:odSuffix(o.Material),slitLen:parseInt(o.Length)||0,items:[]};
    groups[gk].items.push({...o,_rem:toFloat(o["Pending Rolls"])});
  }

  // Determine machine max based on mode
  const machMax=(machineMode==="M-2")?M2_MAX:(machineMode==="M-1")?M1_MAX:M2_MAX;
  // For auto mode, prefer M-1 first (learned: M-1 is default)
  const preferredMachMax=(machineMode==="auto"||!machineMode)?M1_MAX:machMax;

  for(const [gk,grp] of Object.entries(groups)){
    const {micron,od,slitLen}=grp;
    const sl=defaultSlitLen(od, slitLen);
    const jumboLength=JUMBO_LEN; // 73000m
    let items=grp.items.filter(i=>i._rem>0).map(i=>({...i}));
    let safety=0;

    while(items.some(i=>i._rem>0)&&safety++<200){
      const remaining=items.filter(i=>i._rem>0);

      // Sort: most pending first, then wider orders first (wider = easier to fill machine)
      remaining.sort((a,b)=>{
        if(Math.abs(b._rem-a._rem)>0.5) return b._rem-a._rem;
        return toFloat(b.Width)-toFloat(a.Width);
      });

      // Build width pool — each order can appear up to its _rem count (max MAX_ARMS copies)
      const widthPool=[];
      for(const item of remaining){
        const w=toFloat(item.Width);
        if(w<=0) continue;
        const maxRepeat=Math.min(MAX_ARMS, Math.ceil(item._rem));
        widthPool.push({key:getKey(item), width:w, item, maxCount:maxRepeat});
      }

      // ── Try minimum-trim combination on preferred machine ──
      let combo=findMinTrimCombo(widthPool, preferredMachMax, grp.od||"M22");

      // If auto mode and combo trim > GOOD_TRIM, try M-2 to see if it fits better
      if((!machineMode||machineMode==="auto") && (!combo || combo.trim > GOOD_TRIM)){
        const comboM2=findMinTrimCombo(widthPool, M2_MAX, grp.od||"M22");
        if(comboM2 && (!combo || comboM2.trim < combo.trim)) combo=comboM2;
      }

      if(!combo){
        // Fallback: take widest single order
        const item=remaining[0];
        const w=toFloat(item.Width);
        const trim=preferredMachMax-w;
        if(trim<MIN_TRIM||trim>TRIM_MAX||trim>preferredMachMax){unplannableOrders.push({order:item,reason:trim<MIN_TRIM?'Width too close to machine max (trim < '+MIN_TRIM+'mm)':'Width exceeds machine range'});items=items.filter(i=>i._rem>0&&getKey(i)!==getKey(item));continue;}
        combo={arms:[item],armWidths:[w],trim,rollSize:w+trim,usedW:w};
      }

      // ── Arm counts ───────────────────────────────────────────
      const armCounts={};
      for(const a of combo.arms){const k2=getKey(a);armCounts[k2]=(armCounts[k2]||0)+1;}
      const uniqArms=[...new Map(combo.arms.map(a=>[getKey(a),a])).values()];

      // ── Sets: how many full sets can we cut? ─────────────────
      // Learned: sets = limited by the order with fewest remaining rolls per arm slot
      let sets=Math.min(...uniqArms.map(ua=>Math.floor(ua._rem/armCounts[getKey(ua)])));
      sets=Math.max(1,sets);
      // Learned: high sets (>3) occur with smaller rolls + 2-3 arms
      // Cap sets at 6 for reasonable planning horizon
      sets=Math.min(sets,6);

      // ── Machine assignment (learned) ─────────────────────────
      const machine=assignMachine(combo.rollSize, od);

      // ── Metal side (learned) ─────────────────────────────────
      const mio=metalSide(uniqArms[0].Material);

      // ── Find best bare roll ───────────────────────────────────
      const bareRoll=findBare(micron, combo.rollSize);
      const jumboLen=bareRoll?toFloat(bareRoll.Length||0):JUMBO_LEN; // 73000m default
      const noOfRoll=fmtRoll(sets*sl/JUMBO_LEN); // sets × slitLen / 73000

      // ── Deduct from remaining ─────────────────────────────────
      for(const ua of uniqArms){
        const cnt=armCounts[getKey(ua)];
        const orig=items.find(r=>getKey(r)===getKey(ua));
        if(orig) orig._rem=Math.max(0,orig._rem-cnt*sets);
      }

      // ── Trim quality badge ────────────────────────────────────
      const trimGrade=combo.trim<=10?"🟢 Excellent":combo.trim<=15?"🟡 Good":combo.trim<=25?"🟠 Fair":combo.trim<=30?"🔴 Max":"⛔ Over";

      planRows.push({
        source:"BARE", included:true, machine,
        material:uniqArms[0].Material,
        bare:bareRoll, rollSize:combo.rollSize, jumboLen, noOfRoll,
        trim:combo.trim, trimGrade, slitLen:sl,
        arms:combo.arms.map(a=>toFloat(a.Width)),
        sets, metalIO:mio, packMode:"WM",
        od, micron,
        customers:[...new Set(combo.arms.map(a=>shortCust(a["Consignee Name"])))].join(" / "),
        orders:combo.arms
      });

      items=items.filter(i=>i._rem>0);
    }
  }
  // v6: attach unplannable orders and metadata
  planRows._unplannable=unplannableOrders;
  planRows._engineVersion="v6";
  planRows._urgencyStats={overdue:pending.filter(o=>urgencyScore(o)===0).length,urgent:pending.filter(o=>urgencyScore(o)===1).length};
  return planRows;
}


// ─────────────────────────────────────────────────────────────────────────────
// PENDENCY ANALYSIS COMPONENT
// ─────────────────────────────────────────────────────────────────────────────
function PendencyAnalysis({pen, mj, fgjm, bare, cfg, onMakePlan}){
  const [view,setView]=useState("customer");
  const [sortKey,setSortKey]=useState("rolls");
  const [sortDir,setSortDir]=useState(-1);
  const [selGroups,setSelGroups]=useState([]); // selected film type keys as array
  const [selCustomers,setSelCustomers]=useState([]); // selected customer names
  const toggleGroup=(key)=>{
    setSelGroups(function(s){ return s.indexOf(key)>=0?s.filter(function(k){return k!==key;}):[...s,key]; });
  };
  const toggleCustomer=(name)=>{
    setSelCustomers(function(s){ return s.indexOf(name)>=0?s.filter(function(k){return k!==name;}):[...s,name]; });
  };
  const selAll=(fdata)=>setSelGroups((fdata||[]).map(function(f){return f.key;}));
  const selNone=()=>setSelGroups([]);
  const pend=useMemo(()=>pen.filter(r=>r.Material&&(toInt(r["Pending Rolls"])>0||toFloat(r["Pending Rolls"])>0)),[pen]);

  const OD_COMPAT={"22":["22","25","28"],"25":["25","28"],"28":["28"]};

  // ── Source analysis (if other files loaded) ──
  const withSource=useMemo(()=>{
    if(!fgjm.length&&!mj.length&&!bare.length) return pend.map(o=>({...o,_src:"UNKNOWN"}));
    return pend.map(order=>{
      const oMat=String(order.Material).trim(), oW=toInt(order.Width), oL=toInt(order.Length);
      const op=parseMat(oMat), minT=op.od==="22"?cfg.trimMinOD22:cfg.trimMinOD25;
      const fg=fgjm.find(x=>x.Batch&&canFill(x.Material,oMat)&&Math.abs(toInt(x.Width)-oW)<=50);
      if(fg) return{...order,_src:"FGJM"};
      const mjr=mj.find(x=>x.Batch&&canFill(String(x.Material||"").replace(/^3SF/,"3FG").replace("SM",""),oMat)&&toInt(x.Width)>=oW+minT&&toInt(x.Length)>=oL);
      if(mjr) return{...order,_src:"MJ"};
      const br=bare.find(x=>x.Batch&&Math.abs(toFloat(x.Thickness)-(op.thick||0))<0.5);
      if(br) return{...order,_src:"BARE"};
      return{...order,_src:"NONE"};
    });
  },[pend,fgjm,mj,bare,cfg]);

  // ── Customer grouping ──
  const customerData=useMemo(()=>{
    const map={};
    withSource.forEach(o=>{
      const c=String(o["Consignee Name"]||"Unknown").trim();
      if(!map[c]) map[c]={customer:c,rolls:0,kg:0,orders:0,microns:new Set(),src:{}};
      map[c].rolls+=toInt(o["Pending Rolls"])||toFloat(o["Pending Rolls"]);
      const pp=toFloat(o["Pend. Prod."]);
      const wr=toFloat(o["Weight /Roll"]||o["Weight/Roll"]||0)*( toFloat(o["Pending Rolls"]||0));
      map[c].kg+=(pp>0?pp:(wr>0?wr:0));
      map[c].orders++;
      const th=toFloat(o.Thickness);
      if(th) map[c].microns.add(th);
      map[c].src[o._src]=(map[c].src[o._src]||0)+1;
    });
    return Object.values(map).map(x=>({...x,microns:[...x.microns].sort((a,b)=>a-b)}));
  },[withSource]);

  // ── Date grouping ──
  const dateData=useMemo(()=>{
    const map={};
    withSource.forEach(o=>{
      const d=String(o["Required Delivery Date"]||o["SO Crtd Dt."]||"No Date").split("T")[0];
      if(!map[d]) map[d]={date:d,rolls:0,kg:0,orders:0,items:[]};
      map[d].rolls+=toInt(o["Pending Rolls"])||toFloat(o["Pending Rolls"]);
      map[d].kg+=toFloat(o["Pend. Prod."]);
      map[d].orders++;
      map[d].items.push(o);
    });
    return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
  },[withSource]);

  // ── Film type grouping ──
  const filmData=useMemo(()=>{
    const map={};
    withSource.forEach(o=>{
      const th=toFloat(o.Thickness)||"?";
      const op=parseMat(String(o.Material||""));
      const od=op.od?`${op.od==="22"?"2.2":op.od==="25"?"2.5":"2.8"} OD`:"? OD";
      const key=`${th}µ · ${od}`;
      if(!map[key]) map[key]={key,thick:th,od:op.od||"?",rolls:0,kg:0,orders:0,customers:new Set(),widths:new Set()};
      map[key].rolls+=toInt(o["Pending Rolls"])||toFloat(o["Pending Rolls"]);
      map[key].kg+=toFloat(o["Pend. Prod."]);
      map[key].orders++;
      map[key].customers.add(String(o["Consignee Name"]||"").split(" ").slice(0,2).join(" "));
      map[key].widths.add(toInt(o.Width));
    });
    return Object.values(map).map(x=>({...x,customers:[...x.customers],widths:[...x.widths].sort((a,b)=>a-b)})).sort((a,b)=>b.rolls-a.rolls);
  },[withSource]);

  const hasFullData=fgjm.length>0||mj.length>0||bare.length>0;
  const srcColors={FGJM:"#15803d",MJ:"#1e40af",BARE:"#92400e",NONE:"#991b1b",UNKNOWN:"#64748b"};
  const srcBg={FGJM:"#f0fdf4",MJ:"#eff6ff",BARE:"#fef9c3",NONE:"#fef2f2",UNKNOWN:"#f8fafc"};
  const srcLabel={FGJM:"FGM",MJ:"MJ Slit",BARE:"Met",NONE:"No Stock",UNKNOWN:"?"};

  const totalRolls=pend.reduce((s,o)=>s+(toInt(o["Pending Rolls"])||toFloat(o["Pending Rolls"])),0);
  const totalKg=pend.reduce((s,o)=>{
    const pp=toFloat(o["Pend. Prod."]);
    const wr=toFloat(o["Weight /Roll"]||o["Weight/Roll"]||0)*toFloat(o["Pending Rolls"]||0);
    return s+(pp>0?pp:(wr>0?wr:0));
  },0);
  const srcCounts=withSource.reduce((s,o)=>{s[o._src]=(s[o._src]||0)+1;return s},{});

  const TH={background:"#eef1f7",color:"#4b5a6e",padding:"8px 11px",textAlign:"left",fontSize:11,fontWeight:700,letterSpacing:.4,textTransform:"uppercase",borderBottom:"2px solid #dde3ed",whiteSpace:"nowrap"};
  const TD={padding:"9px 11px",fontSize:13,color:C.text,borderBottom:"1px solid #dde3ed",verticalAlign:"middle"};

  // Sort helper
  const sorted=(arr,key)=>[...arr].sort((a,b)=>sortDir*(typeof b[key]==="string"?b[key].localeCompare(a[key]):b[key]-a[key]));
  const SortBtn=({k,label})=>(
    <th style={{...TH,cursor:"pointer",userSelect:"none"}} onClick={()=>{if(sortKey===k)setSortDir(d=>-d);else{setSortKey(k);setSortDir(-1);}}}>
      {label} {sortKey===k?(sortDir===-1?"↓":"↑"):""}
    </th>
  );

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:C.navy,marginBottom:4}}>Pendency Analysis</h1>
          <p style={{fontSize:14,color:"#4b5a6e"}}>{pend.length} orders · {totalRolls.toFixed(0)} rolls · {(totalKg/1000).toFixed(2)} MT pending
            {(()=>{const ov=withSource.filter(o=>{const dd=o["Required Delivery Date"]||o["Req. Delivery Date"];return dd&&new Date(dd).getTime()<Date.now();}).length;
              const urg=withSource.filter(o=>{const dd=o["Required Delivery Date"]||o["Req. Delivery Date"];if(!dd)return false;const dt=new Date(dd).getTime();return dt>=Date.now()&&dt-Date.now()<7*86400000;}).length;
              return(<>{ov>0&&<span style={{background:"#fef2f2",color:"#991b1b",padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:700,marginLeft:8}}>🔥 {ov} overdue</span>}
                {urg>0&&<span style={{background:"#fef9c3",color:"#92400e",padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:700,marginLeft:4}}>⚡ {urg} urgent (7d)</span>}</>);
            })()}

        </div>
        <button onClick={function(){onMakePlan(selGroups.length>0?selGroups:null, selCustomers.length>0?selCustomers:null);}} style={{...btn("linear-gradient(135deg,#1a305c,#1d4ed8)","#fff",{padding:"12px 28px",fontSize:15,boxShadow:"0 4px 16px rgba(29,78,216,.35)"})}}>

                  <td style={{...TD,fontWeight:700,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.customer}</td>
                  <td style={{...TD,textAlign:"center",fontWeight:700}}>{c.orders}</td>
                  <td style={{...TD,textAlign:"center",fontWeight:800,color:C.red}}>{Math.round(c.rolls)}</td>
                  <td style={{...TD,textAlign:"center"}}>{(c.kg/1000).toFixed(2)} MT</td>
                  <td style={TD}>{c.microns.map(m=><span key={m} style={{background:"#eff6ff",color:"#1e40af",borderRadius:12,padding:"2px 8px",fontSize:10,fontWeight:700,marginRight:3}}>{m}µ</span>)}</td>
                  {hasFullData&&<td style={TD}>
                    {Object.entries(c.src).map(([s,n])=>(
                      <span key={s} style={{background:srcBg[s],color:srcColors[s],border:`1px solid ${srcColors[s]}33`,padding:"2px 7px",borderRadius:12,fontSize:10,fontWeight:700,marginRight:3}}>{n} {srcLabel[s]}</span>
                    ))}
                  </td>}
                </tr>
              );})}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── DATE WISE ── */}
      {view==="date"&&(
        <div style={card()}>
          <div style={{overflowX:"auto",borderRadius:9,border:`1px solid ${C.border}`}}>
            <table style={{width:"100%",background:"#fff",minWidth:400}}>
              <thead><tr>
                <th style={TH}>Delivery Date</th>
                <th style={TH}>Orders</th>
                <SortBtn k="rolls" label="Rolls"/>
                <SortBtn k="kg" label="KG"/>
                <th style={TH}>Status</th>
              </tr></thead>
              <tbody>{dateData.map((d,i)=>{
                const dt1=d.date!=="No Date"?new Date(d.date).getTime():null;
                const isOverdue=dt1!==null&&dt1<Date.now();
                const isUrgent=dt1!==null&&!isOverdue&&(dt1-Date.now())<7*86400000;
                return(
                  <tr key={i} className="pprow" style={{background:isOverdue?"#fef2f2":isUrgent?"#fffbeb":i%2?"#f7f9fc":"#fff"}}>
                    <td style={{...TD,fontWeight:800,color:isOverdue?C.red:isUrgent?C.amber:C.text}}>
                      {d.date==="No Date"?"No Date":new Date(d.date).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})}
                    </td>
                    <td style={{...TD,textAlign:"center"}}>{d.orders}</td>
                    <td style={{...TD,textAlign:"center",fontWeight:800,color:C.red}}>{Math.round(d.rolls)}</td>
                    <td style={{...TD,textAlign:"center"}}>{(d.kg/1000).toFixed(2)} MT</td>
                    <td style={TD}>
                      {isOverdue&&<span style={{background:"#fef2f2",color:C.red,border:`1px solid ${C.redBd}`,padding:"2px 9px",borderRadius:12,fontSize:10,fontWeight:700}}>⚠ OVERDUE</span>}
                      {!isOverdue&&isUrgent&&<span style={{background:C.amberLt,color:C.amber,border:`1px solid ${C.amberBd}`,padding:"2px 9px",borderRadius:12,fontSize:10,fontWeight:700}}>🔥 URGENT</span>}
                      {!isOverdue&&!isUrgent&&d.date!=="No Date"&&<span style={{background:"#f0fdf4",color:"#15803d",border:"1px solid #86efac",padding:"2px 9px",borderRadius:12,fontSize:10,fontWeight:700}}>✓ OK</span>}
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── FILM TYPE WISE ── */}
      {view==="filmtype"&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
            <div style={{flex:1,fontSize:12,color:C.textMd,fontWeight:600}}>
              {selGroups.length===0?"Click cards to select film types, or plan everything":selGroups.length+" film type(s) selected for planning"}
            </div>
            <button onClick={function(e){e.stopPropagation();selAll(filmData);}} style={{...btn(C.navy,"#fff",{padding:"5px 12px",fontSize:11})}}>Select All</button>
            <button onClick={function(e){e.stopPropagation();selNone();}} style={{...btn("#f1f5f9",C.navy,{padding:"5px 12px",fontSize:11,border:"1px solid "+C.border})}}>Clear</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
          {filmData.map((f,i)=>{
            const odColors={"22":["#f0fdf4","#15803d","#86efac"],"25":["#eff6ff","#1e40af","#93c5fd"],"28":["#fff7ed","#92400e","#fdba74"]};
            const [bg,tc,bc]=odColors[f.od]||["#f8fafc","#64748b","#cbd5e1"];
            const isChk=selGroups.indexOf(f.key)>=0;

                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:20,height:20,borderRadius:5,border:"2px solid "+(isChk?tc:"#cbd5e1"),background:isChk?tc:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {isChk&&<span style={{color:"#fff",fontSize:13,fontWeight:900}}>✓</span>}
                  </div>
                  <span style={{background:bg,color:tc,border:"1px solid "+bc,padding:"3px 10px",borderRadius:20,fontWeight:800,fontSize:14}}>{f.thick}µ</span>
                  <span style={{background:bg,color:tc,border:"1px solid "+bc,padding:"3px 10px",borderRadius:20,fontWeight:700,fontSize:12}}>{f.od==="22"?"2.2 OD":f.od==="25"?"2.5 OD":"2.8 OD"}</span>
                  <div style={{marginLeft:"auto",textAlign:"right"}}>
                    <div style={{fontSize:22,fontWeight:900,color:isChk?tc:"#1e40af"}}>{(f.kg/1000).toFixed(2)}</div>
                    <div style={{fontSize:9,color:C.textLt,fontWeight:700}}>MT</div>
                  </div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:C.textMd,marginBottom:6,alignItems:"center"}}>
                  <span>{f.orders} orders</span>
                  <span style={{fontWeight:800,color:C.red,fontSize:14}}>{Math.round(f.rolls)} <span style={{fontSize:10,fontWeight:600,color:C.textMd}}>rolls</span></span>

                </div>

      )}

      {/* ── ALL ORDERS ── */}
      {view==="all"&&(
        <div style={card()}>
          <div style={{overflowX:"auto",borderRadius:9,border:`1px solid ${C.border}`}}>
            <table style={{width:"100%",background:"#fff",minWidth:700}}>

                <th style={TH}>µ</th>
                <th style={TH}>Material</th>
                <th style={TH}>Customer</th>
                <th style={TH}>Width</th>
                <th style={TH}>Length</th>
                <SortBtn k="Pending Rolls" label="Rolls"/>
                <th style={TH}>Delivery</th>
                {hasFullData&&<th style={TH}>Source</th>}
              </tr></thead>
              <tbody>{withSource.map((o,i)=>{
                const d=String(o["Required Delivery Date"]||"").split("T")[0];

                const isUrgent=dt2!==null&&!isOverdue&&(dt2-Date.now())<7*86400000;

                    <td style={{...TD,fontFamily:"monospace",fontSize:13,color:"#3730a3"}}>{o.Material}</td>

                    {hasFullData&&<td style={TD}><span style={{background:srcBg[o._src],color:srcColors[o._src],border:`1px solid ${srcColors[o._src]}33`,padding:"2px 8px",borderRadius:12,fontSize:10,fontWeight:700}}>{srcLabel[o._src]}</span></td>}

// ─────────────────────────────────────────────────────────────────────────────
// GENERATE F05 — Bare Film Slitting Plan
// Takes BARE met runs and groups them into primary slitting rows
// ─────────────────────────────────────────────────────────────────────────────
function generateF05Plan(bareRows, cfg){
  if(!bareRows||bareRows.length===0) return [];
  const PRIMARY_WIDTH=cfg.primarySlitWidth||10500; // v6 fix: actual jumbo width is 10500mm
  const rows=[];
  const used=new Set();

  // Group by micron so same-thickness rolls are slit from same bare film
  const groups={};
  bareRows.forEach(function(r,i){
    const mic=r.micron||"12";
    const mat=r.material||(r.bare&&r.bare.Material)||("3FG-G"+mic+"901");
    const key=mic+"_"+(r.slitLen||r.jumboLen||73000);
    if(!groups[key]) groups[key]={micron:mic,material:mat,length:r.slitLen||r.jumboLen||73000,items:[]};
    groups[key].items.push({idx:i,width:r.rollSize||toInt(r.arms&&r.arms.reduce?r.arms.reduce(function(s,a){return s+toFloat(a);},0):0)+toInt(r.trim||15),rawWidth:r.rollSize||0,customers:r.customers||"",trim:r.trim||15});
  });

  Object.values(groups).forEach(function(grp){
    var items=grp.items.slice();
    var safety=0;
    while(items.length>0&&safety++<200){
      var rollWidths=[];
      var totalW=0;
      var custs=[];
      var usedIdx=[];
      // Pack up to 4 rolls into one primary slit
      for(var i=0;i<items.length&&rollWidths.length<4;i++){
        var rw=items[i].rawWidth||items[i].width;
        if(totalW+rw+30<=PRIMARY_WIDTH){
          rollWidths.push(rw);
          totalW+=rw;
          custs.push(items[i].customers);
          usedIdx.push(i);
        }
      }
      if(rollWidths.length===0) break;
      // Remove used items (reverse order to keep indices valid)
      for(var j=usedIdx.length-1;j>=0;j--){items.splice(usedIdx[j],1);}

      var trim=PRIMARY_WIDTH-totalW;
      var fiveGrade=null;
      // 5-grade roll must be 180-400mm only
      if(trim>=180&&trim<=400){fiveGrade=trim;trim=0;}
      else if(trim>400){
        // Trim is too large for 5-grade, keep as trim waste
        fiveGrade=null;
      }

      rows.push({
        material:grp.material,
        length:grp.length,
        rolls:rollWidths,
        fiveGrade:fiveGrade,
        trim:Math.max(0,trim),
        jumboWidth:totalW+(fiveGrade||0)+Math.max(0,trim),
        customer:[...new Set(custs.filter(Boolean))].join(" / ")
      });
    }
  });
  return rows;
}

// PLAN BUILDER — 3 MACHINE MODES + MANUAL PRIORITY
// ─────────────────────────────────────────────────────────────────────────────
function PlanBuilderNew({pen, mj, fgjm, bare, cfg, metPlan, setMetPlan, onViewSeq, planFilter, customerFilter, onPlanGenerated}){
  const [mode,setMode]=useState("both");
  const [planRows,setPlanRows]=useState(null);
  const [generating,setGenerating]=useState(false);
  const [priorities,setPriorities]=useState([]);
  const [showPri,setShowPri]=useState(false);
  const [editPri,setEditPri]=useState({});
  const [showModal,setShowModal]=useState(false);
  const [planSeed,setPlanSeed]=useState(0);
  const [modalTab,setModalTab]=useState("MET"); // MET | MJ | FGJM

  const pend=pen.filter(r=>r.Material&&(toInt(r["Pending Rolls"])>0||toFloat(r["Pending Rolls"])>0));
  // Apply planFilter: only include orders whose film type key is selected
  const filmFiltered=(planFilter&&planFilter.length>0)?pend.filter(function(o){
    const th=toFloat(o.Thickness)||"?";
    const op=parseMat(String(o.Material||""));
    const odLabel=op.od==="22"?"2.2":op.od==="25"?"2.5":"2.8";
    const key=th+"µ · "+odLabel+" OD";
    return planFilter.indexOf(key)>=0;
  }):pend;
  // Apply customerFilter: only include orders for selected customers
  const filteredPen=(customerFilter&&customerFilter.length>0)?filmFiltered.filter(function(o){
    const cust=String(o["Consignee Name"]||"").trim();
    return customerFilter.indexOf(cust)>=0;
  }):filmFiltered;
  const filterInfo=[];
  if(planFilter&&planFilter.length>0) filterInfo.push(planFilter.length+" film type(s)");
  if(customerFilter&&customerFilter.length>0) filterInfo.push(customerFilter.length+" customer(s)");
  const filterText=filterInfo.length>0?filterInfo.join(" · ")+" selected":"All film types & customers";
  const today=new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"2-digit",year:"numeric"});

  const generate=(refresh)=>{
    setGenerating(true);
    if(refresh) setPlanSeed(s=>s+1);
    setTimeout(()=>{
      // v6: pass seed for alternative combos on refresh
      const rows=smartPlan(filteredPen,bare,mj,fgjm,cfg,mode,priorities,refresh?Date.now():0);
      setPlanRows(rows);
      // Transform BARE rows into proper MetSeq rows with setNo, cumMeters, odType etc.
      const rawMetRows=rows.filter(r=>r.source==="BARE"&&r.included);
      const metRowsBuilt=[];
      ["M-1","M-2"].forEach(machine=>{
        const mr=rawMetRows.filter(r=>r.machine===machine);
        // Pool by OD, each sorted by width descending
        const pool22=mr.filter(r=>r.od==="M22").sort((a,b)=>(b.rollSize||0)-(a.rollSize||0));
        const pool25=mr.filter(r=>r.od==="M25").sort((a,b)=>(b.rollSize||0)-(a.rollSize||0));
        const pool28=mr.filter(r=>r.od==="M28").sort((a,b)=>(b.rollSize||0)-(a.rollSize||0));

        const CAP=cfg.boatCap22||7;
        let setN=1,cumM=0;

        // Build sets: each set starts with 2.2 OD, then higher ODs, then remaining 2.2
        while(pool22.length>0||pool25.length>0||pool28.length>0){
          const setRows=[];

          // Step 1: First slot MUST be 2.2 OD (widest available)
          if(pool22.length>0){
            setRows.push(pool22.shift());
          } else {
            // No 2.2 OD left — use whatever is available (shouldn't happen ideally)
            if(pool25.length>0) setRows.push(pool25.shift());
            else if(pool28.length>0) setRows.push(pool28.shift());
            else break;
          }

          // Step 2: Fill with higher ODs (2.5 then 2.8), widest first
          while(setRows.length<CAP&&pool25.length>0) setRows.push(pool25.shift());
          while(setRows.length<CAP&&pool28.length>0) setRows.push(pool28.shift());

          // Step 3: Fill remaining capacity with 2.2 OD, widest first
          while(setRows.length<CAP&&pool22.length>0) setRows.push(pool22.shift());

          // Sort within set: first row stays (2.2 OD), rest sorted by width desc
          if(setRows.length>1){
            const first=setRows[0];
            const rest=setRows.slice(1).sort((a,b)=>(b.rollSize||0)-(a.rollSize||0));
            setRows.length=0;
            setRows.push(first,...rest);
          }

          // Emit rows for this set
          let slotN=1;
          cumM=0;
          setRows.forEach(r=>{
            const odKey=r.od||"M22";
            const jumpLen=73000; // v6 fix: 73000m jumbo
            const metersPer=(r.sets||1)*(r.slitLen||24000); // v6 fix: sets × slitLen
            cumM+=metersPer;
            metRowsBuilt.push({
              id:uid(),machine,setNo:setN,slotNo:slotN++,
              odType:(odKey||"M22").replace("M",""),
              bareMat:(r.bare&&r.bare.Material)||r.material||("3FG-G"+(r.micron||"12")+"901"),
              batch:(r.bare&&r.bare.Batch)||"",
              width:r.rollSize||0,length:r.jumboLen||73000,thickness:r.micron||"12",
              outputMat:((r.bare&&r.bare.Material)||r.material||"").replace("3FG-G","3SF-G"),
              customers:r.customers||"",arms:r.arms||[],slitLen:r.slitLen||0,
              sets:r.sets||1,noOfRoll:r.noOfRoll||0,trim:r.trim||15,
              jumboWidth:r.rollSize||0,cumMeters:Math.round(cumM),notes:"",
              priority:odKey==="M22"?0:odKey==="M25"?1:2
            });
          });
          setN++;
        }
      });
      setMetPlan(metRowsBuilt);
      setGenerating(false);
      setShowModal(true);
      setModalTab("MET");
      // Compute f05 and notify parent
      const _bareRows=rows.filter(r=>r.source==="BARE");

        {planRows&&<button onClick={()=>generate(true)} disabled={generating} style={{...btn("rgba(255,255,255,.12)","#fff",{border:"1px solid rgba(255,255,255,.25)",padding:"13px 22px",fontSize:14,fontWeight:800})}}>
          {generating?<Spin size={16}/>:"🔄 Refresh Plan"}
        </button>}
        {planRows&&<button onClick={()=>setShowModal(true)} style={{...btn("rgba(255,255,255,.12)","#fff",{border:"1px solid rgba(255,255,255,.25)",padding:"13px 22px",fontSize:14,fontWeight:800})}}>📋 View Plan →</button>}
      </div>

      {planRows&&(
        <div style={{marginTop:14,display:"flex",gap:10,flexWrap:"wrap"}}>
          {[
            {l:"Met Runs",v:bareRows.length,c:"#92400e",bg:"#fef9c3"},
            {l:"M-1",v:bareRows.filter(r=>r.machine==="M-1").length,c:"#92400e",bg:"#fff7ed"},
            {l:"M-2",v:bareRows.filter(r=>r.machine==="M-2").length,c:"#0e7490",bg:"#e0f7fa"},
            {l:"MJ Slit",v:mjRows.length,c:"#1e40af",bg:"#eff6ff"},
            {l:"FGM",v:fgjmRows.length,c:"#15803d",bg:"#f0fdf4"},
          ].map((s,i)=>(
            <div key={i} style={{background:s.bg,borderRadius:9,padding:"8px 14px",textAlign:"center",border:"1px solid #dde3ed"}}>
              <div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
              <div style={{fontSize:11,color:"#4b5a6e",fontWeight:700}}>{s.l}</div>

          ))}
          <button onClick={()=>setShowModal(true)} style={{...btn("linear-gradient(135deg,#1a305c,#1d4ed8)","#fff",{padding:"8px 20px",fontSize:13,marginLeft:"auto"})}}>📋 Open Full Plan →</button>
        </div>
      )}
    </div>
  );
}

  const [customerFilter,setCustomerFilter]=useState([]);
  const [planHistory,setPlanHistory]=useState([]);
  const [histSearch,setHistSearch]=useState("");

  const [showChat,setShowChat]=useState(false);
  const [installable,setInstallable]=useState(false);

  useEffect(()=>{

    window.addEventListener("appinstalled",()=>{setInstallable(false);showToast("Plan Power installed! ✓");});
  },[]);

  const showToast=msg=>{setToast(msg);clearTimeout(toastTimer.current);toastTimer.current=setTimeout(()=>setToast(""),3200);};

  // Auto-load history when History tab is opened
  useEffect(function(){
    if(tab==="history"&&planHistory.length===0&&!histLoading){
      setHistLoading(true);

  },[tab]);
  const logout=()=>{setUser(null);setData({pen:[],mj:[],fgjm:[],bare:[]});setMetPlan([]);setTab("upload");showToast("Signed out");};
  const installApp=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;setDP(null);setInstallable(false);if(outcome==="accepted")showToast("Installing…");};

  const upload=async(k,file)=>{
    if((user && user.role)==="viewer"){showToast("View-only account");return;}
    setBusy(k);
    try{setData(d=>({...d,[k]:[]}));const parsed=await readXL(file);setData(d=>({...d,[k]:parsed}));showToast(`${k==="fgjm"?"FGM":k.toUpperCase()}: ${parsed.length} rows`);}
    catch(e){alert("Read error: "+e.message);}
    setBusy("");
  };

  const shownMet=metPlan.filter(r=>r.machine===metView);
  const boatSets=useMemo(()=>{
    const s={};
    shownMet.forEach(r=>{
      if(!s[r.setNo])s[r.setNo]={no:r.setNo,rows:[],maxMeters:0};
      s[r.setNo].rows.push(r);
      s[r.setNo].maxMeters=r.cumMeters;
    });
    return Object.values(s).sort((a,b)=>a.no-b.no);
  },[shownMet]);

  const updMet=(id,k,v)=>setMetPlan(p=>p.map(r=>r.id===id?{...r,[k]:v}:r));
  const moveMet=(id,dir)=>setMetPlan(p=>{const i=p.findIndex(r=>r.id===id);if((dir<0&&i===0)||(dir>0&&i===p.length-1))return p;const n=[...p];[n[i],n[i+dir]]=[n[i+dir],n[i]];return n;});

  const TABS=[
    {id:"upload",label:"① Upload"},
    {id:"analysis",label:"② Pendency",dis:!data.pen.length},
    {id:"plan",label:"③ MET/F/04",dis:!data.pen.length},
    {id:"f05",label:"④ MET/F/05",dis:!lastF05Rows.length},
    {id:"metseq",label:"⑤ Met Seq",dis:!metPlan.length},
    {id:"history",label:"⑥ History"},
  ];

  const TH={background:"#eef1f7",color:"#4b5a6e",padding:"8px 11px",textAlign:"left",fontSize:11,fontWeight:700,letterSpacing:.4,textTransform:"uppercase",borderBottom:"2px solid #dde3ed",whiteSpace:"nowrap"};
  const TD={padding:"8px 11px",fontSize:13,color:C.text,borderBottom:"1px solid #dde3ed",verticalAlign:"middle"};

  if(!user)return <LoginScreen onLogin={u=>{setUser(u);showToast(`Welcome, ${u.name}! 👋`);}}/>;

  return(
    <>
      <style>{CSS}</style>
      {showAdmin&&user.role==="admin"&&<AdminPanel cfg={cfg} setCfg={c=>{setCfg(c);showToast("Settings saved!");}} onClose={()=>setShowAdmin(false)}/>}
      {showChat&&<ChatBot analysis={null} metPlan={metPlan} cfg={cfg} onClose={()=>setShowChat(false)}/>}
      <div className={darkMode?"pp-dark":""} style={{minHeight:"100vh",background:darkMode?"#0f172a":"#f0f4f8",display:"flex",flexDirection:"column",transition:"background .3s"}}>

        {/* HEADER */}
        <div style={{background:C.navy,padding:"0 16px",display:"flex",alignItems:"stretch",boxShadow:"0 2px 14px rgba(26,48,92,.25)",position:"sticky",top:0,zIndex:100,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px 10px 0",marginRight:8,borderRight:"1px solid rgba(255,255,255,.1)"}}>
            <Logo size={30}/><div><div style={{fontSize:14,fontWeight:800,color:"#fff"}}>PLAN POWER <span style={{background:"#fbbf24",color:"#1a0a00",padding:"1px 6px",borderRadius:4,fontSize:9,fontWeight:900,marginLeft:4}}>v6</span></div><div style={{fontSize:10,color:"rgba(255,255,255,.35)"}}>MET DEPT · PLANNING</div></div>
          </div>
          {TABS.map(t=>(
            <button key={t.id} disabled={t.dis} onClick={()=>!t.dis&&setTab(t.id)} style={{background:"transparent",border:"none",borderBottom:tab===t.id?"3px solid #fbbf24":"3px solid transparent",cursor:t.dis?"not-allowed":"pointer",padding:"0 12px",fontSize:12,fontWeight:700,color:tab===t.id?"#fff":t.dis?"rgba(255,255,255,.2)":"rgba(255,255,255,.55)",display:"flex",alignItems:"center",minHeight:52}}>

            {user.daysLeft!==undefined&&<div style={{background:"rgba(251,191,36,.12)",border:"1px solid rgba(251,191,36,.25)",borderRadius:7,padding:"4px 9px",textAlign:"center"}}><div style={{fontSize:12,fontWeight:800,color:"#fbbf24"}}>{user.daysLeft}d</div><div style={{fontSize:9,color:"rgba(255,255,255,.3)"}}>TRIAL</div></div>}
            <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:700,color:"#fff"}}>{user.name}</div><div style={{fontSize:10,color:"rgba(255,255,255,.38)"}}>{user.company||user.role}</div></div>
            <button onClick={()=>setDarkMode(d=>!d)} style={{...btn("rgba(255,255,255,.08)","rgba(255,255,255,.6)",{border:"1px solid rgba(255,255,255,.1)",padding:"6px 10px",minHeight:0,fontSize:12})}}>{darkMode?"☀":"🌙"}</button>
            {user.role==="admin"&&<button onClick={()=>setShowAdmin(true)} style={{...btn("rgba(251,191,36,.15)","#fbbf24",{border:"1px solid rgba(251,191,36,.3)",padding:"6px 10px",minHeight:0,fontSize:12})}}>👑 Admin</button>}
            <button onClick={logout} style={{...btn("rgba(255,255,255,.08)","rgba(255,255,255,.6)",{border:"1px solid rgba(255,255,255,.1)",padding:"6px 10px",minHeight:0,fontSize:12})}}>↩ Out</button>
          </div>
        </div>

        <div style={{flex:1,padding:"18px 20px",maxWidth:1400,margin:"0 auto",width:"100%"}}>

          {/* ── UPLOAD TAB ── */}
          {tab==="upload"&&(
            <div>
              <h1 style={{fontSize:22,fontWeight:800,color:C.navy,marginBottom:4}}>Upload SAP Files</h1>
              <p style={{fontSize:14,color:"#4b5a6e",marginBottom:18}}>Upload PEN file to start analysis · MJ, FGM, BARE for full fulfillment</p>

                <div style={{background:"linear-gradient(90deg,#b45309,#fbbf24,#fde68a,#fbbf24,#b45309)",height:3}}/>
                <div style={{padding:"15px 18px",display:"flex",alignItems:"center",gap:14}}>
                  <Logo size={42}/>
                  <div style={{flex:1}}>
                    <div style={{color:"#fff",fontWeight:800,fontSize:16}}>Plan Power <span style={{background:"#fbbf24",color:"#1a0a00",padding:"2px 8px",borderRadius:6,fontSize:10,fontWeight:900,marginLeft:6}}>v6</span></div>
                    <div style={{color:"rgba(255,255,255,.45)",fontSize:12,marginTop:2}}>Install as app for offline access & faster loading</div>

                  <button onClick={installApp} style={{background:"linear-gradient(135deg,#fde68a,#fbbf24)",color:"#1a0a00",border:"none",borderRadius:12,padding:"12px 28px",cursor:installable?"pointer":"default",fontSize:15,fontWeight:900,animation:installable?"ppPulse 2s infinite":"none",opacity:installable?1:0.5}} disabled={!installable}>

                </div>
                <SmartUpload
