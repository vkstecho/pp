async function fbSavePlanTracking(planId,runs){
  const db=getDB();
  // Get max globalSeqIndex for each machine to append new runs after existing ones
  const machines=[...new Set(runs.map(r=>r.machine||"M-1"))];
  const maxByMachine={};
  await Promise.all(machines.map(async m=>{maxByMachine[m]=await fbGetMaxGlobalSeq(m);}));
  const counterByMachine={};
  const batch=db.batch();
  runs.forEach(r=>{
    const m=r.machine||"M-1";
    if(!counterByMachine[m])counterByMachine[m]=0;
    counterByMachine[m]++;
    const globalSeqIndex=(maxByMachine[m]||0)+counterByMachine[m];
    const ref=db.collection("pp_tracking").doc(planId+"_"+r.id);
    batch.set(ref,{
      planId,runId:r.id,
      material:r.material||"",machine:m,
      rollSize:r.rollSize||0,slitLen:r.slitLen||0,
      arms:r.arms||[],sets:r.sets||0,od:r.od||"22",
      customers:r.customers||"",source:r.source||"",
      metStatus:"pending",slitStatus:"pending",
      seqIndex:r.seqIndex||0,
      globalSeqIndex,// GLOBAL index — persists across plan refreshes
      planNo:r.planNo||"",
      createdAt:new Date().toISOString()
    });
  });
  await batch.commit();
}

const toInt=v=>parseInt(String(v||"").replace(/[\s,]/g,""))||0;
const toFloat=v=>parseFloat(String(v||"").replace(/,/g,"").replace(/[^\d.-]/g,""))||0;

function parseMat(mat){
  const s=String(mat||"").trim();
  const odM=s.match(/M(22|25|28)$/);
  const od=odM?odM[1]:null;
  const micM=s.match(/G(\d{2})/);
  const micron=micM?parseInt(micM[1]):null;
  const grM=s.match(/G\d{2}(\d{3})/);
  const grade=grM?grM[1]:null;
  const isAB=s.includes("AB");
  const isSM=s.includes("SM");
  const isAL=s.includes("AL");
  return{od,micron,grade,isAB,isSM,isAL};
}

// Grade hierarchy: higher can fill lower
// 320SM > 360M > 301ABM > 301M
function gradeRank(grade,isAB,isSM){
  if(isSM)return 100;// 320SM
  if(grade==="360")return 80;
  if(isAB)return 60;
  if(grade==="301")return 40;
  return 20;
}

function canFillFGM(fgmMat,orderMat){
  const f=parseMat(fgmMat),o=parseMat(orderMat);
  if(!f.micron||f.micron!==o.micron)return false;
  if(f.isAL)return false;
  // OD compat: FGM od must be in compat list for order od
  const odCompat={"22":["22","25","28"],"25":["25","28"],"28":["28"]};
  if(o.od&&!((odCompat[o.od]||[o.od]).includes(f.od)))return false;
  // Grade: FGM grade rank must be >= order grade rank
  const fRank=gradeRank(f.grade,f.isAB,f.isSM);
  const oRank=gradeRank(o.grade,o.isAB,o.isSM);
  if(fRank<oRank)return false;
  // Special: 301 cannot fill 360 order (lower cannot fill higher for grade type)
  if(o.grade==="360"&&f.grade!=="360"&&!f.isSM)return false;
  return true;
}

function canFillBare(bareMat,orderMat){
  // 901 → 301M, 301ABM (universal)
  // 360 → 360M (and 301M if <11MT threshold — handled in engine)
  // 320 → 320SM > 320M > 360M > 301ABM > 301M (cascade)
  const b=parseMat(bareMat),o=parseMat(orderMat);
  if(!b.micron||b.micron!==o.micron)return false;
  if(b.grade==="901"){
    // 901 universal bare → can produce 301 and ABM
    return o.grade==="301"||o.grade==="361"||o.isAB;
  }
  if(b.grade==="360"){
    return o.grade==="360"||(o.grade==="301"&&!o.isAB);
  }
  if(b.grade==="320"){
    // 320 cascade: 320SM→320M→360M→301ABM→301M
    return true;// engine handles priority
  }
  if(b.grade==="361")return o.grade==="361";
  return false;
}

async function readXL(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=e=>{
      try{
        const wb=_XLSX.read(e.target.result,{type:"array",cellDates:true});
        const rawRows=_XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:null,raw:true});
        const rows=rawRows.map(r=>{
          const clean={};
          Object.keys(r).forEach(k=>{
            const v=r[k];
            if(typeof v==="number"&&v>40000&&v<50000&&k.toLowerCase().includes("date")){
              const d=new Date(Date.UTC(1899,11,30));d.setDate(d.getDate()+Math.floor(v));
              clean[k]=d.toISOString().split("T")[0];
            }else{clean[k]=v;}
          });
          return clean;
        });
        res(rows);
      }catch(err){rej(err);}
    };
    fr.onerror=rej;fr.readAsArrayBuffer(file);
  });
}

function detectFileType(rows,filename){
  if(!rows||!rows.length)return null;
  const fname=String(filename||"").toUpperCase();
  const keys=Object.keys(rows[0]).map(k=>String(k).toLowerCase().trim());
  if(keys.some(k=>k.includes("pending")||k.includes("pend")))return"pen";
  const mats=rows.slice(0,30).map(r=>String(r.Material||r.material||"")).filter(Boolean);
  if(mats.some(m=>/^(SM|3SM|3SF)/i.test(m)))return"mj";
  // STK file = combined FGM + BARE stock
  if(fname.includes("STK")){return"stk";}
  const hasBatch=keys.some(k=>k.includes("batch"));
  const hasGrade=keys.some(k=>k.toLowerCase()==="grade");
  if(hasGrade&&hasBatch&&mats.some(m=>/^3FG/i.test(m))){
    const grades=rows.slice(0,10).map(r=>toFloat(r.Grade||0));
    if(grades.some(g=>g===5))return"fgjm";
    return"bare";
  }
  if(mats.some(m=>/^3FG.*901/i.test(m))&&hasBatch)return"bare";
  return null;
}

// Split STK file into FGM rows (Grade 5, with OD) and Bare rows (Grade 4, no OD)
function splitSTKFile(rows){
  const fgjm=[],bare=[];
  rows.forEach(r=>{
    if(!r.Material)return;
    const mat=String(r.Material).trim();
    const grade=toFloat(r.Grade||0);
    // Bare: 901 grade OR grade 4, no M22/M25/M28 suffix
    const isBare=mat.includes("901")||grade===4||(!mat.match(/M(22|25|28)$/)&&grade!==5);
    // FGM: grade 5 OR has metallised OD suffix
    const isFGM=grade===5||mat.match(/M(22|25|28)$/);
    if(isFGM)fgjm.push(r);
    else if(isBare)bare.push(r);
  });
  return{fgjm,bare};
}

// ─── CORE PLANNING ENGINE v8 ──────────────────────────────────────────────────
function smartPlanV8(penData,bareData,mjData,fgjmData,cfg,machineMode,priorities){
  const M1_MIN=cfg.m1Min||1910,M1_MAX=cfg.m1Max||3290;
  const M2_MIN=cfg.m2Min||2900,M2_MAX=cfg.m2Max||3630;
  const TRIM_MIN=cfg.trimMin||5,TRIM_MAX=cfg.trimMax||30;
  const TRIM_MIN_25=cfg.trimMinOD25||15;
  const TRIM_MIN_28=cfg.trimMinOD28||25;// 2.8 OD: 25-30mm min trim
  const MAX_ARMS=cfg.maxArms||5;
  const JUMBO_LENS=cfg.jumboLengths||{"8":73000,"10":73000,"12":73000,"18":48000,"19":48000,"23":48000};
  const MJ_CAP=cfg.mjStockCap||7000;
  const CUST_RULES=cfg.customerRules||{};
  const SALVAGE_OK=cfg.salvageOK||[];
  const SALVAGE_NO=cfg.salvageNO||[];
  const OFFCUT_MIN=cfg.offcutMin||{"10":950,"12":800,"8":800};
  const LEN_TOL=3000;// ±3000m domestic tolerance

  const getJumboLen=(mic)=>{return JUMBO_LENS[String(mic)]||73000;};
  const getCustFixedTrim=(cust)=>{
    const cu=String(cust||"").toUpperCase();
    for(const[k,v]of Object.entries(CUST_RULES)){
      if(cu.includes(k.toUpperCase())&&v.fixedTrim)return v.fixedTrim;
    }
    return null;
  }
  const isGLSFlex=(cust)=>{
    const cu=String(cust||"").toUpperCase();
    for(const[k,v]of Object.entries(CUST_RULES)){
      if(cu.includes(k.toUpperCase())&&v.lengthFlex)return true;
    }
    return false;
  }
  const isSalvageable=(remarks,qr)=>{
    const c=(String(remarks||"")+" "+String(qr||"")).toLowerCase();
    if(SALVAGE_NO.some(b=>c.includes(b)))return false;
    return SALVAGE_OK.some(g=>c.includes(g));
  }
  const fitsMachine=(rollSize,mode)=>{
    if(mode==="M-1"&&rollSize>=M1_MIN&&rollSize<=M1_MAX)return"M-1";
    if(mode==="M-2"&&rollSize>=M2_MIN&&rollSize<=M2_MAX)return"M-2";
    if(!mode||mode==="both"||mode==="auto"){
      if(rollSize>=M1_MIN&&rollSize<=M1_MAX)return"M-1";
      if(rollSize>=M2_MIN&&rollSize<=M2_MAX)return"M-2";
    }
    return null;
  }
  const getMinTrim=(od,cust)=>{
    const ft=getCustFixedTrim(cust);
    if(ft!==null)return ft;
    if(od==="25")return TRIM_MIN_25;if(od==="28")return TRIM_MIN_28;
    return TRIM_MIN;
  }
  const shortCust=(c)=>String(c||"").split(" ").slice(0,2).join(" ");
  const lenCompatible=(orderLen,avail)=>{
    // ±3000m domestic tolerance
    return avail>=(orderLen-LEN_TOL);
  }
  const getKey=(o)=>`${o["Sales Order"]}-${o["Sale Order Item"]}`;

  // ── Filter and sort PEN orders ──
  const pend=penData.filter(r=>r.Material&&(toFloat(r["Pending Rolls"])>0));
  pend.forEach(o=>{
    o._rem=toFloat(o["Pending Rolls"]);
    o._key=getKey(o);
    const delv=String(o["Required Delivery Date"]||"9999").split("T")[0];
    o._overdue=delv<TODAY;
    o._delivery=delv;
  });
  // Mark priority customers
  const isPriority=(o)=>priorities&&priorities.length>0&&
    priorities.some(c=>String(o["Consignee Name"]||"").toUpperCase().includes(c.toUpperCase()));
  pend.forEach(o=>{o._priority=isPriority(o);});

  // Sort: priority customers first → overdue → delivery date → smaller qty → older SO
  pend.sort((a,b)=>{
    if(a._priority&&!b._priority)return-1;
    if(!a._priority&&b._priority)return 1;
    if(a._overdue&&!b._overdue)return-1;
    if(!a._overdue&&b._overdue)return 1;
    if(a._delivery!==b._delivery)return a._delivery.localeCompare(b._delivery);
    if(a._rem!==b._rem)return a._rem-b._rem;
    return String(a["Sales Order"]).localeCompare(String(b["Sales Order"]));
  });

  const planRows=[];

  // ══ PHASE 1: BARE STOCK (Priority 1) ══
  // Sort bare: widest first
  const bareStock=(bareData||[]).filter(r=>r.Material&&r.Batch).map(r=>({
    ...r,_used:false,
    _width:toFloat(r.Width),_length:toFloat(r.Length),
    _micron:toFloat(r.Thickness),_p:parseMat(r.Material)
  })).sort((a,b)=>b._width-a._width);

  for(const o of pend){
    if(o._rem<=0)continue;
    const op=parseMat(o.Material);
    const oW=toFloat(o.Width),oL=toFloat(o.Length);
    for(const b of bareStock){
      if(b._used)continue;
      if(!canFillBare(b.Material,o.Material))continue;
      if(b._micron!==op.micron)continue;
      // bare width must cover arm + min trim
      const minTrim=getMinTrim(op.od,o["Consignee Name"]);
      if(b._width<oW+minTrim)continue;
      const actualTrim=b._width-oW;// single arm
      if(actualTrim>TRIM_MAX)continue;
      // sets from actual bare length
      const sets=oL>0?Math.floor(b._length/oL):0;
      if(sets<=0){
        // try with tolerance
        const setsT=Math.floor(b._length/(oL-LEN_TOL));
        if(setsT<=0)continue;
      }
      const useSets=oL>0?Math.floor(b._length/(oL-LEN_TOL)):0;
      if(useSets<=0)continue;
      const produce=Math.min(useSets,Math.ceil(o._rem));
      const nor=Math.ceil(produce*oL/72000);// use 72000m standard jumbo length, round up
      const mc=fitsMachine(b._width,machineMode)||fitsMachine(b._width,"auto");
      if(!mc)continue;
      planRows.push({
        id:uid(),
        source:"BARE",phase:1,included:true,
        machine:mc,material:o.Material,bareMat:b.Material,bareBatch:b.Batch,
        rollSize:b._width,jumboLen:b._length,noOfRoll:nor,
        trim:actualTrim,slitLen:oL,
        arms:[oW],sets:produce,
        od:op.od||"22",micron:op.micron,
        customers:shortCust(o["Consignee Name"]),
        metalIO:o["Metal Side"]||"I",packMode:o["Packing Mode"]||"WM",
        coreId:toInt(o["Core ID"])||6,
        orders:[o],overdue:o._overdue,delivery:o._delivery,
      });
      o._rem-=produce;
      b._used=true;
      break;
    }
  }

  // ══ PHASE 2: FGM STOCK (Priority 2) ══
  // Sort FGM: FIFO by production date
  const fgmStock=(fgjmData||[]).filter(r=>r.Material&&r.Batch).map(r=>({
    ...r,_used:false,
    _width:toFloat(r.Width),_length:toFloat(r.Length),
    _micron:toFloat(r.Thickness),_p:parseMat(r.Material),
    _salvage:isSalvageable(r.Remarks||"",r["Quality Remarks"]||""),
    _notJayesh:(String(r.Remarks||"")+" "+String(r["Quality Remarks"]||"")).toLowerCase().includes("not jayesh"),
    _prodDate:String(r["Production Date"]||""),
  })).sort((a,b)=>a._prodDate.localeCompare(b._prodDate));

  for(const o of pend){
    if(o._rem<=0)continue;
    const isJayesh=String(o["Consignee Name"]||"").toUpperCase().includes("JAYESH");
    for(const f of fgmStock){
      if(f._used||!f._salvage)continue;
      if(f._notJayesh&&isJayesh)continue;
      if(!canFillFGM(f.Material,o.Material))continue;
      if(f._width<toFloat(o.Width))continue;
      planRows.push({
        id:uid(),
        source:"FGJM",phase:2,included:true,
        material:o.Material,fgmBatch:f.Batch,fgmMat:f.Material,
        fgmWidth:f._width,orderWidth:toFloat(o.Width),
        customers:shortCust(o["Consignee Name"]),
        orders:[o],overdue:o._overdue,delivery:o._delivery,
      });
      o._rem-=1;
      f._used=true;
      break;
    }
  }

  // ══ PHASE 3: MJ SLITTING (Priority 3) ══
  // Check MJ stock cap
  const mjTotalKg=(mjData||[]).filter(r=>r.Material&&r.Batch&&!parseMat(String(r.Material).replace("3SF-","3FG-")).isAL).reduce((s,r)=>s+toFloat(r.Weight),0);
  const mjBlocked=false;// Always advisory — never block fresh runs

  const mjStock=(mjData||[]).filter(r=>r.Material&&r.Batch).map(r=>{
    const matFG=String(r.Material).replace("3SF-","3FG-");
    const p=parseMat(matFG);
    if(p.isAL)return null;
    const machine=String(r.Machine||"").includes("M2")||String(r.Machine||"").includes("M-2")?"M-2":"M-1";
    return{
      ...r,_used:false,_matFG:matFG,_p:p,
      _width:toFloat(r.Width),_length:toFloat(r.Length),
      _remLen:toFloat(r.Length),
      _machine:machine,_coreId:machine==="M-2"?8:6,
    };
  }).filter(Boolean);

  // MJ trim rules: 10-20mm only
  // If trim > 20mm → add Grade 5 arm from excess
  // Grade 5 min width: 10µ=910mm, 12µ=490mm, others=400mm
  // If Grade 5 arm > 33% of MJ width → skip MJ, send to Fresh Met
  const MJ_TRIM_MIN=10, MJ_TRIM_MAX=20;
  const getMJ5GradeMin=(micron)=>{
    if(micron===10)return 910;
    if(micron===12)return 490;
    return 400;
  };
  const planMJRun=(mj,o,oW,oL,mjLen,mjBatch,combined)=>{
    const mic=mj._p.micron||10;
    const maxArmsForOrder=Math.min(MAX_ARMS,Math.floor(mj._width/oW));
    if(maxArmsForOrder<=0)return null;
    // Try different arm counts
    for(let armCount=maxArmsForOrder;armCount>=1;armCount--){
      const armSum=armCount*oW;
      const rawTrim=mj._width-armSum;
      // Try trim 10-20mm directly
      if(rawTrim>=MJ_TRIM_MIN&&rawTrim<=MJ_TRIM_MAX){
        return{armCount,armWidths:Array(armCount).fill(oW),trim:rawTrim,grade5Arm:null};
      }
      // Trim > 20mm → try adding Grade 5 arm
      if(rawTrim>MJ_TRIM_MAX){
        // Try each trim 10-20mm and see if remaining width makes valid Grade 5 arm
        // Grade 5 arm: width must be multiple of 5mm
        // Trim range 8-13mm (up to 13mm to achieve multiple of 5)
        const g5Min=getMJ5GradeMin(mic);
        for(let trim=8;trim<=13;trim++){
          const rawG5=mj._width-armSum-trim;
          // Round DOWN to nearest multiple of 5
          const g5Width=Math.floor(rawG5/5)*5;
          // Actual trim = MJ_width - armSum - g5Width (slightly more than requested trim)
          const actualTrim=mj._width-armSum-g5Width;
          if(actualTrim<8||actualTrim>13)continue;// trim out of range after rounding
          if(g5Width<g5Min)continue;// too narrow
          if(g5Width/mj._width>0.33){
            return null;// Grade 5 > 33% of MJ width → skip to Fresh Met
          }
          return{armCount,armWidths:Array(armCount).fill(oW),trim:actualTrim,
            grade5Arm:{width:g5Width,length:oL,micron:mic,batch:mjBatch}};
        }
        // No valid Grade 5 configuration found — skip MJ
        // No valid Grade 5 arm found and trim > 20mm → skip MJ
        return null;
      }
      // rawTrim < 10mm → try fewer arms
    }
    return null;
  }

  for(const o of pend){
    if(o._rem<=0)continue;
    const op=parseMat(o.Material);
    const oW=toFloat(o.Width),oL=toFloat(o.Length);
    for(const mj of mjStock){
      if(mj._used)continue;
      if(mj._p.micron!==op.micron)continue;
      if(mj._p.grade!==op.grade)continue;
      if(mj._p.isAB!==op.isAB)continue;
      const odC={"22":["22","25","28"],"25":["25","28"],"28":["28"]};
      if(op.od&&!(odC[op.od]||[op.od]).includes(mj._p.od))continue;

      const sets=oL>0?Math.floor(mj._remLen/(oL-LEN_TOL)):0;
      if(sets<=0){
        // try combining with another MJ roll
        const partner=mjStock.find(m2=>!m2._used&&m2!==mj&&
          m2._p.micron===op.micron&&m2._p.grade===op.grade&&m2._p.isAB===op.isAB&&
          Math.abs(m2._width-mj._width)<=250&&
          (mj._remLen+m2._length)>=(oL-LEN_TOL));
        if(partner){
          const combLen=mj._remLen+partner._length;
          const combSets=Math.floor(combLen/(oL-LEN_TOL));
          if(combSets>0){
            const plan=planMJRun(mj,o,oW,oL,combLen,mj.Batch+"+"+partner.Batch,true);
            if(!plan){continue;}// trim rule failed — skip
            const produce=Math.min(plan.armCount*combSets,Math.ceil(o._rem));
            const nor=Math.ceil(produce*oL/72000);
            const displayArms=[...plan.armWidths];
            if(plan.grade5Arm)displayArms.push("5G:"+plan.grade5Arm.width);
            planRows.push({
              id:uid(),source:"MJ",phase:3,included:true,selected:true,rejected:false,
              material:o.Material,mjBatch:mj.Batch+"+"+partner.Batch,
              mjWidth:mj._width,mjLength:combLen,
              arms:plan.armWidths,armDisplay:displayArms,
              sets:Math.ceil(produce/plan.armCount),
              noOfRoll:nor,trim:plan.trim,
              grade5Arm:plan.grade5Arm||null,
              machine:mj._machine,coreId:mj._coreId,
              slitLen:oL,customers:shortCust(o["Consignee Name"]),
              orders:[o],overdue:o._overdue,delivery:o._delivery,combined:true,
            });
            o._rem-=produce;
            mj._used=true;partner._used=true;
            break;
          }
        }
        continue;
      }

      // Plan with trim rules
      const plan=planMJRun(mj,o,oW,oL,mj._remLen,mj.Batch,false);
      if(!plan){continue;}// trim > 20mm and no valid Grade5 arm — skip, goes to Fresh Met

      const produce=Math.min(plan.armCount*sets,Math.ceil(o._rem));
      const actualSets=Math.ceil(produce/plan.armCount);
      const lenUsed=actualSets*oL;
      const nor=Math.ceil(lenUsed/72000);
      const displayArms=[...plan.armWidths];
      if(plan.grade5Arm)displayArms.push("5G:"+plan.grade5Arm.width);
      planRows.push({
        id:uid(),source:"MJ",phase:3,included:true,selected:true,rejected:false,
        material:o.Material,mjBatch:mj.Batch,
        mjWidth:mj._width,mjLength:mj._length,
        arms:plan.armWidths,armDisplay:displayArms,
        sets:actualSets,noOfRoll:nor,trim:plan.trim,
        grade5Arm:plan.grade5Arm||null,
        machine:mj._machine,coreId:mj._coreId,
        slitLen:oL,customers:shortCust(o["Consignee Name"]),
        orders:[o],overdue:o._overdue,delivery:o._delivery,
      });
      o._rem-=produce;
      mj._remLen-=lenUsed;
      if(mj._remLen<(oL-LEN_TOL))mj._used=true;
      break;
    }
  }

  // ══ PHASE 4: FRESH MET RUNS (always generated — MJ cap is advisory only) ══
  const freshOrders=pend.filter(o=>o._rem>0);
  if(freshOrders.length>0){
    // Group by micron
    const micGroups={};
    for(const o of freshOrders){
      const mic=parseMat(o.Material).micron||10;
      if(!micGroups[mic])micGroups[mic]=[];
      micGroups[mic].push({...o,w:toFloat(o.Width),l:toFloat(o.Length),cu:String(o["Consignee Name"]||""),_key:o._key||getKey(o),od:parseMat(o.Material).od||"22"});
    }

    // Trim ladder per roll position from same jumbo
    // trim logic is in findBestCombo getTrimOrder

    const findBestCombo=(items,mode,fixedTrim,odType,mustInclude=null)=>{
      // If mustInclude: at least 1 arm must be from mustInclude list
      // This ensures priority customers get served while filling arms efficiently
      // CORRECT TRIM LOGIC:
      // Always try 15mm first → step down only if arm widths force it
      // 2.2 OD: 15 → 10 → 5 (last resort)
      // 2.5/2.8 OD: 15 → 16 → ... → 30 (never below 15mm)
      // Jayesh: fixedTrim=30mm always
      // Each run independently finds its best trim

      let best=null,bestTrim=9999;
      const vi=items.filter(i=>i.w>0&&i._rem>0);
      if(!vi.length) return null;

      const cands=[];
      for(const it of vi.slice(0,12)){
        const mr=Math.min(MAX_ARMS,Math.ceil(it._rem));
        for(let r=0;r<Math.min(mr,3);r++) cands.push(it);
      }
      if(!cands.length) return null;

      // Trim priority per OD type — 15mm always tried first
      const getTrimOrder=(od,cust)=>{
        if(fixedTrim!==null&&fixedTrim!==undefined) return [fixedTrim];
        const ft=getCustFixedTrim(cust);
        if(ft!==null) return [ft];
        if(od==="25"){
          const arr=[];for(let t=15;t<=TRIM_MAX;t++) arr.push(t);return arr;
        }
        if(od==="28"){
          const arr=[];for(let t=25;t<=TRIM_MAX;t++) arr.push(t);return arr;
        }
        return [15,10,5];
      };

      for(const n of[3,2,4,5,1]){
        if(n>cands.length) continue;
        if(best&&bestTrim<=TRIM_MIN) break;
        const indices=Array(n).fill(0);
        const nextC=()=>{
          for(let i=n-1;i>=0;i--){
            if(indices[i]<cands.length-1){
              indices[i]++;
              for(let j=i+1;j<n;j++) indices[j]=indices[i];
              return true;
            }
          }
          return false;
        };
        do{
          const armSum=indices.reduce((s,i)=>s+cands[i].w,0);
          const mixed=new Set(indices.map(i=>cands[i].od)).size>1;
          if(mixed&&(armSum+15)>=2500) continue;
          const cts={};let ok=true;
          for(const i of indices){
            cts[cands[i]._key]=(cts[cands[i]._key]||0)+1;
            if(cts[cands[i]._key]>Math.ceil(cands[i]._rem)){ok=false;break;}
          }
          if(!ok) continue;
          // If mustInclude specified, at least 1 arm must be a priority item
          if(mustInclude&&mustInclude.length>0){
            const hasPriority=indices.some(i=>mustInclude.some(m=>m._key===cands[i]._key));
            if(!hasPriority)continue;
          }
          const cu=cands[indices[0]]&&cands[indices[0]].cu||"";
          const od=cands[indices[0]]&&cands[indices[0]].od||odType||"22";
          const trimOrder=getTrimOrder(od,cu);
          for(const t of trimOrder){
            if(t<TRIM_MIN||t>TRIM_MAX) continue;
            const rs=armSum+t;
            const mc=fitsMachine(rs,mode);
            if(!mc) continue;
            if(t<bestTrim){bestTrim=t;best={arms:indices.map(i=>cands[i]),trim:t,rs,mc};}
            break; // Stop at first valid trim (15mm tried first)
          }
          if(best&&bestTrim<=TRIM_MIN) break;
        }while(nextC());
        if(best&&bestTrim<=TRIM_MIN) break;
      }
      return best;
    }

    for(const[micStr,orders]of Object.entries(micGroups).sort()){
      const mic=parseInt(micStr);
      const JL=getJumboLen(mic);
      const items=orders.map(o=>({...o,w:toFloat(o.Width),l:toFloat(o.Length),cu:String(o["Consignee Name"]||""),_priority:!!o._priority,_key:o._key||getKey(o),od:parseMat(o.Material).od||"22"}));

      let safety=0;
      while(items.some(i=>i._rem>0)&&safety++<200){
        // Sort active: priority customers first, then by remaining qty
        const active=items.filter(i=>i._rem>0).sort((a,b)=>{
          if(a._priority&&!b._priority)return-1;
          if(!a._priority&&b._priority)return 1;
          return b._rem-a._rem;
        });
        if(!active.length)break;

        // Determine dominant OD (from priority items first, then all)
        const priorityActive=active.filter(i=>i._priority);
        const domSource=priorityActive.length>0?priorityActive:active;
        const odGroups={};
        for(const a of domSource){if(!odGroups[a.od])odGroups[a.od]=[];odGroups[a.od].push(a);}
        const domOD=Object.entries(odGroups).sort((a,b)=>b[1].length-a[1].length)[0][0];

        // Check Jayesh
        const jayeshItems=active.filter(i=>getCustFixedTrim(i.cu)!==null);
        let found=null;
        if(jayeshItems.length){
          const ft=getCustFixedTrim(jayeshItems[0].cu);
          found=findBestCombo(jayeshItems,machineMode,ft,domOD);
        }
        // Try priority customers first — fill remaining arms with any customer
        if(!found&&priorityActive.length>0){
          found=findBestCombo(active,machineMode,null,domOD,priorityActive);
        }
        if(!found)found=findBestCombo(active,machineMode,null,domOD);

        if(!found){
          // Single arm fallback
          const it=active.sort((a,b)=>b._rem-a._rem)[0];
          const ft=getCustFixedTrim(it.cu);
          const minTrimOD=it.od==="28"?TRIM_MIN_28:it.od==="25"?TRIM_MIN_25:TRIM_MIN;
          // Try 15mm first, step down only if forced
          const _trimOrd=it.od==="25"||it.od==="28"?Array.from({length:16},(_,k)=>k+15):[15,10,5];
          for(const t of _trimOrd){
            if(t<minTrimOD)continue;
            if(ft!==null&&t!==ft)continue;
            const rs=it.w+t;
            const mc=fitsMachine(rs,machineMode)||fitsMachine(rs,"auto");
            if(mc){found={arms:[it],trim:t,rs,mc};break;}
          }
          if(!found){active[0]._rem=0;continue;}
        }

        const armWidths=found.arms.map(a=>a.w);
        const rollSize=found.rs;
        const odUsed=found.arms[0].od||domOD;

        // Each arm calculates sets independently
        const armSets=found.arms.map(a=>{
          const al=a.l||24000;
          return al>0?Math.floor(JL/al):1;
        });
        const minSets=Math.min(...armSets);
        const sl=found.arms[0].l||24000;
        const nor=Math.ceil(minSets*sl/72000);

        // Bare material
        const grades=new Set(found.arms.map(a=>parseMat(a.Material).grade));
        let bareMat="3FG-G"+String(mic).padStart(2,"0")+"901";
        if([...grades].includes("360"))bareMat="3FG-G"+String(mic).padStart(2,"0")+"360";
        if([...grades].includes("320"))bareMat="3FG-G"+String(mic).padStart(2,"0")+"320";

        const custs=[...new Set(found.arms.map(a=>shortCust(a.cu)))].join(" / ");
        const trimGrade=found.trim<=10?"🟢":found.trim<=15?"🟡":found.trim<=25?"🟠":"🔴";

        // Trim is self-determined per run (15mm first, step down only if forced)

        planRows.push({
          id:uid(),
          source:"BARE_FRESH",phase:4,included:true,selected:true,rejected:false,
          machine:found.mc,material:found.arms[0].Material||"",bareMat,
          rollSize,jumboLen:JL,noOfRoll:nor,
          trim:found.trim,trimGrade,slitLen:sl,
          arms:armWidths,armSets,sets:minSets,
          od:odUsed,micron:mic,
          customers:custs,metalIO:found.arms[0]["Metal Side"]||"I",
          packMode:"WM",coreId:found.mc==="M-2"?8:6,
          orders:found.arms,overdue:found.arms.some(a=>a._overdue),
          delivery:found.arms[0]._delivery||"",
        });

        // Deduct
        const ac={};
        for(const a of found.arms){ac[a._key]=(ac[a._key]||0)+1;}
        for(const[k,cnt]of Object.entries(ac)){
          const it=items.find(i=>i._key===k);
          if(it){
            const armCount=armSets[found.arms.findIndex(a=>a._key===k)]||minSets;
            it._rem=Math.max(0,it._rem-cnt*armCount);
          }
        }
      }
    }
  }

  // ══ SEQUENCE OPTIMIZATION — group by machine then OD then width desc ══
  // Rule: same OD runs must be together to minimize boat changes
  // Order: 2.2 OD first (most common) → 2.5 OD → 2.8 OD
  // Within same OD: widest rolls first (max output per shift)
  // Separate M-1 and M-2 sequences
  const OD_ORDER={"22":1,"25":2,"28":3};
  const metRunsForSeq=planRows.filter(r=>r.source==="BARE_FRESH"||r.source==="BARE");
  
  // Sort met runs: machine → OD group → roll size desc (widest first)
  metRunsForSeq.sort((a,b)=>{
    if(a.machine!==b.machine)return a.machine<b.machine?-1:1;
    const oa=OD_ORDER[a.od||"22"]||1, ob=OD_ORDER[b.od||"22"]||1;
    if(oa!==ob)return oa-ob;
    return (b.rollSize||0)-(a.rollSize||0);// widest first within same OD
  });

  // Assign seqIndex per machine
  const seqCounters={"M-1":0,"M-2":0};
  metRunsForSeq.forEach(r=>{
    const m=r.machine||"M-1";
    r.seqIndex=seqCounters[m]||0;
    seqCounters[m]=(seqCounters[m]||0)+1;
  });

  // Also sort MJ runs by machine → OD → width
  const mjRunsForSeq=planRows.filter(r=>r.source==="MJ");
  mjRunsForSeq.sort((a,b)=>{
    if(a.machine!==b.machine)return a.machine<b.machine?-1:1;
    const oa=OD_ORDER[a.od||"22"]||1, ob=OD_ORDER[b.od||"22"]||1;
    if(oa!==ob)return oa-ob;
    return (b.mjWidth||0)-(a.mjWidth||0);
  });

  // ══ APPLY SORT ORDER TO planRows ══
  // Re-order planRows so F/04 and Sequence both show OD-grouped order
  // Section order: overdue first, then MJ, then FGM, then FRESH MET (sorted by machine+OD+size)
  const OD_ORD={"22":1,"25":2,"28":3};
  planRows.sort((a,b)=>{
    // Overdue always first
    if(a.overdue&&!b.overdue)return -1;
    if(!a.overdue&&b.overdue)return 1;
    // Phase order: FGM(2) → MJ(3) → FRESH(4)
    if((a.phase||4)!==(b.phase||4))return(a.phase||4)-(b.phase||4);
    // For met runs: machine first, then OD group, then widest roll first
    if(a.source==="BARE_FRESH"||a.source==="BARE"){
      if(a.machine!==b.machine)return a.machine<b.machine?-1:1;
      const oa=OD_ORD[a.od||"22"]||1, ob=OD_ORD[b.od||"22"]||1;
      if(oa!==ob)return oa-ob;
      return(b.rollSize||0)-(a.rollSize||0);// widest first
    }
    // For MJ runs: machine, then OD, then width
    if(a.source==="MJ"){
      if(a.machine!==b.machine)return a.machine<b.machine?-1:1;
      const oa=OD_ORD[a.od||"22"]||1, ob=OD_ORD[b.od||"22"]||1;
      if(oa!==ob)return oa-ob;
      return(b.mjWidth||0)-(a.mjWidth||0);
    }
    return 0;
  });

  // Assign seqIndex on sorted planRows
  const _seqC={"M-1":0,"M-2":0};
  planRows.forEach(r=>{
    if(r.source==="BARE_FRESH"||r.source==="BARE"){
      const m=r.machine||"M-1";
      r.seqIndex=_seqC[m]||0;
      _seqC[m]=(_seqC[m]||0)+1;
    }
  });

    // ══ APPLY CORRECT SEQUENCE ORDER TO planRows ══
  // Rule 1: group by OD — 2.2 OD → 2.5 OD → 2.8 OD (minimize boat changes)
  // Rule 2: after each boat changeover, FIRST run must be 2.2 OD (boat seasoning)
  // Rule 3: widest rolls first within same OD group
  const _OD_ORD={"22":1,"25":2,"28":3};

  // Sort met runs per machine with OD grouping + widest first
  const _metRuns=planRows.filter(r=>r.source==="BARE_FRESH"||r.source==="BARE");
  const _mjRuns=planRows.filter(r=>r.source==="MJ");
  const _otherRuns=planRows.filter(r=>r.source!=="BARE_FRESH"&&r.source!=="BARE"&&r.source!=="MJ");

  // Function to resequence met runs for one machine with boat-seasoning rule
  const resequenceForMachine=(runs,machine)=>{
    const machRuns=runs.filter(r=>r.machine===machine);
    if(!machRuns.length)return[];
    const boatLife={"22":cfg.boatLife22||550000,"25":cfg.boatLife25||330000,"28":cfg.boatLife28||280000};

    // Group by OD
    const byOD={"22":[],"25":[],"28":[]};
    machRuns.forEach(r=>{ const od=r.od||"22"; (byOD[od]=byOD[od]||[]).push(r); });
    // Sort each OD group widest first
    Object.values(byOD).forEach(g=>g.sort((a,b)=>(b.rollSize||0)-(a.rollSize||0)));

    const result=[];
    const odGroups=["22","25","28"].filter(od=>byOD[od]&&byOD[od].length>0);

    odGroups.forEach((od,gi)=>{
      // After first group: insert 1× 2.2 OD seasoning run before each new OD group
      if(gi>0&&byOD["22"]&&byOD["22"].length>0){
        // Seasoning run should be WIDER than the first roll of the upcoming OD group
        // This conditions the boat properly for the wider film
        const nextGroupWidest=byOD[od][0]?.rollSize||0;
        // Find widest 2.2 OD run that is >= upcoming group's widest roll
        const widerRun=byOD["22"].find(r=>r.rollSize>=nextGroupWidest);
        // If none is wider, use the widest available 2.2 OD run
        const seasonSource=widerRun||byOD["22"][0];// byOD["22"] sorted widest first
        const seasonRun={...seasonSource,_seasoning:true,_seasoningFor:od,_seasoningTarget:nextGroupWidest};
        result.push(seasonRun);
      }
      byOD[od].forEach(r=>result.push(r));
    });
    return result;
  };

  const seqM1=resequenceForMachine(_metRuns,"M-1");
  const seqM2=resequenceForMachine(_metRuns,"M-2");
  const allSeqMet=[...seqM1,...seqM2];

  // Sort MJ runs
  _mjRuns.sort((a,b)=>{
    if(a.machine!==b.machine)return a.machine<b.machine?-1:1;
    const oa=_OD_ORD[a.od||"22"]||1,ob=_OD_ORD[b.od||"22"]||1;
    if(oa!==ob)return oa-ob;
    return(b.mjWidth||0)-(a.mjWidth||0);
  });

  // Rebuild planRows in correct order: overdue first, then by phase
  planRows.length=0;
  // Add overdue non-met first
  _otherRuns.filter(r=>r.overdue).forEach(r=>planRows.push(r));
  _mjRuns.filter(r=>r.overdue).forEach(r=>planRows.push(r));
  // Non-overdue other runs (FGM)
  _otherRuns.filter(r=>!r.overdue).forEach(r=>planRows.push(r));
  // MJ runs (non-overdue)
  _mjRuns.filter(r=>!r.overdue).forEach(r=>planRows.push(r));
  // Met runs in correct OD sequence
  allSeqMet.forEach(r=>planRows.push(r));

  // Assign seqIndex after final sort
  const _seqC2={"M-1":0,"M-2":0};
  planRows.forEach(r=>{
    if(r.source==="BARE_FRESH"||r.source==="BARE"){
      const m=r.machine||"M-1";
      r.seqIndex=_seqC2[m]||0;
      _seqC2[m]=(_seqC2[m]||0)+1;
    }
  });

  // ══ F/05 GENERATION ══
  const f05Rows=generateF05(planRows.filter(r=>r.source==="BARE_FRESH"),cfg);

  return{planRows,f05Rows,mjBlocked:false,mjAdvisory:mjTotalKg>(cfg.mjStockCap||7000),mjTotalKg,overdueCount:pend.filter(o=>o._overdue).length,remainingOrders:pend.filter(o=>o._rem>0)};
}

function generateF05(metRuns,cfg){
  const JUMBO_W=cfg.jumboWidth||10450;
  const TARGET_MIN=10100,TARGET_MAX=10300;
  const OFFCUT_MIN=cfg.offcutMin||{"10":950,"12":800,"8":800};
  const OFFCUT_MAX=2000;// Primary slitter CANNOT produce 5-grade roll > 2000mm

  // Group by MICRON only — mix different bare materials of same micron on same jumbo
  const micGroups={};
  for(const r of metRuns){
    const mic=String(r.micron||10);
    if(!micGroups[mic])micGroups[mic]={micron:Number(mic),runs:[],jumboLen:r.jumboLen};
    micGroups[mic].runs.push(r);
  }

  const f05Rows=[];
  for(const[mic,grp] of Object.entries(micGroups)){
    const rolls=[...grp.runs];
    let rowRolls=[],rowSum=0;
    // F/05 trim rules per micron:
    // 10µ: trim = 200-360mm | 12µ: trim = 180-300mm | rest → 5 Grade (max 2000mm)
    const TRIM_F05_MIN=grp.micron===12?180:grp.micron===8?150:200;
    const TRIM_F05_MAX=grp.micron===12?300:grp.micron===8?250:360;

    const pushRow=()=>{
      if(!rowRolls.length)return;
      const sum=rowRolls.reduce((s,r)=>s+r.rollSize,0);
      const remaining=JUMBO_W-sum;

      // Split remaining into: trim (200-360mm) + 5 Grade offcut
      // Target: use minimum trim, rest goes to 5 Grade
      let trim=TRIM_F05_MIN;// start with min trim
      let rawOffcut=remaining-trim;

      // If offcut > 2000mm — too wide, increase trim to reduce offcut
      if(rawOffcut>OFFCUT_MAX){
        // Try to increase trim to bring offcut ≤ 2000mm
        const neededTrim=remaining-OFFCUT_MAX;
        trim=Math.min(TRIM_F05_MAX, Math.max(TRIM_F05_MIN, neededTrim));
        rawOffcut=remaining-trim;
      }

      // If still > 2000mm after max trim → packing error, show as trim only
      let offcut=0;
      let offcutWarn=false;
      if(rawOffcut>OFFCUT_MAX){
        trim=remaining;// show all as trim (packing error)
        offcut=0;
        offcutWarn=true;
      } else if(rawOffcut>=( OFFCUT_MIN[String(grp.micron)]||950)){
        offcut=Math.floor(rawOffcut/5)*5;// round DOWN to multiple of 5mm
        trim=remaining-offcut;// actual trim after rounding
      } else if(rawOffcut>0&&rawOffcut<(OFFCUT_MIN[String(grp.micron)]||950)){
        // Too narrow for useful 5 Grade — add to trim
        trim=remaining;
        offcut=0;
      }

      // Clamp trim to allowed range
      if(offcut===0&&!offcutWarn){
        trim=Math.max(TRIM_F05_MIN, Math.min(TRIM_F05_MAX, trim));
      }

      const bareMats=[...new Set(rowRolls.map(r=>r.bareMat||r.material||"").filter(Boolean))];
      const primaryBare=bareMats[0]||"";
      f05Rows.push({
        material:primaryBare,
        mixedMats:bareMats.length>1?bareMats:null,
        length:grp.jumboLen,
        rolls:rowRolls.map(r=>({
          size:r.rollSize,coreId:r.coreId,machine:r.machine,
          customer:r.customers||"DOMESTIC",metPlan:"",
          bareMat:r.bareMat||r.material||primaryBare,
          altMat:(()=>{const bp=parseMat(primaryBare),mp=parseMat(r.material||"");
            return(bp.grade&&mp.grade&&bp.grade!==mp.grade)?mp.grade:null;})()
        })),
        trim,jumboWidth:JUMBO_W,
        offcut,micron:grp.micron,
        offcutWarn,
        trimWarn:trim<TRIM_F05_MIN||trim>TRIM_F05_MAX,
      });
    };
    for(let ri=0;ri<rolls.length;ri++){
      const r=rolls[ri];
      if(rowSum+r.rollSize>TARGET_MAX){
        // Before closing, check if closing now would leave > 2000mm unused
        const wouldRemain=JUMBO_W-rowSum;
        const trimMin2=grp.micron===12?180:200;
        const maxOffcut=OFFCUT_MAX+TRIM_F05_MAX;
        if(wouldRemain>maxOffcut&&rowRolls.length>0){
          // Try adding this roll anyway if it fits at all
          if(rowSum+r.rollSize<=JUMBO_W-TRIM_F05_MIN){
            rowRolls.push(r);rowSum+=r.rollSize;
            pushRow();rowRolls=[];rowSum=0;
            continue;
          }
        }
        pushRow();rowRolls=[];rowSum=0;
      }
      rowRolls.push(r);rowSum+=r.rollSize;
      if(rowSum>=TARGET_MIN&&rowSum<=TARGET_MAX){
        // Only close row if remaining would be ≤ OFFCUT_MAX + max_trim
        const remain=JUMBO_W-rowSum;
        if(remain<=OFFCUT_MAX+TRIM_F05_MAX){
          pushRow();rowRolls=[];rowSum=0;
        }
      }
    }
    if(rowRolls.length)pushRow();
  }
  return f05Rows;
}

function SmartUpload({data,onUpload,disabled}){
  const ref=useRef();
  const [dragOver,setDragOver]=useState(false);
  const [detected,setDetected]=useState([]);
  const handleFiles=async(fileList)=>{
    const files=Array.from(fileList).filter(f=>/\.(xlsx|xls)$/i.test(f.name)).slice(0,3);
    if(!files.length)return;
    setDetected([]);
    const results=[];
    for(const file of files){
      try{
        const rows=await readXL(file);
        const type=detectFileType(rows,file.name);
        if(type==="stk"){
          // Split STK into FGM and BARE
          const{fgjm,bare}=splitSTKFile(rows);
          results.push({file:file.name,type:"stk",rows:rows.length,status:"ok"});
          if(fgjm.length>0)onUpload("fgjm",fgjm,file.name+"[FGM]");
          if(bare.length>0)onUpload("bare",bare,file.name+"[BARE]");
        } else if(type){
          results.push({file:file.name,type,rows:rows.length,status:"ok"});
          onUpload(type,rows,file.name);
        } else results.push({file:file.name,type:null,rows:rows.length,status:"unknown"});
      }catch(e){results.push({file:file.name,type:null,rows:0,status:"error",error:e.message});}
    }
    setDetected(results);setTimeout(()=>setDetected([]),8000);
  };
  const labels={pen:"PEN",mj:"MJ",fgjm:"FGM",bare:"BARE",stk:"STK"};
  // Show STK as combined FGM+BARE, or individual if uploaded separately
  const loaded=Object.entries(data).filter(([k,v])=>v.length>0);
  const hasStk=data.fgjm.length>0||data.bare.length>0;
  return(
    <div>
      <div onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files);}}
        onClick={()=>!disabled&&ref.current&&ref.current.click()}
        className={`upload-zone${dragOver?" drag":""}${(loaded.length>=3&&data.pen.length>0&&data.mj.length>0&&(data.fgjm.length>0||data.bare.length>0))?" loaded":""}`}>
        <input ref={ref} type="file" accept=".xlsx,.xls" multiple style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
        <div style={{fontSize:32,marginBottom:8}}>{loaded.length===4?"🎯":"📂"}</div>
        <div style={{fontWeight:800,fontSize:16,color:C.navy}}>{loaded.length===0?"Drop 3 SAP Excel files here":(()=>{const n=[data.pen.length>0,data.mj.length>0,(data.fgjm.length>0||data.bare.length>0)].filter(Boolean).length;return n+"/3 files loaded";})()}</div>
        <div style={{fontSize:12,color:"#4b5a6e",marginTop:6}}>Auto-detects PEN · MJ · STK (FGM+BARE combined) · FGM · BARE</div>
        <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:12,flexWrap:"wrap"}}>
          {["pen","mj","stk"].map(k=>{
            const isL=k==="stk"?(data.fgjm.length>0||data.bare.length>0):(data[k]&&data[k].length>0);
            const lbl=k==="stk"?"STK (Stock)":k.toUpperCase();
            const sub=k==="stk"?
              (data.fgjm.length>0&&data.bare.length>0?`FGM ${data.fgjm.length}r + BARE ${data.bare.length}r`:
               data.fgjm.length>0?`FGM ${data.fgjm.length}r`:
               data.bare.length>0?`BARE ${data.bare.length}r`:"—"):
              (isL?`✓ ${data[k].length} rows`:"—");
            return <div key={k} style={{padding:"5px 12px",borderRadius:12,fontSize:12,fontWeight:700,background:isL?"#f0fdf4":"#f8fafc",border:isL?"2px solid #86efac":"2px dashed #dde3ed",color:isL?"#15803d":"#94a3b8"}}>{lbl}: {sub}</div>;
          })}

        </div>
      </div>
      {detected.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
        {detected.map((d,i)=><div key={i} style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:700,background:d.status==="ok"?"#f0fdf4":"#fef9c3",border:d.status==="ok"?"1px solid #86efac":"1px solid #fbbf24",color:d.status==="ok"?"#15803d":"#92400e"}}>{d.status==="ok"?"✓ "+d.file+" → "+(labels[d.type]||d.type)+"("+d.rows+")":"⚠ "+d.file+" — unknown type"}</div>)}
      </div>}
    </div>
  );
}

// ─── PENDENCY ANALYSIS ────────────────────────────────────────────────────────
function PendencyAnalysis({pen,mj,fgjm,bare,cfg,onMakePlan}){
  const [view,setView]=useState("customer");
  const [sortKey,setSortKey]=useState("rolls");
  const [sortDir,setSortDir]=useState(-1);
  const [selCustomers,setSelCustomers]=useState([]);
  const [expandedCustomers,setExpandedCustomers]=useState([]);
  const [selMicron,setSelMicron]=useState(null);
  const [selOD,setSelOD]=useState(null);
  const [selSoDate,setSelSoDate]=useState(null);// filter by SO Crtd Date
  const [selOrders,setSelOrders]=useState([]);// individual ticked orders (by _key)
  const [plannedOrders,setPlannedOrders]=useState([]);

  const toggleCustomer=name=>setSelCustomers(s=>s.includes(name)?s.filter(k=>k!==name):[...s,name]);
  const toggleExpandCustomer=name=>setExpandedCustomers(s=>s.includes(name)?s.filter(k=>k!==name):[...s,name]);
  const toggleOrder=key=>setSelOrders(s=>s.includes(key)?s.filter(k=>k!==key):[...s,key]);
  const toggleAllOrders=arr=>{
    const keys=arr.map(o=>o._key);
    const allSel=keys.every(k=>selOrders.includes(k));
    if(allSel)setSelOrders(s=>s.filter(k=>!keys.includes(k)));
    else setSelOrders(s=>[...new Set([...s,...keys])]);
  };

  useEffect(()=>{
    fbGetPlans(50).then(plans=>{
      const keys=plans.flatMap(p=>p.orderNumbers||[]);
      setPlannedOrders([...new Set(keys)]);
    }).catch(()=>{});
  },[]);

  const pend=useMemo(()=>pen.filter(r=>r.Material&&(toFloat(r["Pending Rolls"])>0)),[pen]);

  const withSource=useMemo(()=>{
    if(!fgjm.length&&!mj.length&&!bare.length)return pend.map(o=>({...o,_src:"UNKNOWN"}));
    return pend.map(order=>{
      const oMat=String(order.Material).trim(),oW=toFloat(order.Width),oL=toFloat(order.Length);
      const op=parseMat(oMat);
      const minT=cfg.trimMinOD25||15;
      const fg=fgjm.find(x=>x.Batch&&toFloat(x.Grade)===5&&canFillFGM(x.Material,oMat)&&toFloat(x.Width)>=oW);
      if(fg)return{...order,_src:"FGJM"};
      const mjr=mj.find(x=>{
        if(!x.Batch)return false;
        const mp=parseMat(String(x.Material||"").replace("3SF-","3FG-"));
        if(mp.isAL)return false;
        return mp.micron===op.micron&&mp.grade===op.grade&&mp.isAB===op.isAB&&toFloat(x.Width)>=oW+minT&&toFloat(x.Length||0)>=oL-3000;
      });
      if(mjr)return{...order,_src:"MJ"};
      const br=bare.find(x=>x.Batch&&canFillBare(x.Material,oMat)&&toFloat(x.Width)>=oW+5);
      if(br)return{...order,_src:"BARE"};
      return{...order,_src:"NONE"};
    });
  },[pend,fgjm,mj,bare,cfg]);

  // Add _key to each order
  const withKey=useMemo(()=>withSource.map(o=>({
    ...o,
    _key:`${o["Sales Order"]||""}-${o["Sale Order Item"]||""}`,
    _soDate:String(o["SO Crtd Date"]||o["SO Crtd. Date"]||"").split("T")[0]||""
  })),[withSource]);

  // All unique SO Created Dates
  const availDates=useMemo(()=>[...new Set(withKey.map(o=>o._soDate).filter(Boolean))].sort().reverse(),[withKey]);

  // All unique microns and ODs
  const availMicrons=useMemo(()=>[...new Set(pend.map(o=>toFloat(o.Thickness)).filter(Boolean))].sort((a,b)=>a-b),[pend]);
  const availODs=useMemo(()=>[...new Set(pend.map(o=>{const p=parseMat(o.Material);return p.od;}).filter(Boolean))].sort(),[pend]);

  // Apply all filters
  const filteredPend=useMemo(()=>withKey.filter(o=>{
    if(selMicron&&toFloat(o.Thickness)!==selMicron)return false;
    if(selOD&&parseMat(o.Material).od!==selOD)return false;
    if(selSoDate&&o._soDate!==selSoDate)return false;
    return true;
  }),[withKey,selMicron,selOD,selSoDate]);

  const customerData=useMemo(()=>{
    const map={};
    filteredPend.forEach(o=>{
      const c=String(o["Consignee Name"]||"Unknown").trim();
      if(!map[c])map[c]={customer:c,rolls:0,kg:0,orders:0,microns:new Set(),src:{}};
      map[c].rolls+=toFloat(o["Pending Rolls"]);
      map[c].kg+=toFloat(o["Pend. Prod."]);
      map[c].orders++;
      const th=toFloat(o.Thickness);if(th)map[c].microns.add(th);
      const src=o._src||"UNKNOWN";map[c].src[src]=(map[c].src[src]||0)+1;
    });
    return Object.values(map).map(c=>({...c,microns:[...c.microns]}))
      .sort((a,b)=>sortDir*(sortKey==="rolls"?b.rolls-a.rolls:sortKey==="kg"?b.kg-a.kg:b.orders-a.orders));
  },[filteredPend,sortKey,sortDir]);

  const totalRolls=useMemo(()=>filteredPend.reduce((s,o)=>s+toFloat(o["Pending Rolls"]),0),[filteredPend]);
  const totalKg=useMemo(()=>filteredPend.reduce((s,o)=>s+toFloat(o["Pend. Prod."]),0),[filteredPend]);
  const overdueCount=useMemo(()=>filteredPend.filter(o=>String(o["Required Delivery Date"]||"").split("T")[0]<TODAY).length,[filteredPend]);
  const srcCounts=useMemo(()=>{const m={};filteredPend.forEach(o=>{const s=o._src||"UNKNOWN";m[s]=(m[s]||0)+1;});return m;},[filteredPend]);

  const srcBg={FGJM:"#f0fdf4",MJ:"#eff6ff",BARE:"#fef9c3",NONE:"#fef2f2",UNKNOWN:"#f8fafc"};
  const srcColors={FGJM:"#15803d",MJ:"#1e40af",BARE:"#92400e",NONE:"#991b1b",UNKNOWN:"#64748b"};
  const srcLabel={FGJM:"Direct FGM",MJ:"MJ Slit",BARE:"Met",NONE:"No Stock",UNKNOWN:"Unknown"};
  const OD_COLORS={"22":"#15803d","25":"#1d4ed8","28":"#92400e"};
  const OD_BG={"22":"#f0fdf4","25":"#eff6ff","28":"#fff7ed"};

  // What to pass to planning engine:
  // If individual orders ticked → plan those; else if customers selected → plan by customer
  const getSelectionForPlan=()=>{
    if(selOrders.length>0){
      // Pass the actual order keys to generatePlan
      return{type:"orders",keys:selOrders,micron:selMicron,od:selOD};
    }
    if(selCustomers.length>0){
      return{type:"customers",customers:selCustomers,micron:selMicron,od:selOD};
    }
    return{type:"all",micron:selMicron,od:selOD};
  };

  const selCount=selOrders.length;
  const selRolls=filteredPend.filter(o=>selOrders.includes(o._key)).reduce((s,o)=>s+toFloat(o["Pending Rolls"]),0);

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,flexWrap:"wrap",gap:10}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:C.navy,marginBottom:4}}>Pendency Analysis</h1>
          <p style={{fontSize:14,color:C.textMd}}>{filteredPend.length} orders · {totalRolls.toFixed(0)} rolls · {(totalKg/1000).toFixed(2)} MT
            {(selMicron||selOD||selSoDate)&&<span style={{color:C.accent,fontWeight:700}}> (filtered)</span>}
          </p>
        </div>
        <button onClick={()=>onMakePlan(getSelectionForPlan())}
          style={{...btn("linear-gradient(135deg,#1a305c,#1d4ed8)","#fff",{padding:"12px 20px",fontSize:13,fontWeight:700,borderRadius:10,minWidth:200})}}>
          {selCount>0?`📋 Plan ${selCount} Selected Orders →`:`📋 Make Plan MET/F/04 →`}
        </button>
      </div>

      {overdueCount>0&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:10,padding:"10px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>🔴</span>
        <span style={{fontWeight:700,color:"#991b1b",fontSize:13}}>{overdueCount} orders OVERDUE — Immediate action required</span>
      </div>}

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10,marginBottom:14}}>
        {[
          {l:"Total Orders",v:filteredPend.length,sub:`${totalRolls.toFixed(0)} rolls`,c:C.navy,bg:"#f0f4ff"},
          {l:"OVERDUE",v:overdueCount,sub:"Past delivery date",c:C.red,bg:"#fef2f2"},
          {l:"Pending MT",v:(totalKg/1000).toFixed(2),sub:"Metric Tonnes",c:"#1e40af",bg:"#eff6ff"},
          {l:"Direct FGM",v:srcCounts.FGJM||0,sub:"Ready",c:"#15803d",bg:"#f0fdf4"},
          {l:"MJ Slit",v:srcCounts.MJ||0,sub:"Slit only",c:"#1e40af",bg:"#eff6ff"},
          {l:"To Metallise",v:srcCounts.BARE||0,sub:"Bare avail",c:"#92400e",bg:"#fef9c3"},
          {l:"No Stock",v:srcCounts.NONE||0,sub:"Procure",c:C.red,bg:"#fef2f2"},
        ].map((s,i)=>(
          <div key={i} style={{background:s.bg,borderRadius:12,padding:"12px",textAlign:"center",border:`1px solid ${C.border}`}}>
            <div style={{fontSize:22,fontWeight:800,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:11,color:C.textMd,fontWeight:700,marginTop:4}}>{s.l}</div>
            <div style={{fontSize:10,color:C.textLt,marginTop:2}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* ── FILTERS BAR ── */}
      <div style={{...card({padding:"12px 14px",marginBottom:12})}}>
        {/* Row 1: Micron + OD */}
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:11,fontWeight:700,color:C.textMd,minWidth:40}}>Micron:</span>
          <button onClick={()=>setSelMicron(null)} style={{...btn(selMicron===null?C.navy:"#f1f5f9",selMicron===null?"#fff":C.textMd,{padding:"4px 10px",fontSize:11,border:`1px solid ${selMicron===null?C.navy:C.border}`})}}>All</button>
          {availMicrons.map(m=>(
            <button key={m} onClick={()=>setSelMicron(selMicron===m?null:m)} style={{...btn(selMicron===m?"#1e40af":"#eff6ff",selMicron===m?"#fff":"#1e40af",{padding:"4px 10px",fontSize:11,border:"1px solid #bfdbfe"})}}>
              {m}µ
            </button>
          ))}
          <span style={{color:C.border,margin:"0 6px"}}>|</span>
          <span style={{fontSize:11,fontWeight:700,color:C.textMd,minWidth:20}}>OD:</span>
          <button onClick={()=>setSelOD(null)} style={{...btn(selOD===null?C.navy:"#f1f5f9",selOD===null?"#fff":C.textMd,{padding:"4px 10px",fontSize:11,border:`1px solid ${selOD===null?C.navy:C.border}`})}}>All</button>
          {availODs.map(od=>(
            <button key={od} onClick={()=>setSelOD(selOD===od?null:od)} style={{...btn(selOD===od?OD_COLORS[od]||C.navy:"#f1f5f9",selOD===od?"#fff":C.textMd,{padding:"4px 10px",fontSize:11,border:`1px solid ${selOD===od?OD_COLORS[od]||C.navy:C.border}`})}}>
              {od==="22"?"2.2 OD":od==="25"?"2.5 OD":od==="28"?"2.8 OD":od+" OD"}
            </button>
          ))}
          {(selMicron||selOD||selSoDate)&&<button onClick={()=>{setSelMicron(null);setSelOD(null);setSelSoDate(null);}} style={{...btn("#fef2f2",C.red,{padding:"4px 10px",fontSize:11,border:"1px solid #fca5a5",marginLeft:4})}}>✕ Clear Filters</button>}
        </div>
        {/* Row 2: SO Created Date filter */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{fontSize:11,fontWeight:700,color:C.textMd,minWidth:40}}>SO Date:</span>
          <button onClick={()=>setSelSoDate(null)} style={{...btn(selSoDate===null?C.navy:"#f1f5f9",selSoDate===null?"#fff":C.textMd,{padding:"4px 10px",fontSize:11,border:`1px solid ${selSoDate===null?C.navy:C.border}`})}}>All Dates</button>
          {availDates.slice(0,12).map(d=>(
            <button key={d} onClick={()=>setSelSoDate(selSoDate===d?null:d)} style={{...btn(selSoDate===d?"#6d28d9":"#f5f3ff",selSoDate===d?"#fff":"#6d28d9",{padding:"4px 10px",fontSize:11,border:`1px solid ${selSoDate===d?"#6d28d9":"#ddd6fe"}`})}}>
              {d}
            </button>
          ))}
          {availDates.length>12&&<span style={{fontSize:11,color:C.textLt}}>+{availDates.length-12} more dates</span>}
        </div>
      </div>

      {/* Planned notice */}
      {plannedOrders.length>0&&<div style={{fontSize:11,color:"#6d28d9",background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:8,padding:"6px 12px",marginBottom:10}}>
        🗂 {plannedOrders.length} order(s) already in archive — shown with <span style={{background:"#ede9fe",borderRadius:4,padding:"1px 5px"}}>purple</span> highlight
      </div>}

      {/* Selected orders action bar */}
      {selCount>0&&<div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span style={{fontWeight:700,color:"#1e40af",fontSize:13}}>✅ {selCount} orders selected · {selRolls.toFixed(0)} rolls</span>
        <button onClick={()=>onMakePlan(getSelectionForPlan())} style={{...btn("linear-gradient(135deg,#1e40af,#1d4ed8)","#fff",{padding:"8px 18px",fontSize:13,fontWeight:700,borderRadius:8})}}>
          📋 Plan Selected Orders →
        </button>
        <button onClick={()=>setSelOrders([])} style={{...btn("#fef2f2",C.red,{padding:"8px 14px",fontSize:12,border:"1px solid #fca5a5"})}}>✕ Clear Selection</button>
      </div>}

      {/* View Tabs */}
      <div style={{display:"flex",gap:0,marginBottom:12,borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
        {[{id:"orders",icon:"📋",label:`All Orders (${filteredPend.length})`},{id:"customer",icon:"🏢",label:"Customer Wise"}].map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)} style={{flex:1,padding:"10px 8px",background:view===t.id?C.navy:"#f8fafc",border:"none",cursor:"pointer",fontWeight:700,fontSize:13,color:view===t.id?"#fff":C.textMd,fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* ── ALL ORDERS VIEW (with checkboxes + date) ── */}
      {view==="orders"&&(
        <div style={{...card({padding:0,overflow:"hidden"})}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",background:"#fff",minWidth:960}}>
              <thead><tr style={{background:C.navy}}>
                <th style={{...TH,width:36,color:"#fff",padding:"10px 8px"}}>
                  <input type="checkbox"
                    checked={filteredPend.length>0&&filteredPend.every(o=>selOrders.includes(o._key))}
                    onChange={()=>toggleAllOrders(filteredPend)}
                    style={{cursor:"pointer",width:16,height:16}}/>
                </th>
                {["#","SO Date","SO No","Material","Customer","Width","Length","Rolls","KG","Req. Delivery","Status"].map(h=>(
                  <th key={h} style={{...TH,color:"#fff",padding:"10px 8px",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{filteredPend.map((o,i)=>{
                const isOD=String(o["Required Delivery Date"]||"").split("T")[0]<TODAY;
                const src=o._src||"UNKNOWN";
                const isSel=selOrders.includes(o._key);
                const isPlanned=plannedOrders.includes(String(o["Sales Order"]||""));
                return(
                  <tr key={i} className="pprow" style={{background:isSel?"#eff6ff":isPlanned?"#f5f3ff":isOD?"#fff5f5":i%2?"#f7f9fc":"#fff",cursor:"pointer"}}
                    onClick={()=>toggleOrder(o._key)}>
                    <td style={{...TD,textAlign:"center",width:36}} onClick={e=>e.stopPropagation()}>
                      <input type="checkbox" checked={isSel} onChange={()=>toggleOrder(o._key)} style={{cursor:"pointer",width:16,height:16}}/>
                    </td>
                    <td style={{...TD,textAlign:"center",fontWeight:700}}>{i+1}</td>
                    <td style={{...TD,fontSize:11,whiteSpace:"nowrap",color:"#6d28d9",fontWeight:600}}>{o._soDate||"—"}</td>
                    <td style={{...TD,fontSize:11,whiteSpace:"nowrap",color:C.textMd}}>{o["Sales Order"]||"—"}</td>
                    <td style={{...TD,fontWeight:700,color:C.navy,fontSize:10}}>{o.Material}</td>
                    <td style={{...TD,fontSize:11,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{String(o["Consignee Name"]||"").slice(0,20)}</td>
                    <td style={{...TD,textAlign:"center"}}>{toFloat(o.Width)}</td>
                    <td style={{...TD,textAlign:"center"}}>{toFloat(o.Length)}</td>
                    <td style={{...TD,textAlign:"center",fontWeight:800,color:C.red}}>{toFloat(o["Pending Rolls"])}</td>
                    <td style={{...TD,textAlign:"center"}}>{(toFloat(o["Pend. Prod."])/1000).toFixed(2)}MT</td>
                    <td style={{...TD,fontSize:11,whiteSpace:"nowrap"}}>{isOD&&<span style={{color:C.red,fontWeight:700}}>🔴 </span>}{String(o["Required Delivery Date"]||"").split("T")[0]||"—"}</td>
                    <td style={{...TD}}><span style={{background:srcBg[src],color:srcColors[src],padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>{srcLabel[src]}</span></td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── CUSTOMER WISE VIEW ── */}
      {view==="customer"&&(
        <div style={card()}>
          <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
            <div style={{flex:1,fontSize:12,color:C.textMd}}>{selCustomers.length===0?"Click customers to plan specific ones":`${selCustomers.length} selected`}</div>
            <button onClick={()=>setSelCustomers(customerData.map(c=>c.customer))} style={{...btn(C.navy,"#fff",{padding:"5px 12px",fontSize:11})}}>All</button>
            <button onClick={()=>setSelCustomers([])} style={{...btn("#f1f5f9",C.textMd,{padding:"5px 12px",fontSize:11,border:`1px solid ${C.border}`})}}>Clear</button>
          </div>
          <table style={{width:"100%"}}>
            <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
              <th style={{...TH,width:34}}></th>
              {["Customer","Orders","Rolls↓","KG","Microns","Fulfillment"].map(h=><th key={h} style={TH}>{h}</th>)}
            </tr></thead>
            <tbody>{customerData.map((cd,ci)=>{
              const isSel=selCustomers.includes(cd.customer);
              const isExp=expandedCustomers.includes(cd.customer);
              const custOrders=filteredPend.filter(o=>String(o["Consignee Name"]||"").trim()===cd.customer);
              return(
                <React.Fragment key={ci}>
                  <tr className="pprow" style={{background:isSel?"#eff6ff":"transparent",cursor:"pointer"}}
                    onClick={()=>toggleExpandCustomer(cd.customer)}>
                    <td style={{...TD,width:34,textAlign:"center"}}>
                      <input type="checkbox" checked={isSel} onChange={e=>{e.stopPropagation();toggleCustomer(cd.customer);}} style={{cursor:"pointer"}}/>
                    </td>
                    <td style={{...TD,fontWeight:700,color:C.navy}}>{cd.customer}</td>
                    <td style={{...TD,textAlign:"center"}}>{cd.orders}</td>
                    <td style={{...TD,textAlign:"center",fontWeight:800,color:C.red}}>{cd.rolls.toFixed(0)}</td>
                    <td style={{...TD,textAlign:"center"}}>{(cd.kg/1000).toFixed(2)} MT</td>
                    <td style={{...TD,fontSize:11}}>{cd.microns.map(m=>`${m}µ`).join(", ")}</td>
                    <td style={{...TD}}>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {Object.entries(cd.src).map(([s,n])=>(
                          <span key={s} style={{background:srcBg[s],color:srcColors[s],padding:"2px 7px",borderRadius:8,fontSize:10,fontWeight:700}}>{n} {srcLabel[s]}</span>
                        ))}
                      </div>
                    </td>
                  </tr>
                  {isExp&&custOrders.map((o,oi)=>{
                    const isOD2=String(o["Required Delivery Date"]||"").split("T")[0]<TODAY;
                    const oKey=String(o["Sales Order"]||"");
                    const isPlanned2=plannedOrders.includes(oKey);
                    const isTicked=selOrders.includes(o._key);
                    return(
                      <tr key={oi} style={{background:isTicked?"#dbeafe":isPlanned2?"#ede9fe":isOD2?"#fff5f5":"#f8fafc",cursor:"pointer"}}
                        onClick={()=>toggleOrder(o._key)}>
                        <td style={{...TD,textAlign:"center"}}>
                          <input type="checkbox" checked={isTicked} onChange={()=>toggleOrder(o._key)} style={{cursor:"pointer"}}/>
                        </td>
                        <td style={{...TD,paddingLeft:28}} colSpan={2}>
                          <span style={{fontWeight:700,color:C.navy,fontSize:11}}>{o.Material}</span>
                          {isPlanned2&&<span style={{fontSize:9,background:"#ede9fe",color:"#6d28d9",borderRadius:4,padding:"1px 5px",marginLeft:4,fontWeight:700}}>📋 Planned</span>}
                        </td>
                        <td style={{...TD,fontSize:11,color:C.textMd}}>{o["Sales Order"]}</td>
                        <td style={{...TD,textAlign:"center",fontSize:11}}>{toFloat(o.Width)}mm</td>
                        <td style={{...TD,textAlign:"center",fontSize:11}}>{(toFloat(o["Pend. Prod."])/1000).toFixed(2)} MT</td>
                        <td style={{...TD}}><span style={{background:srcBg[o._src||"UNKNOWN"],color:srcColors[o._src||"UNKNOWN"],padding:"2px 7px",borderRadius:8,fontSize:10,fontWeight:700}}>{srcLabel[o._src||"UNKNOWN"]}</span></td>
                      </tr>
                    );
                  })}
                </React.Fragment>
              );
            })}</tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ─── F/04 PLAN VIEW ───────────────────────────────────────────────────────────
function TrimReasonModal({oldTrim,newTrim,run,reasons,onSubmit,onClose}){
  const [sel,setSel]=useState("");
  const [custom,setCustom]=useState("");

}



function RejectionModal({run,onSubmit,onClose,onCancel}){
  const [reason,setReason]=useState("");
  const reasons=["Trim too high","Wrong OD sequence","Customer not urgent","Bare not available","Different batch preferred","MJ stock too high","Other"];
  const [sel,setSel]=useState("");
  return(
    <div style={{position:"fixed",inset:0,zIndex:700,background:"rgba(10,20,45,.7)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:"min(440px,100%)",padding:22,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style={{fontWeight:800,fontSize:15,color:C.navy,marginBottom:4}}>Why skip this run?</div>
        <div style={{fontSize:12,color:C.textMd,marginBottom:14}}>{run?.material} · {run?.rollSize}mm · {run?.customers}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
          {reasons.map(r=>(
            <button key={r} onClick={()=>{setSel(r);setReason(r);}} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${sel===r?C.navy:C.border}`,background:sel===r?C.navy:"#f8fafc",color:sel===r?"#fff":C.textMd,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{r}</button>
          ))}
        </div>
        <textarea value={reason} onChange={e=>setReason(e.target.value)} placeholder="Add more detail (optional)..." style={{...inp({minHeight:60,resize:"vertical",marginBottom:12})}}/>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={onCancel||onClose} style={{...btn("#f1f5f9",C.textMd,{border:`1px solid ${C.border}`})}}>Cancel — Keep in plan</button>
          <button onClick={()=>onSubmit(reason||"No reason given")} style={{...btn(C.navy,"#fff")}}>Submit & Skip →</button>
        </div>
      </div>
    </div>
  );
}

function F04PlanView({result,cfg,planNo,bareNo,user,pen,onSave,saved,onRegenerate}){
  const {planRows,mjAdvisory,mjTotalKg,overdueCount,remainingOrders}=result||{};
  const [rowStates,setRowStates]=useState({});// {id: {selected,rejected,reason}}
  const [rejectingRun,setRejectingRun]=useState(null);
  const [editingTrim,setEditingTrim]=useState(null);// {runId, value}
  const [trimOverrides,setTrimOverrides]=useState({});// {runId: newTrimValue}
  const [trimReasonModal,setTrimReasonModal]=useState(null);// {runId,oldTrim,newTrim}
  const [trimReasons]=useState(["Better fit machine range","Customer request","OD type requirement","Minimize waste","Arm width adjustment","Other"]);

  const getTrim=(r)=>trimOverrides[r.id]!==undefined?trimOverrides[r.id]:(r.trim||0);

  const startEditTrim=(r)=>{
    setEditingTrim({runId:r.id,value:String(getTrim(r))});
  };

  const commitTrim=(r,newVal)=>{
    const parsed=parseInt(newVal);
    if(isNaN(parsed)||parsed<5||parsed>30){
      setEditingTrim(null);return;// invalid — cancel
    }
    const oldTrim=getTrim(r);
    setEditingTrim(null);
    if(parsed===oldTrim)return;// no change
    // Ask why
    setTrimReasonModal({runId:r.id,oldTrim,newTrim:parsed,run:r});
  };

  const applyTrimChange=(reason)=>{
    if(!trimReasonModal)return;
    const{runId,oldTrim,newTrim,run}=trimReasonModal;
    setTrimOverrides(t=>({...t,[runId]:newTrim}));
    // Save to learning engine
    fbSavePlanOverride(planNo,runId,"trim",oldTrim,newTrim,reason,user?.name||"Unknown").catch(()=>{});
    setTrimReasonModal(null);
  };

  // Initialize row states when planRows change
  useEffect(()=>{
    if(!planRows)return;
    const init={};
    planRows.forEach(r=>{if(r.id)init[r.id]={selected:true,rejected:false,reason:""};});
    setRowStates(init);
  },[planRows]);

  const toggleRow=(run)=>{
    const cur=rowStates[run.id];
    if(!cur)return;
    if(cur.selected){
      // Show why modal — row stays selected until reason submitted
      setRejectingRun(run);
    } else {
      // Re-selecting (undo rejection)
      setRowStates(s=>({...s,[run.id]:{selected:true,rejected:false,reason:""}}));
    }
  };
  const handleRejection=async(reason)=>{
    if(!rejectingRun)return;
    // Now deselect — only after reason confirmed
    setRowStates(s=>({...s,[rejectingRun.id]:{selected:false,rejected:true,reason}}));
    try{await fbSavePlanOverride(planNo,rejectingRun.id,"rejected","selected","rejected",reason,user?.name||"Unknown");}catch(e){}
    setRejectingRun(null);
  };
  const handleRejectionCancel=()=>{
    // User cancelled — keep row selected, close modal
    setRejectingRun(null);
  };

  const isSelected=(run)=>rowStates[run?.id]?.selected!==false;
  const selectedCount=planRows?planRows.filter(r=>isSelected(r)).length:0;
  const rejectedCount=planRows?planRows.filter(r=>rowStates[r.id]?.rejected).length:0;
  if(!planRows)return<div style={{padding:40,textAlign:"center",color:C.textMd}}>No plan generated yet. Upload files and generate plan.</div>;

  const metRuns=planRows.filter(r=>r.source==="BARE_FRESH"||r.source==="BARE");
  const mjRuns=planRows.filter(r=>r.source==="MJ");
  const fgmRuns=planRows.filter(r=>r.source==="FGJM");
  const totalNOR=planRows.reduce((s,r)=>s+(r.noOfRoll||0),0);// all sections

  const OD_COLORS={"22":"#15803d","25":"#1e40af","28":"#92400e"};
  const OD_BG={"22":"#f0fdf4","25":"#eff6ff","28":"#fff7ed"};

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      {trimReasonModal&&<TrimReasonModal
        oldTrim={trimReasonModal.oldTrim}
        newTrim={trimReasonModal.newTrim}
        run={trimReasonModal.run}
        reasons={TRIM_REASONS}
        onSubmit={applyTrimChange}
        onClose={()=>setTrimReasonModal(null)}

        newTrim={trimReasonModal.newTrim}
        run={trimReasonModal.run}

        onClose={()=>setTrimReasonModal(null)}

        run={trimReasonModal.run} reasons={TRIM_REASONS}

      />}
    {trimReasonModal&&<TrimReasonModal
        oldTrim={trimReasonModal.oldTrim} newTrim={trimReasonModal.newTrim}

    {rejectingRun&&<RejectionModal run={rejectingRun} onSubmit={handleRejection} onClose={()=>setRejectingRun(null)} onCancel={handleRejectionCancel}/>}

// ─── MET SEQUENCE WITH TRACKING ──────────────────────────────────────────────
function MetSequence({result,cfg,planId,planNo,user}){
  // Use GLOBAL tracking — reads ALL plans from Firebase, ordered by globalSeqIndex
  // So when new PEN uploaded and new plan made, old runs stay at top, new runs append below
  const [m1Runs,setM1Runs]=useState([]);
  const [m2Runs,setM2Runs]=useState([]);
  const [saving,setSaving]=useState({});
  const [loadingT,setLoadingT]=useState(true);

  useEffect(()=>{
    setLoadingT(true);
    const u1=fbWatchAllTracking("M-1",rows=>{setM1Runs(rows);setLoadingT(false);});
    const u2=fbWatchAllTracking("M-2",rows=>setM2Runs(rows));
    return()=>{u1&&u1();u2&&u2();};
  },[]);// run once on mount — listens to ALL plans forever

  // If we have in-memory result but no saved tracking yet, show preview from memory
  const {planRows}=result||{};
  const memRuns=planRows?(planRows.filter(r=>r.source==="BARE_FRESH"||r.source==="BARE")):[];
  const hasFirebaseData=m1Runs.length>0||m2Runs.length>0;
  const boatLife={"22":cfg.boatLife22||550000,"25":cfg.boatLife25||330000,"28":cfg.boatLife28||280000};
  const OD_C={"22":"#15803d","25":"#1e40af","28":"#92400e"};
  const OD_BG2={"22":"#f0fdf4","25":"#eff6ff","28":"#fff7ed"};

  // markMet works directly on Firebase tracking doc (which IS the run)
  const markMet=async(trackDoc)=>{
    if(!trackDoc?.id){
      alert("This run has no tracking record. Please save the plan first.");
      return;
    }
    setSaving(s=>({...s,[trackDoc.id]:true}));
    const newSt=trackDoc.metStatus==="done"?"pending":"done";
    await fbUpdateRunStatus(trackDoc.id,{
      metStatus:newSt,
      ...(newSt==="done"?{metAt:new Date().toISOString(),metBy:user?.name}:{metAt:null})
    });
    setSaving(s=>({...s,[trackDoc.id]:false}));
  };

  const moveRun=async(runDocId,dir,fbRuns)=>{
    // Find this run in fbRuns by its Firebase doc id
    const idx=fbRuns.findIndex(r=>r.id===runDocId);
    if(idx<0)return;
    const newIdx=idx+dir;
    if(newIdx<0||newIdx>=fbRuns.length)return;
    const a=fbRuns[idx],b=fbRuns[newIdx];
    // Use Date.now()-based values to guarantee strict ordering after swap
    const ts=Date.now();
    const aNewG=dir>0?b.globalSeqIndex+0.5:b.globalSeqIndex-0.5;
    const bNewG=dir>0?a.globalSeqIndex-0.5:a.globalSeqIndex+0.5;
    const db=getDB();
    const batch=db.batch();
    batch.update(db.collection("pp_tracking").doc(a.id),{globalSeqIndex:aNewG,updatedAt:new Date().toISOString()});
    batch.update(db.collection("pp_tracking").doc(b.id),{globalSeqIndex:bNewG,updatedAt:new Date().toISOString()});
    await batch.commit();
  };

  const buildSeq=(runs)=>{
    let cum=0,bm=0,bn=1,rows=[];
    for(const r of runs){
      const rm=(r.noOfRoll||1)*(r.jumboLen||73000);
      if(bm+rm>boatLife[r.od||"22"]){rows.push({isBoat:true,bn,cum,bm});bn++;bm=0;}
      cum+=rm;bm+=rm;rows.push({...r,cum,bm,bn,rm});
    }
    return rows;
  };

  const SeqMachine=({machine})=>{
    // Firebase runs for this machine — already globally ordered, includes ALL plans
    const fbRuns=machine==="M-1"?m1Runs:m2Runs;
    // If no Firebase data yet, show in-memory preview
    const runs=fbRuns.length>0?fbRuns:memRuns.filter(r=>r.machine===machine);
    const isLive=fbRuns.length>0;
    const seq=buildSeq(runs);
    const metDone=runs.filter(r=>r.metStatus==="done").length;
    const slitDone=runs.filter(r=>r.slitStatus==="done").length;
    return(
      <div style={{...card({padding:0,overflow:"hidden"}),marginBottom:16}}>
        <div style={{background:machine==="M-2"?"#7f1d1d":C.navy,padding:"10px 16px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{color:"#fff",fontWeight:800,fontSize:15}}>{machine}</span>
          <span style={{color:"rgba(255,255,255,.5)",fontSize:12}}>{runs.length} runs</span>
          <div style={{marginLeft:"auto",display:"flex",gap:6}}>
            <span style={{background:"rgba(255,255,255,.15)",color:"#fff",borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:700}}>Met {metDone}/{runs.length}</span>
            <span style={{background:"rgba(255,255,255,.15)",color:"#fff",borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:700}}>Slit {slitDone}/{runs.length}</span>
          </div>
        </div>
        <div style={{height:4,background:"#f1f5f9"}}><div style={{height:4,background:C.green,width:`${runs.length>0?metDone/runs.length*100:0}%`,transition:"width .4s"}}/></div>
        {runs.length===0?<div style={{padding:24,textAlign:"center",color:C.textMd}}>No runs for {machine}</div>:(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",minWidth:820}}>
              <thead><tr style={{background:"#f1f5f9"}}>{["#","↕","Material","Size","Trim","OD","Sets","Slit L","Boat","Status","Action"].map(h=><th key={h} style={{...TH,padding:"6px 8px",fontSize:10}}>{h}</th>)}</tr></thead>
              <tbody>{seq.map((r,i)=>{
                if(r.isBoat)return<tr key={i} style={{background:"#fef9c3",borderBottom:"2px solid #fbbf24"}}><td colSpan={11} style={{padding:"7px 16px",textAlign:"center",fontWeight:800,color:"#92400e",fontSize:12}}>🔄 BOAT CHANGE #{r.bn} — ~60 min · Cumul: {(r.cum/1000).toFixed(0)}k m</td></tr>;
                // r is directly a Firebase tracking doc — has metStatus/slitStatus
                const isMet=r.metStatus==="done";
                const isSlit=r.slitStatus==="done";
                const ri=runs.findIndex(x=>x.id===r.id);// exact index in runs array
                // Show which plan this run belongs to
                const isPrevPlan=r.planId&&r.planId!==planId;
                return(
                  <tr key={i} className="pprow" style={{background:isSlit?"#f0fdf4":isMet?"#eff6ff":isPrevPlan?"#fafff7":i%2?"#f7f9fc":"#fff"}}>
                    <td style={{...TD,textAlign:"center",fontWeight:700,width:28}}>{ri+1}</td>
                    <td style={{...TD,textAlign:"center",width:54}}>
                      {isLive&&!isMet&&<>
                        <button onClick={()=>moveRun(r.id,-1,runs)} disabled={ri===0} style={{background:"none",border:"1px solid #dde3ed",borderRadius:4,cursor:"pointer",padding:"2px 5px",fontSize:10,opacity:ri===0?0.3:1}}>↑</button>
                        {" "}
                        <button onClick={()=>moveRun(r.id,1,runs)} disabled={ri===runs.length-1} style={{background:"none",border:"1px solid #dde3ed",borderRadius:4,cursor:"pointer",padding:"2px 5px",fontSize:10,opacity:ri===runs.length-1?0.3:1}}>↓</button>
                      </>}
                    </td>
                    <td style={{...TD,fontWeight:700,color:C.navy,fontSize:11,textDecoration:isSlit?"line-through":"none"}}>
                      {r.material}
                      {isPrevPlan&&<div style={{fontSize:9,color:"#15803d",fontWeight:700}}>{r.planNo||r.planId?.slice(0,6)}</div>}
                    </td>
                    <td style={{...TD,textAlign:"center",fontWeight:700}}>{r.rollSize}</td>
                    <td style={{...TD,textAlign:"center"}}><span style={{color:r.trim<=15?"#15803d":r.trim<=20?"#92400e":"#991b1b",fontWeight:700}}>{r.trim}mm</span></td>
                    <td style={{...TD,textAlign:"center"}}><span style={{background:OD_BG2[r.od||"22"],color:OD_C[r.od||"22"],padding:"2px 6px",borderRadius:7,fontSize:10,fontWeight:700}}>{r.od==="22"?"2.2":r.od==="25"?"2.5":"2.8"}</span></td>
                    <td style={{...TD,textAlign:"center"}}>{r.sets}</td>
                    <td style={{...TD,textAlign:"center"}}>{r.slitLen}</td>
                    <td style={{...TD,textAlign:"center",fontWeight:700}}>#{r.bn}</td>
                    <td style={{...TD,minWidth:80}}>
                      {isSlit?<span style={{background:"#f0fdf4",color:"#15803d",padding:"2px 8px",borderRadius:7,fontSize:11,fontWeight:700}}>✅ Slit</span>
                      :isMet?<span style={{background:"#eff6ff",color:"#1e40af",padding:"2px 8px",borderRadius:7,fontSize:11,fontWeight:700}}>🔵 Met ✓</span>
                      :<span style={{background:"#f1f5f9",color:C.textMd,padding:"2px 8px",borderRadius:7,fontSize:11}}>⏳ Pending</span>}
                    </td>
                    <td style={{...TD,minWidth:110}}>
                      {!isSlit&&(isLive?(
                        <button onClick={()=>markMet(r)} disabled={!!saving[r.id]} style={{...btn(isMet?"#fef2f2":"#eff6ff",isMet?"#991b1b":"#1e40af",{padding:"5px 10px",fontSize:11,border:`1px solid ${isMet?"#fca5a5":"#bfdbfe"}`})}}>
                          {saving[r.id]?<Spin size={11} color={isMet?"#991b1b":"#1e40af"}/>:isMet?"↩ Undo":"✅ Met Done"}
                        </button>
                      ):(
                        <span style={{fontSize:10,color:"#92400e",fontWeight:600}}>💾 Save first</span>
                      ))}
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        )}
      </div>
    );
  };
  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,color:C.navy,marginBottom:2}}>Met Sequence</h1>
          <p style={{fontSize:13,color:C.textMd}}>M22={fmtNum(cfg.boatLife22)}m · M25={fmtNum(cfg.boatLife25)}m · M28={fmtNum(cfg.boatLife28)}m · Boat change ~60min</p>
        </div>
        {planId?<div style={{fontSize:12,color:C.green,fontWeight:700}}>🔴 Live — all users see updates instantly</div>
        :<div style={{background:"#fef9c3",border:"1px solid #fbbf24",borderRadius:8,padding:"6px 14px",fontSize:12,color:"#92400e",fontWeight:700}}>
          ⚠️ Met Done disabled — <b>Save Plan first</b> (click 💾 in MET/F/04 tab)
        </div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <SeqMachine machine="M-1"/>
        <SeqMachine machine="M-2"/>
      </div>
    </div>
  );
}

              <tr key={p.id||i} className="pprow" style={{background:i%2?"#f7f9fc":"#fff"}}>
                <td style={{...TD,textAlign:"center",fontWeight:700}}>{i+1}</td>
                <td style={{...TD,fontSize:12,whiteSpace:"nowrap"}}>{fmtDate(p.createdAt)}</td>
                <td style={{...TD,fontWeight:800,color:C.navy}}>{p.planNo||"—"}</td>
                <td style={{...TD,fontWeight:800,color:C.green}}>{p.f05No||"—"}</td>
                <td style={{...TD,fontSize:12}}>{p.machine||"—"}</td>
                <td style={{...TD,textAlign:"center",fontWeight:700}}>{p.metRuns||0}</td>
                <td style={{...TD,fontSize:12}}>{p.createdBy||"—"}</td>
