function trialDaysLeft(trialEnd){
  if(!trialEnd)return 0;
  const diff=Math.ceil((new Date(trialEnd)-new Date())/(1000*60*60*24));
  return diff>0?diff:0;
}
function fmtDate(iso){
  if(!iso)return"—";
  // For ISO strings (from Firebase): split on T is safest
  if(typeof iso==="string"&&iso.indexOf("T")>0){
    var p=iso.split("T")[0].split("-");
    var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return p[2]+"-"+months[parseInt(p[1],10)-1]+"-"+p[0];
  }
  return fmtDateShort(iso);
}
// Clean any date value to YYYY-MM-DD string (for sorting/display)
// SheetJS cellDates creates Date objects in LOCAL timezone → use local methods
// ISO strings are UTC → split on T
function cleanDate(val){
  if(!val||val==="nan"||val==="undefined")return"";
  if(typeof val==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(val))return val;
  if(typeof val==="string"&&val.indexOf("T")>0)return val.split("T")[0];
  try{
    var d=(val instanceof Date)?val:new Date(val);
    if(!isNaN(d.getTime())){
      // For Date objects from SheetJS: use local timezone (SheetJS creates local midnight)
      var y=d.getFullYear();var m=String(d.getMonth()+1);if(m.length<2)m="0"+m;
      var dd=String(d.getDate());if(dd.length<2)dd="0"+dd;
      return y+"-"+m+"-"+dd;
    }
  }catch(e){}
  return String(val).split("T")[0]||"";
}
// Format date for display: "03-Mar-2026"
function fmtDateShort(val){
  if(!val)return"—";
  // If already a clean string, parse parts directly
  if(typeof val==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(val)){
    var parts=val.split("-");
    var months2=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return parts[2]+"-"+months2[parseInt(parts[1],10)-1]+"-"+parts[0];
  }
  try{
    var d=(val instanceof Date)?val:new Date(val);
    if(!isNaN(d.getTime())){
      var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      var dd=String(d.getDate());if(dd.length<2)dd="0"+dd;
      return dd+"-"+months[d.getMonth()]+"-"+d.getFullYear();
    }
  }catch(e){}
  return cleanDate(val)||"—";
}

// ─── TRACKING & SF STOCK FIREBASE ────────────────────────────────────────────
async function fbSavePlanTracking(planId,runs){
  const db=getDB();
  // Get max globalSeqIndex for each machine to append new runs after existing ones
  const machines=[...new Set(runs.map(r=>r.machine||"M-1"))];
  const maxByMachine={};
  await Promise.all(machines.map(async m=>{maxByMachine[m]=await fbGetMaxGlobalSeq(m);}));
  const counterByMachine={};
  const batch=db.batch();
  runs.forEach(r=>{
    const m=r.machine||"M-1";
    if(!counterByMachine[m])counterByMachine[m]=0;
    counterByMachine[m]++;
    const globalSeqIndex=(maxByMachine[m]||0)+counterByMachine[m];
    const ref=db.collection("pp_tracking").doc(planId+"_"+r.id);
    batch.set(ref,{
      planId,runId:r.id,
      material:r.material||"",machine:m,
      rollSize:r.rollSize||0,slitLen:r.slitLen||0,
      arms:r.arms||[],sets:r.sets||0,od:r.od||"22",
      customers:r.customers||"",source:r.source||"",
      metStatus:"pending",slitStatus:"pending",
      seqIndex:r.seqIndex||0,
      globalSeqIndex,// GLOBAL index — persists across plan refreshes
      planNo:r.planNo||"",
      createdAt:new Date().toISOString()
    });
  });
  await batch.commit();
}

async function fbGetSuggestions(){
  try{
    const snap=await getDB().collection("pp_overrides").orderBy("createdAt","desc").limit(300).get();
    const overrides=snap.docs.map(d=>d.data());
    const suggestions=[];
    const trimOv=overrides.filter(o=>o.field==="trim");
    const tc={};trimOv.forEach(o=>{const k=`${o.original}→${o.changed}`;tc[k]=(tc[k]||0)+1;});
    Object.entries(tc).forEach(([k,count])=>{if(count>=5)suggestions.push({type:"trim",msg:`Trim changed ${k} in ${count} plans`,count,key:k});});
    return suggestions;
  }catch(e){return[];}
}
async function fbSearchPlans(q,field){
  const snap=await getDB().collection("pp_plans").orderBy("createdAt","desc").limit(100).get();
  const all=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(!q||!q.trim())return all;
  const ql=q.toLowerCase().trim();
  return all.filter(p=>{
    if(!field||field==="all"){
      return String(p.planNo||"").toLowerCase().includes(ql)||
        String(p.f05No||"").toLowerCase().includes(ql)||
        (p.customers||[]).some(c=>String(c).toLowerCase().includes(ql))||
        (p.orderNumbers||[]).some(o=>String(o).toLowerCase().includes(ql));
    }
    if(field==="customer")return(p.customers||[]).some(c=>String(c).toLowerCase().includes(ql));
    if(field==="order")return(p.orderNumbers||[]).some(o=>String(o).toLowerCase().includes(ql));
    return false;
  });
}

const JUMBO_BASE_G={"8":72000,"10":72000,"12":72000,"15":72000,"18":48000,"19":48000,"23":48000};
function calcNOR(sets,slitLen,micron){
  var base=JUMBO_BASE_G[String(micron)]||72000;
  if(base<=0)return sets;
  var raw=sets*slitLen/base;
  return Math.round(raw*100)/100;
}
const toInt=v=>parseInt(String(v||"").replace(/[\s,]/g,""))||0;
const toFloat=v=>parseFloat(String(v||"").replace(/,/g,"").replace(/[^\d.-]/g,""))||0;
const uid=()=>Math.random().toString(36).slice(2,9);
const fmtNum=n=>{const v=+(n||0);return v>=100000?(v/100000).toFixed(2)+" L":v.toLocaleString("en-IN");};
const TODAY=new Date().toISOString().split("T")[0];
const BOAT_LIFE={"22":550000,"25":330000,"28":280000};

function parseMat(mat){
  const s=String(mat||"").trim();
  // Strip rewind-quality suffix R3/R5/R9 before OD parse — e.g. 3FG-G12360M22R3 -> OD=22
  const sOD=s.replace(/R[359]$/,"");
  const odM=sOD.match(/M(22|25|28)$/);
  const od=odM?odM[1]:null;
  const micM=s.match(/G(\d{2})/);
  const micron=micM?parseInt(micM[1]):null;
  const grM=s.match(/G\d{2}(\d{3})/);
  const grade=grM?grM[1]:null;
  const isAB=s.includes("AB");
  const isSM=s.includes("SM");
  const isAL=s.includes("AL");
  // Rewind quality suffix: R3, R5, R9
  const rM=s.match(/R([359])$/);
  const rewind=rM?rM[1]:null;
  return{od,micron,grade,isAB,isSM,isAL,rewind};
}

// Grade hierarchy: higher can fill lower
// 320SM > 360M > 301ABM > 301M
function gradeRank(grade,isAB,isSM){
  if(isSM)return 100;// 320SM
  if(grade==="360")return 80;
  if(isAB)return 60;
  if(grade==="301")return 40;
  return 20;
}

function canFillFGM(fgmMat,orderMat,customerName){
  const f=parseMat(fgmMat),o=parseMat(orderMat);
  if(!f.micron||f.micron!==o.micron)return false;
  if(f.isAL)return false;
  // Rewind quality: R3/R5/R9 order can ONLY be filled by matching R3/R5/R9 FGM
  // Normal FGM cannot fill R3 orders; R3 FGM can fill normal orders
  if(o.rewind&&f.rewind!==o.rewind)return false;
  // OD rule: Order OD ≤ FGM OD (FGM M28 can fill M22/M25/M28)
  const odVal={"22":22,"25":25,"28":28};
  const fOD=odVal[f.od]||22;
  const oOD=odVal[o.od]||22;
  if(oOD>fOD)return false;

  // Grade hierarchy: 320SM(100) > 320M(90) > 360M(80) > 301ABM(60) > 301M(40)
  // Higher grade FGM can ALWAYS fill lower grade orders
  // Additionally: 301M/301ABM can fill 360M orders (except GLS)
  const isGLS=customerName&&String(customerName).toUpperCase().indexOf("GLS")>=0;

  // Assign rank: higher = better quality
  const rank=(p)=>{
    if(p.isSM)return 100;// 320SM
    if(p.grade==="320")return 90;// 320M
    if(p.grade==="360")return 80;// 360M
    if(p.grade==="301"&&p.isAB)return 60;// 301ABM
    if(p.grade==="301")return 40;// 301M
    return 0;
  };
  const fR=rank(f),oR=rank(o);

  // Higher grade FGM → lower grade order: always OK
  if(fR>=oR)return true;

  // Lower grade FGM → higher grade order: ONLY 301/301AB → 360 (except GLS)
  if(oR===80&&(fR===40||fR===60)){// order is 360M, FGM is 301M or 301ABM
    return !isGLS;
  }
  // 301M → 301ABM (lower fills slightly higher within 301 family)
  if(fR===40&&oR===60)return true;

  return false;
}

function canFillBare(bareMat,orderMat){
  // 901 → 301M, 301ABM (universal)
  // 360 → 360M (and 301M if <11MT threshold — handled in engine)
  // 320 → 320SM > 320M > 360M > 301ABM > 301M (cascade)
  const b=parseMat(bareMat),o=parseMat(orderMat);
  if(!b.micron||b.micron!==o.micron)return false;
  // Rewind quality: R3 order needs R3 bare; R3 bare can fill normal orders
  if(o.rewind&&b.rewind!==o.rewind)return false;
  if(b.grade==="901"){
    // 901 universal bare → can produce 301 and ABM
    return o.grade==="301"||o.grade==="361"||o.isAB;
  }
  if(b.grade==="360"){
    return o.grade==="360"||(o.grade==="301"&&!o.isAB);
  }
  if(b.grade==="320"){
    // 320 cascade: 320SM→320M→360M→301ABM→301M
    return true;// engine handles priority
  }
  if(b.grade==="361")return o.grade==="361";
  return false;
}

async function readXL(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=e=>{
      try{
        // No cellDates — keep raw serial numbers, convert with pure arithmetic (no timezone risk)
        const wb=_XLSX.read(e.target.result,{type:"array",cellDates:false});
        const rawRows=_XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:null,raw:true});
        // Pure arithmetic Excel serial → YYYY-MM-DD (no Date constructor, no timezone issues)
        const serialToYMD=function(s){
          var n=Math.floor(s);// drop time fraction
          // Excel epoch: serial 1 = 1900-01-01, with leap year bug (serial 60 = fake 1900-02-29)
          if(n>=60)n--;// skip the fake leap day
          // Days since 1899-12-31
          var d=new Date(Date.UTC(1899,11,31));
          d.setUTCDate(d.getUTCDate()+n);
          var y=d.getUTCFullYear(),mo=d.getUTCMonth()+1,dy=d.getUTCDate();
          return y+"-"+(mo<10?"0"+mo:mo)+"-"+(dy<10?"0"+dy:dy);
        };
        const rows=rawRows.map(r=>{
          const clean={};
          Object.keys(r).forEach(k=>{
            const v=r[k];
            // Convert Excel date serials (40000-60000 covers 2009-2064)
            if(typeof v==="number"&&v>40000&&v<60000&&(
              k.toLowerCase().indexOf("date")>=0||k.toLowerCase().indexOf("dt")>=0||
              k.toLowerCase().indexOf("time")>=0||k==="SO Crtd Dt."
            )){
              clean[k]=serialToYMD(v);
            }else{clean[k]=v;}
          });
          return clean;
        });
        res(rows);
      }catch(err){rej(err);}
    };
    fr.onerror=rej;fr.readAsArrayBuffer(file);
  });
}

function detectFileType(rows,filename){
  if(!rows||!rows.length)return null;
  const fname=String(filename||"").toUpperCase();
  const keys=Object.keys(rows[0]).map(k=>String(k).toLowerCase().trim());
  if(keys.some(k=>k.includes("pending")||k.includes("pend")))return"pen";
  const mats=rows.slice(0,30).map(r=>String(r.Material||r.material||"")).filter(Boolean);
  if(mats.some(m=>/^(SM|3SM|3SF)/i.test(m)))return"mj";
  // STK file = combined FGM + BARE stock
  if(fname.includes("STK")){return"stk";}
  const hasBatch=keys.some(k=>k.includes("batch"));
  const hasGrade=keys.some(k=>k.toLowerCase()==="grade");
  if(hasGrade&&hasBatch&&mats.some(m=>/^3FG/i.test(m))){
    const grades=rows.slice(0,10).map(r=>toFloat(r.Grade||0));
    if(grades.some(g=>g===5))return"fgjm";
    return"bare";
  }
  if(mats.some(m=>/^3FG.*901/i.test(m))&&hasBatch)return"bare";
  return null;
}

// Split STK file into FGM rows (Grade 5, with OD) and Bare rows (Grade 4, no OD)
function splitSTKFile(rows){
  const fgjm=[],bare=[];
  rows.forEach(r=>{
    if(!r.Material)return;
    const mat=String(r.Material).trim();
    const grade=toFloat(r.Grade||0);
    // Bare: 901 grade OR grade 4, no M22/M25/M28 suffix
    // Bare: 901 grade OR grade 4 PET (unmetallized feed stock)
    const isBare=mat.includes("901")||grade===4||(!mat.match(/M(22|25|28)$/)&&grade!==5);
    // FGM: ONLY grade 5 (Grade 6=offcut, Grade 7=ALOX — must NOT enter FGM pool)
    const isFGM=grade===5;
    if(isFGM)fgjm.push(r);
    else if(isBare)bare.push(r);
  });
  return{fgjm,bare};
}

// Clean uploaded rows: remove summary/total rows, fix swapped columns, flag anomalies
function cleanUploadData(type,rows){
  var warnings=[];
  var cleaned=rows.filter(function(r){
    // Remove summary/total rows (empty Material or Batch)
    if(type==="mj"||type==="bare"||type==="fgjm"){
      if(!r.Material||!String(r.Material).trim())return false;
      if((type==="mj"||type==="bare"||type==="fgjm")&&!r.Batch)return false;
      if(!String(r.Batch||"").trim())return false;
    }
    if(type==="pen"){
      if(!r.Material||!String(r.Material).trim())return false;
    }
    return true;
  });
  // MJ-specific fixes
  if(type==="mj"){
    cleaned=cleaned.map(function(r){
      var w=toFloat(r.Weight);
      var q=toFloat(r.Quality);
      // Fix: Weight=0 but Quality has the real weight value (swapped columns in SAP export)
      if(w===0&&q>0){
        warnings.push("⚠ MJ "+String(r.Batch||"")+" ("+String(r.Material||"").replace("3SF-","")+"): Weight was 0, used Quality value "+q.toFixed(1)+" kg instead");
        var fixed={};
        Object.keys(r).forEach(function(k){fixed[k]=r[k];});
        fixed.Weight=q;
        fixed.Quality=0;
        return fixed;
      }
      // Flag short rolls (< 21000m)
      var len=toFloat(r.Length);
      if(len>0&&len<21000){
        warnings.push("⚠ MJ "+String(r.Batch||"")+": Short roll ("+len+"m) — may produce fewer sets");
      }
      return r;
    });
  }
  // BARE-specific: flag short rolls
  if(type==="bare"){
    cleaned.forEach(function(r){
      var len=toFloat(r.Length);
      if(len>0&&len<21000){
        warnings.push("⚠ BARE "+String(r.Batch||"")+": Short roll ("+len+"m) — will be skipped by engine");
      }
    });
  }
  var removed=rows.length-cleaned.length;
  if(removed>0){
    warnings.push("Filtered "+removed+" empty/summary row(s) from "+type.toUpperCase());
  }
  return{rows:cleaned,warnings:warnings};
}

// ─── CORE PLANNING ENGINE v10 ──────────────────────────────────────────────────
function smartPlanV10(penData,bareData,mjData,fgjmData,cfg,machineMode,priorities,f05Mode,skipBatches){
  const _skipBatches=skipBatches||[];
  const M1_MIN=cfg.m1Min||1910,M1_MAX=cfg.m1Max||3300;
  const M2_MIN=cfg.m2Min||2900,M2_MAX=cfg.m2Max||3650;
  const TRIM_MIN=cfg.trimMin||5,TRIM_MAX=cfg.trimMax||30;
  const TRIM_MIN_25=cfg.trimMinOD25||15;
  const TRIM_MIN_28=cfg.trimMinOD28||25;// 2.8 OD: 25-30mm min trim
  const MAX_ARMS=cfg.maxArms||5;
  const JUMBO_LENS=cfg.jumboLengths||{"8":73000,"10":73000,"12":73000,"18":48000,"19":48000,"23":48000};
  const JUMBO_BASE={"8":72000,"10":72000,"12":72000,"18":48000,"19":48000,"23":48000};
  // NOR = (sets × slitLen) / baseJumboLen — decimal, NOT ceiled
  const calcNOR=(sets,slitLen,micron)=>{
    const base=JUMBO_BASE[String(micron)]||72000;
    if(base<=0)return sets;
    const raw=sets*slitLen/base;
    return Math.round(raw*100)/100;// 2 decimal places
  };
  const MJ_CAP=cfg.mjStockCap||7000;
  const CUST_RULES=cfg.customerRules||{};
  const SALVAGE_OK=cfg.salvageOK||[];
  const SALVAGE_NO=cfg.salvageNO||[];
  const OFFCUT_MIN=cfg.offcutMin||{"10":950,"12":800,"8":800};
  const LEN_TOL=3000;// ±3000m domestic tolerance

  const getJumboLen=(mic)=>{return JUMBO_LENS[String(mic)]||73000;};
  const getCustFixedTrim=(cust)=>{
    const cu=String(cust||"").toUpperCase();
    for(const[k,v]of Object.entries(CUST_RULES)){
      if(cu.includes(k.toUpperCase())&&v.fixedTrim)return v.fixedTrim;
    }
    return null;
  }
  const isGLSFlex=(cust)=>{
    const cu=String(cust||"").toUpperCase();
    for(const[k,v]of Object.entries(CUST_RULES)){
      if(cu.includes(k.toUpperCase())&&v.lengthFlex)return true;
    }
    return false;
  }
  const isSalvageable=(remarks,qr)=>{
    const c=(String(remarks||"")+" "+String(qr||"")).toLowerCase();
    // nan/empty = no defect reported = OK
    if(c.trim()===""||c==="nan nan"||c==="nan")return true;
    if(SALVAGE_NO.some(b=>c.includes(b)))return false;
    return SALVAGE_OK.some(g=>c.includes(g));
  }
  const fitsMachine=(rollSize,mode)=>{
    if(mode==="M-1"&&rollSize>=M1_MIN&&rollSize<=M1_MAX)return"M-1";
    if(mode==="M-2"&&rollSize>=M2_MIN&&rollSize<=M2_MAX)return"M-2";
    if(!mode||mode==="both"||mode==="auto"){
      if(rollSize>=M1_MIN&&rollSize<=M1_MAX)return"M-1";
      if(rollSize>=M2_MIN&&rollSize<=M2_MAX)return"M-2";
    }
    return null;
  }
  const getMinTrim=(od,cust)=>{
    const ft=getCustFixedTrim(cust);
    if(ft!==null)return ft;
    if(od==="25")return TRIM_MIN_25;if(od==="28")return TRIM_MIN_28;
    return TRIM_MIN;
  }
  const shortCust=(c)=>String(c||"").split(" ").slice(0,2).join(" ");
  const lenCompatible=(orderLen,avail)=>{
    // ±3000m domestic tolerance
    return avail>=(orderLen-LEN_TOL);
  }
  const getKey=(o)=>`${o["Sales Order"]}-${o["Sale Order Item"]}`;

  // ── Filter and sort PEN orders ──
  // Grade 2 = standard met orders (plan these). Grade 3 = special/trial orders (skip).
  const pend=penData.filter(r=>r.Material&&(toFloat(r["Pending Rolls"])>0)&&String(r.Grade||"").trim()!=="3");
  pend.forEach(o=>{
    o._rem=toFloat(o["Pending Rolls"]);
    o._key=getKey(o);
    const delv=cleanDate(o["Required Delivery Date"]||"9999");
    o._overdue=delv<TODAY;
    o._delivery=delv;
    o._soCreated=cleanDate(o["SO Crtd Dt."]||o["SO Crtd Date"]||o["SO Crtd. Date"]||"9999");
    // Mark orders that should skip stock phases (user unchecked stock run)
    o._skipStock=false;// Will be checked per-batch in Phase 1/2/3
  });
  // Mark priority customers
  const isPriority=(o)=>priorities&&priorities.length>0&&
    priorities.some(c=>String(o["Consignee Name"]||"").toUpperCase().includes(c.toUpperCase()));
  pend.forEach(o=>{o._priority=isPriority(o);});

  // Sort: priority → overdue → SO Created Date (oldest first) → delivery → smaller qty → older SO
  pend.sort((a,b)=>{
    if(a._priority&&!b._priority)return-1;
    if(!a._priority&&b._priority)return 1;
    if(a._overdue&&!b._overdue)return-1;
    if(!a._overdue&&b._overdue)return 1;
    if(a._soCreated!==b._soCreated)return a._soCreated.localeCompare(b._soCreated);
    if(a._delivery!==b._delivery)return a._delivery.localeCompare(b._delivery);
    if(a._rem!==b._rem)return a._rem-b._rem;
    return String(a["Sales Order"]).localeCompare(String(b["Sales Order"]));
  });

  // ══ STOCK LEVEL CHECK — FGM+MJ total for excess control ══
  const mjTotalKg_early=(mjData||[]).filter(r=>r.Material&&r.Batch&&!parseMat(String(r.Material).replace("3SF-","3FG-")).isAL).reduce((s,r)=>s+toFloat(r.Weight),0);
  const fgmTotalKg_early=(fgjmData||[]).filter(r=>r.Material&&r.Batch).reduce((s,r)=>s+toFloat(r.Weight),0);
  const stockHigh=(mjTotalKg_early+fgmTotalKg_early)>(cfg.stockCapKg||40000);// FGM+MJ > 40MT → cap sets
  const fgmHigh=fgmTotalKg_early>(cfg.fgmCapKg||8000);// FGM > 8MT → no excess FGM from any phase

  const planRows=[];
  const planWarnings=[];

  // ══ PHASE 1: FGM DIRECT (Highest Priority — ready to dispatch) ══
  // FGM rolls go through rewinder/slitter — multiple FGM rolls of same width can be
  // spliced to produce more order rolls. E.g. 2×36000m → 3×24000m rolls.
  // Sort FGM: FIFO by production date
  const fgmStock=(fgjmData||[]).filter(r=>r.Material&&r.Batch).map(r=>({
    ...r,_used:false,
    _width:toFloat(r.Width),_length:toFloat(r.Length),
    _micron:toFloat(r.Thickness),_p:parseMat(r.Material),
    _salvage:isSalvageable(r.Remarks||"",r["Quality Remarks"]||""),
    _notJayesh:(String(r.Remarks||"")+" "+String(r["Quality Remarks"]||"")).toLowerCase().includes("not jayesh"),
    _lowMBS:(String(r.Remarks||"")+" "+String(r["Quality Remarks"]||"")).toLowerCase().includes("low mbs"),
    _prodDate:String(r["Production Date"]||""),
  })).sort((a,b)=>a._prodDate.localeCompare(b._prodDate));

  // Step 1: Match each FGM roll to its best order (widest matching)
  var fgmMatches=[];
  for(var fi=0;fi<fgmStock.length;fi++){
    var f=fgmStock[fi];
    if(f._used||!f._salvage)continue;
    if(_skipBatches.indexOf(f.Batch)>=0)continue;
    var bestOrder=null;var bestWidth=0;
    for(var oi=0;oi<pend.length;oi++){
      var o=pend[oi];
      if(o._rem<=0)continue;
      var isJayesh=String(o["Consignee Name"]||"").toUpperCase().includes("JAYESH");
      if(f._notJayesh&&isJayesh)continue;
      if(f._lowMBS){var op2=parseMat(o.Material);if(op2.isAB||op2.grade==="360"||op2.isSM)continue;}
      if(!canFillFGM(f.Material,o.Material,o["Consignee Name"]))continue;
      var oW=toFloat(o.Width);
      if(f._width<oW)continue;
      if(oW>bestWidth){bestWidth=oW;bestOrder=o;}
    }
    if(bestOrder){
      var oKey=getKey(bestOrder);
      fgmMatches.push({fgm:f,order:bestOrder,orderKey:oKey,orderWidth:toFloat(bestOrder.Width),orderLen:toFloat(bestOrder.Length)||24000});
    }
  }

  // Step 2: Group by order key, pool FGM lengths, calculate rolls produced
  var fgmByOrder={};
  for(var mi=0;mi<fgmMatches.length;mi++){
    var m=fgmMatches[mi];
    if(!fgmByOrder[m.orderKey])fgmByOrder[m.orderKey]={matches:[],order:m.order,orderLen:m.orderLen,totalLen:0};
    fgmByOrder[m.orderKey].matches.push(m);
    fgmByOrder[m.orderKey].totalLen+=m.fgm._length;
  }

  for(var ok in fgmByOrder){
    var grp=fgmByOrder[ok];
    var orderLen=grp.orderLen;
    var needed=grp.order._rem;// pending rolls for this order
    // Total rolls producible from pooled FGM length
    var totalProducible=orderLen>0?Math.floor(grp.totalLen/orderLen):grp.matches.length;
    var toProduce=Math.min(totalProducible,needed);
    if(toProduce<=0)continue;

    // Assign rolls to individual FGM rolls (track which FGM contributes what)
    var accLen=0;var produced=0;
    for(var gi=0;gi<grp.matches.length;gi++){
      if(produced>=toProduce)break;
      var gm=grp.matches[gi];
      var f2=gm.fgm;
      accLen+=f2._length;
      var rollsFromPool=orderLen>0?Math.floor(accLen/orderLen):1;
      var rollsThisFGM=rollsFromPool-produced;
      if(rollsThisFGM<=0&&gi<grp.matches.length-1)continue;// this roll only contributes partial length
      if(rollsThisFGM<=0)continue;
      rollsThisFGM=Math.min(rollsThisFGM,toProduce-produced);

      planRows.push({
        id:uid(),
        source:"FGJM",phase:1,included:true,
        material:gm.order.Material,fgmBatch:f2.Batch,fgmMat:f2.Material,
        fgmWidth:f2._width,fgmLength:f2._length,orderWidth:gm.orderWidth,
        rollSize:f2._width,noOfRoll:rollsThisFGM,
        od:f2._p.od||parseMat(gm.order.Material).od||"22",
        micron:f2._micron||parseMat(gm.order.Material).micron||10,
        machine:f2["Storage Location"]==="JM02"?"M-2":"M-1",
        trim:f2._width-gm.orderWidth,slitLen:orderLen,
        fgmRemarks:String(f2.Remarks||""),fgmQR:String(f2["Quality Remarks"]||""),
        customers:shortCust(gm.order["Consignee Name"]),
        orders:[gm.order],overdue:gm.order._overdue,delivery:gm.order._delivery,
      });
      produced+=rollsThisFGM;
      f2._used=true;
    }
    grp.order._rem=Math.max(0,grp.order._rem-produced);
  }

  // ══ PHASE 2: MJ SLITTING ══
  const mjTotalKg=mjTotalKg_early;
  const fgmTotalKg=fgmTotalKg_early;
  const stockTotalKg=mjTotalKg+fgmTotalKg;
  const mjBlocked=false;// Always advisory — never block fresh runs

  const mjStock=(mjData||[]).filter(r=>r.Material&&r.Batch).map(r=>{
    const matFG=String(r.Material).replace("3SF-","3FG-");
    const p=parseMat(matFG);
    if(p.isAL)return null;
    const machine=String(r.Machine||"").includes("M2")||String(r.Machine||"").includes("M-2")?"M-2":"M-1";
    return{
      ...r,_used:false,_matFG:matFG,_p:p,
      _width:toFloat(r.Width),_length:toFloat(r.Length),
      _remLen:toFloat(r.Length),
      _machine:machine,_coreId:machine==="M-2"?8:6,
    };
  }).filter(Boolean);

  // MJ trim rules: 10-20mm only
  // PRIORITY 1: Mix different orders to fill MJ width with 10-20mm trim (NO Grade 5)
  // PRIORITY 2: Single order + Grade 5 arm (if mixing impossible)
  const MJ_TRIM_MIN=cfg.mjTrimMin||10, MJ_TRIM_MAX=cfg.mjTrimMax||20;
  const getMJ5GradeMin=(micron)=>{
    var g5m=cfg.mjGrade5Min||{"8":400,"10":910,"12":490};
    return g5m[String(micron)]||400;
  };

  // Find best multi-order combo for an MJ roll
  const findMJCombo=(mj,pendingOrders)=>{
    const mjW=mj._width;
    const mjLen=mj._remLen;
    const mic=mj._p.micron||10;
    // Get compatible pending orders (same micron, compatible grade/OD)
    const compat=[];
    for(var ci=0;ci<pendingOrders.length;ci++){
      var o=pendingOrders[ci];
      if(o._rem<=0)continue;
      var op=parseMat(o.Material);
      if(op.micron!==mj._p.micron)continue;
      // R3/R5/R9 orders: MJ rolls cannot fill rewind-quality orders (MJ has no rewind suffix)
      if(op.rewind&&mj._p.rewind!==op.rewind)continue;
      // Grade rank hierarchy: 320SM(100)>320M(90)>360M(80)>301ABM(60)>301M(40)
      // Higher rank MJ can slit into lower rank orders (quality substitution)
      var mjRank=mj._p.isSM?100:mj._p.grade==="320"?90:mj._p.grade==="360"?80:mj._p.isAB?60:mj._p.grade==="301"?40:20;
      var oRank=op.isSM?100:op.grade==="320"?90:op.grade==="360"?80:op.isAB?60:op.grade==="301"?40:20;
      if(mjRank<oRank)continue;// MJ quality too low for this order
      // Same rank: grade must match (e.g. 301M MJ can't fill 360M order, 320M can't fill 320SM order)
      if(mjRank===oRank&&op.grade!==mj._p.grade)continue;
      var odC={"22":["22","25","28"],"25":["25","28"],"28":["28"]};
      if(op.od&&!(odC[op.od]||[op.od]).includes(mj._p.od))continue;
      var oW=toFloat(o.Width);
      if(oW>mjW-MJ_TRIM_MIN)continue;// single arm too wide
      var oL=toFloat(o.Length);
      // Calculate sets for this order's slit length
      var orderSets=oL>0?Math.floor(mjLen/(oL-LEN_TOL)):1;
      if(orderSets<=0)orderSets=1;
      // Max arms for this order = ceil(pending / sets)
      var maxArmsForOrder=Math.ceil(o._rem/orderSets);
      compat.push({order:o,w:oW,l:oL,rem:o._rem,cu:String(o["Consignee Name"]||""),maxArms:maxArmsForOrder});
    }
    if(!compat.length)return null;

    // Priority passes: same-OD first, then any-OD. R3 rolls add R3-only passes before each.
    var mjRewind=mj._p.rewind||null;
    var mjOD=mj._p.od||"22";
    var compatSameOD=compat.filter(function(c){return(c.order&&parseMat(c.order.Material).od||"22")===mjOD;});
    var compatR3=mjRewind?compat.filter(function(c){return parseMat(c.order.Material).rewind===mjRewind;}):[];
    var compatR3SameOD=mjRewind?compatR3.filter(function(c){return(parseMat(c.order.Material).od||"22")===mjOD;}):[];

    var passes=[];
    if(mjRewind){
      // R3 roll: R3+sameOD → R3+anyOD → sameOD → all
      if(compatR3SameOD.length>0)passes.push(compatR3SameOD);
      if(compatR3.length>0)passes.push(compatR3);
      if(compatSameOD.length>0)passes.push(compatSameOD);
      passes.push(compat);
    } else {
      // Normal roll: sameOD → all
      if(compatSameOD.length>0)passes.push(compatSameOD);
      passes.push(compat);
    }

    var effectiveTrimMax=MJ_TRIM_MAX;

    // Try all combos of 1-5 arms from compatible orders
    var bestCombo=null;var bestScore=-1;

    for(var passIdx=0;passIdx<passes.length;passIdx++){
      var passCompat=passes[passIdx];
      if(bestCombo&&passIdx>0)break;// found combo in earlier pass, skip remaining

    // Build candidate pool: each order can appear up to maxArms times
    var cands=[];
    for(var pi=0;pi<Math.min(passCompat.length,15);pi++){
      var item=passCompat[pi];
      var maxR=Math.min(item.maxArms,4,MAX_ARMS);
      for(var rr=0;rr<maxR;rr++)cands.push(item);
    }

    // Try combos of 1-5 arms
    for(var n=Math.min(cands.length,5);n>=1;n--){
      // Use DFS-like approach for small combos
      var comboCount=0;
      var tryCombo=function(start,arms,sum){
        if(comboCount>500)return;// safety cap for large candidate sets
        if(arms.length===n){
          var trim=mjW-sum;
          if(trim>=MJ_TRIM_MIN&&trim<=effectiveTrimMax){
            comboCount++;
            // Score: prefer (1) more unique customers, (2) uniform slit lengths across arms,
            // (3) longer slit length (more sets), (4) trim is NOT a tiebreaker within valid range
            var uniqueCustomers={};
            var slitLens=[];
            for(var uw=0;uw<arms.length;uw++){
              uniqueCustomers[arms[uw].cu]=true;
              slitLens.push(arms[uw].l||24000);
            }
            // Slit length uniformity: penalise if arms have very different slit lengths
            var maxSL=slitLens[0],minSL=slitLens[0];
            for(var si=1;si<slitLens.length;si++){
              if(slitLens[si]>maxSL)maxSL=slitLens[si];
              if(slitLens[si]<minSL)minSL=slitLens[si];
            }
            var slUniform=(maxSL-minSL)<5000?200:0;// bonus if all arms have similar slit length
            // Production: actual slit len = max arm length; more sets = better MJ utilisation
            var setsEst=maxSL>0?Math.floor(mjLen/(maxSL-LEN_TOL)):0;
            var prodScore=setsEst*100;// each set worth 100 points
            var score=Object.keys(uniqueCustomers).length*1000+prodScore+slUniform;
            // Bonus for R3 arms when MJ roll is R3 (prioritize R3 orders)
            if(mjRewind){
              var r3Count=0;
              for(var r3i=0;r3i<arms.length;r3i++){
                if(parseMat(arms[r3i].order.Material).rewind===mjRewind)r3Count++;
              }
              score+=r3Count*2000;// strong bonus per R3 arm
            }
            if(score>bestScore){
              bestScore=score;
              bestCombo={arms:arms.slice(),trim:trim,noGrade5:true};
            }
          }
          return;
        }
        for(var ci2=start;ci2<cands.length;ci2++){
          var newSum=sum+cands[ci2].w;
          if(newSum>mjW-MJ_TRIM_MIN)continue;// too wide already
          if(mjW-newSum>(MAX_ARMS-arms.length-1)*1300+effectiveTrimMax)continue;// can't fill remaining
          arms.push(cands[ci2]);
          tryCombo(ci2+1,arms,newSum);
          arms.pop();
        }
      };
      tryCombo(0,[],0);
      // Don't break — let all arm counts compete. R3 bonus in 3-arm may beat 4-arm normal.
    }
    }// end passes loop

    // If no multi-order combo found, try single-order + Grade 5
    if(!bestCombo){
      for(var si=0;si<compat.length;si++){
        var it=compat[si];
        var maxArms=Math.min(MAX_ARMS,Math.floor(mjW/it.w),it.rem);
        for(var ac=maxArms;ac>=1;ac--){
          var armSum=ac*it.w;
          var rawTrim=mjW-armSum;
          // Direct trim 10-20mm (or up to 30mm for R3)
          if(rawTrim>=MJ_TRIM_MIN&&rawTrim<=effectiveTrimMax){
            bestCombo={arms:Array(ac).fill(it),trim:rawTrim,noGrade5:true};
            break;
          }
          // Grade 5 arm
          if(rawTrim>effectiveTrimMax){
            var g5Min=getMJ5GradeMin(mic);
            for(var gt=8;gt<=13;gt++){
              var rawG5=mjW-armSum-gt;
              var g5W=Math.floor(rawG5/5)*5;
              var actTrim=mjW-armSum-g5W;
              if(actTrim<8||actTrim>13)continue;
              if(g5W<g5Min)continue;
              if(g5W/mjW>0.33)break;// too much Grade 5
              bestCombo={arms:Array(ac).fill(it),trim:actTrim,noGrade5:false,
                grade5Arm:{width:g5W,length:it.l,micron:mic}};
              break;
            }
            if(bestCombo)break;
          }
        }
        if(bestCombo)break;
      }
    }
    return bestCombo;
  };

  // Process each MJ roll
  for(var mi=0;mi<mjStock.length;mi++){
    var mj=mjStock[mi];
    if(mj._used)continue;
    if(_skipBatches.indexOf(mj.Batch)>=0)continue;

    var combo=findMJCombo(mj,pend);
    if(!combo){planWarnings.push("MJ "+mj.Batch+" ("+mj._matFG.replace("3FG-","")+", "+mj._width+"mm×"+mj._length+"m): no matching order combo found");continue;}

    // Calculate sets from slit length — use MAX across all arms (all arms slit to same length;
    // shorter orders get extra length which is acceptable, but must meet longest order need)
    var comboOrders=combo.arms.map(function(a){return a.order;});
    var slitLen=combo.arms[0].l||24000;
    for(var sli=1;sli<combo.arms.length;sli++){
      var al=combo.arms[sli].l||24000;
      if(al>slitLen)slitLen=al;
    }
    var sets=slitLen>0?Math.floor(mj._remLen/(slitLen-LEN_TOL)):0;
    if(sets<=0){planWarnings.push("MJ "+mj.Batch+": length "+mj._remLen+"m too short for slit length "+slitLen+"m — 0 sets");continue;}

    // Calculate production per arm
    var armCounts={};
    combo.arms.forEach(function(a){
      var k=getKey(a.order);
      armCounts[k]=(armCounts[k]||0)+1;
    });

    // Always cap MJ sets to needed — user can increase via sets editor
    var minSets=sets;
    {
      var mjArmsByWidth={};
      combo.arms.forEach(function(a){var w=a.w;mjArmsByWidth[w]=(mjArmsByWidth[w]||0)+1;});
      for(var wk3 in mjArmsByWidth){
        var wCnt=mjArmsByWidth[wk3];
        var wVal=parseFloat(wk3);
        var totalRemW=0;
        for(var pri=0;pri<pend.length;pri++){
          if(toFloat(pend[pri].Width)===wVal&&pend[pri]._rem>0)totalRemW+=pend[pri]._rem;
        }
        if(totalRemW>0&&wCnt>0){
          var neededW=Math.floor(totalRemW/wCnt);
          if(neededW<=0)neededW=1;
          if(neededW<minSets)minSets=neededW;
        }
      }
    }

    var armWidths=combo.arms.map(function(a){return a.w;});
    var displayArms=armWidths.slice();
    if(combo.grade5Arm)displayArms.push("5G:"+combo.grade5Arm.width);
    var custs=[...new Set(combo.arms.map(function(a){return shortCust(a.cu);}))].join(" / ");
    var mjMic=mj._p.micron||10;
    // MJ NOR = sets × slitLen / actual roll length (physical roll consumed)
    var norRawMJ=mj._length>0?(minSets*slitLen/mj._length):minSets;
    var nor=Math.abs(norRawMJ-Math.round(norRawMJ))<0.15?Math.round(norRawMJ):Math.round(norRawMJ*100)/100;

    planRows.push({
      id:uid(),source:"MJ",phase:3,included:true,selected:true,rejected:false,
      material:combo.arms[0].order.Material,mjMat:mj._matFG,mjBatch:mj.Batch,
      mjWidth:mj._width,mjLength:mj._length,
      arms:armWidths,armDisplay:displayArms,
      sets:minSets,noOfRoll:nor,trim:combo.trim,
      grade5Arm:combo.grade5Arm||null,
      machine:mj._machine,coreId:toFloat(comboOrders[0]["Core ID"])||(mj._machine==="M-2"?8:6),
      od:mj._p.od||parseMat(combo.arms[0].order.Material).od||"22",
      micron:mjMic,
      rollSize:mj._width,// for OD sequence sort compatibility
      slitLen:slitLen,customers:custs,
      orders:comboOrders,overdue:comboOrders.some(function(o){return o._overdue;}),
      delivery:comboOrders[0]._delivery||"",
    });

    // Deduct from pending — spread across ALL orders of same width
    var mjDeductByWidth={};
    combo.arms.forEach(function(a){mjDeductByWidth[a.w]=(mjDeductByWidth[a.w]||0)+1;});
    for(var mdwk in mjDeductByWidth){
      var mdwVal=parseFloat(mdwk);
      var mjTotalDeduct=mjDeductByWidth[mdwk]*minSets;
      for(var mdpi=0;mdpi<pend.length&&mjTotalDeduct>0;mdpi++){
        if(toFloat(pend[mdpi].Width)===mdwVal&&pend[mdpi]._rem>0){
          var mjTake=Math.min(pend[mdpi]._rem,mjTotalDeduct);
          pend[mdpi]._rem-=mjTake;
          mjTotalDeduct-=mjTake;
        }
      }
    }
    mj._used=true;
  }


  // ══ PHASE 3: BARE STOCK ══
  // Bare roll width IS the met roll width — goes to metallizer as-is
  // Find arm combos from pending orders that fit: arms + trim = bare_width
  // Sort bare: widest first (maximise output per roll)
  const bareStock=(bareData||[]).filter(r=>r.Material&&r.Batch).map(r=>({
    ...r,_used:false,
    _width:toFloat(r.Width),_length:toFloat(r.Length),
    _micron:toFloat(r.Thickness),_p:parseMat(r.Material),
    _storLoc:String(r["Storage Location"]||r["Stor. Loc."]||r["StorLoc"]||"")
  })).sort((a,b)=>b._width-a._width);

  for(const b of bareStock){
    if(b._used)continue;
    if(_skipBatches.indexOf(b.Batch)>=0)continue;
    const storLocMachine=b._storLoc.toUpperCase().indexOf("JM02")>=0?"M-2":null;
    const mc=storLocMachine||fitsMachine(b._width,machineMode)||fitsMachine(b._width,"auto");
    if(!mc){planWarnings.push("BARE "+b.Batch+": width "+b._width+"mm does not fit any machine");continue;}
    // Skip if length too short for any order (min 21000m with tolerance)
    if(b._length<21000){planWarnings.push("BARE "+b.Batch+": short roll ("+b._length+"m) — skipped");continue;}

    // Find matching orders: same micron, grade compatible
    const matchingOrders=pend.filter(o=>{
      if(o._rem<=0)return false;
      if(o._skipStock)return false;// forced to fresh met by user
      if(!canFillBare(b.Material,o.Material))return false;
      const op=parseMat(o.Material);
      if(op.micron!==b._p.micron&&b._micron!==op.micron)return false;
      const oW=toFloat(o.Width);
      if(oW>b._width-TRIM_MIN)return false;// can't even fit 1 arm
      // Check length: at least 1 set with tolerance
      const oL=toFloat(o.Length);
      if(oL>0&&b._length<(oL-LEN_TOL))return false;
      return true;
    });
    if(!matchingOrders.length)continue;

    // Find best arm combo that fills this bare width
    // Try 3 arms first, then 2, 4, 5, 1
    let bestCombo=null;
    for(const nArms of[3,2,4,5,1]){
      if(bestCombo)break;
      // Try all combos of nArms from matching orders
      const cands=[];
      for(const o of matchingOrders.slice(0,10)){
        const maxRep=Math.min(nArms,Math.ceil(o._rem));
        for(let r=0;r<Math.min(maxRep,3);r++)cands.push(o);
      }
      if(cands.length<nArms)continue;

      const indices=Array(nArms).fill(0);
      const nextC2=()=>{
        for(let i=nArms-1;i>=0;i--){
          if(indices[i]<cands.length-1){indices[i]++;for(let j=i+1;j<nArms;j++)indices[j]=indices[i];return true;}
        }
        return false;
      };
      do{
        const armSum=indices.reduce((s,i)=>s+toFloat(cands[i].Width),0);
        const trim=b._width-armSum;
        if(trim<TRIM_MIN||trim>TRIM_MAX)continue;
        // All arms must have same OD — can't mix M22 and M25 on one roll
        const od0=parseMat(cands[indices[0]].Material).od||"22";
        var odMixed=false;
        for(var odi=1;odi<indices.length;odi++){
          if((parseMat(cands[indices[odi]].Material).od||"22")!==od0){odMixed=true;break;}
        }
        if(odMixed)continue;
        // Check OD-specific min trim
        const minT=getMinTrim(od0,cands[indices[0]]["Consignee Name"]);
        if(trim<minT)continue;
        // Check each arm count doesn't exceed remaining rolls
        const cts={};let ok=true;
        for(const i of indices){
          const k=getKey(cands[i]);
          cts[k]=(cts[k]||0)+1;
          if(cts[k]>cands[i]._rem){ok=false;break;}
        }
        if(!ok)continue;
        bestCombo={arms:indices.map(i=>cands[i]),trim,od:od0};
        break;
      }while(nextC2());
    }

    if(!bestCombo)continue;

    // Calculate sets from bare length — use FULL bare roll
    const armWidths=bestCombo.arms.map(a=>toFloat(a.Width));
    const sl=toFloat(bestCombo.arms[0].Length);
    const setsFromLen=sl>0?Math.floor(b._length/(sl-LEN_TOL)):0;
    if(setsFromLen<=0)continue;

    // Full bare roll = full sets, UNLESS FGM > 8MT → cap to needed (no excess FGM)
    const armCounts={};
    for(const a of bestCombo.arms){const k=getKey(a);armCounts[k]=(armCounts[k]||0)+1;}
    let minSets=setsFromLen;
    let hasExcess=false;
    {
      // Always cap sets to needed — user can increase via sets editor
      var bareArmsByW={};
      for(var bai=0;bai<bestCombo.arms.length;bai++){
        var baw=toFloat(bestCombo.arms[bai].Width);
        bareArmsByW[baw]=(bareArmsByW[baw]||0)+1;
      }
      for(var bwk in bareArmsByW){
        var bwCnt=bareArmsByW[bwk];
        var bwVal=parseFloat(bwk);
        var bTotalRem=0;
        for(var bri=0;bri<pend.length;bri++){
          if(toFloat(pend[bri].Width)===bwVal&&pend[bri]._rem>0)bTotalRem+=pend[bri]._rem;
        }
        if(bTotalRem>0&&bwCnt>0){
              var bNeeded=Math.floor(bTotalRem/bwCnt);
              if(bNeeded<=0)bNeeded=1;
              if(bNeeded<minSets){minSets=bNeeded;hasExcess=true;}
            }
      }
    }

    const setsPerJumbo=sl>0?Math.floor(b._length/sl):1;
    // BARE NOR = sets × slitLen / actual bare roll length (physical roll consumed)
    var norRawBR=b._length>0?(minSets*sl/b._length):minSets;
    const nor=Math.abs(norRawBR-Math.round(norRawBR))<0.15?Math.round(norRawBR):Math.round(norRawBR*100)/100;
    const custs=[...new Set(bestCombo.arms.map(a=>shortCust(a["Consignee Name"])))].join(" / ");
    const trimGrade=bestCombo.trim<=10?"🟢":bestCombo.trim<=15?"🟡":bestCombo.trim<=25?"🟠":"🔴";

    planRows.push({
      id:uid(),
      source:"BARE",phase:1,included:true,selected:true,rejected:false,
      machine:mc,material:bestCombo.arms[0].Material||"",bareMat:b.Material,bareBatch:b.Batch,
      rollSize:b._width,jumboLen:b._length,noOfRoll:nor,
      trim:bestCombo.trim,trimGrade,slitLen:sl,
      arms:armWidths,sets:minSets,hasExcess:hasExcess,
      od:bestCombo.od||"22",micron:b._p.micron||b._micron,
      customers:custs,metalIO:bestCombo.arms[0]["Metal Side"]||"I",
      packMode:bestCombo.arms[0]["Packing Mode"]||"WM",
      coreId:toFloat(bestCombo.arms[0]["Core ID"])||(mc==="M-2"?8:6),
      orders:bestCombo.arms,overdue:bestCombo.arms.some(a=>a._overdue),
      delivery:bestCombo.arms[0]._delivery||"",
    });

    // Deduct rolls from pending — spread across ALL orders of same width
    // The per-width cap allows more sets than any single order needs,
    // so deduction must spread across all orders of that width
    var deductByWidth={};
    for(var dki=0;dki<bestCombo.arms.length;dki++){
      var dw=toFloat(bestCombo.arms[dki].Width);
      deductByWidth[dw]=(deductByWidth[dw]||0)+1;
    }
    for(var dwk in deductByWidth){
      var dwVal=parseFloat(dwk);
      var totalToDeduct=deductByWidth[dwk]*minSets;
      // Spread deduction across all pend orders of this width+micron
      for(var dpi=0;dpi<pend.length&&totalToDeduct>0;dpi++){
        if(toFloat(pend[dpi].Width)===dwVal&&pend[dpi]._rem>0){
          var take=Math.min(pend[dpi]._rem,totalToDeduct);
          pend[dpi]._rem-=take;
          totalToDeduct-=take;
        }
      }
    }
    b._used=true;
  }


  // ══ PHASE 4: FRESH MET RUNS (always generated — MJ cap is advisory only) ══
  const freshOrders=pend.filter(o=>o._rem>0);
  if(freshOrders.length>0){
    // Group by micron + rewind quality (R3 and normal must be separate runs)
    const micGroups={};
    for(const o of freshOrders){
      const op=parseMat(o.Material);
      const mic=op.micron||10;
      const rw=op.rewind||"";
      const groupKey=mic+(rw?"_R"+rw:"");
      if(!micGroups[groupKey])micGroups[groupKey]=[];
      micGroups[groupKey].push({...o,w:toFloat(o.Width),l:toFloat(o.Length),cu:String(o["Consignee Name"]||""),_key:o._key||getKey(o),od:op.od||"22"});
    }

    // Trim ladder per roll position from same jumbo
    // trim logic is in findBestCombo getTrimOrder

    const findBestCombo=(items,mode,fixedTrim,odType,mustInclude=null,mic=10)=>{
      // F/05-AWARE COMBO FINDER
      // Scores combos by: (1) roll size in F/05 target range, (2) minimum trim
      // f05Mode: "3r5g","3rt","4rt","4r5g","auto"

      let best=null,bestScore=-1;
      const vi=items.filter(i=>i.w>0&&i._rem>0);
      if(!vi.length) return null;

      const cands=[];
      for(const it of vi.slice(0,20)){
        const mr=Math.min(MAX_ARMS,Math.ceil(it._rem));
        for(let r=0;r<Math.min(mr,4);r++) cands.push(it);
      }
      if(!cands.length) return null;

      // Calculate F/05 target roll size range based on mode + micron
      var f05TC=cfg.f05TrimMin||{"8":150,"10":200,"12":180,"15":200,"23":200};
      var f05OC=cfg.offcutMin||{"8":800,"10":950,"12":800,"15":800,"23":800};
      const TMIN_F05=f05TC[String(mic)]||200;
      const OMIN_F05=f05OC[String(mic)]||800;
      const JW=cfg.jumboWidth||10450;
      const maxSum=JW-TMIN_F05;// absolute max roll sum per jumbo

      // Target ranges per mode (per-roll ideal size)
      const targets={
        "3r5g":{lo:Math.floor((JW-TMIN_F05-2000)/3),hi:Math.floor((JW-TMIN_F05-OMIN_F05)/3)},
        "3rt":{lo:Math.floor((JW-400)/3),hi:Math.floor(maxSum/3)},
        "4r5g":{lo:Math.floor((JW-TMIN_F05-2000)/4),hi:Math.floor((JW-TMIN_F05-OMIN_F05)/4)},
        "4rt":{lo:Math.floor((JW-600)/4),hi:Math.floor(maxSum/4)},
      };
      // Auto: accept any good combo
      const autoLo=1910,autoHi=3650;

      const getTarget=()=>{
        if(f05Mode==="auto")return{lo:autoLo,hi:autoHi};
        return targets[f05Mode]||{lo:autoLo,hi:autoHi};
      };
      const tgt=getTarget();

      // Score: 1000+ if in target range, 0-999 if outside (fallback)
      const scoreCombo=(rs,trim,nArms)=>{
        let s=0;
        if(rs>=tgt.lo&&rs<=tgt.hi){
          s=1000+(500-Math.abs(rs-Math.floor((tgt.lo+tgt.hi)/2)));
        } else if(f05Mode==="auto"){
          // Auto: prefer combos that fit well in ANY mode
          let anyHit=false;
          for(const tk of Object.keys(targets)){
            const tt=targets[tk];
            if(rs>=tt.lo&&rs<=tt.hi){anyHit=true;s=Math.max(s,900+(500-Math.abs(rs-Math.floor((tt.lo+tt.hi)/2))));break;}
          }
          if(!anyHit) s=500-Math.min(Math.abs(rs-tgt.lo),Math.abs(rs-tgt.hi));
        } else {
          s=500-Math.min(Math.abs(rs-tgt.lo),Math.abs(rs-tgt.hi));
        }
        s+=nArms*30;// more arms = more production
        s+=(TRIM_MAX-trim)*3;// less trim slightly better
        return s;
      };

      const getTrimOrder=(od,cust,isMixedWidth)=>{
        if(fixedTrim!==null&&fixedTrim!==undefined) return [fixedTrim];
        const ft=getCustFixedTrim(cust);
        if(ft!==null) return [ft];
        if(od==="25"){const arr=[];for(let t=15;t<=TRIM_MAX;t++) arr.push(t);return arr;}
        if(od==="28"){const arr=[];for(let t=25;t<=TRIM_MAX;t++) arr.push(t);return arr;}
        // OD 22: always try 15mm first; 5-14mm only as fallback for mixed widths
        const arr22=[];
        for(let t=15;t<=TRIM_MAX;t++) arr22.push(t);// 15→30 first
        if(isMixedWidth){for(let t=TRIM_MIN;t<15;t++) arr22.push(t);}// then 5→14 fallback
        return arr22;
      };

      for(const n of[3,2,4,5,1]){
        if(n>cands.length) continue;
        if(best&&bestScore>=1400) break;// already found great match
        const indices=Array(n).fill(0);
        const nextC=()=>{
          for(let i=n-1;i>=0;i--){
            if(indices[i]<cands.length-1){
              indices[i]++;
              for(let j=i+1;j<n;j++) indices[j]=indices[i];
              return true;
            }
          }
          return false;
        };
        do{
          const armSum=indices.reduce((s,i)=>s+cands[i].w,0);
          const _ods=indices.map(i=>cands[i].od);const mixed=_ods.length>1&&!_ods.every(function(v){return v===_ods[0];});
          if(mixed&&(armSum+15)>=2500) continue;
          const cts={};let ok=true;
          for(const i of indices){
            cts[cands[i]._key]=(cts[cands[i]._key]||0)+1;
            if(cts[cands[i]._key]>cands[i]._rem){ok=false;break;}
          }
          if(!ok) continue;
          if(mustInclude&&mustInclude.length>0){
            const hasPriority=indices.some(i=>mustInclude.some(m=>m._key===cands[i]._key));
            if(!hasPriority)continue;
          }
          const cu=cands[indices[0]]&&cands[indices[0]].cu||"";
          const od=cands[indices[0]]&&cands[indices[0]].od||odType||"22";
          // Check if arms have mixed widths — only mixed widths allow 5mm trim
          var armWidthSet={};
          for(var awi=0;awi<indices.length;awi++){armWidthSet[cands[indices[awi]].w]=true;}
          var isMixedWidth=Object.keys(armWidthSet).length>1;
          const trimOrder=getTrimOrder(od,cu,isMixedWidth);
          for(const t of trimOrder){
            if(t<TRIM_MIN||t>TRIM_MAX) continue;
            const rs=armSum+t;
            const mc=fitsMachine(rs,mode);
            if(!mc) continue;
            const sc=scoreCombo(rs,t,n);
            if(sc>bestScore){bestScore=sc;best={arms:indices.map(i=>cands[i]),trim:t,rs,mc};}
            break;// first valid trim per combo
          }
          if(best&&bestScore>=1400) break;
        }while(nextC());
        if(best&&bestScore>=1400) break;
      }
      return best;
    }

    for(const[micStr,orders]of Object.entries(micGroups).sort()){
      const mic=parseInt(micStr);
      const JL=getJumboLen(mic);
      const items=orders.map(o=>({...o,w:toFloat(o.Width),l:toFloat(o.Length),cu:String(o["Consignee Name"]||""),_priority:!!o._priority,_key:o._key||getKey(o),od:parseMat(o.Material).od||"22"}));

      let safety=0;
      while(items.some(i=>i._rem>0)&&safety++<200){
        // Sort active: priority customers first, then by remaining qty
        const active=items.filter(i=>i._rem>0).sort((a,b)=>{
          if(a._priority&&!b._priority)return-1;
          if(!a._priority&&b._priority)return 1;
          return b._rem-a._rem;
        });
        if(!active.length)break;

        // Determine dominant OD (from priority items first, then all)
        const priorityActive=active.filter(i=>i._priority);
        const domSource=priorityActive.length>0?priorityActive:active;
        const odGroups={};
        for(const a of domSource){if(!odGroups[a.od])odGroups[a.od]=[];odGroups[a.od].push(a);}
        const domOD=Object.entries(odGroups).sort((a,b)=>b[1].length-a[1].length)[0][0];

        // Check Jayesh
        const jayeshItems=active.filter(i=>getCustFixedTrim(i.cu)!==null);
        let found=null;
        if(jayeshItems.length){
          const ft=getCustFixedTrim(jayeshItems[0].cu);
          found=findBestCombo(jayeshItems,machineMode,ft,domOD,null,mic);
        }
        // Try priority customers first — fill remaining arms with any customer
        if(!found&&priorityActive.length>0){
          found=findBestCombo(active,machineMode,null,domOD,priorityActive,mic);
        }
        if(!found)found=findBestCombo(active,machineMode,null,domOD,null,mic);

        if(!found){
          // Multi-arm same-order fallback — for narrow widths that can't reach machine range alone
          const it=active.sort((a,b)=>b._rem-a._rem)[0];
          const ft=getCustFixedTrim(it.cu);
          const minTrimOD=it.od==="28"?TRIM_MIN_28:it.od==="25"?TRIM_MIN_25:TRIM_MIN;
          const _trimOrd=it.od==="25"||it.od==="28"?Array.from({length:16},(_,k)=>k+15):[15,10,5];
          // Try 1→2→3→4→5 arms of same order
          for(const nA of[1,2,3,4,5]){
            if(found)break;
            if(nA>it._rem)break;
            for(const t of _trimOrd){
              if(t<minTrimOD)continue;
              if(ft!==null&&t!==ft)continue;
              const rs=it.w*nA+t;
              const mc=fitsMachine(rs,machineMode)||fitsMachine(rs,"auto");
              if(mc){
                const arms=[];for(var _a=0;_a<nA;_a++)arms.push(it);
                found={arms:arms,trim:t,rs,mc};break;
              }
            }
          }
          // Also try mixing with other active orders
          if(!found){
            for(const it2 of active.slice(0,8)){
              if(found)break;
              for(const nA of[1,2,3]){
                if(found)break;
                for(const nB of[1,2,3]){
                  if(found)break;
                  if(nA>it._rem||nB>it2._rem)continue;
                  for(const t of _trimOrd){
                    if(t<minTrimOD)continue;
                    if(ft!==null&&t!==ft)continue;
                    const rs=it.w*nA+it2.w*nB+t;
                    const mc=fitsMachine(rs,machineMode)||fitsMachine(rs,"auto");
                    if(mc&&nA+nB<=MAX_ARMS){
                      const arms=[];
                      for(var _b=0;_b<nA;_b++)arms.push(it);
                      for(var _c=0;_c<nB;_c++)arms.push(it2);
                      found={arms:arms,trim:t,rs,mc};break;
                    }
                  }
                }
              }
            }
          }
          if(!found){active[0]._rem=0;continue;}// truly impossible
        }

        const armWidths=found.arms.map(a=>a.w);
        let rollSize=found.rs;
        let finalTrim=found.trim;
        const odUsed=found.arms[0].od||domOD;

        // Each arm calculates sets independently based on its own order length
        const armSlitLens=found.arms.map(a=>a.l||24000);
        const armSets=found.arms.map(a=>{
          const al=a.l||24000;
          return al>0?Math.floor(JL/al):1;
        });
        const fullJumboSets=Math.min(...armSets);// full jumbo capacity
        // slitLen = dominant (most common) arm slit length for display
        var slitCounts={};
        armSlitLens.forEach(function(l){slitCounts[l]=(slitCounts[l]||0)+1;});
        var sl=armSlitLens[0];var slMax=0;
        for(var slk in slitCounts){if(slitCounts[slk]>slMax){slMax=slitCounts[slk];sl=parseInt(slk);}}
        const setsPerJumbo=sl>0?Math.floor(JL/sl):1;

        // Always cap sets to what's actually needed — no excess production
        // User can manually increase sets via the sets editor if extra FGM needed
        let minSets=fullJumboSets;
        let hasExcess=false;
        {
          var armsByWidth2={};
          for(var aci=0;aci<found.arms.length;aci++){
            var aw2=found.arms[aci].w;
            armsByWidth2[aw2]=(armsByWidth2[aw2]||0)+1;
          }
          var runODVal={"22":22,"25":25,"28":28};
          for(var wk2 in armsByWidth2){
            var armCnt=armsByWidth2[wk2];
            var wNum=parseFloat(wk2);
            var totalRem=0;
            for(var ri2=0;ri2<items.length;ri2++){
              if(items[ri2].w===wNum&&items[ri2]._rem>0){
                var itemOD=runODVal[items[ri2].od]||22;
                var runOD=runODVal[odUsed]||22;
                if(itemOD<=runOD)totalRem+=items[ri2]._rem;
              }
            }
            if(totalRem>0&&armCnt>0){
              // HARD CAP: ensure armCnt * minSets <= totalRem (no excess rolls)
              var maxSetsForWidth=Math.floor(totalRem/armCnt);
              if(maxSetsForWidth<=0)maxSetsForWidth=1;
              if(maxSetsForWidth<minSets){minSets=maxSetsForWidth;hasExcess=true;}
            } else if(totalRem<=0){
              // This width has no pending — skip this run entirely
              minSets=0;
            }
          }
          if(minSets<=0){
            // All arms fully planned — mark items as done and skip
            for(var ski=0;ski<found.arms.length;ski++){
              var skit=items.find(function(it){return it._key===found.arms[ski]._key;});
              if(skit)skit._rem=0;
            }
            continue;
          }
        }

        // ── F/05 CONSTRAINT (only in forward mode) ──
        var f05TrimCfg2=cfg.f05TrimMin||{"8":150,"10":200,"12":180,"15":200,"23":200};
        var offcutCfg2=cfg.offcutMin||{"8":800,"10":950,"12":800,"15":800,"23":800};
        const f05TrimMin=f05TrimCfg2[String(mic)]||200;
        const f05OffcutMin=offcutCfg2[String(mic)]||800;
        const maxFor3WithOffcut=Math.floor(((cfg.jumboWidth||10450)-f05TrimMin-f05OffcutMin)/3);
        const maxFor3NoOffcut=Math.floor(((cfg.jumboWidth||10450)-f05TrimMin)/3);
        if(rollSize>maxFor3WithOffcut){
          const excess=rollSize-maxFor3WithOffcut;
          if(finalTrim-excess>=5){
            finalTrim=finalTrim-excess;
            rollSize=maxFor3WithOffcut;
          } else if(rollSize>maxFor3NoOffcut){
            const excess2=rollSize-maxFor3NoOffcut;
            if(finalTrim-excess2>=5){
              finalTrim=finalTrim-excess2;
              rollSize=maxFor3NoOffcut;
            }
          }
        }

        const nor=calcNOR(minSets,sl,mic);

        // Bare material
        const _gradeList=found.arms.map(a=>parseMat(a.Material).grade);
        const _rewindList=found.arms.map(a=>parseMat(a.Material).rewind);
        let bareMat="3FG-G"+String(mic).padStart(2,"0")+"901";
        if(_gradeList.indexOf("360")>=0)bareMat="3FG-G"+String(mic).padStart(2,"0")+"360";
        if(_gradeList.indexOf("320")>=0)bareMat="3FG-G"+String(mic).padStart(2,"0")+"320";
        // Append R3/R5/R9 if any arm needs rewind quality
        var rewindSuffix=null;
        for(var rwi=0;rwi<_rewindList.length;rwi++){if(_rewindList[rwi]){rewindSuffix=_rewindList[rwi];break;}}
        if(rewindSuffix)bareMat=bareMat+"R"+rewindSuffix;

        const custs=[...new Set(found.arms.map(a=>shortCust(a.cu)))].join(" / ");
        const trimGrade=found.trim<=10?"🟢":found.trim<=15?"🟡":found.trim<=25?"🟠":"🔴";

        // Trim is self-determined per run (15mm first, step down only if forced)

        planRows.push({
          id:uid(),
          source:"BARE_FRESH",phase:4,included:true,selected:true,rejected:false,
          machine:found.mc,material:found.arms[0].Material||"",bareMat,
          rollSize,jumboLen:JL,noOfRoll:nor,
          trim:finalTrim,trimGrade,slitLen:sl,
          arms:armWidths,armSets,armSlitLens,sets:minSets,
          od:odUsed,micron:mic,f05Mode:f05Mode||"auto",
          hasExcess:hasExcess,
          customers:custs,metalIO:found.arms[0]["Metal Side"]||"I",
          packMode:"WM",coreId:toFloat(found.arms[0]["Core ID"])||(found.mc==="M-2"?8:6),
          orders:found.arms,overdue:found.arms.some(a=>a._overdue),
          delivery:found.arms[0]._delivery||"",
          // Check if a matching bare stock roll exists (unused by Phase 2)
          _matchingBare:(function(){
            var matches=[];
            for(var bi2=0;bi2<bareStock.length;bi2++){
              var bk=bareStock[bi2];
              if(bk._used)continue;
              if(_skipBatches.indexOf(bk.Batch)>=0)continue;
              if(bk._width<rollSize-30)continue;// bare must be >= run roll size
              if(bk._length<21000)continue;
              var bMic=bk._micron||bk._p.micron||0;
              if(bMic!==mic)continue;
              if(!canFillBare(bk.Material,(found.arms[0]||{}).Material||""))continue;
              matches.push({batch:bk.Batch,material:bk.Material,width:bk._width,length:bk._length});
            }
            return matches.length>0?matches:null;
          })(),
        });

        // Deduct — use CAPPED minSets per arm (not armSets which is uncapped jumbo capacity)
        // Each arm produces minSets rolls (the run does minSets passes through the machine)
        const ac={};
        for(var dai=0;dai<found.arms.length;dai++){
          var dk=found.arms[dai]._key;
          ac[dk]=(ac[dk]||0)+minSets;
        }
        for(const[k,totalRolls]of Object.entries(ac)){
          const it=items.find(i=>i._key===k);
          if(it){
            it._rem=Math.max(0,it._rem-totalRolls);
          }
        }
      }
    }
  }

  // ══ SEQUENCE OPTIMIZATION — group by machine then OD then width desc ══
  // Rule: same OD runs must be together to minimize boat changes
  // Order: 2.2 OD first (most common) → 2.5 OD → 2.8 OD
  // Within same OD: widest rolls first (max output per shift)
  // Separate M-1 and M-2 sequences
  const OD_ORDER={"22":1,"25":2,"28":3};
  const metRunsForSeq=planRows.filter(r=>r.source==="BARE_FRESH"||r.source==="BARE");
  
  // Sort met runs: machine → OD group → roll size desc (widest first)
  metRunsForSeq.sort((a,b)=>{
    if(a.machine!==b.machine)return a.machine<b.machine?-1:1;
    const oa=OD_ORDER[a.od||"22"]||1, ob=OD_ORDER[b.od||"22"]||1;
    if(oa!==ob)return oa-ob;
    return (b.rollSize||0)-(a.rollSize||0);// widest first within same OD
  });

  // Assign seqIndex per machine
  const seqCounters={"M-1":0,"M-2":0};
  metRunsForSeq.forEach(r=>{
    const m=r.machine||"M-1";
    r.seqIndex=seqCounters[m]||0;
    seqCounters[m]=(seqCounters[m]||0)+1;
  });

  // Also sort MJ runs by machine → OD → width
  const mjRunsForSeq=planRows.filter(r=>r.source==="MJ");
  mjRunsForSeq.sort((a,b)=>{
    if(a.machine!==b.machine)return a.machine<b.machine?-1:1;
    const oa=OD_ORDER[a.od||"22"]||1, ob=OD_ORDER[b.od||"22"]||1;
    if(oa!==ob)return oa-ob;
    return (b.mjWidth||0)-(a.mjWidth||0);
  });

  // ══ APPLY SORT ORDER TO planRows ══
  // Re-order planRows so F/04 and Sequence both show OD-grouped order
  // Section order: overdue first, then MJ, then FGM, then FRESH MET (sorted by machine+OD+size)
  const OD_ORD={"22":1,"25":2,"28":3};
  planRows.sort((a,b)=>{
    // Overdue always first
    if(a.overdue&&!b.overdue)return -1;
    if(!a.overdue&&b.overdue)return 1;
    // Phase order: FGM(2) → MJ(3) → FRESH(4)
    if((a.phase||4)!==(b.phase||4))return(a.phase||4)-(b.phase||4);
    // For met runs: machine first, then OD group, then widest roll first
    if(a.source==="BARE_FRESH"||a.source==="BARE"){
      if(a.machine!==b.machine)return a.machine<b.machine?-1:1;
      const oa=OD_ORD[a.od||"22"]||1, ob=OD_ORD[b.od||"22"]||1;
      if(oa!==ob)return oa-ob;
      return(b.rollSize||0)-(a.rollSize||0);// widest first
    }
    // For MJ runs: machine, then OD, then width
    if(a.source==="MJ"){
      if(a.machine!==b.machine)return a.machine<b.machine?-1:1;
      const oa=OD_ORD[a.od||"22"]||1, ob=OD_ORD[b.od||"22"]||1;
      if(oa!==ob)return oa-ob;
      return(b.mjWidth||0)-(a.mjWidth||0);
    }
    return 0;
  });

  // Assign seqIndex on sorted planRows
  const _seqC={"M-1":0,"M-2":0};
  planRows.forEach(r=>{
    if(r.source==="BARE_FRESH"||r.source==="BARE"){
      const m=r.machine||"M-1";
      r.seqIndex=_seqC[m]||0;
      _seqC[m]=(_seqC[m]||0)+1;
    }
  });

    // ══ APPLY CORRECT SEQUENCE ORDER TO planRows ══
  // Rule 1: group by OD — 2.2 OD → 2.5 OD → 2.8 OD (minimize boat changes)
  // Rule 2: after each boat changeover, FIRST run must be 2.2 OD (boat seasoning)
  // Rule 3: widest rolls first within same OD group
  const _OD_ORD={"22":1,"25":2,"28":3};

  // Sort met runs per machine with OD grouping + widest first
  const _metRuns=planRows.filter(r=>r.source==="BARE_FRESH"||r.source==="BARE");
  const _mjRuns=planRows.filter(r=>r.source==="MJ");
  const _otherRuns=planRows.filter(r=>r.source!=="BARE_FRESH"&&r.source!=="BARE"&&r.source!=="MJ");

  // Function to resequence met runs for one machine with boat-seasoning rule
  const resequenceForMachine=(runs,machine)=>{
    const machRuns=runs.filter(r=>r.machine===machine);
    if(!machRuns.length)return[];
    const boatLife={"22":cfg.boatLife22||550000,"25":cfg.boatLife25||330000,"28":cfg.boatLife28||280000};

    // Group by OD
    const byOD={"22":[],"25":[],"28":[]};
    machRuns.forEach(r=>{ const od=r.od||"22"; (byOD[od]=byOD[od]||[]).push(r); });
    // Sort each OD group widest first
    Object.values(byOD).forEach(g=>g.sort((a,b)=>(b.rollSize||0)-(a.rollSize||0)));

    const result=[];
    const odGroups=["22","25","28"].filter(od=>byOD[od]&&byOD[od].length>0);

    // Pre-allocate seasoning: REMOVE from 22 pool to prevent duplication
    const seasoningRuns={};
    for(let gi=1;gi<odGroups.length;gi++){
      const od=odGroups[gi];
      if(!byOD["22"]||byOD["22"].length===0)break;
      const nextGroupWidest=byOD[od][0]?.rollSize||0;
      const widerIdx=byOD["22"].findIndex(r=>r.rollSize>=nextGroupWidest);
      const seasonIdx=widerIdx>=0?widerIdx:0;
      const seasonRun=byOD["22"].splice(seasonIdx,1)[0];
      seasonRun._seasoning=true;
      seasonRun._seasoningFor=od;
      seasonRun._seasoningTarget=nextGroupWidest;
      seasoningRuns[od]=seasonRun;
    }
    odGroups.forEach((od,gi)=>{
      if(gi>0&&seasoningRuns[od]){result.push(seasoningRuns[od]);}
      byOD[od].forEach(r=>result.push(r));
    });
    return result;
  };

  const seqM1=resequenceForMachine(_metRuns,"M-1");
  const seqM2=resequenceForMachine(_metRuns,"M-2");
  const allSeqMet=[...seqM1,...seqM2];

  // Sort MJ runs
  _mjRuns.sort((a,b)=>{
    if(a.machine!==b.machine)return a.machine<b.machine?-1:1;
    const oa=_OD_ORD[a.od||"22"]||1,ob=_OD_ORD[b.od||"22"]||1;
    if(oa!==ob)return oa-ob;
    return(b.mjWidth||0)-(a.mjWidth||0);
  });

  // Rebuild planRows in correct order: overdue first, then by phase
  planRows.length=0;
  // Add overdue non-met first
  _otherRuns.filter(r=>r.overdue).forEach(r=>planRows.push(r));
  _mjRuns.filter(r=>r.overdue).forEach(r=>planRows.push(r));
  // Non-overdue other runs (FGM)
  _otherRuns.filter(r=>!r.overdue).forEach(r=>planRows.push(r));
  // MJ runs (non-overdue)
  _mjRuns.filter(r=>!r.overdue).forEach(r=>planRows.push(r));
  // Met runs in correct OD sequence
  allSeqMet.forEach(r=>planRows.push(r));

  // Assign seqIndex after final sort
  const _seqC2={"M-1":0,"M-2":0};
  planRows.forEach(r=>{
    if(r.source==="BARE_FRESH"||r.source==="BARE"){
      const m=r.machine||"M-1";
      r.seqIndex=_seqC2[m]||0;
      _seqC2[m]=(_seqC2[m]||0)+1;
    }
  });

  // ══ F/05 GENERATION ══
  // Exclude fresh met runs that have matching bare stock — no new bare slit needed
  const f05Runs=planRows.filter(function(r){return r.source==="BARE_FRESH"&&!r._matchingBare;});
  const f05Rows=generateF05(f05Runs,cfg);

  return{planRows,f05Rows,f05Mode:f05Mode||"auto",mjBlocked:false,mjAdvisory:mjTotalKg>(cfg.mjStockCap||7000),mjTotalKg,fgmTotalKg,stockTotalKg,stockHigh,fgmHigh,overdueCount:pend.filter(o=>o._overdue).length,remainingOrders:pend.filter(o=>o._rem>0),planWarnings:planWarnings};
}

function generateF05(metRuns,cfg){
  const JUMBO_W=cfg.jumboWidth||10450;
  const TARGET_MIN=cfg.f05TargetMin||10100,TARGET_MAX=cfg.f05TargetMax||10300;
  const OFFCUT_MIN=cfg.offcutMin||{"10":950,"12":800,"8":800};
  const OFFCUT_MAX=2000;// Primary slitter CANNOT produce 5-grade roll > 2000mm

  // Group by MICRON only — mix different bare materials of same micron on same jumbo
  const micGroups={};
  for(const r of metRuns){
    const mic=String(r.micron||10);
    if(!micGroups[mic])micGroups[mic]={micron:Number(mic),runs:[],jumboLen:r.jumboLen};
    micGroups[mic].runs.push(r);
  }

  const f05Rows=[];
  for(const[mic,grp] of Object.entries(micGroups)){
    const rolls=[...grp.runs];
    let rowRolls=[],rowSum=0;
    // F/05 trim rules per micron:
    // 10µ: trim = 200-360mm | 12µ: trim = 180-300mm | rest → 5 Grade (max 2000mm)
    var f05TrimCfg=cfg.f05TrimMin||{"8":150,"10":200,"12":180,"15":200,"23":200};
    const TRIM_F05_MIN=f05TrimCfg[String(grp.micron)]||200;
    const TRIM_F05_MAX=grp.micron===12?300:grp.micron===8?250:360;

    const pushRow=()=>{
      if(!rowRolls.length)return;
      const sum=rowRolls.reduce((s,r)=>s+r.rollSize,0);
      const remaining=JUMBO_W-sum;

      // Split remaining into: trim (200-360mm) + 5 Grade offcut
      // Target: use minimum trim, rest goes to 5 Grade
      let trim=TRIM_F05_MIN;// start with min trim
      let rawOffcut=remaining-trim;

      // If offcut > 2000mm — too wide, increase trim to reduce offcut
      if(rawOffcut>OFFCUT_MAX){
        // Try to increase trim to bring offcut ≤ 2000mm
        const neededTrim=remaining-OFFCUT_MAX;
        trim=Math.min(TRIM_F05_MAX, Math.max(TRIM_F05_MIN, neededTrim));
        rawOffcut=remaining-trim;
      }

      // If still > 2000mm after max trim → use excess as Grade 5 roll
      let offcut=0;
      let offcutWarn=false;
      const offcutMin=OFFCUT_MIN[String(grp.micron)]||950;
      if(rawOffcut>OFFCUT_MAX){
        // Large remaining space: use (remaining - TRIM_F05_MIN) as Grade 5 if it qualifies
        const potentialG5=Math.floor((remaining-TRIM_F05_MIN)/5)*5;
        if(potentialG5>=offcutMin){
          offcut=potentialG5;
          trim=remaining-offcut;
          offcutWarn=false;// handled cleanly
        } else {
          trim=remaining;
          offcut=0;
          offcutWarn=true;// genuinely can't use the space
        }
      } else if(rawOffcut>=offcutMin){
        offcut=Math.floor(rawOffcut/5)*5;// round DOWN to multiple of 5mm
        trim=remaining-offcut;// actual trim after rounding
      } else if(rawOffcut>0&&rawOffcut<offcutMin){
        // Too narrow for useful 5 Grade — add to trim
        trim=remaining;
        offcut=0;
      }

      // Clamp trim to allowed range
      if(offcut===0&&!offcutWarn){
        trim=Math.max(TRIM_F05_MIN, Math.min(TRIM_F05_MAX, trim));
      }

      const bareMats=[...new Set(rowRolls.map(r=>r.bareMat||r.material||"").filter(Boolean))];
      const primaryBare=bareMats[0]||"";
      f05Rows.push({
        material:primaryBare,
        mixedMats:bareMats.length>1?bareMats:null,
        length:grp.jumboLen,
        rolls:rowRolls.map(r=>({
          size:r.rollSize,coreId:r.machine==="M-2"?8:6,machine:r.machine,
          customer:r.customers||"DOMESTIC",metPlan:"",
          bareMat:r.bareMat||r.material||primaryBare,
          altMat:(()=>{const bp=parseMat(primaryBare),mp=parseMat(r.material||"");
            return(bp.grade&&mp.grade&&bp.grade!==mp.grade)?mp.grade:null;})()
        })),
        trim,jumboWidth:JUMBO_W,
        offcut,micron:grp.micron,
        offcutWarn,
        trimWarn:trim<TRIM_F05_MIN||trim>TRIM_F05_MAX,
      });
    };
    for(let ri=0;ri<rolls.length;ri++){
      const r=rolls[ri];
      if(rowSum+r.rollSize>TARGET_MAX){
        const wouldRemain=JUMBO_W-rowSum;
        const maxOffcut=OFFCUT_MAX+TRIM_F05_MAX;
        if(wouldRemain>maxOffcut&&rowRolls.length>0){
          // Try adding this roll anyway if it fits within jumbo
          if(rowSum+r.rollSize<=JUMBO_W-TRIM_F05_MIN){
            rowRolls.push(r);rowSum+=r.rollSize;
            pushRow();rowRolls=[];rowSum=0;
            continue;
          }
          // Try to find a smaller future roll that fits in remaining space
          const availSpace=JUMBO_W-rowSum-TRIM_F05_MIN;
          const smallerIdx=rolls.slice(ri+1).findIndex(rx=>rx.rollSize<=availSpace);
          if(smallerIdx>=0){
            const actualIdx=ri+1+smallerIdx;
            const smallerRoll=rolls[actualIdx];
            rowRolls.push(smallerRoll);rowSum+=smallerRoll.rollSize;
            rolls.splice(actualIdx,1);// remove from future processing
            pushRow();rowRolls=[];rowSum=0;
            // continue without incrementing ri (process r again next iteration)
            ri--;continue;
          }
        }
        pushRow();rowRolls=[];rowSum=0;
      }
      rowRolls.push(r);rowSum+=r.rollSize;
      if(rowSum>=TARGET_MIN&&rowSum<=TARGET_MAX){
        const remain=JUMBO_W-rowSum;
        if(remain<=OFFCUT_MAX+TRIM_F05_MAX){
          pushRow();rowRolls=[];rowSum=0;
        }
      }
    }
    if(rowRolls.length)pushRow();
  }
  return f05Rows;
}

// ─── CUSTOMER ETA CALCULATOR ─────────────────────────────────────────────────
function calcCustomerETA(soNumber,trackingRuns,boatLife){
  // Find all runs that contain this SO
  var myRuns=[];var allRuns=(trackingRuns||[]).filter(function(r){return r.metStatus!=="cancelled";});// skip cancelled
  for(var i=0;i<allRuns.length;i++){
    var r=allRuns[i];
    var orders=r.orders||[];
    for(var j=0;j<orders.length;j++){
      if(String(orders[j]["Sales Order"]||"")===String(soNumber)){
        myRuns.push({run:r,position:i,metDone:r.metStatus==="done",slitDone:r.slitStatus==="done"});
      }
    }
  }
  if(!myRuns.length)return{found:false,msg:"Not in metallizer queue"};
  // Find earliest unfinished run
  var pending=myRuns.filter(function(m){return !m.metDone;});
  if(!pending.length){
    var unSlit=myRuns.filter(function(m){return !m.slitDone;});
    if(!unSlit.length)return{found:true,msg:"✅ Completed — Met done, Slit done",stage:"done"};
    return{found:true,msg:"🔥 Metallized — Awaiting slitting",stage:"slit_pending",position:0};
  }
  // Calculate queue position: how many undone runs are before this one?
  var myPos=pending[0].position;
  var runsBefore=0;
  for(var k=0;k<myPos;k++){
    if(allRuns[k].metStatus!=="done")runsBefore++;
  }
  // Estimate time: ~7 runs per shift (8 hours), boat change ~1 hour
  var boatChanges=Math.floor(runsBefore/7);
  var totalHours=Math.ceil(runsBefore*1.15)+boatChanges;// 1.15hr per run avg + boat changes
  var shifts=Math.ceil(totalHours/8);
  return{
    found:true,stage:"met_pending",position:runsBefore+1,
    runsAhead:runsBefore,boatChanges:boatChanges,
    estHours:totalHours,estShifts:shifts,
    msg:"⏳ Queue #"+(runsBefore+1)+" · ~"+shifts+" shift"+(shifts>1?"s":"")+" · "+runsBefore+" runs ahead"
  };
}

function SmartUpload({data,onUpload,disabled}){
  const ref=useRef();
  const [dragOver,setDragOver]=useState(false);
  const [detected,setDetected]=useState([]);
  const handleFiles=async(fileList)=>{
    const files=Array.from(fileList).filter(f=>/\.(xlsx|xls)$/i.test(f.name)).slice(0,3);
    if(!files.length)return;
    setDetected([]);
    const results=[];
    for(const file of files){
      try{
        const rows=await readXL(file);
        const type=detectFileType(rows,file.name);
        if(type==="stk"){
          // Split STK into FGM and BARE
          const{fgjm,bare}=splitSTKFile(rows);
          results.push({file:file.name,type:"stk",rows:rows.length,status:"ok"});
          if(fgjm.length>0)onUpload("fgjm",fgjm,file.name+"[FGM]");
          if(bare.length>0)onUpload("bare",bare,file.name+"[BARE]");
        } else if(type){
          results.push({file:file.name,type,rows:rows.length,status:"ok"});
          onUpload(type,rows,file.name);
        } else results.push({file:file.name,type:null,rows:rows.length,status:"unknown"});
      }catch(e){results.push({file:file.name,type:null,rows:0,status:"error",error:e.message});}
    }
    setDetected(results);setTimeout(()=>setDetected([]),8000);
  };
  const labels={pen:"PEN",mj:"MJ",fgjm:"FGM",bare:"BARE",stk:"STK"};
  // Show STK as combined FGM+BARE, or individual if uploaded separately
  const loaded=Object.entries(data).filter(([k,v])=>v.length>0);
  const hasStk=data.fgjm.length>0||data.bare.length>0;
  return(
    <div>
      <div onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files);}}
        onClick={()=>!disabled&&ref.current&&ref.current.click()}
        className={`upload-zone${dragOver?" drag":""}${(loaded.length>=3&&data.pen.length>0&&data.mj.length>0&&(data.fgjm.length>0||data.bare.length>0))?" loaded":""}`}>
        <input ref={ref} type="file" accept=".xlsx,.xls" multiple style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
        <div style={{fontSize:32,marginBottom:8}}>{loaded.length===4?"🎯":"📂"}</div>
        <div style={{fontWeight:800,fontSize:16,color:C.navy}}>{loaded.length===0?"Drop 3 SAP Excel files here":(()=>{const n=[data.pen.length>0,data.mj.length>0,(data.fgjm.length>0||data.bare.length>0)].filter(Boolean).length;return n+"/3 files loaded";})()}</div>
        <div style={{fontSize:12,color:"#4b5a6e",marginTop:6}}>Auto-detects PEN · MJ · STK (FGM+BARE combined) · FGM · BARE</div>
        <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:12,flexWrap:"wrap"}}>
          {["pen","mj","stk"].map(k=>{
            const isL=k==="stk"?(data.fgjm.length>0||data.bare.length>0):(data[k]&&data[k].length>0);
            const lbl=k==="stk"?"STK (Stock)":k.toUpperCase();
            const sub=k==="stk"?
              (data.fgjm.length>0&&data.bare.length>0?`FGM ${data.fgjm.length}r + BARE ${data.bare.length}r`:
               data.fgjm.length>0?`FGM ${data.fgjm.length}r`:
               data.bare.length>0?`BARE ${data.bare.length}r`:"—"):
              (isL?`✓ ${data[k].length} rows`:"—");
            return <div key={k} style={{padding:"5px 12px",borderRadius:12,fontSize:12,fontWeight:700,background:isL?"#f0fdf4":"#f8fafc",border:isL?"2px solid #86efac":"2px dashed #dde3ed",color:isL?"#15803d":"#94a3b8"}}>{lbl}: {sub}</div>;
          })}

        </div>
      </div>
      {detected.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
        {detected.map((d,i)=><div key={i} style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:700,background:d.status==="ok"?"#f0fdf4":"#fef9c3",border:d.status==="ok"?"1px solid #86efac":"1px solid #fbbf24",color:d.status==="ok"?"#15803d":"#92400e"}}>{d.status==="ok"?"✓ "+d.file+" → "+(labels[d.type]||d.type)+"("+d.rows+")":"⚠ "+d.file+" — unknown type"}</div>)}
      </div>}
    </div>
  );
}
