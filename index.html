// ─── SF STOCK ─────────────────────────────────────────────────────────────────
function SFStock(){
  const [sfRolls,setSFRolls]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sfView,setSFView]=useState("M-1");
  const [expanded,setExpanded]=useState(null);
  const [editing,setEditing]=useState(null);// {rollId, setNo}
  const [manualArms,setManualArms]=useState("");
  const [saving,setSaving]=useState({});
  const [downgrading,setDowngrading]=useState(null);// {rollId, setNo}
  const [dgReason,setDgReason]=useState("");
  const DG_REASONS=["Crease","Scratch","Ripple","Pinhole","Low OD","Drum Line","Joint Issue","Other"];
  useEffect(()=>{
    setLoading(true);
    const unsub=fbWatchSFStock(rolls=>{setSFRolls(rolls);setLoading(false);});
    return()=>unsub&&unsub();
  },[]);
  const m1=sfRolls.filter(r=>r.machine==="M-1");
  const m2=sfRolls.filter(r=>r.machine==="M-2");
  const current=sfView==="M-1"?m1:m2;
  const OD_C={"22":"#15803d","25":"#1e40af","28":"#92400e"};
  const OD_BG={"22":"#f0fdf4","25":"#eff6ff","28":"#fff7ed"};

  // Get per-set data for a roll
  const getSets=(r)=>{
    const totalSets=r.sets||1;
    const slitSets=r.slitSets||[];
    var result=[];
    for(var s=1;s<=totalSets;s++){
      var existing=null;
      for(var j=0;j<slitSets.length;j++){if(slitSets[j].setNo===s){existing=slitSets[j];break;}}
      if(existing)result.push(existing);
      else result.push({setNo:s,done:false,arms:r.arms||[],trim:r.trim||0});
    }
    return result;
  };

  // Mark individual set as slit
  const markSetDone=async(roll,setNo)=>{
    var key=roll.id+"_s"+setNo;
    setSaving(function(v){var n={};for(var k in v)n[k]=v[k];n[key]=true;return n;});
    try{
      var sets=getSets(roll);
      var updated=sets.map(function(s){
        if(s.setNo===setNo)return{setNo:s.setNo,done:true,doneAt:new Date().toISOString(),arms:s.arms,trim:s.trim,manual:!!s.manual};
        return s;
      });
      // If all sets done → mark whole roll slit done
      var allDone=updated.every(function(s){return s.done;});
      var upd={slitSets:updated};
      if(allDone){upd.slitStatus="done";upd.slitAt=new Date().toISOString();}
      await fbUpdateRunStatus(roll.id,upd);
    }catch(e){alert("Error: "+e.message);}
    finally{setSaving(function(v){var n={};for(var k in v)n[k]=v[k];n[key]=false;return n;});}
  };

  // Undo set
  const undoSet=async(roll,setNo)=>{
    var sets=getSets(roll);
    var updated=sets.map(function(s){
      if(s.setNo===setNo)return{setNo:s.setNo,done:false,doneAt:null,arms:s.arms,trim:s.trim,manual:!!s.manual};
      return s;
    });
    await fbUpdateRunStatus(roll.id,{slitSets:updated,slitStatus:"pending",slitAt:null});
  };

  // Save manual arms for a set
  const saveManualArms=async(roll,setNo,armsStr)=>{
    var parsed=armsStr.split(/[+,\s]+/).map(function(v){return parseInt(v);}).filter(function(v){return !isNaN(v)&&v>0;});
    if(!parsed.length){alert("Enter valid arm widths separated by +");return;}
    var sets=getSets(roll);
    var updated=sets.map(function(s){
      if(s.setNo===setNo)return{setNo:s.setNo,done:s.done,doneAt:s.doneAt||null,arms:parsed,trim:roll.rollSize-parsed.reduce(function(a,b){return a+b;},0),manual:true};
      return s;
    });
    await fbUpdateRunStatus(roll.id,{slitSets:updated});
    setEditing(null);setManualArms("");
  };

  // Cancel whole jumbo
  const cancelJumbo=async(roll)=>{
    if(!confirm("Cancel this jumbo? Orders will be available for replanning."))return;
    await fbUpdateRunStatus(roll.id,{metStatus:"cancelled",cancelledAt:new Date().toISOString()});
  };

  // Mark set as downgraded (Grade 5 FGM)
  var markSetDowngraded=async function(roll,setNo,reason){
    var key=roll.id+"_s"+setNo;
    setSaving(function(v){var n={};for(var k in v)n[k]=v[k];n[key]=true;return n;});
    try{
      var sets=getSets(roll);
      var updated=sets.map(function(s){
        if(s.setNo===setNo)return{setNo:s.setNo,done:true,doneAt:new Date().toISOString(),arms:s.arms,trim:s.trim,manual:!!s.manual,downgraded:true,dgReason:reason||"",dgGrade:5};
        return s;
      });
      var allDone=updated.every(function(s){return s.done;});
      var upd={slitSets:updated};
      if(allDone){upd.slitStatus="done";upd.slitAt=new Date().toISOString();}
      await fbUpdateRunStatus(roll.id,upd);
    }catch(e){alert("Error: "+e.message);}
    finally{
      setSaving(function(v){var n={};for(var k in v)n[k]=v[k];n[key]=false;return n;});
      setDowngrading(null);setDgReason("");
    }
  };

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <h1 style={{fontSize:20,fontWeight:800,color:C.navy,marginBottom:4}}>SF Stock — Slitting Tracker</h1>
      <p style={{fontSize:13,color:C.textMd,marginBottom:14}}>Each jumbo shows its sets · Tick per set · Enter manual sizes if slit differently</p>
      <div style={{display:"flex",gap:0,marginBottom:14,borderRadius:10,overflow:"hidden",border:"1px solid "+C.border,width:"fit-content"}}>
        {["M-1","M-2"].map(m=>(
          <button key={m} onClick={()=>setSFView(m)} style={{padding:"10px 28px",background:sfView===m?C.navy:"#f8fafc",border:"none",cursor:"pointer",fontWeight:700,fontSize:13,color:sfView===m?"#fff":C.textMd,fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
            {m}<span style={{background:sfView===m?"rgba(255,255,255,.2)":"#e2e8f0",color:sfView===m?"#fff":C.textMd,borderRadius:10,padding:"1px 7px",fontSize:11}}>{m==="M-1"?m1.length:m2.length}</span>
          </button>
        ))}
      </div>
      {loading&&<div style={{padding:40,textAlign:"center"}}><Spin color={C.accent} size={28}/></div>}
      {!loading&&current.length===0&&(
        <div style={{...card({textAlign:"center",padding:40})}}>
          <div style={{fontSize:44,marginBottom:10}}>🏭</div>
          <div style={{fontWeight:700,color:C.navy}}>No rolls in SF Stock for {sfView}</div>
          <div style={{fontSize:13,color:C.textMd,marginTop:6}}>Rolls appear here when metallisation is ticked ✅ in Met Sequence</div>
        </div>
      )}
      {!loading&&current.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {current.map(function(r){
            var isAllSlit=r.slitStatus==="done";
            var sets=getSets(r);
            var doneSets=sets.filter(function(s){return s.done;}).length;
            var isExp=expanded===r.id;
            return(
              <div key={r.id} style={{...card({padding:0,overflow:"hidden",border:isAllSlit?"2px solid "+C.greenBd:"1px solid "+C.border})}}>
                {/* Jumbo header — click to expand */}
                <div onClick={function(){setExpanded(isExp?null:r.id);}} style={{padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",background:isAllSlit?"#f0fdf4":"#fff"}}>
                  <div style={{width:44,height:44,borderRadius:22,background:OD_BG[r.od||"22"],display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid "+(OD_C[r.od||"22"]+"44"),flexShrink:0}}>
                    <span style={{fontSize:14,fontWeight:800,color:OD_C[r.od||"22"]}}>{r.od==="22"?"2.2":r.od==="25"?"2.5":"2.8"}</span>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,color:C.navy,fontSize:14}}>{r.material} <span style={{fontWeight:600,fontSize:11,color:C.textMd}}>W={r.rollSize}mm</span></div>
                    <div style={{fontSize:12,color:C.textMd}}>Arms: {(r.arms||[]).join("+")}+{r.trim}T · {r.sets||1} sets × {r.slitLen}m · {r.customers}</div>
                    <div style={{fontSize:11,color:C.textLt}}>{r.planNo||""} · Met: {r.metAt?new Date(r.metAt).toLocaleDateString("en-IN"):""}</div>
                  </div>
                  {/* Progress */}
                  <div style={{textAlign:"center",minWidth:60}}>
                    <div style={{fontSize:20,fontWeight:800,color:isAllSlit?C.green:doneSets>0?"#1e40af":C.textLt}}>{doneSets}/{sets.length}</div>
                    <div style={{fontSize:10,color:C.textMd}}>sets slit</div>
                  </div>
                  <span style={{fontSize:12,color:C.textLt}}>{isExp?"▲":"▼"}</span>
                </div>
                {/* Progress bar */}
                <div style={{height:4,background:"#f1f5f9",display:"flex"}}>
                  {sets.map(function(s,si){return <div key={si} style={{flex:1,background:s.done?C.green:"transparent",borderRight:si<sets.length-1?"1px solid #fff":"none"}}/>;})}
                </div>
                {/* Expanded: per-set detail */}
                {isExp&&(
                  <div style={{padding:"10px 16px",background:"#f8fafc",borderTop:"1px solid "+C.border}}>
                    {sets.map(function(s){
                      var setKey=r.id+"_s"+s.setNo;
                      var isSaving=!!saving[setKey];
                      var isEditing=editing&&editing.rollId===r.id&&editing.setNo===s.setNo;
                      var isDg=downgrading&&downgrading.rollId===r.id&&downgrading.setNo===s.setNo;
                      var arms=s.arms||r.arms||[];
                      var trim=s.trim!==undefined?s.trim:(r.trim||0);
                      return(
                        <div key={s.setNo} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #e2e8f0",flexWrap:"wrap"}}>
                          <div style={{width:40,textAlign:"center",fontWeight:800,fontSize:13,color:s.downgraded?"#92400e":s.done?C.green:C.navy}}>Set {s.setNo}</div>
                          <div style={{flex:1,fontSize:12}}>
                            {isEditing?(
                              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                <input value={manualArms} onChange={function(e){setManualArms(e.target.value);}} placeholder="e.g. 1100+1200+1105" style={{...inp({maxWidth:200,padding:"6px 10px",fontSize:12})}}/>
                                <button onClick={function(){saveManualArms(r,s.setNo,manualArms);}} style={{...btn(C.accent,"#fff",{padding:"5px 12px",fontSize:11})}}>Save</button>
                                <button onClick={function(){setEditing(null);setManualArms("");}} style={{...btn("#f1f5f9",C.textMd,{padding:"5px 10px",fontSize:11,border:"1px solid "+C.border})}}>✕</button>
                              </div>
                            ):(
                              <div>
                                <span style={{fontWeight:700,color:s.manual?"#6d28d9":C.navy}}>{arms.join(" + ")} + {trim}T</span>
                                {s.manual&&<span style={{fontSize:9,background:"#ede9fe",color:"#6d28d9",borderRadius:4,padding:"1px 5px",marginLeft:4,fontWeight:700}}>✏ Manual</span>}
                                {s.downgraded&&<span style={{fontSize:9,background:"#fff7ed",color:"#92400e",borderRadius:4,padding:"1px 5px",marginLeft:4,fontWeight:700,border:"1px solid #fdba74"}}>⬇ Grade 5 — {s.dgReason||"Downgraded"}</span>}
                                {!s.done&&<button onClick={function(){setEditing({rollId:r.id,setNo:s.setNo});setManualArms(arms.join("+"));}} style={{marginLeft:8,background:"none",border:"1px dashed #93c5fd",borderRadius:4,cursor:"pointer",padding:"2px 8px",fontSize:10,color:"#1e40af"}} title="Enter different slit sizes">✏ Edit sizes</button>}
                              </div>
                            )}
                            {s.done&&s.doneAt&&<div style={{fontSize:10,color:s.downgraded?"#92400e":C.green,marginTop:2}}>{s.downgraded?"Downgraded":"Done"}: {new Date(s.doneAt).toLocaleString("en-IN")}</div>}

                            {/* Downgrade reason selector */}
                            {isDg&&(
                              <div style={{marginTop:6,background:"#fff7ed",border:"1px solid #fdba74",borderRadius:8,padding:"8px 10px"}}>
                                <div style={{fontWeight:700,fontSize:11,color:"#92400e",marginBottom:6}}>⬇ Select downgrade reason:</div>
                                <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
                                  {DG_REASONS.map(function(rr){return(
                                    <button key={rr} onClick={function(){setDgReason(rr);}} style={{padding:"4px 10px",borderRadius:14,fontSize:10,fontWeight:600,cursor:"pointer",
                                      background:dgReason===rr?"#92400e":"#fff",color:dgReason===rr?"#fff":"#92400e",
                                      border:"1px solid "+(dgReason===rr?"#92400e":"#fdba74"),fontFamily:"inherit"}}>{rr}</button>
                                  );})}
                                </div>
                                <div style={{display:"flex",gap:6}}>
                                  <button onClick={function(){if(!dgReason){alert("Select a reason");return;}markSetDowngraded(r,s.setNo,dgReason);}} disabled={isSaving}
                                    style={{...btn("#92400e","#fff",{padding:"5px 14px",fontSize:11})}}>
                                    {isSaving?<Spin size={11} color="#fff"/>:"⬇ Confirm Downgrade"}
                                  </button>
                                  <button onClick={function(){setDowngrading(null);setDgReason("");}} style={{...btn("#f1f5f9",C.textMd,{padding:"5px 10px",fontSize:11,border:"1px solid "+C.border})}}>Cancel</button>
                                </div>
                              </div>
                            )}
                          </div>
                          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                            {s.done?(
                              <div style={{display:"flex",gap:6}}>
                                <span style={{background:s.downgraded?"#fff7ed":C.greenLt,color:s.downgraded?"#92400e":C.green,padding:"4px 10px",borderRadius:8,fontSize:11,fontWeight:700}}>{s.downgraded?"⬇ G5":"✅ Slit"}</span>
                                <button onClick={function(){undoSet(r,s.setNo);}} style={{background:"none",border:"1px solid #fca5a5",borderRadius:4,cursor:"pointer",padding:"3px 8px",fontSize:10,color:"#991b1b"}}>↩ Undo</button>
                              </div>
                            ):(
                              <div style={{display:"flex",gap:4}}>
                                <button onClick={function(){markSetDone(r,s.setNo);}} disabled={isSaving} style={{...btn(C.green,"#fff",{padding:"6px 14px",fontSize:11})}}>
                                  {isSaving?<Spin size={11} color="#fff"/>:"✅ Set Done"}
                                </button>
                                <button onClick={function(){setDowngrading({rollId:r.id,setNo:s.setNo});setDgReason("");}} style={{...btn("#fff7ed","#92400e",{padding:"6px 10px",fontSize:11,border:"1px solid #fdba74"})}}>
                                  ⬇ Downgrade
                                </button>
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                    {/* Cancel jumbo button */}
                    <div style={{marginTop:10,display:"flex",gap:8,justifyContent:"flex-end"}}>
                      {!isAllSlit&&<button onClick={function(){cancelJumbo(r);}} style={{...btn("#fef2f2","#991b1b",{padding:"6px 14px",fontSize:11,border:"1px solid #fca5a5"})}}>🚫 Cancel Jumbo</button>}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── MET SEQUENCE WITH TRACKING ──────────────────────────────────────────────
function MetSequence({result,cfg,planId,planNo,user}){
  // Use GLOBAL tracking — reads ALL plans from Firebase, ordered by globalSeqIndex
  // So when new PEN uploaded and new plan made, old runs stay at top, new runs append below
  const [m1Runs,setM1Runs]=useState([]);
  const [m2Runs,setM2Runs]=useState([]);
  const [saving,setSaving]=useState({});
  const [loadingT,setLoadingT]=useState(true);

  useEffect(()=>{
    setLoadingT(true);
    const u1=fbWatchAllTracking("M-1",rows=>{setM1Runs(rows);setLoadingT(false);});
    const u2=fbWatchAllTracking("M-2",rows=>setM2Runs(rows));
    return()=>{u1&&u1();u2&&u2();};
  },[]);// run once on mount — listens to ALL plans forever

  // If we have in-memory result but no saved tracking yet, show preview from memory
  const {planRows}=result||{};
  const memRuns=planRows?(planRows.filter(r=>r.source==="BARE_FRESH"||r.source==="BARE")):[];
  const hasFirebaseData=m1Runs.length>0||m2Runs.length>0;
  const boatLife={"22":cfg.boatLife22||550000,"25":cfg.boatLife25||330000,"28":cfg.boatLife28||280000};
  const OD_C={"22":"#15803d","25":"#1e40af","28":"#92400e"};
  const OD_BG2={"22":"#f0fdf4","25":"#eff6ff","28":"#fff7ed"};

  // markMet works directly on Firebase tracking doc (which IS the run)
  const markMet=async(trackDoc)=>{
    if(!trackDoc?.id){
      alert("This run has no tracking record. Please save the plan first.");
      return;
    }
    setSaving(s=>({...s,[trackDoc.id]:true}));
    const newSt=trackDoc.metStatus==="done"?"pending":"done";
    try{
      await fbUpdateRunStatus(trackDoc.id,{
        metStatus:newSt,
        ...(newSt==="done"?{metAt:new Date().toISOString(),metBy:user?.name}:{metAt:null})
      });
    }catch(e){alert("Update failed: "+e.message);}
    finally{setSaving(s=>({...s,[trackDoc.id]:false}));}
  };

  const moveRun=async(runDocId,dir,fbRuns)=>{
    // Find this run in fbRuns by its Firebase doc id
    const idx=fbRuns.findIndex(r=>r.id===runDocId);
    if(idx<0)return;
    const newIdx=idx+dir;
    if(newIdx<0||newIdx>=fbRuns.length)return;
    const a=fbRuns[idx],b=fbRuns[newIdx];
    // Use Date.now()-based values to guarantee strict ordering after swap
    const ts=Date.now();
    const aNewG=dir>0?b.globalSeqIndex+0.5:b.globalSeqIndex-0.5;
    const bNewG=dir>0?a.globalSeqIndex-0.5:a.globalSeqIndex+0.5;
    const db=getDB();
    const batch=db.batch();
    batch.update(db.collection("pp_tracking").doc(a.id),{globalSeqIndex:aNewG,updatedAt:new Date().toISOString()});
    batch.update(db.collection("pp_tracking").doc(b.id),{globalSeqIndex:bNewG,updatedAt:new Date().toISOString()});
    await batch.commit();
  };

  const buildSeq=(runs)=>{
    let cum=0,bm=0,bn=1,rows=[];
    for(const r of runs){
      // Cancelled runs: show in sequence but don't count meters
      if(r.metStatus==="cancelled"){rows.push({...r,cum,bm,bn,rm:0,_cancelled:true});continue;}
      const rm=(r.sets||1)*(r.slitLen||24000);// actual meters through metallizer
      if(bm+rm>boatLife[r.od||"22"]){rows.push({isBoat:true,bn,cum,bm});bn++;bm=0;}
      cum+=rm;bm+=rm;rows.push({...r,cum,bm,bn,rm});
    }
    return rows;
  };

  const SeqMachine=({machine})=>{
    // Firebase runs for this machine — already globally ordered, includes ALL plans
    const fbRuns=machine==="M-1"?m1Runs:m2Runs;
    // If no Firebase data yet, show in-memory preview
    const runs=fbRuns.length>0?fbRuns:memRuns.filter(r=>r.machine===machine);
    const isLive=fbRuns.length>0;
    const seq=buildSeq(runs);
    const metDone=runs.filter(r=>r.metStatus==="done").length;
    const slitDone=runs.filter(r=>r.slitStatus==="done").length;
    return(
      <div style={{...card({padding:0,overflow:"hidden"}),marginBottom:16}}>
        <div style={{background:machine==="M-2"?"#7f1d1d":C.navy,padding:"10px 16px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{color:"#fff",fontWeight:800,fontSize:15}}>{machine}</span>
          <span style={{color:"rgba(255,255,255,.5)",fontSize:12}}>{runs.length} runs</span>
          <div style={{marginLeft:"auto",display:"flex",gap:6}}>
            <span style={{background:"rgba(255,255,255,.15)",color:"#fff",borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:700}}>Met {metDone}/{runs.length}</span>
            <span style={{background:"rgba(255,255,255,.15)",color:"#fff",borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:700}}>Slit {slitDone}/{runs.length}</span>
          </div>
        </div>
        <div style={{height:4,background:"#f1f5f9"}}><div style={{height:4,background:C.green,width:`${runs.length>0?metDone/runs.length*100:0}%`,transition:"width .4s"}}/></div>
        {runs.length===0?<div style={{padding:24,textAlign:"center",color:C.textMd}}>No runs for {machine}</div>:(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",minWidth:820}}>
              <thead><tr style={{background:"#f1f5f9"}}>{["#","↕","Material","Size","Trim","OD","Sets","Slit L","Boat","Status","Action"].map(h=><th key={h} style={{...TH,padding:"6px 8px",fontSize:10}}>{h}</th>)}</tr></thead>
              <tbody>{seq.map((r,i)=>{
                if(r.isBoat)return<tr key={i} style={{background:"#fef9c3",borderBottom:"2px solid #fbbf24"}}><td colSpan={11} style={{padding:"7px 16px",textAlign:"center",fontWeight:800,color:"#92400e",fontSize:12}}>🔄 BOAT CHANGE #{r.bn} — ~60 min · Cumul: {(r.cum/1000).toFixed(0)}k m</td></tr>;
                // r is directly a Firebase tracking doc — has metStatus/slitStatus
                const isMet=r.metStatus==="done";
                const isSlit=r.slitStatus==="done";
                const ri=runs.findIndex(x=>x.id===r.id);// exact index in runs array
                // Show which plan this run belongs to
                const isPrevPlan=r.planId&&r.planId!==planId;
                return(
                  <tr key={i} className="pprow" style={{background:r.metStatus==="cancelled"?"#f9f9f9":isSlit?"#f0fdf4":isMet?"#eff6ff":isPrevPlan?"#fafff7":i%2?"#f7f9fc":"#fff",opacity:r.metStatus==="cancelled"?0.45:1}}>
                    <td style={{...TD,textAlign:"center",fontWeight:700,width:28}}>{ri+1}</td>
                    <td style={{...TD,textAlign:"center",width:54}}>
                      {isLive&&!isMet&&<>
                        <button onClick={()=>moveRun(r.id,-1,runs)} disabled={ri===0} style={{background:"none",border:"1px solid #dde3ed",borderRadius:4,cursor:"pointer",padding:"2px 5px",fontSize:10,opacity:ri===0?0.3:1}}>↑</button>
                        {" "}
                        <button onClick={()=>moveRun(r.id,1,runs)} disabled={ri===runs.length-1} style={{background:"none",border:"1px solid #dde3ed",borderRadius:4,cursor:"pointer",padding:"2px 5px",fontSize:10,opacity:ri===runs.length-1?0.3:1}}>↓</button>
                      </>}
                    </td>
                    <td style={{...TD,fontWeight:700,color:C.navy,fontSize:11,textDecoration:isSlit?"line-through":"none"}}>
                      {isLive&&!isMet?<input className="ppec" defaultValue={r.material} onBlur={e=>{if(e.target.value!==r.material)fbUpdateTracking(r.id,{material:e.target.value});}} style={{fontWeight:700,color:C.navy,fontSize:11,width:"100%"}}/>:r.material}
                      {isPrevPlan&&<div style={{fontSize:9,color:"#15803d",fontWeight:700}}>{r.planNo||""}</div>}
                    </td>
                    <td style={{...TD,textAlign:"center",fontWeight:700}}>
                      {isLive&&!isMet?<input className="ppec" defaultValue={r.rollSize} onBlur={e=>{const v=parseInt(e.target.value);if(!isNaN(v)&&v!==r.rollSize)fbUpdateTracking(r.id,{rollSize:v});}} style={{fontWeight:700,textAlign:"center",width:55}}/>:r.rollSize}
                    </td>
                    <td style={{...TD,textAlign:"center"}}>
                      {isLive&&!isMet?<input className="ppec" defaultValue={r.trim} onBlur={e=>{const v=parseInt(e.target.value);if(!isNaN(v)&&v!==r.trim)fbUpdateTracking(r.id,{trim:v});}} style={{fontWeight:700,textAlign:"center",width:40,color:r.trim<=15?"#15803d":r.trim<=20?"#92400e":"#991b1b"}}/>:<span style={{color:r.trim<=15?"#15803d":r.trim<=20?"#92400e":"#991b1b",fontWeight:700}}>{r.trim}mm</span>}
                    </td>
                    <td style={{...TD,textAlign:"center"}}>
                      {isLive&&!isMet?<select className="ppec" defaultValue={r.od||"22"} onChange={e=>fbUpdateTracking(r.id,{od:e.target.value})} style={{textAlign:"center",width:55,fontWeight:700,background:OD_BG2[r.od||"22"],color:OD_C[r.od||"22"],borderRadius:7,fontSize:10,border:"none",padding:"2px 4px"}}>
                        <option value="22">2.2</option><option value="25">2.5</option><option value="28">2.8</option>
                      </select>:<span style={{background:OD_BG2[r.od||"22"],color:OD_C[r.od||"22"],padding:"2px 6px",borderRadius:7,fontSize:10,fontWeight:700}}>{r.od==="22"?"2.2":r.od==="25"?"2.5":"2.8"}</span>}
                    </td>
                    <td style={{...TD,textAlign:"center"}}>
                      {isLive&&!isMet?<input className="ppec" defaultValue={r.sets} onBlur={e=>{const v=parseInt(e.target.value);if(!isNaN(v))fbUpdateTracking(r.id,{sets:v});}} style={{textAlign:"center",width:35}}/>:r.sets}
                    </td>
                    <td style={{...TD,textAlign:"center"}}>
                      {isLive&&!isMet?<input className="ppec" defaultValue={r.slitLen} onBlur={e=>{const v=parseInt(e.target.value);if(!isNaN(v))fbUpdateTracking(r.id,{slitLen:v});}} style={{textAlign:"center",width:50}}/>:r.slitLen}
                    </td>
                    <td style={{...TD,textAlign:"center",fontWeight:700}}>#{r.bn}</td>
                    <td style={{...TD,minWidth:80}}>
                      {r.metStatus==="cancelled"?<span style={{background:"#fef2f2",color:"#991b1b",padding:"2px 8px",borderRadius:7,fontSize:11,fontWeight:700}}>🚫 Cancelled</span>
                      :isSlit?<span style={{background:"#f0fdf4",color:"#15803d",padding:"2px 8px",borderRadius:7,fontSize:11,fontWeight:700}}>✅ Slit</span>
                      :isMet?<span style={{background:"#eff6ff",color:"#1e40af",padding:"2px 8px",borderRadius:7,fontSize:11,fontWeight:700}}>🔵 Met ✓</span>
                      :<span style={{background:"#f1f5f9",color:C.textMd,padding:"2px 8px",borderRadius:7,fontSize:11}}>⏳ Pending</span>}
                    </td>
                    <td style={{...TD,minWidth:160}}>
                      {r.metStatus==="cancelled"?(
                        <button onClick={()=>{fbUpdateTracking(r.id,{metStatus:"pending",cancelledAt:null,cancelledBy:null});}} style={{...btn("#fef9c3","#92400e",{padding:"5px 10px",fontSize:11,border:"1px solid #fbbf24"})}}>↩ Restore</button>
                      ):!isSlit&&(isLive?(
                        <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                          <button onClick={()=>markMet(r)} disabled={!!saving[r.id]} style={{...btn(isMet?"#fef2f2":"#eff6ff",isMet?"#991b1b":"#1e40af",{padding:"5px 10px",fontSize:11,border:"1px solid "+(isMet?"#fca5a5":"#bfdbfe")})}}>
                            {saving[r.id]?<Spin size={11} color={isMet?"#991b1b":"#1e40af"}/>:isMet?"↩ Undo":"✅ Met Done"}
                          </button>
                          {!isMet&&<button onClick={()=>{if(confirm("Cancel this run? Orders will be available for replanning."))fbUpdateTracking(r.id,{metStatus:"cancelled",cancelledAt:new Date().toISOString(),cancelledBy:window._ppUser||"unknown"});}} style={{...btn("#fef2f2","#991b1b",{padding:"5px 10px",fontSize:11,border:"1px solid #fca5a5"})}}>🚫 Cancel</button>}
                          {!isMet&&<button onClick={()=>{if(confirm("Delete this run from sequence?"))fbDeleteTracking(r.id);}} style={{background:"none",border:"1px solid #fca5a5",borderRadius:4,cursor:"pointer",padding:"4px 6px",fontSize:10,color:"#991b1b"}} title="Delete run">✕</button>}
                        </div>
                      ):(
                        <span style={{fontSize:10,color:"#92400e",fontWeight:600}}>💾 Save first</span>
                      ))}
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        )}
      </div>
    );
  };
  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,color:C.navy,marginBottom:2}}>Met Sequence</h1>
          <p style={{fontSize:13,color:C.textMd}}>M22={fmtNum(cfg.boatLife22)}m · M25={fmtNum(cfg.boatLife25)}m · M28={fmtNum(cfg.boatLife28)}m · Boat change ~60min</p>
        </div>
        {planId?<div style={{fontSize:12,color:C.green,fontWeight:700}}>🔴 Live — all users see updates instantly</div>
        :<div style={{background:"#fef9c3",border:"1px solid #fbbf24",borderRadius:8,padding:"6px 14px",fontSize:12,color:"#92400e",fontWeight:700}}>
          ⚠️ Met Done disabled — <b>Save Plan first</b> (click 💾 in MET/F/04 tab)
        </div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <SeqMachine machine="M-1"/>
        <SeqMachine machine="M-2"/>
      </div>
    </div>
  );
}


// ─── ORDER TRACKER ────────────────────────────────────────────────────────────
async function fbSaveOrderStatus(k,u){await getDB().collection("pp_order_tracker").doc(k).set({...u,k,updatedAt:new Date().toISOString()},{merge:true});}
function fbWatchOrderTracker(cb){return getDB().collection("pp_order_tracker").onSnapshot(snap=>{const m={};snap.docs.forEach(d=>{m[d.id]={...d.data()};});cb(m);},function(err){console.log("OrderTracker error:",err.message);cb({});});}
const OT_STEPS=["bare_ready","sent_to_met","met_done","slit_done","qc_dispatch"];
const OT_LBL={"bare_ready":"Bare Ready","sent_to_met":"Sent to Met","met_done":"Met Done","slit_done":"Slit Done","qc_dispatch":"QC/Dispatch"};
const OT_ICON={"bare_ready":"📦","sent_to_met":"🚛","met_done":"⚡","slit_done":"✂️","qc_dispatch":"✅"};
const OT_COL={"bare_ready":"#92400e","sent_to_met":"#1d4ed8","met_done":"#7c3aed","slit_done":"#15803d","qc_dispatch":"#0e7490"};

function OrderTracker({pen}){
  const [smap,setSmap]=useState({});
  const [saving,setSaving]=useState({});
  const [search,setSearch]=useState("");
  const [exp,setExp]=useState(null);
  const [trackRuns,setTrackRuns]=useState([]);
  const [custFilter,setCustFilter]=useState("");
  useEffect(()=>{const u=fbWatchOrderTracker(m=>setSmap(m));return()=>u&&u();},[]);
  // Load tracking runs for ETA
  useEffect(()=>{
    const unsub=fbWatchAllTracking(null,runs=>setTrackRuns(runs));
    return()=>unsub&&unsub();
  },[]);
  const orders=useMemo(()=>{
    if(!pen||!pen.length)return[];
    return pen.filter(o=>o.Material&&toFloat(o["Pending Rolls"])>0).map(o=>({
      ...o,_k:String(o["Sales Order"]||"")+"-"+String(o["Sale Order Item"]||""),
      _sn:String(o["Sales Order"]||""),_cu:String(o["Consignee Name"]||"").trim(),
      _r:toFloat(o["Pending Rolls"]),_w:toFloat(o.Width),
      _dd:cleanDate(o["Required Delivery Date"]||""),
      _soDate:cleanDate(o["SO Crtd Dt."]||o["SO Crtd Date"]||o["SO Crtd. Date"]||""),
    }));
  },[pen]);
  const getCur=k=>{const s=smap[k]||{};for(let i=OT_STEPS.length-1;i>=0;i--){if(s[OT_STEPS[i]])return OT_STEPS[i];}return null;};
  const toggle=async(o,step)=>{
    const k=o._k;const s=smap[k]||{};const done=!!s[step];
    setSaving(v=>({...v,[k+step]:true}));
    try{
      const idx=OT_STEPS.indexOf(step);const upd={};
      if(done){OT_STEPS.slice(idx).forEach(st=>{upd[st]=false;upd[st+"_at"]=null;});}
      else{OT_STEPS.slice(0,idx+1).forEach(st=>{upd[st]=true;if(!s[st+"_at"])upd[st+"_at"]=new Date().toISOString();});}
      await fbSaveOrderStatus(k,{...s,...upd,mat:o.Material,cu:o._cu,sn:o._sn,r:o._r});
    }catch(e){alert("Failed: "+e.message);}
    finally{setSaving(v=>({...v,[k+step]:false}));}
  };
  // Get unique customers
  const customers=useMemo(()=>{
    const cs={};orders.forEach(o=>{if(!cs[o._cu])cs[o._cu]={name:o._cu,orders:0,rolls:0};cs[o._cu].orders++;cs[o._cu].rolls+=o._r;});
    return Object.values(cs).sort((a,b)=>b.rolls-a.rolls);
  },[orders]);
  const list=useMemo(()=>{
    let filtered=orders;
    if(custFilter)filtered=filtered.filter(o=>o._cu===custFilter);
    if(search.trim()){
      const q=search.toLowerCase();
      filtered=filtered.filter(o=>o._sn.includes(q)||o._cu.toLowerCase().includes(q)||o.Material.toLowerCase().includes(q));
    }
    return filtered.sort(function(a,b){return(a._soDate||"9999").localeCompare(b._soDate||"9999");});
  },[orders,search,custFilter]);
  if(!pen||!pen.length)return(<div style={{...card({textAlign:"center",padding:48})}}>
    <div style={{fontSize:48,marginBottom:12}}>📦</div>
    <div style={{fontWeight:700,color:C.navy,fontSize:16}}>Upload PEN file first</div>
  </div>);
  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <h1 style={{fontSize:22,fontWeight:800,color:C.navy,marginBottom:4}}>Order Tracker + Customer ETA</h1>
      <p style={{fontSize:13,color:C.textMd,marginBottom:12}}>Track each order: Bare → Met → Slit → Dispatch · Live Firebase sync · Click order for ETA</p>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search SO, customer, material…" style={{...inp({maxWidth:300})}}/>
        <select value={custFilter} onChange={e=>setCustFilter(e.target.value)} style={{...inp({maxWidth:220,minHeight:38})}}>
          <option value="">All Customers</option>
          {customers.map(c=><option key={c.name} value={c.name}>{c.name} ({c.rolls}r)</option>)}
        </select>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {list.length===0&&<div style={{...card({textAlign:"center",padding:32,color:C.textMd})}}>No orders found</div>}
        {list.map(o=>{
          const k=o._k;const s=smap[k]||{};const cur=getCur(k);const curIdx=OT_STEPS.indexOf(cur);const isExp=exp===k;
          const eta=calcCustomerETA(o._sn,trackRuns,BOAT_LIFE);
          const isOverdue=o._dd&&o._dd<TODAY;
          return(
            <div key={k} style={{...card({padding:0,overflow:"hidden",border:cur?"1px solid #bfdbfe":isOverdue?"2px solid #dc2626":"1px solid #fca5a5"})}}>
              <div onClick={()=>setExp(isExp?null:k)} style={{padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <div style={{width:9,height:9,borderRadius:"50%",background:cur?OT_COL[cur]:"#fca5a5",flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,color:C.navy,fontSize:12}}>{o.Material} {isOverdue&&<span style={{color:C.red,fontSize:10}}>🔴 OVERDUE</span>}</div>
                  <div style={{fontSize:11,color:C.textMd}}>{o._cu} · SO {o._sn} · {o._w}mm · {o._r} rolls · SO Date: {o._soDate||"—"}{o._dd?" · Del: "+o._dd:""}</div>
                </div>
                {cur
                  ?<span style={{background:OT_COL[cur]+"22",color:OT_COL[cur],padding:"3px 9px",borderRadius:9,fontSize:11,fontWeight:700}}>{OT_ICON[cur]} {OT_LBL[cur]}</span>
                  :<span style={{background:"#fef2f2",color:C.red,padding:"3px 9px",borderRadius:9,fontSize:11,fontWeight:700}}>⏳ Not started</span>}
                {eta.found&&<span style={{background:eta.stage==="done"?"#f0fdf4":eta.stage==="slit_pending"?"#fef9c3":"#f0f4ff",color:eta.stage==="done"?"#15803d":eta.stage==="slit_pending"?"#92400e":"#1e40af",padding:"3px 9px",borderRadius:9,fontSize:10,fontWeight:700}}>{eta.msg}</span>}
                <span style={{fontSize:11,color:C.textLt}}>{isExp?"▲":"▼"}</span>
              </div>
              <div style={{height:3,background:"#f1f5f9",display:"flex"}}>
                {OT_STEPS.map((st,si)=><div key={st} style={{flex:1,background:curIdx>=si?OT_COL[st]:"transparent"}}/>)}
              </div>
              {isExp&&(
                <div style={{padding:"10px 14px",background:"#f8fafc",borderTop:"1px solid "+C.border}}>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                    {OT_STEPS.map(step=>{
                      const done=!!s[step];const sv=saving[k+step];const at=s[step+"_at"];
                      return(
                        <div key={step} style={{textAlign:"center"}}>
                          <button onClick={()=>toggle(o,step)} disabled={!!sv}
                            style={{...btn(done?OT_COL[step]:"#fff",done?"#fff":OT_COL[step],{padding:"7px 12px",fontSize:11,border:"1.5px solid "+OT_COL[step],borderRadius:8,display:"block",width:"100%"})}}>
                            {sv?<Spin size={11} color={done?"#fff":OT_COL[step]}/>:<>{done?"✓ ":""}{OT_ICON[step]} {OT_LBL[step]}</>}
                          </button>
                          {at&&<div style={{fontSize:9,color:C.textLt,marginTop:2}}>{new Date(at).toLocaleDateString("en-IN",{day:"2-digit",month:"short"})}</div>}
                        </div>
                      );
                    })}
                  </div>
                  {eta.found&&eta.stage==="met_pending"&&<div style={{background:"#f0f4ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"8px 12px",fontSize:12,color:C.navy}}>
                    <strong>ETA:</strong> Queue position #{eta.position} · {eta.runsAhead} runs ahead · ~{eta.boatChanges} boat change(s) · Estimated {eta.estShifts} shift(s) (~{eta.estHours}hrs)
                  </div>}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── PLAN ARCHIVE ─────────────────────────────────────────────────────────────
function PlanArchive(){
  const [plans,setPlans]=useState([]);
  const [loading,setLoading]=useState(false);
  const [search,setSearch]=useState("");
  const [searchField,setSearchField]=useState("all");
  const [expanded,setExpanded]=useState(null);// planId
  const [archiveTab,setArchiveTab]=useState("f04");// f04 or f05

  useEffect(()=>{loadPlans();},[]);
  const loadPlans=async()=>{setLoading(true);try{setPlans(await fbGetPlans(50));}catch(e){}setLoading(false);};
  const doSearch=async()=>{setLoading(true);try{setPlans(await fbSearchPlans(search,searchField));}catch(e){}setLoading(false);};

  const OD_BG2={"22":"#f0fdf4","25":"#eff6ff","28":"#fff7ed"};
  const OD_C2={"22":"#15803d","25":"#1e40af","28":"#92400e"};

  const renderF04=(rows)=>{
    if(!rows||!rows.length)return <div style={{padding:20,textAlign:"center",color:C.textMd,fontSize:12}}>No F/04 data saved (plan was from older version)</div>;
    const fgm=rows.filter(r=>r.source==="FGJM");
    const mj=rows.filter(r=>r.source==="MJ");
    const met=rows.filter(r=>r.source==="BARE_FRESH"||r.source==="BARE");
    return(
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",minWidth:900,borderCollapse:"collapse"}}>
          <thead><tr>{["#","M/C","Material","Bare/MJ","Roll Size","Len","NOR","Trim","Slit L","Arm 1","Arm 2","Arm 3","Arm 4","Arm 5","Sets","OD","Customer"].map(h=><th key={h} style={{...TH,padding:"5px 7px",fontSize:9}}>{h}</th>)}</tr></thead>
          <tbody>
            {fgm.length>0&&<tr><td colSpan={17} style={{background:"#f0fdf4",padding:"4px 10px",fontWeight:800,fontSize:10,color:"#15803d",borderBottom:"1px solid #86efac"}}>FGM DISPATCH — {fgm.length}</td></tr>}
            {fgm.map((r,i)=><tr key={"f"+i} style={{background:i%2?"#f7f9fc":"#fff"}}><td style={{...TD,textAlign:"center",fontSize:10}}>{i+1}</td><td style={{...TD,fontSize:10}}>—</td><td style={{...TD,fontWeight:700,fontSize:10}}>{r.material}</td><td style={{...TD,fontSize:9}}>{r.fgmMat||r.batch}</td><td style={{...TD,textAlign:"center"}}>{r.fgmWidth||r.orderWidth}</td><td colSpan={12} style={{...TD,fontSize:10}}>{r.customers}</td></tr>)}
            {mj.length>0&&<tr><td colSpan={17} style={{background:"#eff6ff",padding:"4px 10px",fontWeight:800,fontSize:10,color:"#1e40af",borderBottom:"1px solid #bfdbfe"}}>MJ SLIT — {mj.length}</td></tr>}
            {mj.map((r,i)=>{var arms=r.armDisplay||r.arms||[];return<tr key={"m"+i} style={{background:i%2?"#f7f9fc":"#fff"}}><td style={{...TD,textAlign:"center",fontSize:10}}>{i+1}</td><td style={{...TD,fontSize:10,fontWeight:700,color:r.machine==="M-2"?"#dc2626":C.navy}}>{r.machine}</td><td style={{...TD,fontWeight:700,fontSize:10}}>{r.mjMat||r.material}</td><td style={{...TD,fontSize:9}}>{r.mjBatch||r.batch}</td><td style={{...TD,textAlign:"center",fontWeight:700}}>{r.mjWidth||r.rollSize}</td><td style={{...TD,textAlign:"center",fontSize:10}}>{r.mjLength||r.jumboLen}</td><td style={{...TD,textAlign:"center",fontWeight:700}}>{r.noOfRoll||""}</td><td style={{...TD,textAlign:"center"}}><span style={{fontWeight:700,color:r.trim<=15?"#15803d":"#92400e"}}>{r.trim}mm</span></td><td style={{...TD,textAlign:"center"}}>{r.slitLen}</td>{[0,1,2,3,4].map(ai=><td key={ai} style={{...TD,textAlign:"center",fontWeight:700,color:arms[ai]?C.navy:"#e2e8f0",fontSize:10}}>{arms[ai]||"—"}</td>)}<td style={{...TD,textAlign:"center"}}>{r.sets}</td><td style={{...TD,textAlign:"center"}}><span style={{background:OD_BG2[r.od||"22"],color:OD_C2[r.od||"22"],padding:"1px 5px",borderRadius:5,fontSize:9,fontWeight:700}}>{(r.od||"22")==="22"?"2.2":(r.od||"")==="25"?"2.5":"2.8"}</span></td><td style={{...TD,fontSize:10}}>{r.customers}</td></tr>;})}
            {met.length>0&&<tr><td colSpan={17} style={{background:"#fef9c3",padding:"4px 10px",fontWeight:800,fontSize:10,color:"#92400e",borderBottom:"1px solid #fbbf24"}}>FRESH MET — {met.length} runs</td></tr>}
            {met.map((r,i)=>{var arms=r.arms||[];return<tr key={"b"+i} style={{background:r._seasoning?"#fefce8":i%2?"#f7f9fc":"#fff"}}><td style={{...TD,textAlign:"center",fontSize:10}}>{i+1}</td><td style={{...TD,fontSize:10,fontWeight:700,color:r.machine==="M-2"?"#dc2626":C.navy}}>{r.machine}</td><td style={{...TD,fontWeight:700,fontSize:10}}>{r.material}{r._seasoning?" ⚙":""}</td><td style={{...TD,fontSize:9}}>{r.bareMat||r.batch}</td><td style={{...TD,textAlign:"center",fontWeight:700}}>{r.rollSize}</td><td style={{...TD,textAlign:"center",fontSize:10}}>{r.jumboLen}</td><td style={{...TD,textAlign:"center",fontWeight:700}}>{r.noOfRoll}</td><td style={{...TD,textAlign:"center"}}><span style={{fontWeight:700,color:r.trim<=15?"#15803d":r.trim<=20?"#d97706":"#991b1b"}}>{r.trim}mm</span></td><td style={{...TD,textAlign:"center"}}>{r.slitLen}</td>{[0,1,2,3,4].map(ai=><td key={ai} style={{...TD,textAlign:"center",fontWeight:700,color:arms[ai]?C.navy:"#e2e8f0",fontSize:10}}>{arms[ai]||"—"}</td>)}<td style={{...TD,textAlign:"center"}}>{r.sets}</td><td style={{...TD,textAlign:"center"}}><span style={{background:OD_BG2[r.od||"22"],color:OD_C2[r.od||"22"],padding:"1px 5px",borderRadius:5,fontSize:9,fontWeight:700}}>{(r.od||"22")==="22"?"2.2":(r.od||"")==="25"?"2.5":"2.8"}</span></td><td style={{...TD,fontSize:10}}>{r.customers}</td></tr>;})}
          </tbody>
        </table>
      </div>
    );
  };

  const renderF05=(rows,planNo)=>{
    if(!rows||!rows.length)return <div style={{padding:20,textAlign:"center",color:C.textMd,fontSize:12}}>No F/05 data saved (plan was from older version)</div>;
    var JW=10450;
    return(
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",minWidth:800,borderCollapse:"collapse"}}>
          <thead><tr>{["#","Material","Length","Roll 1","Roll 2","Roll 3","Roll 4","5 Grade","Trim","JW","Met%","Customer"].map(h=><th key={h} style={{...TH,padding:"5px 7px",fontSize:9}}>{h}</th>)}</tr></thead>
          <tbody>{rows.map(function(r,i){
            var rolls=r.rolls||[];
            var rollSum=rolls.reduce(function(s,rl){return s+(rl?rl.size:0);},0);
            var metPct=JW>0?(rollSum/JW*100).toFixed(1)+"%":"";
            var custs=[];rolls.forEach(function(rl){if(rl&&rl.customer)custs.push(rl.customer);});
            var uniq=custs.filter(function(c,idx){return custs.indexOf(c)===idx;}).join(" / ");
            return <tr key={i} style={{background:i%2?"#f7f9fc":"#fff"}}>
              <td style={{...TD,textAlign:"center",fontSize:10}}>{i+1}</td>
              <td style={{...TD,fontWeight:700,fontSize:10}}>{r.material}{r.mixedMats&&r.mixedMats.length>1?<span style={{fontSize:8,color:"#6d28d9"}}> +{r.mixedMats.length-1}</span>:""}</td>
              <td style={{...TD,textAlign:"center",fontWeight:700}}>{r.length}</td>
              {[0,1,2,3].map(function(ri){return <td key={ri} style={{...TD,textAlign:"center",fontWeight:700,color:rolls[ri]?C.navy:"#cbd5e1"}}>{rolls[ri]?rolls[ri].size:"—"}</td>;})}
              <td style={{...TD,textAlign:"center",background:"#fef9c3",fontWeight:700,color:"#92400e"}}>{r.offcut>0?r.offcut:"—"}</td>
              <td style={{...TD,textAlign:"center",fontWeight:700,color:r.trim>400?"#991b1b":C.text}}>{r.trim}</td>
              <td style={{...TD,textAlign:"center"}}>{r.jumboWidth||JW}</td>
              <td style={{...TD,textAlign:"center",fontWeight:700,fontSize:11,color:parseFloat(metPct)>=95?"#15803d":parseFloat(metPct)>=88?"#92400e":"#991b1b"}}>{metPct}</td>
              <td style={{...TD,fontSize:10}}>{uniq||"DOMESTIC"}</td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    );
  };

  return(
    <div style={{animation:"fadeIn .3s ease"}}>
      <h1 style={{fontSize:20,fontWeight:800,color:C.navy,marginBottom:16}}>Plan Archive</h1>
      <div style={{...card({marginBottom:14})}}>
        <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          {[{id:"all",l:"All Fields"},{id:"customer",l:"Customer"},{id:"order",l:"Order No"}].map(f=>(
            <button key={f.id} onClick={()=>setSearchField(f.id)} style={{...btn(searchField===f.id?C.navy:"#f1f5f9",searchField===f.id?"#fff":C.navy,{padding:"5px 12px",fontSize:11,border:"1px solid "+(searchField===f.id?C.navy:C.border)})}}>{f.l}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSearch()} placeholder="Search plans…" style={{...inp({flex:1})}}/>
          <button onClick={doSearch} style={{...btn(C.navy,"#fff",{padding:"10px 18px"})}}>🔍 Search</button>
          <button onClick={()=>{setSearch("");loadPlans();}} style={{...btn("#f1f5f9",C.navy,{padding:"10px 14px",border:"1px solid "+C.border})}}>↺</button>
        </div>
      </div>
      {loading&&<div style={{padding:40,textAlign:"center"}}><Spin color={C.accent} size={28}/></div>}
      {!loading&&plans.length===0&&<div style={{...card({textAlign:"center",padding:40})}}>
        <div style={{fontSize:44,marginBottom:10}}>📋</div>
        <div style={{fontWeight:700,color:C.navy}}>No plans yet</div>
        <div style={{fontSize:13,color:C.textMd,marginTop:6}}>Generate and save a plan — it appears here</div>
      </div>}
      {!loading&&plans.map((p,i)=>{
        const isExp=expanded===p.id;
        const hasData=p.fullPlanRows&&p.fullPlanRows.length>0;
        return(
          <div key={p.id||i} style={{...card({marginBottom:10,padding:0,overflow:"hidden"})}}>
            {/* Summary row — click to expand */}
            <div onClick={()=>setExpanded(isExp?null:p.id)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",background:isExp?"#f0f4ff":"#fff"}}>
              <div style={{fontWeight:800,fontSize:14,color:C.navy,minWidth:70}}>{p.planNo||"—"}</div>
              <div style={{fontWeight:700,fontSize:12,color:C.green}}>{p.f05No||"—"}</div>
              <div style={{fontSize:11,color:C.textMd}}>{fmtDate(p.createdAt)}</div>
              <div style={{fontSize:11,color:C.textMd}}>{p.createdBy||"—"}</div>
              <div style={{fontSize:11,color:C.textMd}}>{p.totalRuns||p.metRuns||0} runs</div>
              {p.f05Mode&&<span style={{background:"#ede9fe",color:"#6d28d9",padding:"1px 6px",borderRadius:5,fontSize:9,fontWeight:700}}>F/05: {p.f05Mode}</span>}
              <div style={{flex:1,fontSize:10,color:C.textMd,textAlign:"right",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(p.customers||[]).slice(0,3).join(", ")}</div>
              <span style={{fontSize:12,color:C.textLt}}>{isExp?"▲":"▼"}</span>
            </div>

            {/* Expanded: full F/04 + F/05 */}
            {isExp&&(
              <div style={{borderTop:"2px solid "+C.accent}}>
                {/* ═══ PLAN ANALYSIS DASHBOARD ═══ */}
                {hasData&&(function(){
                  var rows=p.fullPlanRows||[];
                  var metRows=rows.filter(function(r){return r.source==="BARE_FRESH"||r.source==="BARE";});
                  var mjRows=rows.filter(function(r){return r.source==="MJ";});
                  var fgmRows=rows.filter(function(r){return r.source==="FGJM";});
                  // Trim analysis
                  var totalTrimWaste=0;var totalMachineWidth=0;var totalArmWidth=0;var trimCount=0;
                  metRows.concat(mjRows).forEach(function(r){
                    var rs=r.rollSize||r.mjWidth||0;
                    var tr2=r.trim||0;
                    if(rs>0&&tr2>0){totalTrimWaste+=tr2;totalMachineWidth+=rs;totalArmWidth+=rs-tr2;trimCount++;}
                  });
                  var avgTrim=trimCount>0?(totalTrimWaste/trimCount).toFixed(1):0;
                  var trimPct2=totalMachineWidth>0?((totalTrimWaste/totalMachineWidth)*100).toFixed(1):0;
                  var utilPct=totalMachineWidth>0?((totalArmWidth/totalMachineWidth)*100).toFixed(1):0;
                  // Total rolls/sets
                  var totalSets=0;var totalNOR2=0;
                  rows.forEach(function(r){totalSets+=(r.sets||0);totalNOR2+=(r.noOfRoll||0);});
                  // OD distribution
                  var odDist={"22":0,"25":0,"28":0};
                  metRows.forEach(function(r){odDist[r.od||"22"]=(odDist[r.od||"22"]||0)+1;});
                  // Machine distribution
                  var m1=metRows.filter(function(r){return r.machine==="M-1";}).length;
                  var m2=metRows.filter(function(r){return r.machine==="M-2";}).length;
                  // F/05 analysis
                  var f05=p.fullF05Rows||[];
                  var f05MetPct=0;var f05TrimPct=0;
                  if(f05.length>0){
                    var f05JW=10450;var f05TotalFilm=f05.length*f05JW;
                    var f05TotalMet=f05.reduce(function(s,r){return s+(r.rolls||[]).reduce(function(a,rl){return a+(rl?rl.size:0);},0);},0);
                    var f05TotalTrim=f05.reduce(function(s,r){return s+(r.trim||0);},0);
                    f05MetPct=(f05TotalMet/f05TotalFilm*100).toFixed(1);
                    f05TrimPct=(f05TotalTrim/f05TotalFilm*100).toFixed(1);
                  }
                  return React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8,padding:"10px 14px",background:"#f8fafc",borderBottom:"1px solid "+C.border}},
                    React.createElement("div",{style:{background:"#f0f4ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"8px 10px",textAlign:"center"}},
                      React.createElement("div",{style:{fontSize:9,fontWeight:700,color:C.textMd,textTransform:"uppercase"}},"Machine Util"),
                      React.createElement("div",{style:{fontSize:18,fontWeight:800,color:parseFloat(utilPct)>=95?"#15803d":parseFloat(utilPct)>=90?"#1e40af":"#92400e"}},utilPct+"%"),
                      React.createElement("div",{style:{fontSize:9,color:C.textMd}},"Arm fill vs roll")
                    ),
                    React.createElement("div",{style:{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"8px 10px",textAlign:"center"}},
                      React.createElement("div",{style:{fontSize:9,fontWeight:700,color:C.textMd,textTransform:"uppercase"}},"Trim Waste"),
                      React.createElement("div",{style:{fontSize:18,fontWeight:800,color:parseFloat(trimPct2)<=2?"#15803d":parseFloat(trimPct2)<=3?"#92400e":"#991b1b"}},trimPct2+"%"),
                      React.createElement("div",{style:{fontSize:9,color:C.textMd}},"Avg "+avgTrim+"mm/run")
                    ),
                    React.createElement("div",{style:{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"8px 10px",textAlign:"center"}},
                      React.createElement("div",{style:{fontSize:9,fontWeight:700,color:C.textMd,textTransform:"uppercase"}},"Total Runs"),
                      React.createElement("div",{style:{fontSize:18,fontWeight:800,color:C.navy}},rows.length),
                      React.createElement("div",{style:{fontSize:9,color:C.textMd}},metRows.length+" met · "+mjRows.length+" MJ · "+fgmRows.length+" FGM")
                    ),
                    React.createElement("div",{style:{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"8px 10px",textAlign:"center"}},
                      React.createElement("div",{style:{fontSize:9,fontWeight:700,color:C.textMd,textTransform:"uppercase"}},"Total NOR"),
                      React.createElement("div",{style:{fontSize:18,fontWeight:800,color:C.navy}},totalNOR2.toFixed(1)),
                      React.createElement("div",{style:{fontSize:9,color:C.textMd}},totalSets+" sets planned")
                    ),
                    React.createElement("div",{style:{background:"#fef9c3",border:"1px solid #fbbf24",borderRadius:8,padding:"8px 10px",textAlign:"center"}},
                      React.createElement("div",{style:{fontSize:9,fontWeight:700,color:C.textMd,textTransform:"uppercase"}},"OD Split"),
                      React.createElement("div",{style:{fontSize:12,fontWeight:800,color:"#92400e"}},
                        (odDist["22"]||0)>0?"2.2:"+odDist["22"]+" ":"",
                        (odDist["25"]||0)>0?"2.5:"+odDist["25"]+" ":"",
                        (odDist["28"]||0)>0?"2.8:"+odDist["28"]:""
                      ),
                      React.createElement("div",{style:{fontSize:9,color:C.textMd}},"M1:"+m1+" M2:"+m2)
                    ),
                    f05.length>0?React.createElement("div",{style:{background:"#fef9c3",border:"1px solid #fbbf24",borderRadius:8,padding:"8px 10px",textAlign:"center"}},
                      React.createElement("div",{style:{fontSize:9,fontWeight:700,color:C.textMd,textTransform:"uppercase"}},"F/05 Met%"),
                      React.createElement("div",{style:{fontSize:18,fontWeight:800,color:parseFloat(f05MetPct)>=90?"#15803d":"#92400e"}},f05MetPct+"%"),
                      React.createElement("div",{style:{fontSize:9,color:C.textMd}},f05.length+" jumbos · "+f05TrimPct+"% trim")
                    ):null
                  );
                })()}
                <div style={{display:"flex",borderBottom:"1px solid "+C.border}}>
                  <button onClick={()=>setArchiveTab("f04")} style={{flex:1,padding:"8px",fontWeight:700,fontSize:12,cursor:"pointer",border:"none",
                    background:archiveTab==="f04"?"#fff":"#f8fafc",color:archiveTab==="f04"?C.navy:C.textMd,
                    borderBottom:archiveTab==="f04"?"3px solid "+C.accent:"3px solid transparent",fontFamily:"inherit"}}>
                    📋 MET/F/04 — {p.planNo} {hasData?"":"(no data)"}
                  </button>
                  <button onClick={()=>setArchiveTab("f05")} style={{flex:1,padding:"8px",fontWeight:700,fontSize:12,cursor:"pointer",border:"none",
                    background:archiveTab==="f05"?"#fff":"#f8fafc",color:archiveTab==="f05"?C.green:C.textMd,
                    borderBottom:archiveTab==="f05"?"3px solid "+C.green:"3px solid transparent",fontFamily:"inherit"}}>
                    📄 MET/F/05 — {p.f05No} {p.fullF05Rows?"":"(no data)"}
                  </button>
                </div>
                <div style={{padding:"8px",background:"#fff"}}>
                  {archiveTab==="f04"?renderF04(p.fullPlanRows):renderF05(p.fullF05Rows,p.planNo)}
                </div>
                {/* Print/Export from archive */}
                <div style={{padding:"8px 16px",background:"#f8fafc",borderTop:"1px solid "+C.border,display:"flex",gap:8}}>
                  {hasData&&<button onClick={()=>exportF04Excel(p.fullPlanRows,p.planNo,p.f05No,{companyName:p.companyName||"GLS POLYFILMS PVT. LTD."},null)} style={{...btn("#15803d","#fff",{padding:"6px 14px",fontSize:11})}}>⬇ Excel F/04</button>}
                  {p.fullF05Rows&&<button onClick={()=>exportF05Excel(p.fullF05Rows,p.f05No,p.planNo,{jumboWidth:10450})} style={{...btn("#15803d","#fff",{padding:"6px 14px",fontSize:11})}}>⬇ Excel F/05</button>}
                  <button onClick={()=>window.print()} style={{...btn(C.navy,"#fff",{padding:"6px 14px",fontSize:11})}}>🖨️ Print</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── ADMIN PANEL ──────────────────────────────────────────────────────────────
function AdminUserCard({u,onApprove,onToggle,onExtend,onDelete}){
  const [showPwd,setShowPwd]=useState(false);
  const [resetPwd,setResetPwd]=useState("");
  const [showReset,setShowReset]=useState(false);
  const doAdminReset=async()=>{
    if(!resetPwd||resetPwd.length<6){alert("Min 6 chars");return;}
    await fbAdminResetPassword(u.uid,resetPwd);
    alert("Password updated!");setShowReset(false);setResetPwd("");
  };
  const deviceShort=String(u.device||"Unknown").slice(0,70);
  return(
    <div style={{...card({marginBottom:10,padding:14,border:!u.approved?`2px solid #fbbf24`:`1px solid ${C.border}`})}}>
      <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
        {u.facePhoto
          ?<img src={u.facePhoto} style={{width:56,height:56,borderRadius:28,objectFit:"cover",border:`2px solid ${u.approved?C.green:"#fbbf24"}`,flexShrink:0}}/>
          :<div style={{width:56,height:56,borderRadius:28,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:22,color:"#fff"}}>👤</div>
        }
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,fontSize:14,color:C.navy}}>{u.name||"Unknown"}</div>
          <div style={{fontSize:12,color:C.textMd,marginTop:2}}>📞 {u.phone} · 🏭 {u.company}</div>
          <div style={{fontSize:11,color:C.textLt,marginTop:2}}>Joined: {fmtDate(u.createdAt)||fmtDateShort(u.createdAt)||"—"}</div>
          <div style={{fontSize:12,marginTop:3}}>
            {u.trialEnd?(function(){
              var days=trialDaysLeft(u.trialEnd);
              return days>0
                ?<span style={{background:"#f0fdf4",color:"#15803d",padding:"2px 8px",borderRadius:6,fontWeight:700}}>✅ Valid — {days} days left (expires {fmtDateShort(u.trialEnd)})</span>
                :<span style={{background:"#fef2f2",color:"#991b1b",padding:"2px 8px",borderRadius:6,fontWeight:700}}>🔴 EXPIRED — ended {fmtDateShort(u.trialEnd)}</span>;
            })():<span style={{background:"#fef9c3",color:"#92400e",padding:"2px 8px",borderRadius:6,fontWeight:700}}>⚠ No trial set</span>}
          </div>
          <div style={{fontSize:10,color:C.textLt,marginTop:2,wordBreak:"break-all"}}>💻 {deviceShort}{(u.device||"").length>70?"…":""}</div>
        </div>
        <div style={{flexShrink:0}}>
          {!u.approved&&<span style={{background:"#fef9c3",color:"#92400e",padding:"3px 10px",borderRadius:8,fontSize:11,fontWeight:700}}>⏳ Pending</span>}
          {u.approved&&<span style={{background:u.active?"#f0fdf4":"#fef2f2",color:u.active?"#15803d":"#991b1b",padding:"3px 10px",borderRadius:8,fontSize:11,fontWeight:700}}>{u.active?"✅ Active":"🔴 Off"}</span>}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,padding:"8px 10px",background:"#f8fafc",borderRadius:8,border:`1px solid ${C.border}`}}>
        <span style={{fontSize:11,color:C.textMd,fontWeight:700,minWidth:70}}>🔑 Password:</span>
        <span style={{fontSize:12,fontFamily:"monospace",color:C.navy,flex:1,letterSpacing:2}}>
          {showPwd?u.password||"—":"•".repeat(Math.min((u.password||"").length||8,12))}
        </span>
        <button onClick={()=>setShowPwd(s=>!s)} style={{...btn("#eff6ff",C.accent,{padding:"3px 10px",fontSize:11,border:"1px solid #bfdbfe"})}}>
          {showPwd?"Hide":"Show"}
        </button>
        <button onClick={()=>setShowReset(s=>!s)} style={{...btn("#fef9c3","#92400e",{padding:"3px 10px",fontSize:11,border:"1px solid #fbbf24"})}}>
          Reset
        </button>
      </div>
      {showReset&&<div style={{display:"flex",gap:8,marginTop:8}}>

      </div>
    </div>
  );

function RegisterScreen({onDone}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:"",phone:"",company:"",password:"",confirm:""});
  const [facePhoto,setFacePhoto]=useState(null);
  const [camOn,setCamOn]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [done,setDone]=useState(false);
  const videoRef=useRef(null);const canvasRef=useRef(null);const streamRef=useRef(null);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const startCam=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});streamRef.current=s;if(videoRef.current)videoRef.current.srcObject=s;setCamOn(true);}catch(e){setErr("Camera access denied.");}};
  const stopCam=()=>{streamRef.current?.getTracks().forEach(t=>t.stop());setCamOn(false);};
  const snap=()=>{const v=videoRef.current,c=canvasRef.current;if(!v||!c)return;c.width=v.videoWidth;c.height=v.videoHeight;c.getContext("2d").drawImage(v,0,0);setFacePhoto(c.toDataURL("image/jpeg",0.8));stopCam();};
  const submit=async()=>{
    setLoading(true);setErr("");
    try{await fbRegister(form.name,form.phone,form.company,form.password,facePhoto);setDone(true);}
    catch(e){setErr(e.message);}
    setLoading(false);
  };
  if(done)return(
    <div style={{textAlign:"center",padding:"10px 0"}}>
      <div style={{fontSize:44,marginBottom:12}}>🎉</div>
      <div style={{fontSize:20,fontWeight:800,color:C.navy,marginBottom:6}}>Registration Submitted!</div>
      <div style={{fontSize:13,color:C.textMd,marginBottom:4,lineHeight:1.6}}>Admin has been notified via WhatsApp.<br/>You will get access once admin approves.</div>
      <button onClick={onDone} style={{...btn(C.navy,"#fff",{padding:"11px 30px",fontSize:14,marginTop:16})}}>Go to Login →</button>
    </div>
  );
  const STEPS=["Your Details","Face Photo","Done"];
  return(
    <div>
      <div style={{display:"flex",marginBottom:20,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
        {STEPS.map((s,i)=><div key={s} style={{flex:1,padding:"8px 4px",textAlign:"center",fontSize:11,fontWeight:700,background:step===i+1?C.navy:step>i+1?"#15803d":"#f8fafc",color:step>=i+1?"#fff":C.textLt,borderRight:i<2?`1px solid ${C.border}`:undefined}}>{step>i+1?"✓ ":""}{s}</div>)}
      </div>
      {step===1&&(
        <div>
          {[{l:"Full Name",k:"name",ph:"Your full name",t:"text"},{l:"Phone Number",k:"phone",ph:"10-digit mobile",t:"tel"},{l:"Company",k:"company",ph:"Company name",t:"text"},{l:"Password (6-15 chars)",k:"password",ph:"Min 6 characters",t:"password"},{l:"Confirm Password",k:"confirm",ph:"Re-enter",t:"password"}].map(f=>(
            <div key={f.k} style={{marginBottom:11}}><label style={lbl}>{f.l}</label><input type={f.t} value={form[f.k]} onChange={e=>upd(f.k,e.target.value)} placeholder={f.ph} style={inp()}/></div>
          ))}
          {err&&<ErrBox msg={err}/>}
          <button onClick={()=>{

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("upload");
  const [data,setData]=useState({pen:[],mj:[],fgjm:[],bare:[]});
  const [cfg,setCfg]=useState({...DEFAULT_CONFIG});
  const [planResult,setPlanResult]=useState(null);
  const [generating,setGenerating]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [toast,setToast]=useState("");
  const [dataWarnings,setDataWarnings]=useState([]);
  const [planSaved,setPlanSaved]=useState(false);
  const [machineMode,setMachineMode]=useState("auto");
  const [f05Mode,setF05Mode]=useState("auto");
  const [planId,setPlanId]=useState(null);
  const [showFeedback,setShowFeedback]=useState(false);
  const [suggestions,setSuggestions]=useState([]);
  const [lastSelection,setLastSelection]=useState(null);
  const [skipBatchesApp,setSkipBatchesApp]=useState([]);
  const [filteredPenApp,setFilteredPenApp]=useState([]);// pen data filtered by selection// batches to skip from stock matching
  const [rollSizeOverridesApp,setRollSizeOverridesApp]=useState({});// {runId: newRollSize} — lifted from F04

  // ═══ ALREADY-PLANNED ROLLS: Load from saved plans to prevent duplicate planning ═══
  const [alreadyPlannedRolls,setAlreadyPlannedRolls]=useState({});
  const [alreadyPlannedDetails,setAlreadyPlannedDetails]=useState([]);
  useEffect(function(){
    fbGetPlans(200).then(function(plans){
      var rollsMap={};
      var details=[];
      getDB().collection("pp_tracking").orderBy("globalSeqIndex","asc").limit(500).get().then(function(snap){
        var cancelledPlans={};
        snap.docs.forEach(function(d){
          var t=d.data();
          if(t.metStatus==="cancelled"){cancelledPlans[t.planId]=true;}
        });
        for(var pi=0;pi<plans.length;pi++){
          var p=plans[pi];
          var pno=p.planNo||"?";
          var dt=p.createdAt||"";
          if(cancelledPlans[p.id])continue;
          if(p.plannedByLineKey){
            var pblk=p.plannedByLineKey;
            for(var lk in pblk){
              rollsMap[lk]=(rollsMap[lk]||0)+pblk[lk];
              details.push({lineKey:lk,planNo:pno,rolls:pblk[lk],createdAt:dt,planId:p.id,customers:(p.customers||[]).join(", "),status:"📋 Planned"});
            }
          } else if(p.orderLineKeys){
            (p.orderLineKeys||[]).forEach(function(lk){
              rollsMap[lk]=(rollsMap[lk]||0)+1;
              if(!details.some(function(d2){return d2.lineKey===lk&&d2.planNo===pno;})){
                details.push({lineKey:lk,planNo:pno,rolls:1,createdAt:dt,planId:p.id,customers:(p.customers||[]).join(", "),status:"📋 Planned (est.)"});
              }
            });
          }
        }
        setAlreadyPlannedRolls(rollsMap);
        setAlreadyPlannedDetails(details);
      }).catch(function(){setAlreadyPlannedRolls({});setAlreadyPlannedDetails([]);});
    }).catch(function(){});
  },[]);

  // Recompute F/05 rows when roll sizes are overridden in F/04
  const liveF05Rows=useMemo(()=>{
    try{
      if(!planResult||!planResult.planRows)return planResult?planResult.f05Rows:[];
      var keys=Object.keys(rollSizeOverridesApp);
      if(!keys.length)return planResult.f05Rows;
      var modifiedRuns=planResult.planRows.filter(function(r){return r.source==="BARE_FRESH"&&!r._matchingBare;}).map(function(r){
        var newRS=rollSizeOverridesApp[r.id];
        if(newRS!==undefined)return Object.assign({},r,{rollSize:newRS});
        return r;
      });
      return generateF05(modifiedRuns,cfg);
    }catch(e){console.error("liveF05Rows error:",e);return planResult?planResult.f05Rows:[];}
  },[planResult,rollSizeOverridesApp,cfg]);

  useEffect(()=>{
    // Restore session if user refreshed page
    try{
      const saved=sessionStorage.getItem("pp_user");
      if(saved){const u=JSON.parse(saved);if(u&&u.uid)setUser(u);}
    }catch(e){}
    const splash=document.getElementById("pp-splash");
    setTimeout(()=>{if(splash)splash.classList.add("fade");setTimeout(()=>{if(splash)splash.style.display="none";},700);},600);
    fbGetSuggestions().then(s=>{if(s.length>0)setSuggestions(s);}).catch(()=>{});
    // Load planning config from Firebase
    fbLoadConfig().then(function(saved){if(saved)setCfg(function(prev){return Object.assign({},DEFAULT_CONFIG,saved);});}).catch(function(){});
  },[]);
  // Keep window user ref updated for Firebase tracking
  useEffect(()=>{window._ppUser=user?.name||"unknown";},[user]);

  // ═══ MET IDLE NOTIFICATION — alert if no Met Done tick for 2.5 hours ═══
  const [metIdleAlert,setMetIdleAlert]=useState(false);
  const [lastMetAt,setLastMetAt]=useState(null);
  const metAlertRef=useRef(null);

  useEffect(()=>{
    if(!user)return;
    var unsub=null;var timer=null;
    // Watch pp_tracking for latest metAt timestamp
    try{
      unsub=getDB().collection("pp_tracking")
        .where("metStatus","==","done")
        .orderBy("metAt","desc").limit(1)
        .onSnapshot(function(snap){
          if(!snap.empty){
            var d=snap.docs[0].data();
            setLastMetAt(d.metAt||null);
            setMetIdleAlert(false);
          }
        },function(err){
          // Index might not exist — fall back to simple query
          console.log("Met idle watch fallback:",err.message);
          unsub=getDB().collection("pp_tracking")
            .where("metStatus","==","done").limit(1)
            .onSnapshot(function(snap){
              if(!snap.empty){
                var latest=null;
                snap.docs.forEach(function(d){
                  var at=d.data().metAt;
                  if(at&&(!latest||at>latest))latest=at;
                });
                if(latest){setLastMetAt(latest);setMetIdleAlert(false);}
              }
            },function(){});
        });
    }catch(e){console.log("Met idle init error:",e.message);}
    // Check idle every 60 seconds
    timer=setInterval(function(){
      if(!lastMetAt)return;// Don't alert if we never got a timestamp
      var diff=Date.now()-new Date(lastMetAt).getTime();
      var IDLE_MS=2.5*60*60*1000;
      if(diff>IDLE_MS){
        setMetIdleAlert(true);
        try{
          var ctx=new(window.AudioContext||window.webkitAudioContext)();
          var osc=ctx.createOscillator();var gain=ctx.createGain();
          osc.connect(gain);gain.connect(ctx.destination);
          osc.frequency.value=880;osc.type="sine";
          gain.gain.value=0.3;
          osc.start();osc.stop(ctx.currentTime+0.3);
          setTimeout(function(){
            var osc2=ctx.createOscillator();var gain2=ctx.createGain();
            osc2.connect(gain2);gain2.connect(ctx.destination);
            osc2.frequency.value=1100;osc2.type="sine";
            gain2.gain.value=0.3;
            osc2.start();osc2.stop(ctx.currentTime+0.3);
          },400);
        }catch(e){}
      }
    },60000);
    return function(){if(unsub)unsub();if(timer)clearInterval(timer);};
  },[user,lastMetAt]);

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),3000);};

  const onUpload=(type,rows,fname)=>{
    var result=cleanUploadData(type,rows);
    setData(d=>({...d,[type]:result.rows}));
    if(result.warnings.length>0){
      setDataWarnings(function(prev){return prev.concat(result.warnings);});
    }
    showToast("✓ "+fname+" loaded as "+type.toUpperCase()+(result.warnings.length>0?" ("+result.warnings.length+" warning"+(result.warnings.length>1?"s":"")+")" :""));
    setPlanResult(null);setPlanSaved(false);
  };

  const generatePlan=useCallback(async(selection=null,skipBatches=null)=>{
    if(!data.pen.length){showToast("Upload PEN file first");return;}
    setGenerating(true);setPlanSaved(false);setPlanId(null);setRollSizeOverridesApp({});
    if(skipBatches){
      var merged=skipBatchesApp.slice();
      skipBatches.forEach(function(b){if(merged.indexOf(b)<0)merged.push(b);});
      setSkipBatchesApp(merged);
    }
    setLastSelection(selection);
    await new Promise(r=>setTimeout(r,100));
    try{
      let penData=data.pen;
      let priorityCustomers=[];
      // Handle new selection object {type,keys,customers,microns,od}
      const sel=selection||{};
      const selMics=sel.microns||[];
      const selODs=sel.ods||[];

      if(sel.type==="orders"&&sel.keys&&sel.keys.length>0){
        // Filter to only selected order keys
        penData=penData.filter(r=>{
          const k=String(r["Sales Order"]||"")+"-"+String(r["Sale Order Item"]||"");
          return sel.keys.includes(k);
        });
      } else if(sel.type==="customers"&&sel.customers&&sel.customers.length>0){
        // FILTER to only selected customers' orders
        penData=penData.filter(r=>{
          const cust=String(r["Consignee Name"]||"").trim();
          return sel.customers.some(function(c){return cust===c;});
        });
        priorityCustomers=sel.customers;
      }
      // Apply micron and OD filters
      if(selMics.length>0){penData=penData.filter(r=>selMics.includes(toFloat(r.Thickness)));}
      if(selODs.length>0){penData=penData.filter(r=>selODs.includes(parseMat(r.Material||"").od));}

      // Merge skip batches: new + existing cumulative
      var allSkipBatches=skipBatchesApp.slice();
      if(skipBatches){skipBatches.forEach(function(b){if(allSkipBatches.indexOf(b)<0)allSkipBatches.push(b);});}

      // ═══ DEDUCT ALREADY-PLANNED ROLLS from pending quantities ═══
      var deductCount=0;var skippedCount=0;
      if(Object.keys(alreadyPlannedRolls).length>0){
        penData=penData.map(function(r){
          var k=String(r["Sales Order"]||"")+"-"+String(r["Sale Order Item"]||"");
          var ap=alreadyPlannedRolls[k]||0;
          if(ap>0){
            var origPend=toFloat(r["Pending Rolls"]);
            var remaining=Math.max(0,origPend-ap);
            var copy={};Object.keys(r).forEach(function(rk){copy[rk]=r[rk];});
            copy["Pending Rolls"]=remaining;
            if(remaining<=0){skippedCount++;}else{deductCount++;}
            return copy;
          }
          return r;
        }).filter(function(r){return toFloat(r["Pending Rolls"])>0;});
      }

      setFilteredPenApp(penData);
      const result=smartPlanV10(penData,data.bare,data.mj,data.fgjm,cfg,machineMode,priorityCustomers,f05Mode||"auto",allSkipBatches.length>0?allSkipBatches:null);
      setPlanResult(result);
      setTab("f04");
      var deductMsg=(deductCount+skippedCount)>0?" · "+(deductCount+skippedCount)+" adjusted (already planned)":"";
      showToast("✓ Plan generated! "+(sel.type==="customers"?sel.customers.join(", ")+": ":"")+(selMics.length>0?selMics.map(function(m){return m+"µ";}).join("+")+": ":"")+(allSkipBatches.length>0?allSkipBatches.length+" stock skipped · ":"")+result.planRows.length+" runs ("+penData.length+" orders)"+deductMsg);
    }catch(e){showToast("Error: "+e.message);console.error(e);}
    setGenerating(false);
