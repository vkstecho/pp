                React.createElement(Field,{k:"jumboWidth",l:"Bare Jumbo Width",v:lc.jumboWidth||"",onChange:function(e){upd2("jumboWidth",Number(e.target.value));}}),
                React.createElement(Field,{k:"primaryTrim",l:"Primary Trim",v:lc.primaryTrim||"",onChange:function(e){upd2("primaryTrim",Number(e.target.value));}}),
                React.createElement(Field,{k:"f05TargetMin",l:"F/05 Target Min",v:lc.f05TargetMin||"",onChange:function(e){upd2("f05TargetMin",Number(e.target.value));}}),
                React.createElement(Field,{k:"f05TargetMax",l:"F/05 Target Max",v:lc.f05TargetMax||"",onChange:function(e){upd2("f05TargetMax",Number(e.target.value));}}),

                React.createElement(Section,{icon:"📐",title:"F/05 Min Trim per Micron (mm)",mt:8}),
                React.createElement(MapField,{prefix:"ft",label:"F/05 Trim Min",keys:["8","10","12","15","23"],obj:lc.f05TrimMin||{},cfgKey:"f05TrimMin"}),

                React.createElement(Section,{icon:"📐",title:"F/05 Min Offcut per Micron (mm)",mt:8}),
                React.createElement(MapField,{prefix:"oc",label:"Offcut Min",keys:["8","10","12","15","23"],obj:lc.offcutMin||{},cfgKey:"offcutMin"}),

                React.createElement(Section,{icon:"⚖️",title:"Stock Thresholds (KG)",mt:8}),
                React.createElement(Field,{k:"fgmCapKg",l:"FGM Cap (sets capped above)",v:lc.fgmCapKg||"",onChange:function(e){upd2("fgmCapKg",Number(e.target.value));}}),
                React.createElement(Field,{k:"stockCapKg",l:"FGM+MJ Combined Cap",v:lc.stockCapKg||"",onChange:function(e){upd2("stockCapKg",Number(e.target.value));}}),
                React.createElement(Field,{k:"mjStockCap",l:"MJ Stock Warning",v:lc.mjStockCap||"",onChange:function(e){upd2("mjStockCap",Number(e.target.value));}}),

                React.createElement(Section,{icon:"🚢",title:"Boat Life & Production",mt:8}),
                React.createElement(Field,{k:"boatLife22",l:"Boat Life M22 (m)",v:lc.boatLife22||"",onChange:function(e){upd2("boatLife22",Number(e.target.value));}}),
                React.createElement(Field,{k:"boatLife25",l:"Boat Life M25 (m)",v:lc.boatLife25||"",onChange:function(e){upd2("boatLife25",Number(e.target.value));}}),
                React.createElement(Field,{k:"boatLife28",l:"Boat Life M28 (m)",v:lc.boatLife28||"",onChange:function(e){upd2("boatLife28",Number(e.target.value));}}),
                React.createElement(Field,{k:"boatTarget",l:"Boat Target (m/set)",v:lc.boatTarget||"",onChange:function(e){upd2("boatTarget",Number(e.target.value));}}),

                React.createElement(Section,{icon:"🔍",title:"FGM Salvage Rules",mt:8}),
                React.createElement("div",{style:{gridColumn:"1/-1"}},
                  React.createElement("label",{style:lbl},"Salvage OK Keywords (comma-separated)"),
                  React.createElement("input",{type:"text",value:(lc.salvageOK||[]).join(", "),onChange:function(e){upd2("salvageOK",e.target.value.split(",").map(function(s){return s.trim().toLowerCase();}).filter(Boolean));},style:inp()})
                ),
                React.createElement("div",{style:{gridColumn:"1/-1"}},
                  React.createElement("label",{style:lbl},"Salvage REJECT Keywords (comma-separated)"),
                  React.createElement("input",{type:"text",value:(lc.salvageNO||[]).join(", "),onChange:function(e){upd2("salvageNO",e.target.value.split(",").map(function(s){return s.trim().toLowerCase();}).filter(Boolean));},style:inp()})
                ),

                React.createElement(Section,{icon:"👤",title:"Customer-Specific Rules (JSON)",mt:8}),
                React.createElement("div",{style:{gridColumn:"1/-1"}},
                  React.createElement("textarea",{value:JSON.stringify(lc.customerRules||{},null,2),onChange:function(e){try{upd2("customerRules",JSON.parse(e.target.value));}catch(ex){}},style:inp({minHeight:80,resize:"vertical",fontFamily:"monospace",fontSize:11})})
                ),

                React.createElement("div",{style:{gridColumn:"1/-1",display:"flex",gap:10,marginTop:12,paddingBottom:20}},
                  React.createElement("button",{onClick:doSave,style:{...btn(C.green,"#fff",{padding:"12px 28px",fontSize:14,fontWeight:800})}},"💾 Save Planning Rules"),
                  React.createElement("button",{onClick:doReset,style:{...btn("#f1f5f9",C.red,{padding:"12px 20px",fontSize:13,border:"1px solid "+C.redBd})}},"↺ Reset to Defaults")
                )
              )
            );
          })()}

        </div>
      </div>

      {showFeedback&&<FeedbackModal planId={planId||"local"} planNo={cfg.nextPlanNo} user={user} onClose={()=>setShowFeedback(false)}/>}

      {suggestions.length>0&&(
        <div style={{position:"fixed",bottom:96,left:16,zIndex:300,background:"#1a305c",borderRadius:12,padding:"10px 16px",maxWidth:360,boxShadow:"0 4px 20px rgba(0,0,0,.3)"}}>
          <div style={{color:"#fbbf24",fontWeight:800,fontSize:13,marginBottom:6}}>💡 Plan Power Suggestion</div>
          {suggestions.slice(0,1).map((s,i)=><div key={i} style={{color:"rgba(255,255,255,.8)",fontSize:12,marginBottom:6}}>{s.msg}</div>)}
          <div style={{display:"flex",gap:6,marginTop:8}}>
            <button onClick={()=>setSuggestions([])} style={{...btn("rgba(255,255,255,.1)","#fff",{padding:"5px 12px",fontSize:11})}}>Dismiss</button>
          </div>
        </div>
      )}

      {showAdmin&&<AdminPanel cfg={cfg} setCfg={function(c){setCfg(c);fbSaveConfig(c).then(function(){showToast("✓ Rules saved to cloud!");}).catch(function(){showToast("Rules saved locally (cloud save failed)");});}} onClose={()=>setShowAdmin(false)}/>}
      {toast&&<div className="pp-toast">{toast}</div>}
    </>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null,info:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){
    this.setState({info:info});
    console.error("App Error:",e,info);
  }
  render(){
    if(this.state.err){
      return React.createElement("div",{style:{padding:40,textAlign:"center",fontFamily:"system-ui"}},
        React.createElement("h2",{style:{color:"#991b1b"}},"Something went wrong"),
        React.createElement("pre",{style:{background:"#fef2f2",padding:16,borderRadius:8,textAlign:"left",fontSize:12,maxHeight:200,overflow:"auto",margin:"16px auto",maxWidth:600}},
          String(this.state.err.message||this.state.err)
        ),
        React.createElement("button",{onClick:function(){window.location.reload();},style:{padding:"12px 24px",background:"#1a305c",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:700}},"🔄 Reload App")
      );
    }
    return this.props.children;
  }
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
