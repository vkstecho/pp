<script>
  // Catch any JS errors and show on screen instead of blank
  window.onerror = function(msg, src, line, col, err) {
    var s = document.getElementById('pp-splash');
    if(s) { s.style.display = 'flex'; s.style.opacity = '1'; }
    var el = document.getElementById('pp-err');
    var detail = err ? (err.message || err.toString()) : '';
    var stack = err && err.stack ? err.stack.slice(0,300) : '';
    if(el) el.innerHTML = '<div style="background:rgba(220,38,38,.9);color:#fff;padding:14px 18px;border-radius:10px;max-width:90vw;font-size:11px;margin-top:16px;text-align:left;word-break:break-all"><b>⚠ Error</b><br>MSG: '+msg+'<br>SRC: '+src+'<br>LINE: '+line+'<br>DETAIL: '+detail+'<br><small>'+stack+'</small></div>';
    return false;
  };
  // Hard fallback: hide splash after 12s regardless of React status
  setTimeout(function(){
    var s=document.getElementById('pp-splash');
    if(s&&s.style.display!=='none'){s.classList.add('fade');setTimeout(function(){s.style.display='none';},700);}
  }, 12000);
</script>

  boatTarget:550000,planThresh:40000,trimMax:15,trimSide:250,

const OD_COMPAT = {"22":["22","25","28"],"25":["25","28"],"28":["28"]};
const M_RANGE   = {"M-1":[1910,3290],"M-2":[2900,3630]};

const toInt   = v => parseInt(String(v||"").replace(/[\s,]/g,""))||0;
const toFloat = v => parseFloat(String(v||"").replace(/,/g,"").replace(/[^\d.-]/g,""))||0;
const uid     = () => Math.random().toString(36).slice(2,9);
const fmtNum  = n => {const v=+(n||0);return v>=100000?(v/100000).toFixed(2)+" L":v.toLocaleString("en-IN");};

function parseMat(raw){
  const s=String(raw||"").trim();
  return{od:(s.match(/M(22|25|28)$/)||[])[1]||null,thick:+((s.match(/G(\d{2})\d/)||[])[1]||0)||null,grade:(s.match(/G\d{2}(\d{3})/)||[])[1]||null,isAB:s.includes("AB")};
}
function canFill(stockRaw,orderRaw){
  const s=parseMat(String(stockRaw||"").replace(/^3SF/,"3FG")),o=parseMat(String(orderRaw||"").replace(/^3SF/,"3FG"));
  if(!s.thick||s.thick!==o.thick)return false;
  if(!(OD_COMPAT[o.od]||[o.od]).includes(s.od))return false;
  if(o.isAB&&!s.isAB)return false;
  return true;
}
async function readXL(file){
  return new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=e=>{try{const wb=_XLSX.read(e.target.result,{type:"array",cellDates:true});const rawRows=_XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:null,raw:true});
      const rows=rawRows.map(r=>{
        const clean={};
        Object.keys(r).forEach(k=>{
          const v=r[k];
          if(typeof v==="number"&&v>40000&&v<50000&&k.toLowerCase().includes("date")){
            const d=new Date(Date.UTC(1899,11,30));d.setDate(d.getDate()+Math.floor(v));
            clean[k]=d.toISOString().split("T")[0];
          } else {clean[k]=v;}
        });
        return clean;
      });
      res(rows);}catch(err){rej(err);}};
    fr.onerror=rej;fr.readAsArrayBuffer(file);
  });
}
function buildMetPlan(bareData,penData,cfg){
  const bare=bareData.filter(r=>r.Batch),pend=penData.filter(r=>r.Material&&toInt(r["Pending Rolls"])>0);
  const rows=bare.map(b=>{
    const bW=toInt(b.Width),bL=toInt(String(b.Length).replace(/\s/g,"")),bTh=toFloat(b.Thickness);
    const sv=pend.filter(o=>Math.abs(toFloat(o.Thickness)-bTh)<0.5);
    const odC={"22":0,"25":0,"28":0};
    sv.forEach(o=>{const p=parseMat(String(o.Material));if(p.od)odC[p.od]+=toInt(o["Pending Rolls"]);});
    const dom=Object.entries(odC).sort((a,b)=>b[1]-a[1])[0]?.[0]||"22";
    const m1ok=bW>=1910&&bW<=3290,m2ok=bW>=2900&&bW<=3630;
    return{id:uid(),machine:m1ok&&!m2ok?"M-1":!m1ok&&m2ok?"M-2":"M-1",m1ok,m2ok,setNo:1,slotNo:1,odType:dom,
      bareMat:String(b.Material||"").trim(),batch:String(b.Batch||"").trim(),width:bW,length:bL,thickness:bTh,
      outputMat:String(b.Material||"").replace("3FG-G","3SF-G").trim(),
      customers:[...new Set(sv.map(o=>String(o["Consignee Name"]||"").split(" ").slice(0,2).join(" ")))].join(", ")||"-",
      cumMeters:0,notes:"",priority:dom==="22"?0:dom==="25"?1:2};
  });
  ["M-1","M-2"].forEach(machine=>{
    const mr=rows.filter(r=>r.machine===machine);mr.sort((a,b)=>a.priority-b.priority);
    let sN=1,slN=1,cum=0,slots=0,cap={22:cfg.boatCap22,25:cfg.boatCap25,28:cfg.boatCap28}[mr[0]?.odType||"22"]||5;
    mr.forEach((r,i)=>{
      if(i>0&&(slots>=cap||cum>=cfg.boatTarget)){sN++;slN=1;slots=0;cum=0;cap={22:cfg.boatCap22,25:cfg.boatCap25,28:cfg.boatCap28}[r.odType]||5;}
      r.setNo=sN;r.slotNo=slN;cum+=r.length;r.cumMeters=cum;slN++;slots++;
    });
  });
  return rows;
}

const Spin=({size=18,color="#fff"})=><span style={{display:"inline-block",width:size,height:size,border:"3px solid rgba(0,0,0,.1)",borderTopColor:color,borderRadius:"50%",animation:"spin .8s linear infinite",flexShrink:0}}/>;

function ChatBot({analysis,metPlan,cfg,onClose}){
  const [msgs,setMsgs]=useState([{role:"assistant",text:`Hello! I am your Plan Power AI.\n\nOrders: ${analysis?.pend?.length||0}\nRuns: ${metPlan?.length||0}\nBoat target: ${fmtNum(cfg.boatTarget)} m/set\n\nAsk me about your production plan!`}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);
  const ctx=()=>[
    `You are Plan Power AI, expert planning assistant for Met Department.`,
    `Boat target: ${fmtNum(cfg.boatTarget)} m/set. 2.2OD max ${cfg.boatCap22} runs, 2.5OD max ${cfg.boatCap25}, 2.8OD max ${cfg.boatCap28}.`,
    `Trim max: ${cfg.trimMax}mm. M-1: 1910-3290mm, M-2: 2900-3630mm.`,
    analysis?`Data: ${analysis.pend.length} orders, ${(analysis.totalKg/1000).toFixed(1)}MT total.`:"No data loaded.",
    "Answer concisely."
  ].join("\n");
  const send=async()=>{
    if(!input.trim()||loading)return;
    const msg=input.trim();setInput("");
    setMsgs(m=>[...m,{role:"user",text:msg}]);setLoading(true);
    try{
      const hist=msgs.slice(-8).map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:ctx(),messages:[...hist,{role:"user",content:msg}]})});
      const d=await res.json();
      setMsgs(m=>[...m,{role:"assistant",text:d.content?.map(c=>c.text||"").join("")||"No response."}]);
    }catch{setMsgs(m=>[...m,{role:"assistant",text:"Connection error. Try again."}]);}
    setLoading(false);
  };
  const render=t=>t.split("\n").map((l,i)=><div key={i} style={{marginBottom:l?2:6}}>{l||"\u00a0"}</div>);
  const QUICK=["Boat life rules?","OD substitution rules?","M-1 vs M-2 width?","Trim tolerance?"];
  return(
    <div style={{position:"fixed",bottom:0,right:0,zIndex:500,display:"flex",flexDirection:"column",width:"min(400px,100vw)",height:"min(560px,90vh)",background:"#fff",border:"1.5px solid #dde3ed",borderRadius:"14px 0 0 0",boxShadow:"0 -4px 32px rgba(26,48,92,.22)"}}>
      <div style={{background:C.navy,padding:"12px 16px",borderRadius:"13px 0 0 0",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <Logo size={26}/>
        <div style={{flex:1}}><div style={{color:"#fff",fontWeight:800,fontSize:14}}>Plan Power AI</div><div style={{color:"rgba(255,255,255,.4)",fontSize:11}}>Planning Assistant</div></div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,.1)",border:"none",color:"#fff",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:16,fontWeight:800}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 13px",display:"flex",flexDirection:"column",gap:8}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",gap:7,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="assistant"&&<div style={{width:24,height:24,borderRadius:12,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,color:"#fbbf24",fontWeight:800}}>P</div>}
            <div style={{maxWidth:"80%",padding:"8px 12px",borderRadius:m.role==="user"?"13px 13px 4px 13px":"13px 13px 13px 4px",background:m.role==="user"?C.accent:"#f1f5f9",color:m.role==="user"?"#fff":C.text,fontSize:13,lineHeight:1.55}}>{render(m.text)}</div>
          </div>
        ))}
        {loading&&<div style={{display:"flex",gap:7,alignItems:"center"}}><div style={{width:24,height:24,borderRadius:12,background:C.navy,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fbbf24",fontWeight:800}}>P</div><div style={{padding:"8px 12px",background:"#f1f5f9",borderRadius:"13px 13px 13px 4px",display:"flex",gap:5}}>{[0,1,2].map(i=><span key={i} style={{width:6,height:6,borderRadius:3,background:"#94a3b8",display:"inline-block",animation:`bounce .9s ${i*.2}s infinite`}}/>)}</div></div>}
        <div ref={endRef}/>
      </div>
      {msgs.length<=1&&<div style={{padding:"4px 10px 6px",display:"flex",gap:5,flexWrap:"wrap"}}>{QUICK.map((q,i)=><button key={i} onClick={()=>setInput(q)} style={{background:C.accentLt,color:C.accent,border:"1px solid #bfdbfe",borderRadius:18,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>{q}</button>)}</div>}
      
      <div style={{fontSize:20,fontWeight:800,color:C.navy,marginBottom:6}}>Registration Complete!</div>
      <div style={{fontSize:13,color:C.textMd,marginBottom:4,lineHeight:1.6}}>Your <strong>30-day free trial</strong> has started.<br/>Login with your phone number and password.</div>
      <button onClick={onDone} style={{...btn(C.navy,"#fff",{padding:"11px 30px",fontSize:14,marginTop:16})}}>Go to Login →</button>
    </div>
  );

  const STEPS=["Your Details","Face Photo","Done"];
  return(
    <div>
      <div style={{display:"flex",marginBottom:20,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`}}>
        {STEPS.map((s,i)=>(
          <div key={s} style={{flex:1,padding:"8px 4px",textAlign:"center",fontSize:11,fontWeight:700,
            background:step===i+1?C.navy:step>i+1?"#15803d":"#f8fafc",
            color:step>=i+1?"#fff":C.textLt,
            borderRight:i<2?`1px solid ${C.border}`:undefined}}>
            {step>i+1?"✓ ":""}{s}
          </div>
        ))}
      </div>

      {step===1&&(
        <div>
          {[{l:"Full Name",k:"name",ph:"Your full name",t:"text"},
            {l:"Phone Number",k:"phone",ph:"10-digit mobile number",t:"tel"},
            {l:"Company / Organisation",k:"company",ph:"Company name",t:"text"},
            {l:"Password",k:"password",ph:"Min 6 characters",t:"password"},
            {l:"Confirm Password",k:"confirm",ph:"Re-enter password",t:"password"},
          ].map(f=>(
            <div key={f.k} style={{marginBottom:11}}>
              <label style={lbl}>{f.l}</label>
              <input type={f.t} value={form[f.k]} onChange={e=>upd(f.k,e.target.value)}
                placeholder={f.ph} style={inp()}/>
            </div>
          ))}
          {err&&<ErrBox msg={err}/>}
          <button onClick={()=>{
            if(!form.name.trim()||!form.phone.trim()||!form.company.trim()||!form.password){setErr("All fields are required.");return;}
            if(form.phone.replace(/\D/g,"").length<10){setErr("Enter a valid 10-digit phone number.");return;}
            if(form.password.length<6){setErr("Password must be at least 6 characters.");return;}
            if(form.password!==form.confirm){setErr("Passwords do not match.");return;}
            setErr("");setStep(2);
          }} style={{...btn(C.navy,"#fff",{width:"100%",padding:"12px",fontSize:14,marginTop:4})}}>
            Next: Take Face Photo →
          </button>
        </div>
      )}

      {step===2&&(
        <div style={{textAlign:"center"}}>
          <p style={{fontSize:13,color:C.textMd,marginBottom:14,lineHeight:1.5}}>Take a clear selfie. This helps admin verify your identity.</p>
          <div style={{position:"relative",width:200,height:200,borderRadius:100,margin:"0 auto 14px",overflow:"hidden",
            border:`3px solid ${facePhoto?"#15803d":C.border}`,background:"#f0f4f8",flexShrink:0}}>
            <video ref={videoRef} autoPlay playsInline muted style={{width:200,height:200,objectFit:"cover",display:camOn?"block":"none"}}/>
            <canvas ref={canvasRef} style={{display:"none"}}/>
            {facePhoto&&<img src={facePhoto} style={{width:200,height:200,objectFit:"cover"}} alt="face"/>}
            {!camOn&&!facePhoto&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:C.textLt}}>
              <div style={{fontSize:44}}>📷</div><div style={{fontSize:12,marginTop:6}}>Camera preview</div>
            </div>}
          </div>
          {!facePhoto&&!camOn&&<button onClick={startCam} style={{...btn(C.navy,"#fff",{padding:"10px 24px"})}}>📷 Open Camera</button>}
          {camOn&&<div style={{display:"flex",gap:8,justifyContent:"center"}}>
            <button onClick={snap} style={{...btn("#15803d","#fff",{padding:"10px 22px"})}}>📸 Take Photo</button>
            <button onClick={stopCam} style={{...btn("#94a3b8","#fff",{padding:"10px 14px"})}}>✕</button>
          </div>}
          {facePhoto&&<div>
            <div style={{color:"#15803d",fontWeight:700,marginBottom:12}}>✓ Photo captured!</div>
            <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
              <button onClick={()=>{setFacePhoto(null);setTimeout(startCam,100);}} style={{...btn("#f1f5f9",C.textMd,{border:`1px solid ${C.border}`})}}>↺ Retake</button>
              <button onClick={submit} disabled={loading} style={{...btn(C.navy,"#fff",{padding:"10px 22px"})}}>
                {loading?<><Spin size={16}/>Registering...</>:"✓ Complete Registration"}
              </button>
            </div>
          </div>}
          {err&&<ErrBox msg={err}/>}
          <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:C.textMd,cursor:"pointer",fontSize:13,marginTop:12,display:"block",margin:"14px auto 0"}}>← Back to Details</button>
        </div>
      )}
    </div>
  );
}

function AdminPanel({cfg,setCfg,onClose}){
  const [aTab,setATab]=useState("users");
  const [users,setUsers]=useState([]);
  const [loadingU,setLoadingU]=useState(false);
  const [uErr,setUErr]=useState("");
  const [selUser,setSelUser]=useState(null);
  const [search,setSearch]=useState("");
  const [lc,setLc]=useState({...cfg});
  const [saved,setSaved]=useState(false);

  const loadUsers=async()=>{
    setLoadingU(true);setUErr("");
    try{setUsers(await fbGetAllUsers());}
    catch(e){setUErr("Failed to load: "+e.message);}
    setLoadingU(false);
  };
  useEffect(()=>{if(aTab==="users")loadUsers();},[aTab]);

  const doDelete=async(id,name)=>{
    if(!confirm(`Delete user "${name}"? Cannot be undone.`))return;
    await fbDeleteUser(id);
    setUsers(u=>u.filter(x=>x.id!==id));
    if(selUser?.id===id)setSelUser(null);
  };
  const doToggle=async(id,cur)=>{
    await fbSetActive(id,!cur);
    setUsers(u=>u.map(x=>x.id===id?{...x,active:!cur}:x));
    if(selUser?.id===id)setSelUser(s=>({...s,active:!cur}));
  };
  const doExtend=async(id)=>{
    await fbExtendTrial(id);
    const ts=new Date().toISOString();
    setUsers(u=>u.map(x=>x.id===id?{...x,trialStart:ts}:x));
    if(selUser?.id===id)setSelUser(s=>({...s,trialStart:ts}));
  };

  const filt=users.filter(u=>{
    const q=search.toLowerCase();
    return!q||u.name?.toLowerCase().includes(q)||u.phone?.includes(q)||u.company?.toLowerCase().includes(q);
  });

  const upd=(k,v)=>setLc(c=>({...c,[k]:v}));
  const save=()=>{setCfg(lc);setSaved(true);setTimeout(()=>setSaved(false),2200);};
  const F=({label,k,type,full})=>(
    <div style={{gridColumn:full?"1/-1":"auto"}}>
      <label style={lbl}>{label}</label>
      <input type={type||"number"} value={lc[k]||""} onChange={e=>upd(k,type==="text"?e.target.value:Number(e.target.value))} style={inp()}/>
    </div>
  );

  const statColors={navy:C.navy,green:"#15803d",amber:"#92400e",red:C.red};
  const stats=[
    {l:"Total",v:users.length,c:"navy"},
    {l:"Active",v:users.filter(u=>u.active).length,c:"green"},
    {l:"Expiring",v:users.filter(u=>trialDaysLeft(u.trialStart)<=7&&u.active).length,c:"amber"},
    {l:"Expired",v:users.filter(u=>trialDaysLeft(u.trialStart)===0).length,c:"red"},
  ];

  return(
    <div style={{position:"fixed",inset:0,zIndex:400,background:"rgba(10,20,45,.62)",display:"flex",alignItems:"center",justifyContent:"center",padding:12}}>
      <div style={{background:"#fff",borderRadius:18,width:"min(960px,100%)",maxHeight:"94vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 72px rgba(0,0,0,.38)",overflow:"hidden"}}>

        {/* Header */}
        <div style={{background:C.navy,padding:"13px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
          <Logo size={30}/>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:16}}>Admin Panel</div>
            <div style={{color:"rgba(255,255,255,.35)",fontSize:11}}>Plan Power Management Console</div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
            <div style={{background:"rgba(251,191,36,.15)",border:"1px solid rgba(251,191,36,.3)",borderRadius:8,padding:"4px 12px",color:"#fbbf24",fontSize:13,fontWeight:700}}>
              {users.length} Registered
            </div>
            <button onClick={onClose} style={{...btn("rgba(255,255,255,.1)","rgba(255,255,255,.65)",{border:"1px solid rgba(255,255,255,.15)",padding:"7px 14px"})}}>✕ Close</button>
          </div>
        </div>

        {/* Sub-tabs */}
        <div style={{display:"flex",borderBottom:`2px solid ${C.border}`,background:"#f8fafc",flexShrink:0}}>
          {[{id:"users",icon:"👥",lbl:"Users"},{id:"settings",icon:"⚙",lbl:"Settings"}].map(t=>(
            <button key={t.id} onClick={()=>setATab(t.id)} style={{background:"transparent",border:"none",
              borderBottom:aTab===t.id?`3px solid ${C.navy}`:"3px solid transparent",
              padding:"11px 22px",fontSize:13,fontWeight:700,cursor:"pointer",
              color:aTab===t.id?C.navy:C.textMd,display:"flex",alignItems:"center",gap:6,marginBottom:-2,fontFamily:"inherit"}}>
              {t.icon} {t.lbl}
            </button>
          ))}
        </div>

        {/* Body */}
        <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>

          {/* ── USERS TAB ── */}
          {aTab==="users"&&(
            <div style={{flex:1,display:"flex",overflow:"hidden"}}>

              {/* Left: list */}
              <div style={{width:selUser?360:600,maxWidth:"100%",display:"flex",flexDirection:"column",borderRight:selUser?`1px solid ${C.border}`:undefined,flexShrink:0}}>

                {/* Stats bar */}
                <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,background:"#f8fafc",flexShrink:0}}>
                  {stats.map(s=>(
                    <div key={s.l} style={{flex:1,padding:"10px 8px",textAlign:"center",borderRight:`1px solid ${C.border}`}}>
                      <div style={{fontSize:22,fontWeight:800,color:statColors[s.c]}}>{s.v}</div>
                      <div style={{fontSize:10,color:C.textLt,fontWeight:700,textTransform:"uppercase"}}>{s.l}</div>
                    </div>
                  ))}
                </div>

                {/* Search + refresh */}
                <div style={{padding:"10px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:7,flexShrink:0}}>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, phone, company…"
                    style={{...inp({fontSize:12,minHeight:34,flex:1})}}/>
                  <button onClick={loadUsers} style={{...btn("#eff6ff",C.accent,{padding:"6px 10px",minHeight:34,fontSize:14,border:`1px solid #bfdbfe`})}}>↻</button>

                {loadingU&&<div style={{padding:32,textAlign:"center",color:C.textMd}}><Spin color={C.accent} size={28}/><div style={{marginTop:10,fontSize:13}}>Loading users…</div></div>}
                {uErr&&<div style={{margin:12,padding:"10px 14px",background:C.redLt,border:`1px solid ${C.redBd}`,borderRadius:9,color:C.red,fontSize:13}}>{uErr}</div>}

                {!loadingU&&!uErr&&filt.length===0&&(
                  <div style={{padding:40,textAlign:"center",color:C.textMd}}>
                    <div style={{fontSize:44,marginBottom:10}}>👥</div>
                    <div style={{fontWeight:700}}>{search?"No users match search":"No users registered yet"}</div>

                {/* User rows */}
                <div style={{flex:1,overflowY:"auto"}}>
                  {filt.map((u,i)=>{
                    const days=trialDaysLeft(u.trialStart);
                    const isSel=selUser?.id===u.id;
                    return(
                      <div key={u.id} onClick={()=>setSelUser(isSel?null:u)}

                    <div style={{fontWeight:800,fontSize:16,color:C.navy}}>User Details</div>

                  <div style={{textAlign:"center",marginBottom:18}}>

                  <div style={{...card({padding:14,marginBottom:14})}}>
                    {[
                      {l:"Phone",v:selUser.phone},
                      {l:"Company",v:selUser.company},
                      {l:"Registered",v:fmtDate(selUser.registeredAt)},
                      {l:"Last Login",v:fmtDate(selUser.lastLogin)},
                      {l:"Trial Start",v:fmtDate(selUser.trialStart)},
                      {l:"Trial Expires",v:(()=>{const d=new Date(selUser.trialStart);d.setDate(d.getDate()+30);return fmtDate(d.toISOString());})()},

                      <div key={r.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                        <span style={{fontSize:12,color:C.textMd,fontWeight:700}}>{r.l}</span>

                    ))}
                  </div>

                  {/* Action buttons */}
                  <div style={{display:"flex",flexDirection:"column",gap:9}}>
                    <button onClick={()=>doExtend(selUser.id)}
                      style={{...btn("#eff6ff",C.accent,{border:`1px solid #bfdbfe`,fontSize:13,padding:"10px 16px"})}}>
                      🔄 Extend Trial +30 Days
                    </button>

// ─────────────────────────────────────────────────────────────────────────────
// SMART PLANNING ENGINE
// ─────────────────────────────────────────────────────────────────────────────
function smartPlan(penData, bareData, mjData, fgjmData, cfg, machineMode, priorities){
  /* ═══════════════════════════════════════════════════════════════
     GLS MET/F/04 PLANNING ENGINE v4
     TRIM RULE: Fixed per OD type (M22=15, M25=20, M28=25)
     noOfRoll = sets × slitLen / jumboLen  (trim does NOT affect this)
     noOfRoll < 1 is CORRECT for small orders (e.g. 1 roll × 24000m / 72000m = 0.333)
  ═══════════════════════════════════════════════════════════════ */
  const M1_MIN=1910, M1_MAX=3290, M2_MIN=2900, M2_MAX=3630;
  const JUMBO_LEN=72000;

  function trimForOD(od){ return od==="M28"?25:od==="M25"?20:15; }
  function getKey(o){ return (o.Material||"")+"_"+(o.Width||"")+"_"+(o["Sales Order"]||""); }
  function baseMicron(mat){ const m=(mat||"").match(/G(\d{2})/);return m?m[1]:"12"; }
  function odSuffix(mat){ const m=(mat||"").match(/M(\d{2})(?:\D|$)/);return m?"M"+m[1]:"M22"; }
  function groupKey(o){ return baseMicron(o.Material)+"_"+odSuffix(o.Material)+"_"+(parseInt(o.Length)||0); }
  function findBare(micron,minW){
    const prefix="3FG-G"+micron;
    return (bareData||[]).filter(b=>{
      if(!b.Material) return false;
      const bw=toFloat(b.Width||b.width||0);
      return String(b.Material).startsWith(prefix)&&bw>=minW-50&&bw>0;
    }).sort((a,b)=>toFloat(b.Length||0)-toFloat(a.Length||0))[0]||null;
  }
  function shortCust(c){ return String(c||"").split(" ").slice(0,2).join(" "); }
  function fmtRoll(n){ return Math.round(n*1000)/1000; }

  // ── Sort pending ──────────────────────────────────────────────
  let pending=penData.filter(r=>r.Material&&toFloat(r["Pending Rolls"])>0);
  const priMap={};
  (priorities||[]).forEach(p=>priMap[p.key]=p.priority);
  pending.sort((a,b)=>{
    const pa=priMap[getKey(a)]||999,pb=priMap[getKey(b)]||999;
    if(pa!==pb) return pa-pb;
    const da=a["Required Delivery Date"]?new Date(a["Required Delivery Date"]).getTime():9e15;
    const db=b["Required Delivery Date"]?new Date(b["Required Delivery Date"]).getTime():9e15;
    if(da!==db) return da-db;
    return toFloat(b["Pending Rolls"])-toFloat(a["Pending Rolls"]);
  });

  const planRows=[]; const usedKeys=new Set();

  // ── FGJM direct ───────────────────────────────────────────────
  for(const order of pending){
    const k=getKey(order),ow=toFloat(order.Width);
    const match=(fgjmData||[]).find(f=>f.Material&&String(f.Material).startsWith((order.Material||"").slice(0,14))&&Math.abs(toFloat(f.Width||f.width||0)-ow)<=50);
    if(match){planRows.push({source:"FGJM",included:true,order,ref:match});usedKeys.add(k);}
  }

  // ── MJ slit ───────────────────────────────────────────────────
  for(const order of pending){
    const k=getKey(order);if(usedKeys.has(k)) continue;
    const ow=toFloat(order.Width),om=String(order.Material||"");
    const match=(mjData||[]).find(m=>m.Material&&String(m.Material||"").replace(/^SM/,"").startsWith(om.slice(0,14).replace(/^SM/,""))&&toFloat(m.Width||m.width||0)>=ow-50);
    if(match){planRows.push({source:"MJ",included:true,order,ref:match});usedKeys.add(k);}
  }

  // ── Met Runs ──────────────────────────────────────────────────
  const metOrders=pending.filter(o=>!usedKeys.has(getKey(o)));
  const groups={};
  for(const o of metOrders){
    const gk=groupKey(o);
    if(!groups[gk]) groups[gk]={micron:baseMicron(o.Material),od:odSuffix(o.Material),slitLen:parseInt(o.Length)||0,items:[]};
    groups[gk].items.push({...o,_rem:toFloat(o["Pending Rolls"])});
  }

  for(const [gk,grp] of Object.entries(groups)){
    const {micron,od,slitLen}=grp;
    const TRIM=trimForOD(od);  // FIXED trim — never changes
    const machMax=(machineMode==="M-2")?M2_MAX:(machineMode==="M-1")?M1_MAX:M2_MAX;

    let items=grp.items.filter(i=>i._rem>0).map(i=>({...i}));
    let safety=0;

    while(items.some(i=>i._rem>0)&&safety++<200){
      const remaining=items.filter(i=>i._rem>0);
      remaining.sort((a,b)=>{
        if(Math.abs(b._rem-a._rem)>0.5) return b._rem-a._rem;
        return toFloat(b.Width)-toFloat(a.Width);
      });

      // ── Build arm list ───────────────────────────────────────
      const armList=[]; let usedW=TRIM;

      // Pass 1: distinct orders (most-pending first)
      const added=new Set();
      for(const item of remaining){
        const k2=getKey(item);
        if(!added.has(k2)&&armList.length<5&&usedW+toFloat(item.Width)<=machMax){
          armList.push(item); usedW+=toFloat(item.Width); added.add(k2);
        }
      }
      if(armList.length===0) break;

      // Pass 2: fill machine width with duplicates (same order on multiple arms)
      let filled=true;
      while(filled&&armList.length<5){
        filled=false;
        const uniq=[...new Set(armList.map(a=>getKey(a)))]
          .map(k2=>armList.find(a=>getKey(a)===k2))
          .sort((a,b)=>b._rem-a._rem);
        for(const cand of uniq){
          const w=toFloat(cand.Width);
          if(armList.length<5&&usedW+w<=machMax){armList.push(cand);usedW+=w;filled=true;break;}
        }
      }

      // ── Calculate sets ───────────────────────────────────────
      const armCounts={};
      for(const a of armList){const k2=getKey(a);armCounts[k2]=(armCounts[k2]||0)+1;}
      const uniqArms=Object.keys(armCounts).map(k2=>armList.find(a=>getKey(a)===k2));
      let sets=Math.min(...uniqArms.map(ua=>Math.floor(ua._rem/armCounts[getKey(ua)])));
      sets=Math.max(1,sets);

      const rollSize=armList.reduce((s,a)=>s+toFloat(a.Width),0)+TRIM;
      const machine=(machineMode==="M-1")?"M-1":(machineMode==="M-2")?"M-2":rollSize>M1_MAX?"M-2":rollSize>=M1_MIN?"M-1":"M-2";
      const bareRoll=findBare(micron,rollSize);
      const jumboLen=bareRoll?toFloat(bareRoll.Length||0):JUMBO_LEN;
      const noOfRoll=fmtRoll(sets*slitLen/(jumboLen||JUMBO_LEN));

      for(const ua of uniqArms){
        const cnt=armCounts[getKey(ua)];
        const orig=items.find(r=>getKey(r)===getKey(ua));
        if(orig) orig._rem=Math.max(0,orig._rem-cnt*sets);
      }

      planRows.push({
        source:"BARE",included:true,machine,
        material:uniqArms[0].Material,
        bare:bareRoll,rollSize,jumboLen,noOfRoll,
        trim:TRIM,slitLen,
        arms:armList.map(a=>toFloat(a.Width)),
        sets,metalIO:"I",packMode:"WM",
        od,micron,customers:[...new Set(armList.map(a=>shortCust(a["Consignee Name"])))].join(" / "),
        orders:armList
      });

      items=items.filter(i=>i._rem>0);
    }
  }
  return planRows;
}


// ─────────────────────────────────────────────────────────────────────────────
// PENDENCY ANALYSIS COMPONENT
// ─────────────────────────────────────────────────────────────────────────────
function PendencyAnalysis({pen, mj, fgjm, bare, cfg, onMakePlan}){
  const [view,setView]=useState("customer");
  const [sortKey,setSortKey]=useState("rolls");
  const [sortDir,setSortDir]=useState(-1);
  const [selGroups,setSelGroups]=useState([]); // selected film type keys as array
  const toggleGroup=(key)=>{
    setSelGroups(function(s){ return s.indexOf(key)>=0?s.filter(function(k){return k!==key;}):[...s,key]; });
  };
  const selAll=(fdata)=>setSelGroups((fdata||[]).map(function(f){return f.key;}));
  const selNone=()=>setSelGroups([]);
  const pend=useMemo(()=>pen.filter(r=>r.Material&&(toInt(r["Pending Rolls"])>0||toFloat(r["Pending Rolls"])>0)),[pen]);

  const OD_COMPAT={"22":["22","25","28"],"25":["25","28"],"28":["28"]};

  // ── Source analysis (if other files loaded) ──
  const withSource=useMemo(()=>{
    if(!fgjm.length&&!mj.length&&!bare.length) return pend.map(o=>({...o,_src:"UNKNOWN"}));
    return pend.map(order=>{
      const oMat=String(order.Material).trim(), oW=toInt(order.Width), oL=toInt(order.Length);
      const op=parseMat(oMat), minT=op.od==="22"?cfg.trimMinOD22:cfg.trimMinOD25;
      const fg=fgjm.find(x=>x.Batch&&canFill(x.Material,oMat)&&Math.abs(toInt(x.Width)-oW)<=50);
      if(fg) return{...order,_src:"FGJM"};
      const mjr=mj.find(x=>x.Batch&&canFill(String(x.Material||"").replace(/^3SF/,"3FG").replace("SM",""),oMat)&&toInt(x.Width)>=oW+minT&&toInt(x.Length)>=oL);
      if(mjr) return{...order,_src:"MJ"};
      const br=bare.find(x=>x.Batch&&Math.abs(toFloat(x.Thickness)-(op.thick||0))<0.5);
      if(br) return{...order,_src:"BARE"};
      return{...order,_src:"NONE"};
    });
  },[pend,fgjm,mj,bare,cfg]);

  // ── Customer grouping ──
  const customerData=useMemo(()=>{
    const map={};
    withSource.forEach(o=>{
      const c=String(o["Consignee Name"]||"Unknown").trim();
      if(!map[c]) map[c]={customer:c,rolls:0,kg:0,orders:0,microns:new Set(),src:{}};
      map[c].rolls+=toInt(o["Pending Rolls"])||toFloat(o["Pending Rolls"]);
      const pp=toFloat(o["Pend. Prod."]);
      const wr=toFloat(o["Weight /Roll"]||o["Weight/Roll"]||0)*( toFloat(o["Pending Rolls"]||0));
      map[c].kg+=(pp>0?pp:(wr>0?wr:0));
      map[c].orders++;
      const th=toFloat(o.Thickness);
      if(th) map[c].microns.add(th);
      map[c].src[o._src]=(map[c].src[o._src]||0)+1;
    });
    return Object.values(map).map(x=>({...x,microns:[...x.microns].sort((a,b)=>a-b)}));
  },[withSource]);

  // ── Date grouping ──
  const dateData=useMemo(()=>{
    const map={};
    withSource.forEach(o=>{
      const d=String(o["Required Delivery Date"]||o["SO Crtd Dt."]||"No Date").split("T")[0];
      if(!map[d]) map[d]={date:d,rolls:0,kg:0,orders:0,items:[]};
      map[d].rolls+=toInt(o["Pending Rolls"])||toFloat(o["Pending Rolls"]);
      map[d].kg+=toFloat(o["Pend. Prod."]);
      map[d].orders++;
      map[d].items.push(o);
    });
    return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
  },[withSource]);

  // ── Film type grouping ──
  const filmData=useMemo(()=>{
    const map={};
    withSource.forEach(o=>{
      const th=toFloat(o.Thickness)||"?";
      const op=parseMat(String(o.Material||""));
      const od=op.od?`${op.od==="22"?"2.2":op.od==="25"?"2.5":"2.8"} OD`:"? OD";
      const key=`${th}µ · ${od}`;
      if(!map[key]) map[key]={key,thick:th,od:op.od||"?",rolls:0,kg:0,orders:0,customers:new Set(),widths:new Set()};
      map[key].rolls+=toInt(o["Pending Rolls"])||toFloat(o["Pending Rolls"]);
      map[key].kg+=toFloat(o["Pend. Prod."]);
      map[key].orders++;
      map[key].customers.add(String(o["Consignee Name"]||"").split(" ").slice(0,2).join(" "));
      map[key].widths.add(toInt(o.Width));
    });
    return Object.values(map).map(x=>({...x,customers:[...x.customers],widths:[...x.widths].sort((a,b)=>a-b)})).sort((a,b)=>b.rolls-a.rolls);
  },[withSource]);

  const hasFullData=fgjm.length>0||mj.length>0||bare.length>0;
